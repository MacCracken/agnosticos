# base-system.yml — Validate base system recipes and build container
#
# Validates recipe format, dependency closure, and source URL reachability.
# Full LFS builds require proper bootstrap ordering and run separately.

name: Base System Validation

on:
  push:
    paths:
      - 'recipes/base/**'
      - 'scripts/ark-build.sh'
      - 'scripts/ark-validate-recipes.sh'
      - 'Dockerfile.takumi'
  pull_request:
    paths:
      - 'recipes/base/**'
  workflow_dispatch:

env:
  SOURCE_DATE_EPOCH: ${{ github.event.repository.pushed_at }}

jobs:
  # -----------------------------------------------------------------
  # Step 1: Validate recipe format and dependency closure
  # -----------------------------------------------------------------
  validate-recipes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all recipes
        run: |
          chmod +x scripts/ark-validate-recipes.sh
          ./scripts/ark-validate-recipes.sh recipes/base/

  # -----------------------------------------------------------------
  # Step 2: Build the takumi builder container
  # -----------------------------------------------------------------
  build-builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set SOURCE_DATE_EPOCH from git
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> $GITHUB_ENV

      - name: Build takumi builder image
        run: |
          docker build \
            -f Dockerfile.takumi \
            --build-arg SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }} \
            -t takumi-builder:local .

      - name: Verify builder container starts
        run: docker run --rm takumi-builder:local --help

      - name: Verify build tools present
        run: |
          docker run --rm --entrypoint bash takumi-builder:local -c "
            gcc --version | head -1 &&
            make --version | head -1 &&
            cmake --version | head -1 &&
            python3 --version &&
            echo 'Recipes:' && ls /recipes/base/*.toml | wc -l &&
            echo 'Container healthy'
          "

  # -----------------------------------------------------------------
  # Step 3: Build data-only packages (quick validation)
  # -----------------------------------------------------------------
  build-data-packages:
    needs: build-builder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build takumi builder image
        run: |
          docker build \
            -f Dockerfile.takumi \
            --build-arg SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) \
            -t takumi-builder:local .

      - name: Build iana-etc (data-only, quick validation)
        run: |
          mkdir -p dist/ark
          docker run --rm \
            -v "$(pwd)/dist/ark:/output" \
            -v "$(pwd)/cache:/cache" \
            takumi-builder:local recipes/base/iana-etc.toml || true

      - name: Build man-pages (data-only, quick validation)
        run: |
          docker run --rm \
            -v "$(pwd)/dist/ark:/output" \
            -v "$(pwd)/cache:/cache" \
            takumi-builder:local recipes/base/man-pages.toml || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ark-packages-data
          path: dist/ark/*.ark
          retention-days: 7
          if-no-files-found: ignore

  # -----------------------------------------------------------------
  # Step 4: Full LFS bootstrap (manual trigger only, takes hours)
  # -----------------------------------------------------------------
  full-bootstrap:
    if: github.event_name == 'workflow_dispatch'
    needs: [validate-recipes, build-builder]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Build takumi builder image
        run: |
          docker build \
            -f Dockerfile.takumi \
            --build-arg SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) \
            -t takumi-builder:local .

      - name: Bootstrap Phase 10A (toolchain)
        run: |
          mkdir -p dist/ark
          for pkg in linux-api-headers gmp mpfr mpc glibc binutils gcc; do
            echo "::group::Building ${pkg}"
            docker run --rm \
              -v "$(pwd)/dist/ark:/output" \
              -v "$(pwd)/cache:/cache" \
              -e ARK_SKIP_CHECK=1 \
              takumi-builder:local "recipes/base/${pkg}.toml" || \
              echo "::warning::Failed to build ${pkg} (expected in bootstrap)"
            echo "::endgroup::"
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ark-packages-bootstrap
          path: dist/ark/*.ark
          retention-days: 7
          if-no-files-found: ignore
