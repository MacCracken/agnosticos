name: Build Bootable Images

# Builds AGNOS bootable media:
#   - x86_64 installer ISO (desktop/server unified + minimal)
#   - aarch64 SD card image (desktop/server unified)
#   - aarch64 minimal SD card image
#   - x86_64 edge ISO (dm-verity, LFS-style)
#   - aarch64 edge SD card image (dm-verity, RPi firmware included)
#
# Triggered via workflow_call from release.yml or manually.

on:
  workflow_call:
    inputs:
      version:
        description: 'AGNOS version'
        required: true
        type: string
      use_agnos_base:
        description: 'Use AGNOS base rootfs instead of Debian debootstrap'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      version:
        description: 'AGNOS version (leave empty for VERSION file)'
        required: false
        type: string
      use_agnos_base:
        description: 'Use AGNOS base rootfs instead of Debian debootstrap'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  # =========================================================================
  # x86_64 Installer ISO (Desktop/Server unified)
  # Output: agnos-YYYYMMDD-x86_64.iso
  # =========================================================================
  build-x86_64-installer:
    name: Build x86_64 Installer ISO
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          debootstrap \
          squashfs-tools \
          grub-pc-bin \
          grub-efi-amd64-bin \
          grub-common \
          grub2-common \
          xorriso \
          mtools \
          zstd \
          debian-archive-keyring

    - name: Download x86_64 binaries
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-amd64
        path: artifacts/
      continue-on-error: true

    - name: Try downloading AGNOS base rootfs
      id: agnos-base
      if: inputs.use_agnos_base
      run: |
        if curl -fSL -o /tmp/agnos-base-rootfs-x86_64.tar.zst \
          "https://github.com/MacCracken/agnosticos/releases/download/base-rootfs-latest/agnos-base-rootfs-x86_64.tar.zst" 2>/dev/null; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi
      continue-on-error: true

    - name: Extract binaries
      run: |
        mkdir -p userland/target/x86_64-unknown-linux-musl/release
        EXTRACT_DIR="$(mktemp -d)"
        # Try tarball first, fall back to raw files (download-artifact v4 compat)
        tar xzf artifacts/*.tar.gz -C "$EXTRACT_DIR" 2>/dev/null \
          || cp artifacts/* "$EXTRACT_DIR/" 2>/dev/null \
          || true
        for bin in agent_runtime llm_gateway agnsh agnos_sudo desktop_environment ai_shell; do
          find "$EXTRACT_DIR" -name "$bin" -type f -exec cp {} userland/target/x86_64-unknown-linux-musl/release/ \;
        done
        ls -la userland/target/x86_64-unknown-linux-musl/release/ 2>/dev/null || echo "No binaries"

    - name: Build installer ISO (desktop profile)
      run: |
        VERSION="${{ inputs.version || '' }}"
        ARGS="--profile desktop --skip-build"
        [ -n "$VERSION" ] && ARGS="$ARGS --version $VERSION"
        [[ "${{ steps.agnos-base.outputs.available }}" == "true" ]] && \
          ARGS="$ARGS --base-rootfs /tmp/agnos-base-rootfs-x86_64.tar.zst"
        sudo ./scripts/build-installer.sh $ARGS

    - name: Fix output permissions
      run: sudo chown -R "$(id -u):$(id -g)" output/

    - name: Upload x86_64 installer ISO
      uses: actions/upload-artifact@v4
      with:
        name: agnos-installer-x86_64
        path: |
          output/agnos-*-x86_64.iso
          output/agnos-*-x86_64.iso.sha256

  # =========================================================================
  # x86_64 Minimal ISO (headless)
  # Output: agnos-YYYYMMDD-minimal-x86_64.iso
  # =========================================================================
  build-x86_64-minimal:
    name: Build x86_64 Minimal ISO
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          debootstrap squashfs-tools grub-pc-bin grub-efi-amd64-bin \
          grub-common grub2-common xorriso mtools debian-archive-keyring

    - name: Download x86_64 binaries
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-amd64
        path: artifacts/
      continue-on-error: true

    - name: Extract binaries
      run: |
        mkdir -p userland/target/x86_64-unknown-linux-musl/release
        EXTRACT_DIR="$(mktemp -d)"
        # Try tarball first, fall back to raw files (download-artifact v4 compat)
        tar xzf artifacts/*.tar.gz -C "$EXTRACT_DIR" 2>/dev/null \
          || cp artifacts/* "$EXTRACT_DIR/" 2>/dev/null \
          || true
        for bin in agent_runtime llm_gateway agnsh agnos_sudo; do
          find "$EXTRACT_DIR" -name "$bin" -type f -exec cp {} userland/target/x86_64-unknown-linux-musl/release/ \;
        done

    - name: Download SY edge binary
      run: |
        curl -sfL -o /tmp/secureyeoman-edge-linux-x64 \
          "https://github.com/MacCracken/SecureYeoman/releases/latest/download/secureyeoman-edge-linux-x64" || true
      continue-on-error: true

    - name: Build minimal ISO
      run: |
        VERSION="${{ inputs.version || '' }}"
        ARGS="--profile minimal --skip-build"
        [ -n "$VERSION" ] && ARGS="$ARGS --version $VERSION"
        [ -f /tmp/secureyeoman-edge-linux-x64 ] && ARGS="$ARGS --sy-edge-binary /tmp/secureyeoman-edge-linux-x64"
        sudo ./scripts/build-installer.sh $ARGS

    - name: Fix output permissions
      run: sudo chown -R "$(id -u):$(id -g)" output/

    - name: Upload minimal ISO
      uses: actions/upload-artifact@v4
      with:
        name: agnos-minimal-x86_64
        path: |
          output/agnos-*-minimal-x86_64.iso
          output/agnos-*-minimal-x86_64.iso.sha256

  # =========================================================================
  # aarch64 SD Card Image (Desktop/Server unified)
  # Output: agnos-YYYYMMDD-aarch64.img
  # =========================================================================
  build-aarch64-sdcard:
    name: Build aarch64 SD Card Image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          debootstrap dosfstools parted e2fsprogs \
          qemu-user-static binfmt-support \
          debian-archive-keyring curl

    - name: Download aarch64 binaries
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-arm64
        path: artifacts/
      continue-on-error: true

    - name: Extract binaries
      run: |
        mkdir -p userland/target/aarch64-unknown-linux-gnu/release
        EXTRACT_DIR="$(mktemp -d)"
        if ls artifacts/*.tar.gz 1>/dev/null 2>&1; then
          tar xzf artifacts/*.tar.gz -C "$EXTRACT_DIR"
        else
          # download-artifact v4 extracts files directly — no tarball wrapper
          cp artifacts/* "$EXTRACT_DIR/" 2>/dev/null || true
        fi
        for bin in agent_runtime llm_gateway agnsh agnos_sudo desktop_environment ai_shell; do
          find "$EXTRACT_DIR" -name "$bin" -type f -exec cp {} userland/target/aarch64-unknown-linux-gnu/release/ \;
        done
        ls -la userland/target/aarch64-unknown-linux-gnu/release/ 2>/dev/null || echo "No binaries"

    - name: Build aarch64 SD card image (desktop profile)
      run: |
        VERSION="${{ inputs.version || '' }}"
        ARGS="--profile desktop --skip-build"
        [ -n "$VERSION" ] && ARGS="$ARGS --version $VERSION"
        sudo ./scripts/build-sdcard.sh $ARGS

    - name: Compress aarch64 image
      run: |
        sudo chown -R "$(id -u):$(id -g)" output/
        cd output
        for img in agnos-*-aarch64.img; do
          [ -f "$img" ] || continue
          xz -9 -T0 "$img"
          sha256sum "${img}.xz" > "${img}.xz.sha256"
        done

    - name: Upload aarch64 image
      uses: actions/upload-artifact@v4
      with:
        name: agnos-sdcard-aarch64
        path: |
          output/agnos-*-aarch64.img.xz
          output/agnos-*-aarch64.img.xz.sha256

  # =========================================================================
  # aarch64 Minimal SD Card Image
  # Output: agnos-YYYYMMDD-minimal-aarch64.img
  # =========================================================================
  build-aarch64-minimal:
    name: Build aarch64 Minimal SD Card Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          debootstrap dosfstools parted e2fsprogs \
          qemu-user-static binfmt-support \
          debian-archive-keyring curl

    - name: Download aarch64 edge binaries
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-arm64-edge
        path: artifacts/
      continue-on-error: true

    - name: Fall back to regular arm64 binaries
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-arm64
        path: artifacts/
      continue-on-error: true

    - name: Extract binaries
      run: |
        mkdir -p userland/target/aarch64-unknown-linux-gnu/release
        EXTRACT_DIR="$(mktemp -d)"
        # Try tarball first, fall back to raw files (download-artifact v4 compat)
        tar xzf artifacts/*.tar.gz -C "$EXTRACT_DIR" 2>/dev/null \
          || cp artifacts/* "$EXTRACT_DIR/" 2>/dev/null \
          || true
        for bin in agent_runtime llm_gateway agnsh agnos_sudo; do
          find "$EXTRACT_DIR" -name "$bin" -type f -exec cp {} userland/target/aarch64-unknown-linux-gnu/release/ \;
        done

    - name: Download SY edge binary
      run: |
        curl -sfL -o /tmp/secureyeoman-edge-linux-arm64 \
          "https://github.com/MacCracken/SecureYeoman/releases/latest/download/secureyeoman-edge-linux-arm64" || true
      continue-on-error: true

    - name: Build minimal SD card image
      run: |
        VERSION="${{ inputs.version || '' }}"
        ARGS="--profile minimal --skip-build"
        [ -n "$VERSION" ] && ARGS="$ARGS --version $VERSION"
        [ -f /tmp/secureyeoman-edge-linux-arm64 ] && ARGS="$ARGS --sy-edge-binary /tmp/secureyeoman-edge-linux-arm64"
        sudo ./scripts/build-sdcard.sh $ARGS

    - name: Compress minimal aarch64 image
      run: |
        sudo chown -R "$(id -u):$(id -g)" output/
        cd output
        for img in agnos-*-minimal-aarch64.img; do
          [ -f "$img" ] || continue
          xz -9 -T0 "$img"
          sha256sum "${img}.xz" > "${img}.xz.sha256"
        done

    - name: Upload minimal aarch64 image
      uses: actions/upload-artifact@v4
      with:
        name: agnos-minimal-aarch64
        path: |
          output/agnos-*-minimal-aarch64.img.xz
          output/agnos-*-minimal-aarch64.img.xz.sha256

  # =========================================================================
  # x86_64 Edge ISO (dm-verity, LFS-style)
  # Output: agnos-YYYYMMDD-edge-x86_64.iso
  # =========================================================================
  build-x86_64-edge:
    name: Build x86_64 Edge ISO
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          squashfs-tools grub-pc-bin grub-efi-amd64-bin \
          grub-common grub2-common xorriso mtools cryptsetup-bin

    - name: Build edge ISO
      run: |
        sudo ./scripts/build-edge.sh x86_64

    - name: Fix output permissions
      run: sudo chown -R "$(id -u):$(id -g)" output/

    - name: Upload edge ISO
      uses: actions/upload-artifact@v4
      with:
        name: agnos-edge-x86_64
        path: |
          output/agnos-*-edge-x86_64.iso
          output/agnos-*-edge-x86_64.iso.sha256

  # =========================================================================
  # aarch64 Edge SD Card Image (dm-verity, RPi firmware included)
  # Output: agnos-YYYYMMDD-edge-aarch64.img
  # =========================================================================
  build-aarch64-edge:
    name: Build aarch64 Edge SD Card Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          squashfs-tools dosfstools parted e2fsprogs cryptsetup-bin curl

    - name: Build edge image
      run: |
        sudo ./scripts/build-edge.sh aarch64

    - name: Compress edge aarch64 image
      run: |
        sudo chown -R "$(id -u):$(id -g)" output/
        cd output
        for img in agnos-*-edge-aarch64.img; do
          [ -f "$img" ] || continue
          xz -9 -T0 "$img"
          sha256sum "${img}.xz" > "${img}.xz.sha256"
        done

    - name: Upload edge image
      uses: actions/upload-artifact@v4
      with:
        name: agnos-edge-aarch64
        path: |
          output/agnos-*-edge-aarch64.img.xz
          output/agnos-*-edge-aarch64.img.xz.sha256
