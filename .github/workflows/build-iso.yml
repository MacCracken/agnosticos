name: Build ISO Images

# Builds bootable AGNOS images for x86_64 (ISO) and aarch64 (SD card .img).
# Triggered on release tags or manually. Downloads pre-built binaries from
# the release workflow artifacts, then runs the ISO build scripts.

on:
  workflow_call:
    inputs:
      version:
        description: 'AGNOS version'
        required: true
        type: string
      use_agnos_base:
        description: 'Use AGNOS base rootfs instead of Debian debootstrap'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      version:
        description: 'AGNOS version (leave empty for VERSION file)'
        required: false
        type: string
      use_agnos_base:
        description: 'Use AGNOS base rootfs instead of Debian debootstrap'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build-x86_64-iso:
    name: Build x86_64 ISO
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install ISO build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          debootstrap \
          squashfs-tools \
          grub-pc-bin \
          grub-efi-amd64-bin \
          grub-common \
          grub2-common \
          xorriso \
          mtools \
          zstd \
          debian-archive-keyring

    - name: Download x86_64 binaries
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-amd64
        path: artifacts/
      continue-on-error: true

    - name: Try downloading AGNOS base rootfs
      id: agnos-base
      if: inputs.use_agnos_base
      run: |
        echo "Attempting to download AGNOS base rootfs..."
        if curl -fSL -o /tmp/agnos-base-rootfs-x86_64.tar.zst \
          "https://github.com/MacCracken/agnosticos/releases/download/base-rootfs-latest/agnos-base-rootfs-x86_64.tar.zst" 2>/dev/null; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "AGNOS base rootfs downloaded — will use instead of Debian debootstrap"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "AGNOS base rootfs not available — falling back to Debian debootstrap"
        fi
      continue-on-error: true

    - name: Extract binaries (from artifact or build)
      run: |
        mkdir -p userland/target/x86_64-unknown-linux-musl/release
        EXTRACT_DIR="$(mktemp -d)"
        if ls artifacts/*.tar.gz 1>/dev/null 2>&1; then
          echo "Using pre-built binaries from artifacts"
          tar xzf artifacts/*.tar.gz -C "$EXTRACT_DIR"
          for bin in agent_runtime llm_gateway agnsh agnos_sudo desktop_environment ai_shell; do
            find "$EXTRACT_DIR" -name "$bin" -type f -exec cp {} userland/target/x86_64-unknown-linux-musl/release/ \;
          done
        else
          echo "No artifacts found — will build from source"
        fi
        ls -la userland/target/x86_64-unknown-linux-musl/release/ 2>/dev/null || echo "No binaries yet"

    - name: Build ISO
      run: |
        VERSION="${{ inputs.version || '' }}"
        ARGS="--skip-build"
        if [ -n "$VERSION" ]; then
          ARGS="$ARGS --version $VERSION"
        fi
        # If AGNOS base rootfs is available, pass it to build-iso.sh
        if [[ "${{ steps.agnos-base.outputs.available }}" == "true" ]]; then
          ARGS="$ARGS --base-rootfs /tmp/agnos-base-rootfs-x86_64.tar.zst"
        fi
        sudo ./scripts/build-iso.sh $ARGS

    - name: Upload x86_64 ISO
      uses: actions/upload-artifact@v4
      with:
        name: agnos-iso-x86_64
        path: |
          output/*.iso
          output/*.iso.sha256

  build-x86_64-edge-iso:
    name: Build x86_64 Edge ISO
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install ISO build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          debootstrap \
          squashfs-tools \
          grub-pc-bin \
          grub-efi-amd64-bin \
          grub-common \
          grub2-common \
          xorriso \
          mtools \
          debian-archive-keyring

    - name: Download x86_64 binaries
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-amd64
        path: artifacts/
      continue-on-error: true

    - name: Extract binaries
      run: |
        mkdir -p userland/target/x86_64-unknown-linux-musl/release
        EXTRACT_DIR="$(mktemp -d)"
        if ls artifacts/*.tar.gz 1>/dev/null 2>&1; then
          tar xzf artifacts/*.tar.gz -C "$EXTRACT_DIR"
          for bin in agent_runtime llm_gateway agnsh agnos_sudo; do
            find "$EXTRACT_DIR" -name "$bin" -type f -exec cp {} userland/target/x86_64-unknown-linux-musl/release/ \;
          done
        fi

    - name: Download SY edge binary
      run: |
        curl -sfL -o /tmp/secureyeoman-edge-linux-x64 \
          "https://github.com/MacCracken/SecureYeoman/releases/latest/download/secureyeoman-edge-linux-x64" || {
          echo "::warning::Could not download SY edge binary"
        }
      continue-on-error: true

    - name: Build edge ISO
      run: |
        VERSION="${{ inputs.version || '' }}"
        ARGS="--edge --skip-build"
        if [ -n "$VERSION" ]; then
          ARGS="$ARGS --version $VERSION"
        fi
        if [ -f /tmp/secureyeoman-edge-linux-x64 ]; then
          ARGS="$ARGS --sy-edge-binary /tmp/secureyeoman-edge-linux-x64"
        fi
        sudo ./scripts/build-iso.sh $ARGS

    - name: Upload x86_64 edge ISO
      uses: actions/upload-artifact@v4
      with:
        name: agnos-edge-iso-x86_64
        path: |
          output/agnos-edge-*.iso
          output/agnos-edge-*.iso.sha256

  build-aarch64-img:
    name: Build aarch64 SD Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install aarch64 image build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          debootstrap \
          squashfs-tools \
          dosfstools \
          parted \
          e2fsprogs \
          qemu-user-static \
          binfmt-support \
          debian-archive-keyring

    - name: Download aarch64 binaries
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-arm64
        path: artifacts/
      continue-on-error: true

    - name: Extract binaries (from artifact or build)
      run: |
        mkdir -p userland/target/aarch64-unknown-linux-gnu/release
        EXTRACT_DIR="$(mktemp -d)"
        if ls artifacts/*.tar.gz 1>/dev/null 2>&1; then
          echo "Using pre-built binaries from artifacts"
          tar xzf artifacts/*.tar.gz -C "$EXTRACT_DIR"
          for bin in agent_runtime llm_gateway agnsh agnos_sudo desktop_environment ai_shell; do
            find "$EXTRACT_DIR" -name "$bin" -type f -exec cp {} userland/target/aarch64-unknown-linux-gnu/release/ \;
          done
        else
          echo "No artifacts found — will need --skip-build disabled"
        fi
        ls -la userland/target/aarch64-unknown-linux-gnu/release/ 2>/dev/null || echo "No binaries yet"

    - name: Build aarch64 image
      run: |
        VERSION="${{ inputs.version || '' }}"
        ARGS="--skip-build"
        if [ -n "$VERSION" ]; then
          ARGS="$ARGS --version $VERSION"
        fi
        sudo ./scripts/build-iso-aarch64.sh $ARGS

    - name: Upload aarch64 image
      uses: actions/upload-artifact@v4
      with:
        name: agnos-img-aarch64
        path: |
          output/*-aarch64.img
          output/*-aarch64.img.sha256

  build-edge-rpi4-img:
    name: Build Edge RPi4 SD Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          debootstrap \
          squashfs-tools \
          dosfstools \
          parted \
          e2fsprogs \
          qemu-user-static \
          binfmt-support \
          debian-archive-keyring

    - name: Download aarch64 edge binaries (size-optimized)
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-arm64-edge
        path: artifacts/
      continue-on-error: true

    - name: Fall back to regular arm64 binaries
      if: failure()
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-arm64
        path: artifacts/
      continue-on-error: true

    - name: Extract AGNOS binaries
      run: |
        mkdir -p userland/target/aarch64-unknown-linux-gnu/release
        EXTRACT_DIR="$(mktemp -d)"
        if ls artifacts/*.tar.gz 1>/dev/null 2>&1; then
          tar xzf artifacts/*.tar.gz -C "$EXTRACT_DIR"
          for bin in agent_runtime llm_gateway agnsh agnos_sudo; do
            find "$EXTRACT_DIR" -name "$bin" -type f -exec cp {} userland/target/aarch64-unknown-linux-gnu/release/ \;
          done
        fi

    - name: Download SY edge binary
      run: |
        # Fetch latest secureyeoman-edge arm64 from SY releases
        curl -sfL -o /tmp/secureyeoman-edge-linux-arm64 \
          "https://github.com/MacCracken/SecureYeoman/releases/latest/download/secureyeoman-edge-linux-arm64" || {
          echo "::warning::Could not download SY edge binary — image will be built without it"
        }
      continue-on-error: true

    - name: Build edge image
      run: |
        VERSION="${{ inputs.version || '' }}"
        ARGS="--edge --skip-build"
        if [ -n "$VERSION" ]; then
          ARGS="$ARGS --version $VERSION"
        fi
        if [ -f /tmp/secureyeoman-edge-linux-arm64 ]; then
          ARGS="$ARGS --sy-edge-binary /tmp/secureyeoman-edge-linux-arm64"
        fi
        sudo ./scripts/build-iso-aarch64.sh $ARGS

    - name: Upload edge image
      uses: actions/upload-artifact@v4
      with:
        name: agnos-edge-img-rpi4
        path: |
          output/agnos-edge-*-aarch64.img
          output/agnos-edge-*-aarch64.img.sha256
