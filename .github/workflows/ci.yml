name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build verification (skipped when called from release — release does its own --release build)
  build:
    if: github.event_name != 'workflow_call'
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            name: linux-arm64
            cross: true

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust-env
      with:
        targets: ${{ matrix.target }}
        cache-prefix: build-${{ matrix.target }}
        install-cross: ${{ matrix.cross }}
        install-build-essential: ${{ !matrix.cross }}

    - name: Build userland (native)
      if: ${{ !matrix.cross }}
      run: cargo build --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Build userland (cross)
      if: matrix.cross
      run: cross build --workspace --target ${{ matrix.target }}
      working-directory: userland

  # Code quality
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust-env
      with:
        components: rustfmt, clippy
        cache-prefix: quality

    - name: Check formatting
      run: cargo fmt --all -- --check
      working-directory: userland

    - name: Run clippy
      run: cargo clippy --workspace -- -D warnings
      working-directory: userland

  # Security scanning
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust-env
      with:
        cache-prefix: security

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run cargo audit
      run: |
        cargo install cargo-audit --locked
        cargo audit
      working-directory: userland

    - name: Run Semgrep
      uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/secrets

    - name: Dependency vulnerability check
      run: |
        cargo install cargo-deny --locked
        printf '[advisories]\nversion = 2\ndb-path = "~/.cargo/advisory-db"\ndb-urls = ["https://github.com/rustsec/advisory-db"]\nyanked = "warn"\n\n[licenses]\nversion = 2\nallow = ["MIT", "Apache-2.0", "BSD-3-Clause", "GPL-3.0"]\n\n[bans]\nmultiple-versions = "warn"\nwildcards = "allow"\n\n[sources]\nunknown-registry = "warn"\nunknown-git = "warn"\n' > deny.toml
        cargo deny check advisories || true
      working-directory: userland
      continue-on-error: true

    - name: Check for outdated dependencies
      run: |
        cargo install cargo-outdated --locked
        cargo outdated --root-deps-only 2>/dev/null || true
      working-directory: userland
      continue-on-error: true

    - name: Generate security report
      run: |
        mkdir -p security-reports
        echo "# Security Scan Report - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > security-reports/summary.md
        echo "" >> security-reports/summary.md
        echo "## Scans Performed" >> security-reports/summary.md
        echo "- Trivy filesystem scan" >> security-reports/summary.md
        echo "- Cargo audit (Rust dependencies)" >> security-reports/summary.md
        echo "- Semgrep (static analysis)" >> security-reports/summary.md
        echo "- Cargo deny (vulnerability database)" >> security-reports/summary.md

    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-report
        path: security-reports/

  # Testing
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust-env
      with:
        cache-prefix: test

    - name: Run tests
      run: cargo test --workspace
      working-directory: userland

    - name: Generate coverage report
      run: |
        cargo install cargo-tarpaulin --locked
        cargo tarpaulin --workspace --out Xml --fail-under 65 || true
      working-directory: userland

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./userland/cobertura.xml
        flags: unittests
        name: codecov-umbrella

  # Benchmarks (record only, does not block merges)
  benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust-env
      with:
        cache-prefix: bench

    - name: Run benchmarks
      run: cargo bench -- --noplot 2>&1 | tee benchmark-output.txt
      working-directory: userland
      continue-on-error: true

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          userland/benchmark-output.txt
          userland/target/criterion/

  # Documentation
  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Verify documentation completeness
      run: |
        test -f README.md
        test -f docs/development/roadmap.md
        test -f CONTRIBUTING.md
        test -f SECURITY.md
        test -f LICENSE

  # Container build (already skips on workflow_call since event_name != 'push')
  container:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-docker-${{ hashFiles('Dockerfile', 'userland/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-docker-

    - name: Build container image
      run: docker build -t agnos:latest .

    - name: Test container
      run: docker run --rm agnos:latest echo "Container build successful"

  # Build .ark packages (push to main only, validates recipes end-to-end)
  ark-build:
    name: Build .ark packages
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential pkg-config autoconf automake libtool \
          zlib1g-dev libffi-dev libssl-dev libbz2-dev liblzma-dev \
          libreadline-dev libncurses5-dev libsqlite3-dev libgdbm-dev \
          libexpat1-dev uuid-dev llvm \
          bison flex libxml2-dev libxslt1-dev libicu-dev \
          liblz4-dev libzstd-dev libsystemd-dev

    - name: Build Redis .ark
      run: ARK_SKIP_CHECK=1 ./scripts/ark-build.sh recipes/database/redis-7.toml

    - name: Build PostgreSQL .ark
      run: ARK_SKIP_CHECK=1 ./scripts/ark-build.sh recipes/database/postgresql-17.toml

    - name: Build pgvector .ark
      run: |
        # Stage PostgreSQL for pgvector build
        mkdir -p /tmp/pg-stage
        tar xzf dist/ark/postgresql17-*-*.ark -C /tmp/pg-stage
        PG_CONFIG=/tmp/pg-stage/usr/bin/pg_config ARK_SKIP_CHECK=1 \
          ./scripts/ark-build.sh recipes/database/pgvector-0.8.toml

    - name: Build CPython 3.12 .ark
      run: ARK_SKIP_CHECK=1 ./scripts/ark-build.sh recipes/python/cpython-3.12.toml

    # NOTE: Browser .ark builds (Firefox, Chromium) are too large for standard
    # GitHub Actions runners (6+ hours, 100+ GB disk). They are built via the
    # takumi builder container on dedicated build infrastructure.

    - name: Verify .ark packages
      run: |
        echo "Built packages:"
        ls -lh dist/ark/
        for ark in dist/ark/*.ark; do
          echo "--- $(basename $ark) ---"
          tar xzf "$ark" -O ./.ark-manifest.toml
          echo ""
        done

    - name: Upload .ark artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ark-packages
        path: dist/ark/*.ark
        retention-days: 30

  # License check
  license:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Verify LICENSE file
      run: |
        test -f LICENSE
        grep -q "GNU GENERAL PUBLIC LICENSE" LICENSE

  # Fuzzing (push to main only, does not block merges)
  fuzzing:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_agent_parse, fuzz_interpreter, fuzz_command_split, fuzz_llm_inference]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust-env
      with:
        toolchain: nightly
        cache-prefix: fuzz-${{ matrix.target }}

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --locked

    - name: Cache fuzzing corpus
      uses: actions/cache@v4
      with:
        path: |
          userland/fuzz/corpus/
          userland/fuzz/artifacts/
        key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
        restore-keys: |
          fuzz-corpus-${{ matrix.target }}-

    - name: Run fuzzer (30 minutes)
      run: |
        cd userland
        timeout 1800 cargo fuzz run ${{ matrix.target }} -- -max_total_time=1800 || true
      continue-on-error: true

    - name: Check for crashes
      run: |
        ARTIFACT_DIR="userland/fuzz/artifacts/${{ matrix.target }}"
        if [ -d "$ARTIFACT_DIR" ] && [ "$(ls -A "$ARTIFACT_DIR" 2>/dev/null)" ]; then
          echo "::error::Found crashes in ${{ matrix.target }}:"
          ls -la "$ARTIFACT_DIR/"
          exit 1
        fi

    - name: Upload crash artifacts
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: fuzz-crash-${{ matrix.target }}
        path: userland/fuzz/artifacts/${{ matrix.target }}/

    - name: Upload corpus
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: fuzz-corpus-${{ matrix.target }}
        path: userland/fuzz/corpus/${{ matrix.target }}/

  # CIS Benchmark Validation (informational, push to main only)
  # NOTE: CI runners are generic Ubuntu — scores will be low. This tracks
  # regressions in the validation script itself, not actual AGNOS compliance.
  # Real CIS scores come from testing on a configured AGNOS image.
  cis-validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc jq

    - name: Run CIS Validation
      run: |
        sudo ./scripts/cis-validate.sh --category all --report "$GITHUB_WORKSPACE/cis-report.json"
      continue-on-error: true

    - name: Upload CIS Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cis-validation-report
        path: cis-report.json
        if-no-files-found: warn

    - name: Report Score
      run: |
        if [ -f cis-report.json ]; then
          SCORE=$(jq -r '.compliance.score' cis-report.json)
          echo "::notice::CIS compliance score: ${SCORE}% (informational — CI runner, not AGNOS image)"
        else
          echo "::notice::CIS report not generated (expected on generic runners)"
        fi
