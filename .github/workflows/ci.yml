name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build verification
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev \
          libncurses5-dev wget zlib1g-dev git ccache

    - name: Install cross-compilation toolchain (aarch64)
      if: matrix.cross
      run: |
        sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64
        sudo dpkg --add-architecture arm64
        sudo apt-get update
        sudo apt-get install -y libssl-dev:arm64 || true
        echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
        echo "OPENSSL_DIR=/usr" >> $GITHUB_ENV
        echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV
        echo "OPENSSL_INCLUDE_DIR=/usr/include" >> $GITHUB_ENV
        cargo install cross --locked

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          userland/target/
        key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build userland (native)
      if: ${{ !matrix.cross }}
      run: cargo build --release --target ${{ matrix.target }}
      working-directory: userland

    - name: Build userland (cross)
      if: matrix.cross
      run: cross build --release --target ${{ matrix.target }}
      working-directory: userland

  # Code quality
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Check formatting
      run: cargo fmt -- --check
      working-directory: userland

    - name: Run clippy
      run: cargo clippy -- -D warnings
      working-directory: userland

    - name: Check kernel style
      run: |
        if [ -f scripts/checkpatch.pl ]; then
          find kernel -name "*.c" -o -name "*.h" | head -20 | \
            xargs -I {} scripts/checkpatch.pl --no-tree -f {}
        fi

  # Security scanning
  security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run cargo audit
      run: |
        cargo install cargo-audit --locked
        cargo audit
      working-directory: userland

    - name: Run Bandit (Python)
      run: |
        pip install bandit
        bandit -r scripts/ || true

    - name: Run Semgrep
      uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/secrets
          p/ci

    - name: Dependency vulnerability check
      run: |
        cargo install cargo-deny --locked
        printf '[advisories]\nversion = 2\ndb-path = "~/.cargo/advisory-db"\ndb-urls = ["https://github.com/rustsec/advisory-db"]\nyanked = "warn"\n\n[licenses]\nversion = 2\nallow = ["MIT", "Apache-2.0", "BSD-3-Clause", "GPL-3.0"]\n\n[bans]\nmultiple-versions = "warn"\nwildcards = "allow"\n\n[sources]\nunknown-registry = "warn"\nunknown-git = "warn"\n' > deny.toml
        cargo deny check advisories || true
      working-directory: userland
      continue-on-error: true

    - name: Check for outdated dependencies
      run: |
        cargo install cargo-outdated --locked
        echo "::notice::Checking for outdated dependencies..."
        cargo outdated --root-deps-only 2>/dev/null || echo "No outdated dependencies found at root level"
      working-directory: userland
      continue-on-error: true

    - name: Generate security report
      run: |
        mkdir -p security-reports
        echo "# Security Scan Report - $(date -u +%Y-%m-%dT%H:%M:%SZ)" > security-reports/summary.md
        echo "" >> security-reports/summary.md
        echo "## Scans Performed" >> security-reports/summary.md
        echo "- Trivy filesystem scan" >> security-reports/summary.md
        echo "- Cargo audit (Rust dependencies)" >> security-reports/summary.md
        echo "- Bandit (Python security)" >> security-reports/summary.md
        echo "- Semgrep (static analysis)" >> security-reports/summary.md
        echo "- Cargo deny (vulnerability database)" >> security-reports/summary.md

    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-report
        path: security-reports/

  # Testing
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Run Rust tests
      run: cargo test --all-features
      working-directory: userland

    - name: Generate coverage report
      run: |
        cargo install cargo-tarpaulin --locked
        cargo tarpaulin --out Xml || true
      working-directory: userland

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./userland/cobertura.xml
        flags: unittests
        name: codecov-umbrella

    - name: Enforce coverage threshold
      run: cargo tarpaulin --fail-under 65
      working-directory: userland

  # Benchmarks (record only, does not block merges)
  benchmarks:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          userland/target/
        key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}

    - name: Run benchmarks
      run: cargo bench -- --noplot 2>&1 | tee benchmark-output.txt
      working-directory: userland
      continue-on-error: true

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          userland/benchmark-output.txt
          userland/target/criterion/

  # Documentation
  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check documentation
      run: |
        # Check for broken links in markdown
        if command -v markdown-link-check &> /dev/null; then
          find . -name "*.md" -not -path "./node_modules/*" | \
            xargs -I {} markdown-link-check {}
        fi

    - name: Verify documentation completeness
      run: |
        # Check that all documented files exist
        test -f README.md
        test -f docs/development/roadmap.md
        test -f CONTRIBUTING.md
        test -f SECURITY.md
        test -f LICENSE

  # Container build
  container:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build container image
      run: docker build -t agnos:latest .

    - name: Test container
      run: docker run --rm agnos:latest echo "Container build successful"

  # License check
  license:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check license headers
      run: |
        # Check that source files have license headers
        find . -name "*.rs" -o -name "*.c" -o -name "*.h" | \
          while read f; do
            if ! grep -q "GPL" "$f" 2>/dev/null; then
              echo "Warning: $f may be missing license header"
            fi
          done

    - name: Verify LICENSE file
      run: |
        test -f LICENSE
        grep -q "GNU GENERAL PUBLIC LICENSE" LICENSE
