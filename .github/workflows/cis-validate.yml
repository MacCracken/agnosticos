name: CIS Benchmark Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Sundays at 3 AM
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      category:
        description: 'Validation category'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - filesystem
          - network
          - services
          - authentication
          - system

env:
  CARGO_TERM_COLOR: always

jobs:
  cis-validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc jq
    
    - name: Run CIS Validation
      run: |
        sudo ./scripts/cis-validate.sh --category ${{ github.event.inputs.category || 'all' }} --report "$GITHUB_WORKSPACE/cis-report.json"
      continue-on-error: true

    - name: Upload CIS Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cis-validation-report
        path: cis-report.json
        if-no-files-found: warn
    
    - name: Check Compliance
      run: |
        if [ -f cis-report.json ]; then
          SCORE=$(jq -r '.compliance.score' cis-report.json)
          if [ "$SCORE" -lt 70 ] 2>/dev/null; then
            echo "::warning::CIS compliance score is ${SCORE}%, below 70% threshold"
          else
            echo "::notice::CIS compliance score: ${SCORE}%"
          fi
        else
          echo "::warning::CIS report not found"
        fi
    
    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let report = { compliance: { score: 0, status: 'UNKNOWN' }, results: { passed: 0, failed: 0, total: 0 } };
          try {
            report = JSON.parse(fs.readFileSync('cis-report.json', 'utf8'));
          } catch (e) {
            console.log('Could not read report');
          }
          
          const score = report.compliance.score || 0;
          const status = report.compliance.status;
          const { passed, failed, total } = report.results;
          
          const color = score >= 80 ? '🟢' : score >= 60 ? '🟡' : '🔴';
          const body = `## CIS Benchmark Validation ${color}
          
          - **Score**: ${score}%
          - **Status**: ${status}
          - **Passed**: ${passed}/${total}
          - **Failed**: ${failed}
          
          ${score < 70 ? '⚠️ Score is below 70% threshold' : '✅ Score meets compliance threshold'}
          
          See the artifacts for the full report.`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.name,
            body: body
          });
