name: Release Automation

# Convenience wrapper: creates and pushes a tag, which triggers release.yml.
# This ensures only tagged commits get a GitHub Release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2026.3.7)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: true
        type: boolean

concurrency:
  group: release-automation-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validate version format
      run: |
        VERSION="${{ github.event.inputs.version }}"
        if ! echo "$VERSION" | grep -qE '^[0-9]{4}\.[0-9]+\.[0-9]+(-#[0-9]+)?$'; then
          echo "::error::Invalid version format '${VERSION}'. Expected CalVer: YYYY.D.M (e.g., 2026.3.7)"
          exit 1
        fi

    - name: Check tag does not already exist
      run: |
        VERSION="${{ github.event.inputs.version }}"
        if git rev-parse "$VERSION" >/dev/null 2>&1; then
          echo "::error::Tag '${VERSION}' already exists"
          exit 1
        fi

    - name: Update VERSION file
      run: |
        echo "${{ github.event.inputs.version }}" > VERSION

    - name: Sign packages (if script exists)
      run: |
        if [ -f scripts/sign-packages.sh ]; then
          chmod +x scripts/sign-packages.sh
          scripts/sign-packages.sh sign || true
        fi

    - name: Create and push tag
      run: |
        VERSION="${{ github.event.inputs.version }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add VERSION
        git commit -m "release: ${VERSION}" || true
        git tag -a "$VERSION" -m "Release ${VERSION}"
        git push origin HEAD "$VERSION"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Summary
      run: |
        VERSION="${{ github.event.inputs.version }}"
        echo "### Tag \`${VERSION}\` created and pushed" >> "$GITHUB_SUMMARY"
        echo "" >> "$GITHUB_SUMMARY"
        echo "The [Release workflow](../actions/workflows/release.yml) will now build and publish the release." >> "$GITHUB_SUMMARY"
