name: Release Automation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2026.3.7)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install dependencies (native)
      if: ${{ !matrix.cross }}
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev

    - name: Install cross (aarch64)
      if: matrix.cross
      uses: taiki-e/install-action@v2
      with:
        tool: cross

    - name: Build (native)
      if: ${{ !matrix.cross }}
      run: cargo build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Build (cross)
      if: matrix.cross
      run: cross build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Package binaries
      run: |
        VERSION="${{ github.ref_name || github.event.inputs.version }}"
        ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
        mkdir -p dist/agnos-${VERSION}-${ARCH}
        for bin in agent_runtime llm_gateway ai_shell agnos_sudo; do
          cp "userland/target/${{ matrix.target }}/release/${bin}" "dist/agnos-${VERSION}-${ARCH}/" 2>/dev/null || true
        done
        cd dist
        tar czf agnos-${VERSION}-${ARCH}.tar.gz agnos-${VERSION}-${ARCH}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: agnos-${{ github.ref_name || github.event.inputs.version }}-${{ matrix.target }}
        path: dist/*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Sign packages
      run: |
        if [ -f scripts/sign-packages.sh ]; then
          chmod +x scripts/sign-packages.sh
          for artifact in artifacts/*/*.tar.gz; do
            scripts/sign-packages.sh sign "$artifact" || true
          done
        fi

    - name: Generate SBOM
      run: |
        if [ -f scripts/generate-sbom.sh ]; then
          chmod +x scripts/generate-sbom.sh
          ./scripts/generate-sbom.sh generate || true
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: AGNOS ${{ github.ref_name || github.event.inputs.version }}
        body: See CHANGELOG.md for detailed changes.
        prerelease: ${{ github.event.inputs.prerelease || true }}
        files: |
          artifacts/**/*.tar.gz
          artifacts/**/*.asc
          sbom/*.json
          sbom/*.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-changelog:
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update CHANGELOG.md
      run: |
        VERSION="${{ github.ref_name }}"
        DATE=$(date +%Y-%m-%d)
        {
          echo "## [${VERSION}] - ${DATE}"
          echo ""
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD~1)..HEAD 2>/dev/null | head -20
          echo ""
        } > /tmp/new_entry.md
        cat /tmp/new_entry.md CHANGELOG.md > /tmp/CHANGELOG.md
        mv /tmp/CHANGELOG.md CHANGELOG.md
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add CHANGELOG.md
        git commit -m "docs: update CHANGELOG for ${VERSION}" || true
        git push || true
