name: Release Automation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2026.3.7)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: true
        type: boolean

concurrency:
  group: release-automation-${{ github.event.inputs.version }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust-env
      with:
        targets: ${{ matrix.target }}
        cache-prefix: release-auto-${{ matrix.target }}
        install-cross: ${{ matrix.cross }}
        install-build-essential: ${{ !matrix.cross }}

    - name: Build (native)
      if: ${{ !matrix.cross }}
      run: cargo build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Build (cross)
      if: matrix.cross
      run: cross build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Package binaries
      run: |
        VERSION="${{ github.event.inputs.version }}"
        ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
        mkdir -p dist/agnos-${VERSION}-${ARCH}
        for bin in agent_runtime llm_gateway ai_shell agnos_sudo; do
          cp "userland/target/${{ matrix.target }}/release/${bin}" "dist/agnos-${VERSION}-${ARCH}/" 2>/dev/null || true
        done
        cd dist
        tar czf agnos-${VERSION}-${ARCH}.tar.gz agnos-${VERSION}-${ARCH}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: agnos-${{ github.event.inputs.version }}-${{ matrix.target }}
        path: dist/*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Sign packages
      run: |
        if [ -f scripts/sign-packages.sh ]; then
          chmod +x scripts/sign-packages.sh
          for artifact in artifacts/*/*.tar.gz; do
            scripts/sign-packages.sh sign "$artifact" || true
          done
        fi

    - name: Generate SBOM
      run: |
        if [ -f scripts/generate-sbom.sh ]; then
          chmod +x scripts/generate-sbom.sh
          ./scripts/generate-sbom.sh generate || true
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: AGNOS ${{ github.event.inputs.version }}
        body: See CHANGELOG.md for detailed changes.
        prerelease: ${{ github.event.inputs.prerelease || true }}
        files: |
          artifacts/**/*.tar.gz
          artifacts/**/*.asc
          sbom/*.json
          sbom/*.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
