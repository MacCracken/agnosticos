name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            name: linux-arm64
            cross: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install dependencies (native)
      if: ${{ !matrix.cross }}
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev

    - name: Install cross-compilation tools (aarch64)
      if: matrix.cross
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        cargo install cross --locked

    - name: Build (native)
      if: ${{ !matrix.cross }}
      run: cargo build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Build (cross)
      if: matrix.cross
      run: cross build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Package
      run: |
        mkdir -p agnos-${{ matrix.name }}
        for bin in agent_runtime llm_gateway desktop_environment ai_shell agnos_sudo; do
          cp "userland/target/${{ matrix.target }}/release/${bin}" "agnos-${{ matrix.name }}/" 2>/dev/null || true
        done
        cp -r docs agnos-${{ matrix.name }}/
        cp README.md agnos-${{ matrix.name }}/
        cp LICENSE agnos-${{ matrix.name }}/
        tar czvf agnos-${{ matrix.name }}.tar.gz agnos-${{ matrix.name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: agnos-${{ matrix.name }}
        path: agnos-${{ matrix.name }}.tar.gz

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: AGNOS ${{ github.ref_name }}
        draft: true
        prerelease: true
        generate_release_notes: true
        files: artifacts/**/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
