name: Release

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write
  actions: read
  security-events: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: maccracken/agnosticos

jobs:
  # Quality gate — run CI checks before building release
  ci-gate:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      actions: read
      security-events: write

  build-release:
    name: Build ${{ matrix.name }}
    needs: ci-gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            name: linux-arm64
            cross: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust-env
      with:
        targets: ${{ matrix.target }}
        cache-prefix: release-${{ matrix.target }}
        install-cross: ${{ matrix.cross }}
        install-build-essential: ${{ !matrix.cross }}

    - name: Build (native)
      if: ${{ !matrix.cross }}
      run: cargo build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Build (cross)
      if: matrix.cross
      run: cross build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Package
      run: |
        mkdir -p agnos-${{ matrix.name }}
        for bin in agent_runtime llm_gateway desktop_environment ai_shell agnos_sudo agnsh; do
          cp "userland/target/${{ matrix.target }}/release/${bin}" "agnos-${{ matrix.name }}/" 2>/dev/null || true
        done
        cp -r docs agnos-${{ matrix.name }}/
        cp README.md agnos-${{ matrix.name }}/
        cp LICENSE agnos-${{ matrix.name }}/
        tar czvf agnos-${{ matrix.name }}.tar.gz agnos-${{ matrix.name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: agnos-${{ matrix.name }}
        path: agnos-${{ matrix.name }}.tar.gz

  # Generate SBOM alongside release artifacts
  generate-sbom:
    name: Generate SBOM
    needs: ci-gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust-env
      with:
        cache-prefix: sbom

    - name: Install SBOM tools
      run: cargo install cargo-cyclonedx cargo-license --locked

    - name: Generate SBOM (CycloneDX)
      run: |
        cd userland
        cargo cyclonedx --format json --output-cdx || true
        cargo cyclonedx --format xml --output-cdx || true
        mkdir -p ../sbom
        cp -f *.cdx.json ../sbom/ 2>/dev/null || true
        cp -f *.cdx.xml ../sbom/ 2>/dev/null || true

    - name: Generate license summary
      run: |
        cd userland
        cargo license --json > ../sbom/license-summary.json 2>/dev/null || true
        cargo license > ../sbom/license-summary.txt 2>/dev/null || true

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom-files
        path: sbom/
        if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: [build-release, generate-sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download release binaries
      uses: actions/download-artifact@v4
      with:
        pattern: agnos-linux-*
        path: artifacts
        merge-multiple: false

    - name: Download SBOM
      uses: actions/download-artifact@v4
      with:
        name: sbom-files
        path: artifacts/sbom-files
      continue-on-error: true

    - name: Generate release notes
      id: notes
      run: |
        VERSION="${{ github.ref_name }}"
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
        {
          echo "notes<<EOF"
          echo "## What's Changed"
          echo ""
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | head -50
          else
            git log --pretty=format:"- %s" -20
          fi
          echo ""
          echo ""
          echo "**Full Changelog**: See [CHANGELOG.md](CHANGELOG.md)"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: AGNOS ${{ github.ref_name }} (Alpha)
        body: |
          > **Alpha Release** — This is a pre-alpha/alpha build. Not recommended for production use.

          ${{ steps.notes.outputs.notes }}
        draft: false
        prerelease: true
        files: |
          artifacts/agnos-*/*.tar.gz
          artifacts/sbom-files/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Multi-arch container image → ghcr.io
  container:
    name: Publish Container Image
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Download amd64 artifact
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-amd64
        path: artifacts/amd64

    - name: Download arm64 artifact
      uses: actions/download-artifact@v4
      with:
        name: agnos-linux-arm64
        path: artifacts/arm64

    - name: Extract binaries
      run: |
        for arch in amd64 arm64; do
          mkdir -p build/${arch}/binaries build/${arch}/tmp
          tar xzf artifacts/${arch}/*.tar.gz -C build/${arch}/tmp
          for bin in agent_runtime llm_gateway agnsh; do
            find build/${arch}/tmp -name "$bin" -type f -exec cp {} build/${arch}/binaries/ \;
          done
          echo "=== ${arch} binaries ==="
          ls -la build/${arch}/binaries/
        done

    - name: Prepare build contexts
      run: |
        for arch in amd64 arm64; do
          cp VERSION build/${arch}/
          cp -r docker build/${arch}/
        done

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ github.ref_name }}
          type=raw,value=latest
          type=raw,value=alpha

    - name: Build and push amd64
      uses: docker/build-push-action@v6
      with:
        context: build/amd64
        file: docker/Dockerfile.release
        platforms: linux/amd64
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
        build-args: |
          AGNOS_VERSION=${{ github.ref_name }}

    - name: Build and push arm64
      uses: docker/build-push-action@v6
      with:
        context: build/arm64
        file: docker/Dockerfile.release
        platforms: linux/arm64
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
        build-args: |
          AGNOS_VERSION=${{ github.ref_name }}

    - name: Create and push multi-arch manifest
      run: |
        IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        VERSION="${{ github.ref_name }}"

        for TAG in "${VERSION}" "latest" "alpha"; do
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
        done

  # Runtime base images → ghcr.io/maccracken/agnosticos:<runtime>
  runtime-images:
    name: Publish ${{ matrix.tag }} Base Image
    needs: ci-gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: docker/Dockerfile.node
            tag: node22
            title: "Node.js 22 + Bun"
          - dockerfile: docker/Dockerfile.python3.13
            tag: python3.13
            title: "Python 3.13"
          - dockerfile: docker/Dockerfile.python3.14
            tag: python3.14
            title: "Python 3.14"
          - dockerfile: docker/Dockerfile.rust
            tag: rust
            title: "Rust"

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}-${{ github.ref_name }}
        labels: |
          org.opencontainers.image.title=AGNOS ${{ matrix.title }} Base
          org.opencontainers.image.version=${{ github.ref_name }}
          org.opencontainers.image.source=https://github.com/MacCracken/agnosticos
