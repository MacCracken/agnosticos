name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Quality gate — run CI checks before building release
  ci-gate:
    uses: ./.github/workflows/ci.yml

  build-release:
    name: Build Release Binaries
    needs: ci-gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            name: linux-arm64
            cross: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install dependencies (native)
      if: ${{ !matrix.cross }}
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev

    - name: Install cross (aarch64)
      if: matrix.cross
      uses: taiki-e/install-action@v2
        with:
          tool: cross

    - name: Build (native)
      if: ${{ !matrix.cross }}
      run: cargo build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Build (cross)
      if: matrix.cross
      run: cross build --release --workspace --target ${{ matrix.target }}
      working-directory: userland

    - name: Package
      run: |
        mkdir -p agnos-${{ matrix.name }}
        for bin in agent_runtime llm_gateway desktop_environment ai_shell agnos_sudo; do
          cp "userland/target/${{ matrix.target }}/release/${bin}" "agnos-${{ matrix.name }}/" 2>/dev/null || true
        done
        cp -r docs agnos-${{ matrix.name }}/
        cp README.md agnos-${{ matrix.name }}/
        cp LICENSE agnos-${{ matrix.name }}/
        tar czvf agnos-${{ matrix.name }}.tar.gz agnos-${{ matrix.name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: agnos-${{ matrix.name }}
        path: agnos-${{ matrix.name }}.tar.gz

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Generate release notes
      id: notes
      run: |
        VERSION="${{ github.ref_name }}"
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
        {
          echo "notes<<EOF"
          echo "## What's Changed"
          echo ""
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | head -50
          else
            git log --pretty=format:"- %s" -20
          fi
          echo ""
          echo ""
          echo "**Full Changelog**: See [CHANGELOG.md](CHANGELOG.md)"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: AGNOS ${{ github.ref_name }}
        body: ${{ steps.notes.outputs.notes }}
        draft: true
        prerelease: true
        files: artifacts/**/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
