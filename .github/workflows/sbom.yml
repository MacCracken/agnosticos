name: SBOM Generation

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  schedule:
    # Generate SBOM weekly
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install SBOM tools
      run: |
        cargo install cargo-bom cargo-license
        pip install cyclonedx-bom
    
    - name: Generate SBOM
      run: |
        cd userland
        # Generate Cargo.lock if it doesn't exist
        cargo generate-lockfile 2>/dev/null || true
        
        # Run SBOM generator
        cd ..
        ./scripts/generate-sbom.sh generate || true
    
    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sbom-files
        path: |
          sbom/*.json
          sbom/*.txt
        if-no-files-found: warn
    
    - name: Upload SBOM to release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          sbom/*.json
          sbom/*.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Dependency Review
      uses: actions/dependency-review-action@v3
      if: github.event_name == 'pull_request'
      with:
        fail-on-severity: high
        comment-summary-in-pr: true

  dependency-track:
    runs-on: ubuntu-latest
    needs: generate-sbom
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.generate-sbom.result == 'success'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download SBOM
      uses: actions/download-artifact@v4
      with:
        name: sbom-files
        path: sbom
    
    - name: Upload to Dependency-Track
      if: env.DEPENDENCY_TRACK_API_KEY != ''
      run: |
        if [ -f "sbom/agnos-$(grep '^version' userland/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)".*/\1/')-bom.json" ]; then
          curl -X POST \
            -H 'Content-Type: multipart/form-data' \
            -H "X-Api-Key: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}" \
            -F 'projectName=AGNOS' \
            -F 'projectVersion=${{ github.ref_name }}' \
            -F 'autoCreate=true' \
            -F 'bom=@sbom/agnos-$(grep "^version" userland/Cargo.toml | head -1 | sed "s/.*= *\"\\(.*\\)\".*/\\1/")-bom.json' \
            https://dependency-track.example.com/api/v1/bom || true
        fi
      continue-on-error: true
