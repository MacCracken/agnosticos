name: Self-Hosting Build

# Builds the AGNOS self-hosting toolchain and base system from source.
# Produces a cross-toolchain and base rootfs that are published as persistent
# release assets. The release workflow then pulls the cached rootfs and overlays
# freshly compiled userland binaries — no debootstrap needed.
#
# This workflow runs RARELY: only when base recipes, toolchain, or kernel change.
# Tagged releases pull the cached base and only rebuild userland (fast path).
#
# Runs on self-hosted runner (needs root, 20GB+ disk, 2+ hours first time).

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Start from stage (0=download, 1=bootstrap, 2=base, 3=userland, 4=iso)'
        required: false
        default: '0'
      force_rebuild:
        description: 'Force rebuild even if cached base exists'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if cached base exists'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  LFS: /tmp/agnos-selfhost
  LINUX_VER: "6.6.130"
  CARGO_TERM_COLOR: always

jobs:
  # -----------------------------------------------------------------------
  # Stage 1: Bootstrap cross-toolchain
  # Produces: agnos-toolchain-x86_64.tar (GCC, binutils, glibc, libstdc++)
  # Published as: release asset "base-rootfs-latest"
  # -----------------------------------------------------------------------
  bootstrap-toolchain:
    name: Bootstrap Toolchain
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 120
    steps:
      - name: Clean workspace (root-owned leftovers)
        run: sudo rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/output"

      - name: Configure git for runner
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Check for published toolchain
        id: published
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "cached=false" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested"
          elif curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/tags/toolchain-latest" 2>/dev/null \
            | grep -q 'agnos-toolchain-x86_64.tar.zst'; then
            echo "cached=true" >> "$GITHUB_OUTPUT"
            echo "Published toolchain found — will download instead of rebuilding"
          else
            echo "cached=false" >> "$GITHUB_OUTPUT"
            echo "No published toolchain found — building from source"
          fi

      - name: Download published toolchain
        if: steps.published.outputs.cached == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          mkdir -p output
          # Get the asset download URL
          ASSET_URL=$(curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/tags/toolchain-latest" \
            | grep -oP '"browser_download_url":\s*"\K[^"]*agnos-toolchain-x86_64\.tar\.zst(?=")')
          curl -fSL -H "Authorization: token ${GITHUB_TOKEN}" \
            -o output/agnos-toolchain-x86_64.tar.zst "$ASSET_URL"
          zstd -d output/agnos-toolchain-x86_64.tar.zst -o output/agnos-toolchain-x86_64.tar
          sudo rm -rf "$LFS"
          mkdir -p "$LFS"
          tar xf output/agnos-toolchain-x86_64.tar -C "$LFS"
          echo "Toolchain restored from published release"

      - name: Prepare build directory
        if: steps.published.outputs.cached != 'true'
        run: |
          sudo rm -rf "$LFS"
          mkdir -p "$LFS"

      - name: Download source tarballs
        if: steps.published.outputs.cached != 'true'
        run: |
          mkdir -p "$LFS/sources"
          cd "$LFS/sources"

          # Download helper: try multiple mirrors with timeout
          download() {
            local file="$1"; shift
            [[ -f "$file" ]] && { echo "  Cached: $file"; return 0; }
            for url in "$@"; do
              echo "  Trying: $url"
              if curl -fSL --connect-timeout 30 --max-time 300 -o "$file" "$url" 2>/dev/null; then
                echo "  OK: $file"
                return 0
              fi
            done
            echo "  FAILED: $file (all mirrors exhausted)"
            return 1
          }

          # GNU mirrors (ordered by reliability)
          G1="https://mirrors.kernel.org/gnu"
          G2="https://mirror.us-midwest-1.nexcess.net/gnu"
          G3="https://ftpmirror.gnu.org"
          G4="https://ftp.gnu.org/gnu"

          download binutils-2.45.tar.xz \
            "$G1/binutils/binutils-2.45.tar.xz" \
            "$G2/binutils/binutils-2.45.tar.xz" \
            "$G3/binutils/binutils-2.45.tar.xz" \
            "$G4/binutils/binutils-2.45.tar.xz"

          download gcc-15.2.0.tar.xz \
            "$G1/gcc/gcc-15.2.0/gcc-15.2.0.tar.xz" \
            "$G2/gcc/gcc-15.2.0/gcc-15.2.0.tar.xz" \
            "$G3/gcc/gcc-15.2.0/gcc-15.2.0.tar.xz" \
            "$G4/gcc/gcc-15.2.0/gcc-15.2.0.tar.xz"

          download glibc-2.42.tar.xz \
            "$G1/glibc/glibc-2.42.tar.xz" \
            "$G2/glibc/glibc-2.42.tar.xz" \
            "$G3/glibc/glibc-2.42.tar.xz" \
            "$G4/glibc/glibc-2.42.tar.xz"

          download gmp-6.3.0.tar.xz \
            "$G1/gmp/gmp-6.3.0.tar.xz" \
            "$G2/gmp/gmp-6.3.0.tar.xz" \
            "$G3/gmp/gmp-6.3.0.tar.xz" \
            "$G4/gmp/gmp-6.3.0.tar.xz"

          download mpfr-4.2.2.tar.xz \
            "$G1/mpfr/mpfr-4.2.2.tar.xz" \
            "$G2/mpfr/mpfr-4.2.2.tar.xz" \
            "$G3/mpfr/mpfr-4.2.2.tar.xz" \
            "$G4/mpfr/mpfr-4.2.2.tar.xz"

          download mpc-1.3.1.tar.gz \
            "$G1/mpc/mpc-1.3.1.tar.gz" \
            "$G2/mpc/mpc-1.3.1.tar.gz" \
            "$G3/mpc/mpc-1.3.1.tar.gz" \
            "$G4/mpc/mpc-1.3.1.tar.gz"

          download "linux-${LINUX_VER}.tar.xz" \
            "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${LINUX_VER}.tar.xz" \
            "https://mirrors.edge.kernel.org/pub/linux/kernel/v6.x/linux-${LINUX_VER}.tar.xz"

          echo "  All source tarballs ready"
          ls -lh *.tar.*

      - name: Bootstrap cross-toolchain
        if: steps.published.outputs.cached != 'true'
        run: |
          LFS="$LFS" bash scripts/bootstrap-toolchain.sh

      - name: Verify toolchain
        run: |
          "$LFS/tools/bin/x86_64-agnos-linux-gnu-gcc" --version
          echo 'int main(){return 0;}' > /tmp/test.c
          "$LFS/tools/bin/x86_64-agnos-linux-gnu-gcc" /tmp/test.c -o /tmp/test
          file /tmp/test
          rm -f /tmp/test.c /tmp/test

      - name: Archive toolchain
        run: |
          mkdir -p output
          tar cf output/agnos-toolchain-x86_64.tar -C "$LFS" tools/ usr/
          ls -lh output/agnos-toolchain-x86_64.tar

      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: agnos-toolchain-x86_64
          path: output/agnos-toolchain-x86_64.tar
          retention-days: 30
          compression-level: 0

  # -----------------------------------------------------------------------
  # Stage 2: Build base system (LFS packages)
  # Produces: agnos-base-rootfs-x86_64.tar (base system WITHOUT userland)
  # Published as: release asset "base-rootfs-latest" for reuse by release.yml
  # -----------------------------------------------------------------------
  build-base:
    name: Build Base System
    needs: bootstrap-toolchain
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 240
    steps:
      - name: Check if x86_64 rootfs already cached
        id: cached
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested"
          elif curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/base-rootfs-latest" 2>/dev/null \
            | grep -q 'agnos-base-rootfs-x86_64.tar.zst'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "x86_64 base rootfs already published — skipping build"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No cached x86_64 rootfs — building from source"
          fi

      - name: Clean workspace (root-owned leftovers)
        if: steps.cached.outputs.skip != 'true'
        run: sudo rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/output"

      - name: Configure git for runner
        if: steps.cached.outputs.skip != 'true'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4
        if: steps.cached.outputs.skip != 'true'

      - name: Download toolchain artifact
        if: steps.cached.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: agnos-toolchain-x86_64
          path: output/

      - name: Restore toolchain
        if: steps.cached.outputs.skip != 'true'
        run: |
          sudo rm -rf "$LFS"
          mkdir -p "$LFS"
          tar xf output/agnos-toolchain-x86_64.tar -C "$LFS"
          "$LFS/tools/bin/x86_64-agnos-linux-gnu-gcc" --version

      - name: Download source tarballs
        if: steps.cached.outputs.skip != 'true'
        run: |
          # Pre-download all source tarballs referenced in recipes
          mkdir -p "$LFS/sources"
          for recipe in recipes/base/*.toml recipes/desktop/*.toml; do
            url=$(grep '^url\s*=' "$recipe" | head -1 | sed 's/.*=\s*"\(.*\)"/\1/')
            if [[ -n "$url" && "$url" != *"local"* ]]; then
              file=$(basename "$url")
              if [[ ! -f "$LFS/sources/$file" ]]; then
                curl -fSL -o "$LFS/sources/$file" "$url" 2>/dev/null || \
                  echo "WARN: Could not download $file"
              fi
            fi
          done
          echo "Source cache: $(du -sh "$LFS/sources" | cut -f1)"

      - name: Build all packages from recipes
        if: steps.cached.outputs.skip != 'true'
        run: |
          # Copy recipes and scripts into chroot
          mkdir -p "$LFS/usr/src/agnos"
          cp -r recipes "$LFS/usr/src/agnos/recipes"
          cp -r scripts "$LFS/usr/src/agnos/scripts"
          cp -r kernel  "$LFS/usr/src/agnos/kernel"
          cp VERSION     "$LFS/usr/src/agnos/VERSION"
          install -m 755 scripts/ark-build.sh "$LFS/usr/bin/ark-build"

          # Create minimal /etc if not present
          mkdir -p "$LFS"/{etc,var/log,tmp,run,proc,sys,dev}
          [[ -f "$LFS/etc/passwd" ]] || echo 'root:x:0:0:root:/root:/bin/bash' > "$LFS/etc/passwd"
          [[ -f "$LFS/etc/group" ]]  || echo 'root:x:0:' > "$LFS/etc/group"

          # Build packages in dependency order from build-order.txt
          BUILT=0
          FAILED=0
          SKIPPED=0
          while IFS= read -r line; do
            # Skip comments and blank lines
            [[ -z "$line" || "$line" == \#* ]] && continue

            recipe="/usr/src/agnos/recipes/${line}.toml"
            pkg=$(basename "$line")

            echo ""
            echo "========== Building: $pkg =========="

            if LFS="$LFS" bash scripts/enter-chroot.sh \
              "ARK_CACHE_DIR=/sources ark-build $recipe 2>&1"; then
              BUILT=$((BUILT + 1))
              echo "OK: $pkg"
            else
              FAILED=$((FAILED + 1))
              echo "FAIL: $pkg (continuing)"
            fi
          done < recipes/build-order.txt

          echo ""
          echo "=========================================="
          echo "  Build Summary"
          echo "=========================================="
          echo "  Built:   $BUILT"
          echo "  Failed:  $FAILED"
          echo "=========================================="

      - name: Build kernel into base rootfs
        if: steps.cached.outputs.skip != 'true'
        run: |
          echo "=== Checking kernel build dependencies ==="
          MISSING=""
          for tool in bc flex bison make gcc; do
            if ! command -v "$tool" &>/dev/null; then
              MISSING="$MISSING $tool"
            fi
          done
          if [[ -n "$MISSING" ]]; then
            echo "ERROR: Missing kernel build tools:$MISSING"
            exit 1
          fi
          echo "=== Building Linux kernel from source ==="
          mkdir -p "$LFS/boot"

          # Clean leftover root-owned kernel build artifacts
          sudo rm -rf "/tmp/linux-${LINUX_VER}" "/tmp/linux-${LINUX_VER}.tar.xz" /tmp/gcc-wrap

          KERNEL_SRC="/tmp/linux-${LINUX_VER}.tar.xz"
          if [[ -f "$LFS/sources/linux-${LINUX_VER}.tar.xz" ]]; then
            cp "$LFS/sources/linux-${LINUX_VER}.tar.xz" "$KERNEL_SRC"
          else
            curl -fSL -o "$KERNEL_SRC" \
              "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${LINUX_VER}.tar.xz"
          fi

          tar xf "$KERNEL_SRC" -C /tmp
          cd "/tmp/linux-${LINUX_VER}"

          # Apply AGNOS kernel patches
          PATCH_DIR="$GITHUB_WORKSPACE/kernel/patches"
          if [[ -d "$PATCH_DIR" ]]; then
            for pdir in "$PATCH_DIR"/*/; do
              for patch in "$pdir"/*.patch "$pdir"/*.diff; do
                if [[ -f "$patch" ]]; then
                  echo "Applying patch: $(basename "$patch")"
                  patch -p1 < "$patch" || echo "WARN: patch $(basename "$patch") did not apply cleanly"
                fi
              done
            done
          fi

          # GCC 15+ needs gnu11 wrapper
          mkdir -p /tmp/gcc-wrap
          cat > /tmp/gcc-wrap/gcc <<'WRAPPER'
          #!/bin/bash
          exec /usr/bin/gcc -std=gnu11 "$@"
          WRAPPER
          chmod +x /tmp/gcc-wrap/gcc
          export PATH="/tmp/gcc-wrap:$PATH"

          cp "$GITHUB_WORKSPACE/kernel/config/agnos_defconfig" .config
          make olddefconfig
          make -j"$(nproc)" bzImage modules

          KVER=$(make -s kernelrelease)
          cp arch/x86/boot/bzImage "$LFS/boot/vmlinuz-${KVER}"
          make modules_install INSTALL_MOD_PATH="$LFS"
          echo "Installed kernel: vmlinuz-${KVER}"

          cd "$GITHUB_WORKSPACE"
          rm -rf "/tmp/linux-${LINUX_VER}" /tmp/gcc-wrap
          echo "Kernel build complete: $KVER"

      - name: Archive base rootfs (with kernel, without userland)
        if: steps.cached.outputs.skip != 'true'
        run: |
          mkdir -p output
          DIRS="usr/ etc/ var/"
          for d in tools/ boot/ lib/ lib64/; do
            [[ -e "$LFS/$d" ]] && DIRS="$DIRS $d"
          done
          echo "Base rootfs directories: $DIRS"
          # Verify kernel is in the base rootfs
          if ls "$LFS"/boot/vmlinuz-* 1>/dev/null 2>&1; then
            echo "Kernel found: $(ls "$LFS"/boot/vmlinuz-*)"
          else
            echo "ERROR: No kernel in base rootfs"
            exit 1
          fi
          tar cf output/agnos-base-rootfs-x86_64.tar \
            -C "$LFS" \
            --exclude='sources' \
            --exclude='tmp' \
            --exclude='usr/src' \
            $DIRS
          ls -lh output/agnos-base-rootfs-x86_64.tar

      - name: Upload base rootfs artifact
        if: steps.cached.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: agnos-base-rootfs-x86_64
          path: output/agnos-base-rootfs-x86_64.tar
          retention-days: 90
          compression-level: 0

      - name: Publish base rootfs as release asset
        if: steps.cached.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/${REPO}"
          AUTH=(-H "Authorization: token ${GITHUB_TOKEN}")
          TAG="base-rootfs-latest"

          # Compress for storage
          zstd -T0 -15 output/agnos-base-rootfs-x86_64.tar \
            -o output/agnos-base-rootfs-x86_64.tar.zst
          sha256sum output/agnos-base-rootfs-x86_64.tar.zst \
            > output/agnos-base-rootfs-x86_64.tar.zst.sha256

          VERSION=$(cat VERSION)

          # Get or create the release (don't delete the whole release — aarch64
          # assets may already be there from the parallel aarch64 job)
          RELEASE_JSON=$(curl -fsSL "${AUTH[@]}" "${API}/releases/tags/${TAG}" 2>/dev/null || echo '{}')
          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id // empty' 2>/dev/null) || true

          if [[ -n "$RELEASE_ID" ]]; then
            echo "Existing release found (id=$RELEASE_ID) — replacing x86_64 assets only"
            UPLOAD_URL=$(echo "$RELEASE_JSON" | jq -r '.upload_url' | sed 's/{.*}//')

            # Delete only x86_64 assets (leave aarch64 alone)
            for old_id in $(echo "$RELEASE_JSON" | jq -r '.assets[]? | select(.name | startswith("agnos-base-rootfs-x86_64")) | .id' 2>/dev/null || true); do
              echo "Deleting old x86_64 asset: $old_id"
              curl -fsSL "${AUTH[@]}" -X DELETE "${API}/releases/assets/${old_id}" || true
            done
          else
            echo "No existing release — creating base-rootfs-latest"
            # Need tag first
            git tag -d "${TAG}" 2>/dev/null || true
            git push origin ":refs/tags/${TAG}" 2>/dev/null || true

            NOTES="AGNOS base system rootfs (x86_64 + aarch64). Version: ${VERSION}. Consumed by release workflow."

            RELEASE_RESPONSE=$(curl -fsSL "${AUTH[@]}" \
              -X POST "${API}/releases" \
              -d "$(jq -n \
                --arg tag "$TAG" \
                --arg name "AGNOS Base Rootfs (Latest)" \
                --arg body "$NOTES" \
                '{tag_name: $tag, name: $name, body: $body}')")

            UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.upload_url' | sed 's/{.*}//')
          fi

          if [[ -z "$UPLOAD_URL" || "$UPLOAD_URL" == "null" ]]; then
            echo "ERROR: Could not get upload URL for release"
            exit 1
          fi

          # Upload x86_64 assets
          for asset in output/agnos-base-rootfs-x86_64.tar.zst output/agnos-base-rootfs-x86_64.tar.zst.sha256; do
            FILENAME=$(basename "$asset")
            CONTENT_TYPE="application/octet-stream"
            [[ "$FILENAME" == *.sha256 ]] && CONTENT_TYPE="text/plain"
            curl -fsSL "${AUTH[@]}" \
              -H "Content-Type: ${CONTENT_TYPE}" \
              --data-binary "@${asset}" \
              "${UPLOAD_URL}?name=${FILENAME}"
            echo "Uploaded: ${FILENAME}"
          done

  # -----------------------------------------------------------------------
  # Stage 3: Build userland + create ISO (validates full pipeline)
  # This is the integration test — proves the base rootfs + userland = bootable
  # -----------------------------------------------------------------------
  build-and-iso:
    name: Build Userland & Create ISO
    needs: build-base
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 60
    steps:
      - name: Clean workspace (root-owned leftovers)
        run: sudo rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/output"

      - name: Configure git for runner
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Download base rootfs (try artifact, fall back to release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output

          # Method 1: Try workflow artifact (available when build-base ran in this workflow)
          # download-artifact only works within the same workflow run, so we use
          # the GitHub API to check if the artifact exists in this run.
          ARTIFACT_FOUND=false
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/${REPO}"

          ARTIFACT_URL=$(curl -fsSL \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${API}/actions/runs/${RUN_ID}/artifacts" 2>/dev/null \
            | jq -r '.artifacts[]? | select(.name == "agnos-base-rootfs-x86_64") | .archive_download_url' 2>/dev/null \
            | head -1) || true

          if [[ -n "$ARTIFACT_URL" && "$ARTIFACT_URL" != "null" ]]; then
            echo "Downloading base rootfs from workflow artifact..."
            if curl -fSL -H "Authorization: token ${GITHUB_TOKEN}" \
              -o /tmp/artifact.zip "$ARTIFACT_URL" 2>/dev/null; then
              cd output && unzip -o /tmp/artifact.zip && cd ..
              rm -f /tmp/artifact.zip
              ARTIFACT_FOUND=true
              echo "OK: Got rootfs from workflow artifact"
            fi
          fi

          # Method 2: Fall back to published release asset
          if [[ "$ARTIFACT_FOUND" != "true" ]]; then
            echo "No workflow artifact — downloading from base-rootfs-latest release..."
            ASSET_URL=$(curl -fsSL \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              "${API}/releases/tags/base-rootfs-latest" 2>/dev/null \
              | jq -r '.assets[]? | select(.name == "agnos-base-rootfs-x86_64.tar.zst") | .browser_download_url' 2>/dev/null \
              | head -1) || true

            if [[ -n "$ASSET_URL" && "$ASSET_URL" != "null" ]]; then
              curl -fSL -H "Authorization: token ${GITHUB_TOKEN}" \
                -o output/agnos-base-rootfs-x86_64.tar.zst "$ASSET_URL"
              zstd -d output/agnos-base-rootfs-x86_64.tar.zst -o output/agnos-base-rootfs-x86_64.tar
              rm -f output/agnos-base-rootfs-x86_64.tar.zst
              echo "OK: Got rootfs from release asset"
            else
              echo "ERROR: No base rootfs available (no artifact, no release)"
              echo "Run selfhost-build with force_rebuild=true first."
              exit 1
            fi
          fi

          ls -lh output/agnos-base-rootfs-x86_64.tar

      - name: Clone agnosys (sibling dependency)
        run: |
          if [ ! -d "../agnosys" ]; then
            git clone --depth 1 https://github.com/MacCracken/agnosys.git ../agnosys
          fi

      - name: Setup Rust toolchain
        run: |
          if [ -f "$HOME/.cargo/env" ]; then
            source "$HOME/.cargo/env"
          fi
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            source "$HOME/.cargo/env"
          fi
          rustup default stable
          rustc --version
          cargo --version

      - name: Build userland
        run: |
          source "$HOME/.cargo/env"
          cd userland
          cargo build --release --workspace

      - name: Assemble rootfs with userland
        run: |
          sudo rm -rf "$LFS"
          mkdir -p "$LFS"

          # Restore base rootfs
          tar xf output/agnos-base-rootfs-x86_64.tar -C "$LFS"

          # Overlay userland binaries
          mkdir -p "$LFS/usr/bin"
          for bin in agent_runtime llm_gateway agnsh agnos_sudo desktop_environment ai_shell; do
            if [[ -f "userland/target/release/$bin" ]]; then
              cp "userland/target/release/$bin" "$LFS/usr/bin/"
              echo "Installed: $bin"
            fi
          done

          # Install systemd units
          mkdir -p "$LFS/usr/lib/systemd/system"
          cp -r systemd/*.service "$LFS/usr/lib/systemd/system/" 2>/dev/null || true

          # Install configs
          mkdir -p "$LFS/etc/agnos"
          cp -r config/* "$LFS/etc/agnos/" 2>/dev/null || true

          # Kernel is already in the base rootfs (built in base-system stage)
          echo "Kernel check:"
          ls -la "$LFS/boot/vmlinuz-"* 2>/dev/null || echo "WARNING: No kernel in base rootfs"

      - name: Archive complete rootfs (base + desktop + userland)
        run: |
          mkdir -p output
          # Build tar argument list from directories that actually exist
          DIRS="usr/ etc/ var/"
          for d in tools/ boot/ lib/ lib64/; do
            [[ -d "$LFS/$d" ]] && DIRS="$DIRS $d"
          done
          echo "Archiving directories: $DIRS"
          # Verify kernel is present before archiving
          if ls "$LFS"/boot/vmlinuz-* 1>/dev/null 2>&1; then
            echo "Kernel found: $(ls "$LFS"/boot/vmlinuz-*)"
          else
            echo "WARNING: No kernel found in $LFS/boot/ — ISO will not be bootable"
          fi
          tar cf output/agnos-complete-rootfs-x86_64.tar \
            -C "$LFS" \
            --exclude='sources' \
            --exclude='tmp' \
            $DIRS
          ls -lh output/agnos-complete-rootfs-x86_64.tar
          # Verify boot/ made it into the archive
          if tar tf output/agnos-complete-rootfs-x86_64.tar | grep -q '^boot/vmlinuz'; then
            echo "OK: kernel present in archive"
          else
            echo "ERROR: kernel NOT in archive — build-installer.sh will fail"
            exit 1
          fi

      - name: Create ISO from AGNOS rootfs (no Debian)
        run: |
          # Place binaries where build-installer.sh expects them
          mkdir -p userland/target/release
          for bin in agent_runtime llm_gateway agnsh agnos_sudo desktop_environment ai_shell; do
            if [[ -f "$LFS/usr/bin/$bin" ]]; then
              cp "$LFS/usr/bin/$bin" userland/target/release/
            fi
          done
          sudo bash scripts/build-installer.sh \
            --profile desktop \
            --skip-build \
            --base-rootfs output/agnos-complete-rootfs-x86_64.tar

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: agnos-selfhost-iso-x86_64
          path: output/agnos-*.iso
          retention-days: 14
          compression-level: 0

      - name: Upload ISO checksum
        uses: actions/upload-artifact@v4
        with:
          name: agnos-selfhost-iso-x86_64-sha256
          path: output/agnos-*.iso.sha256
          retention-days: 14

  # -----------------------------------------------------------------------
  # Stage 4: Build aarch64 base system (native on RPi4)
  # Runs independently of x86_64 stages — only needs the RPi4 runner.
  # Produces: agnos-base-rootfs-aarch64.tar published to base-rootfs-latest
  # -----------------------------------------------------------------------
  build-base-aarch64:
    name: Build aarch64 Base System
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 360
    steps:
      - name: Check if aarch64 rootfs already cached
        id: cached
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested"
          elif curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/base-rootfs-latest" 2>/dev/null \
            | grep -q 'agnos-base-rootfs-aarch64.tar.zst'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "aarch64 base rootfs already published — skipping 6-hour build"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No cached aarch64 rootfs — building from source"
          fi

      - name: Clean workspace
        if: steps.cached.outputs.skip != 'true'
        run: sudo rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/output" "$LFS"

      - name: Configure git for runner
        if: steps.cached.outputs.skip != 'true'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4
        if: steps.cached.outputs.skip != 'true'

      - name: Prepare build directory
        if: steps.cached.outputs.skip != 'true'
        run: |
          mkdir -p "$LFS"/{sources,etc,var/log,tmp,run,proc,sys,dev,boot}
          mkdir -p "$LFS/usr/"{src/agnos,bin,lib}

      - name: Download source tarballs
        if: steps.cached.outputs.skip != 'true'
        run: |
          mkdir -p "$LFS/sources"
          cd "$LFS/sources"

          download() {
            local file="$1"; shift
            [[ -f "$file" ]] && { echo "  Cached: $file"; return 0; }
            for url in "$@"; do
              echo "  Trying: $url"
              if curl -fSL --connect-timeout 30 --max-time 300 -o "$file" "$url" 2>/dev/null; then
                echo "  OK: $file"
                return 0
              fi
            done
            echo "  FAILED: $file"
            return 1
          }

          download "linux-${LINUX_VER}.tar.xz" \
            "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${LINUX_VER}.tar.xz" \
            "https://mirrors.edge.kernel.org/pub/linux/kernel/v6.x/linux-${LINUX_VER}.tar.xz"

          # Download source tarballs referenced in recipes
          for recipe in recipes/base/*.toml; do
            url=$(grep '^url\s*=' "$recipe" | head -1 | sed 's/.*=\s*"\(.*\)"/\1/')
            if [[ -n "$url" && "$url" != *"local"* ]]; then
              file=$(basename "$url")
              [[ -f "$file" ]] || curl -fSL -o "$file" "$url" 2>/dev/null || echo "WARN: $file"
            fi
          done
          echo "Source cache: $(du -sh "$LFS/sources" | cut -f1)"

      - name: Bootstrap host tools into chroot
        if: steps.cached.outputs.skip != 'true'
        run: |
          echo "=== Bootstrapping native aarch64 build tools into chroot ==="
          # On aarch64, we build natively (no cross-compiler). Copy the host's
          # build toolchain into the chroot so ark-build can find gcc, make, etc.

          mkdir -p "$LFS/usr/bin" "$LFS/usr/lib" "$LFS/usr/include" "$LFS/usr/libexec"

          # Essential build tools from host
          TOOLS=(gcc g++ cc make ar ranlib strip ld as nm objcopy objdump
                 install patch sed awk grep find xargs sort uniq head tail
                 wc tr cut tee cat cp mv rm ln mkdir rmdir chmod chown
                 tar xz gzip bzip2 cmp diff file touch date uname id
                 readlink dirname basename expr test true false printf
                 bash sh ls mount umount env)

          for tool in "${TOOLS[@]}"; do
            src=$(command -v "$tool" 2>/dev/null) || continue
            # Resolve symlinks to get the actual binary
            src=$(readlink -f "$src")
            dest="$LFS/usr/bin/$(basename "$tool")"
            if [[ ! -f "$dest" ]]; then
              cp "$src" "$dest" 2>/dev/null || true
              chmod +x "$dest" 2>/dev/null || true
            fi
          done

          # Copy shared library dependencies for all copied tools
          for bin in "$LFS"/usr/bin/*; do
            [[ -f "$bin" ]] || continue
            ldd "$bin" 2>/dev/null | grep -oP '/\S+' | while read -r lib; do
              libname=$(basename "$lib")
              if [[ -f "$lib" ]] && [[ ! -f "$LFS/usr/lib/$libname" ]]; then
                cp "$lib" "$LFS/usr/lib/" 2>/dev/null || true
              fi
            done
          done

          # GCC needs its internal specs, headers, and libexec helpers
          GCC_VER=$(gcc -dumpversion 2>/dev/null)
          if [[ -n "$GCC_VER" ]]; then
            # Copy gcc internal directories
            for dir in /usr/lib/gcc /usr/libexec/gcc; do
              if [[ -d "$dir" ]]; then
                mkdir -p "$LFS$dir"
                cp -r "$dir"/* "$LFS$dir/" 2>/dev/null || true
              fi
            done
            # Copy system headers
            if [[ -d /usr/include ]]; then
              cp -r /usr/include/* "$LFS/usr/include/" 2>/dev/null || true
            fi
          fi

          # Symlinks that some build systems expect
          [[ -f "$LFS/usr/bin/cc" ]] || ln -sf gcc "$LFS/usr/bin/cc" 2>/dev/null || true

          # LFS-style merged-usr symlinks
          for link in bin sbin lib; do
            [[ -e "$LFS/$link" ]] || ln -sf "usr/$link" "$LFS/$link" 2>/dev/null || true
          done

          echo "Build tools bootstrapped: $(ls "$LFS/usr/bin/" | wc -l) binaries"

      - name: Build packages from recipes
        if: steps.cached.outputs.skip != 'true'
        run: |
          cp -r recipes "$LFS/usr/src/agnos/recipes"
          cp -r scripts "$LFS/usr/src/agnos/scripts"
          cp -r kernel  "$LFS/usr/src/agnos/kernel"
          cp VERSION     "$LFS/usr/src/agnos/VERSION"
          install -m 755 scripts/ark-build.sh "$LFS/usr/bin/ark-build"

          [[ -f "$LFS/etc/passwd" ]] || echo 'root:x:0:0:root:/root:/bin/bash' > "$LFS/etc/passwd"
          [[ -f "$LFS/etc/group" ]]  || echo 'root:x:0:' > "$LFS/etc/group"

          BUILT=0
          FAILED=0
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            recipe="/usr/src/agnos/recipes/${line}.toml"
            pkg=$(basename "$line")
            echo ""
            echo "========== Building: $pkg =========="
            if LFS="$LFS" bash scripts/enter-chroot.sh \
              "ARK_CACHE_DIR=/sources ark-build $recipe 2>&1"; then
              BUILT=$((BUILT + 1))
            else
              FAILED=$((FAILED + 1))
              echo "FAIL: $pkg (continuing)"
            fi
          done < recipes/build-order.txt

          echo ""
          echo "=========================================="
          echo "  aarch64 Build Summary"
          echo "  Built:   $BUILT"
          echo "  Failed:  $FAILED"
          echo "=========================================="

      - name: Build aarch64 kernel
        if: steps.cached.outputs.skip != 'true'
        run: |
          echo "=== Building aarch64 kernel ==="
          sudo rm -rf "/tmp/linux-${LINUX_VER}" "/tmp/linux-${LINUX_VER}.tar.xz"

          KERNEL_SRC="/tmp/linux-${LINUX_VER}.tar.xz"
          if [[ -f "$LFS/sources/linux-${LINUX_VER}.tar.xz" ]]; then
            cp "$LFS/sources/linux-${LINUX_VER}.tar.xz" "$KERNEL_SRC"
          else
            curl -fSL -o "$KERNEL_SRC" \
              "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${LINUX_VER}.tar.xz"
          fi

          tar xf "$KERNEL_SRC" -C /tmp
          cd "/tmp/linux-${LINUX_VER}"

          # Apply patches
          PATCH_DIR="$GITHUB_WORKSPACE/kernel/patches"
          if [[ -d "$PATCH_DIR" ]]; then
            for pdir in "$PATCH_DIR"/*/; do
              for patch in "$pdir"/*.patch "$pdir"/*.diff; do
                [[ -f "$patch" ]] && patch -p1 < "$patch" || true
              done
            done
          fi

          # Use RPi4 config if available, otherwise defconfig
          if [[ -f "$GITHUB_WORKSPACE/kernel/config/edge-rpi4.config" ]]; then
            cp "$GITHUB_WORKSPACE/kernel/config/edge-rpi4.config" .config
          else
            cp "$GITHUB_WORKSPACE/kernel/config/agnos_defconfig" .config
          fi
          make olddefconfig

          # aarch64 uses Image not bzImage
          make -j$(nproc) Image modules dtbs 2>&1 || make -j$(nproc) Image modules 2>&1

          KVER=$(make -s kernelrelease)
          cp arch/arm64/boot/Image "$LFS/boot/vmlinuz-${KVER}"
          make modules_install INSTALL_MOD_PATH="$LFS"

          # Copy DTBs for RPi4/5
          mkdir -p "$LFS/boot/dtbs"
          cp arch/arm64/boot/dts/broadcom/bcm2711*.dtb "$LFS/boot/dtbs/" 2>/dev/null || true
          cp arch/arm64/boot/dts/broadcom/bcm2712*.dtb "$LFS/boot/dtbs/" 2>/dev/null || true

          cd "$GITHUB_WORKSPACE"
          rm -rf "/tmp/linux-${LINUX_VER}"
          echo "aarch64 kernel: $KVER"

      - name: Archive aarch64 base rootfs
        if: steps.cached.outputs.skip != 'true'
        run: |
          mkdir -p output
          DIRS="usr/ etc/ var/"
          for d in boot/ lib/; do
            [[ -e "$LFS/$d" ]] && DIRS="$DIRS $d"
          done
          if ls "$LFS"/boot/vmlinuz-* 1>/dev/null 2>&1; then
            echo "Kernel found: $(ls "$LFS"/boot/vmlinuz-*)"
          else
            echo "ERROR: No kernel in aarch64 rootfs"
            exit 1
          fi
          tar cf output/agnos-base-rootfs-aarch64.tar \
            -C "$LFS" \
            --exclude='sources' \
            --exclude='tmp' \
            --exclude='usr/src' \
            $DIRS
          ls -lh output/agnos-base-rootfs-aarch64.tar

      - name: Upload aarch64 base rootfs artifact
        if: steps.cached.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: agnos-base-rootfs-aarch64
          path: output/agnos-base-rootfs-aarch64.tar
          retention-days: 90
          compression-level: 0

      - name: Publish aarch64 rootfs to base-rootfs-latest
        if: steps.cached.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          API="https://api.github.com/repos/${REPO}"
          AUTH=(-H "Authorization: token ${GITHUB_TOKEN}")
          TAG="base-rootfs-latest"

          # Compress
          zstd -T0 -15 output/agnos-base-rootfs-aarch64.tar \
            -o output/agnos-base-rootfs-aarch64.tar.zst
          sha256sum output/agnos-base-rootfs-aarch64.tar.zst \
            > output/agnos-base-rootfs-aarch64.tar.zst.sha256

          # Get existing release upload URL (don't delete — x86_64 assets are there)
          UPLOAD_URL=$(curl -fsSL "${AUTH[@]}" "${API}/releases/tags/${TAG}" \
            | grep -oP '"upload_url":\s*"\K[^{]*') || true

          if [[ -z "$UPLOAD_URL" ]]; then
            echo "WARN: base-rootfs-latest release not found — creating"
            RELEASE_RESPONSE=$(curl -fsSL "${AUTH[@]}" \
              -X POST "${API}/releases" \
              -d "$(jq -n --arg tag "$TAG" --arg name "AGNOS Base Rootfs (Latest)" \
                '{tag_name: $tag, name: $name, body: "Base rootfs for x86_64 and aarch64"}')")
            UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | grep -oP '"upload_url":\s*"\K[^{]*')
          fi

          # Delete old aarch64 assets if present
          RELEASE_JSON=$(curl -fsSL "${AUTH[@]}" "${API}/releases/tags/${TAG}" 2>/dev/null || echo '{}')
          for old_asset_id in $(echo "$RELEASE_JSON" | jq -r '.assets[]? | select(.name | startswith("agnos-base-rootfs-aarch64")) | .id' 2>/dev/null || true); do
            echo "Deleting old asset: $old_asset_id"
            curl -fsSL "${AUTH[@]}" -X DELETE "${API}/releases/assets/${old_asset_id}" || true
          done

          # Upload aarch64 assets
          for asset in output/agnos-base-rootfs-aarch64.tar.zst output/agnos-base-rootfs-aarch64.tar.zst.sha256; do
            FILENAME=$(basename "$asset")
            CONTENT_TYPE="application/octet-stream"
            [[ "$FILENAME" == *.sha256 ]] && CONTENT_TYPE="text/plain"
            curl -fsSL "${AUTH[@]}" \
              -H "Content-Type: ${CONTENT_TYPE}" \
              --data-binary "@${asset}" \
              "${UPLOAD_URL}?name=${FILENAME}"
            echo "Uploaded: ${FILENAME}"
          done

  # -----------------------------------------------------------------------
  # Stage 4b: Validate aarch64 base rootfs
  # Proves the rootfs has a working toolchain, kernel, and essential packages.
  # Mirrors the x86_64 build-and-iso validation but for ARM — no ISO, just
  # rootfs integrity checks since the final artifact is an SD card image.
  # -----------------------------------------------------------------------
  validate-aarch64:
    name: Validate aarch64 Base Rootfs
    needs: build-base-aarch64
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 30
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/output" "$LFS"

      - name: Configure git for runner
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - name: Download aarch64 rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: agnos-base-rootfs-aarch64
          path: output/

      - name: Validate rootfs contents
        env:
          LFS: /tmp/agnos-validate
        run: |
          echo "=== Validating aarch64 base rootfs ==="
          sudo rm -rf "$LFS"
          mkdir -p "$LFS"
          tar xf output/agnos-base-rootfs-aarch64.tar -C "$LFS"

          PASS=0
          FAIL=0

          check() {
            local desc="$1"; shift
            if "$@" >/dev/null 2>&1; then
              echo "  ✓ $desc"
              PASS=$((PASS + 1))
            else
              echo "  ✗ $desc"
              FAIL=$((FAIL + 1))
            fi
          }

          echo ""
          echo "── Kernel ──"
          check "kernel image exists" ls "$LFS"/boot/vmlinuz-*
          check "kernel modules exist" ls "$LFS"/lib/modules/*/modules.dep 2>/dev/null

          echo ""
          echo "── Essential directories ──"
          check "/usr/bin exists" test -d "$LFS/usr/bin"
          check "/usr/lib exists" test -d "$LFS/usr/lib"
          check "/etc exists" test -d "$LFS/etc"

          echo ""
          echo "── Core binaries ──"
          for bin in bash sh cat ls cp mv rm mkdir chmod chown mount; do
            check "$bin" test -f "$LFS/usr/bin/$bin" -o -f "$LFS/bin/$bin" -o -f "$LFS/usr/sbin/$bin"
          done

          echo ""
          echo "── Libraries ──"
          check "libc.so exists" find "$LFS" -name 'libc.so*' -type f 2>/dev/null | grep -q .
          check "libm.so exists" find "$LFS" -name 'libm.so*' -type f 2>/dev/null | grep -q .
          check "libpthread exists" find "$LFS" -name 'libpthread*' -type f 2>/dev/null | grep -q . || find "$LFS" -name 'libc.so*' -type f 2>/dev/null | grep -q .

          echo ""
          echo "── Boot (RPi) ──"
          # DTBs are optional in base rootfs — SD card image adds firmware DTBs separately
          if ls "$LFS"/boot/dtbs/*.dtb >/dev/null 2>&1; then
            echo "  ✓ DTBs exist"
            PASS=$((PASS + 1))
          else
            echo "  ⚠ DTBs not in base rootfs (added during SD card image build)"
          fi

          echo ""
          echo "── Config ──"
          check "/etc/passwd exists" test -f "$LFS/etc/passwd"
          check "/etc/group exists" test -f "$LFS/etc/group"

          echo ""
          echo "=========================================="
          echo "  Validation: $PASS passed, $FAIL failed"
          echo "=========================================="

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::aarch64 rootfs validation failed ($FAIL checks)"
            exit 1
          fi

          rm -rf "$LFS"
