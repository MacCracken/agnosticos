# AGNOS Kernel Hardening - sysctl configuration
# CIS Linux Benchmark 3.0.0 compliance
# Deploy to /etc/sysctl.d/99-agnos-hardening.conf

# ============================================================
# CIS 3.1 - IPv4 Network Parameters
# ============================================================

# 3.1.1 - Disable IP forwarding
net.ipv4.ip_forward = 0

# 3.1.2 - Disable packet redirect sending
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# 3.1.3 - Disable ICMP redirect acceptance
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# 3.1.4 - Disable source packet routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# 3.1.5 - Ignore ICMP broadcast echo requests
net.ipv4.icmp_echo_ignore_broadcasts = 1

# 3.1.6 - Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# 3.1.7 - Enable TCP SYN cookies (SYN flood protection)
net.ipv4.tcp_syncookies = 1

# 3.1.8 - Enable reverse path filtering
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# 3.1.9 - Log suspicious packets (martians)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# ============================================================
# CIS 3.2 - IPv6 Network Parameters
# ============================================================

# 3.2.1 - Disable IPv6 router advertisements
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# 3.2.2 - Disable IPv6 redirects
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# 3.2.3 - Disable IPv6 source routing
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# ============================================================
# Additional hardening (beyond CIS)
# ============================================================

# Restrict dmesg access to root
kernel.dmesg_restrict = 1

# Restrict kernel pointer access
kernel.kptr_restrict = 2

# Yama ptrace scope (no cross-process ptrace)
kernel.yama.ptrace_scope = 2

# Restrict unprivileged BPF
kernel.unprivileged_bpf_disabled = 1

# Restrict perf events
kernel.perf_event_paranoid = 3

# Restrict userfaultfd to root
vm.unprivileged_userfaultfd = 0

# Restrict core dumps
fs.suid_dumpable = 0

# Harden symlink/hardlink handling
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2
