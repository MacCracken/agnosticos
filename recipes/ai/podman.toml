# podman — Rootless container engine
#
# BLFS / AI Stack

[package]
name = "podman"
version = "5.5.2"
description = "podman — Rootless OCI-compliant container engine"
license = "Apache-2.0"
groups = ["containers"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/containers/podman/archive/refs/tags/v5.5.2.tar.gz"
sha256 = "a2dbd8280cd92d4741f32f5a99d385d7fc6f0dd36bc9cc90a7273767e26d43d9"
patches = []

[depends]
runtime = ["glibc", "crun", "conmon", "cni-plugins", "slirp4netns"]
build = ["go"]

[build]
pre_build = ""
configure = ""
make = "go build -o podman ."
check = "go test ./... || true"
install = "install -Dm755 podman $PKG/usr/bin/podman"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
