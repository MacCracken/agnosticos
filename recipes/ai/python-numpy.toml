# python-numpy — Fundamental package for numerical computing in Python
#
# BLFS / AI Stack

[package]
name = "python-numpy"
version = "2.2.4"
description = "python-numpy — Fundamental package for numerical computing with Python"
license = "BSD-3-Clause"
groups = ["ai", "ml", "python"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/numpy/numpy/releases/download/v2.2.4/numpy-2.2.4.tar.gz"
sha256 = "9ba03692a45d3eef66559efe1d1096c4b9b75c0986b5dff5530c378fb8331d4f"
patches = []

[depends]
runtime = ["python3", "openblas"]
build = ["python3", "pip", "meson", "cython"]

[build]
pre_build = ""
configure = ""
make = ""
check = ""
install = "pip install --prefix=/usr --root=$PKG --no-deps ."
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
