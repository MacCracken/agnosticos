# python-scipy — Scientific computing library for Python
#
# BLFS / AI Stack

[package]
name = "python-scipy"
version = "1.15.2"
description = "python-scipy — Scientific computing and technical computing library for Python"
license = "BSD-3-Clause"
groups = ["ai", "ml", "python"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/scipy/scipy/releases/download/v1.15.2/scipy-1.15.2.tar.gz"
sha256 = "cd58a314d92838f7e6f755c8a2167ead4f27e1fd5c1251fd54289569ef3495ec"
patches = []

[depends]
runtime = ["python3", "python-numpy", "openblas", "lapack"]
build = ["python3", "pip", "meson", "cython", "gfortran"]

[build]
pre_build = ""
configure = ""
make = ""
check = ""
install = "pip install --prefix=/usr --root=$PKG --no-deps ."
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
