# libpng — PNG reference library
# PNG image format support. Used by freetype, desktop apps, etc.
#
# BLFS

[package]
name = "libpng"
version = "1.6.44"
description = "libpng — PNG reference library"
license = "Libpng"
groups = ["base", "core", "tier1"]
release = 1
arch = "x86_64"

[source]
url = "https://download.sourceforge.net/libpng/libpng-1.6.44.tar.xz"
sha256 = "60c4da1d5b7f0aa8d158da48e8f8afa9773c1c8baa5d21974df61f1886b8ce8e"
patches = []

[depends]
runtime = ["glibc", "zlib"]
build = ["gcc", "make"]

[build]
pre_build = ""
configure = """
./configure \
    --prefix=/usr \
    --disable-static
"""
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
