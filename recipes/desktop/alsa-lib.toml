# alsa-lib — ALSA userspace library
#
# BLFS

[package]
name = "alsa-lib"
version = "1.2.14"
description = "alsa-lib — ALSA userspace library for sound card access"
license = "LGPL-2.1"
groups = ["desktop", "audio"]
release = 1
arch = "x86_64"

[source]
url = "https://www.alsa-project.org/files/pub/lib/alsa-lib-1.2.14.tar.bz2"
sha256 = "be9c88a0b3604367dd74167a2b754a35e142f670292ae47a2fdef27a2ee97a32"
patches = []

[depends]
runtime = ["glibc"]
build = ["gcc", "make", "pkgconf"]

[build]
pre_build = ""
configure = "./configure --prefix=/usr --disable-static"
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
