# glib — GObject/GIO core library
#
# BLFS

[package]
name = "glib"
version = "2.84.0"
description = "glib — GObject/GIO core library for GLib-based applications"
license = "LGPL-2.1"
groups = ["desktop", "libs"]
release = 1
arch = "x86_64"

[source]
url = "https://download.gnome.org/sources/glib/2.84/glib-2.84.0.tar.xz"
sha256 = "f8823600cb85425e2815cfad82ea20fdaa538482ab74e7293d58b3f64a5aff6a"
patches = []

[depends]
runtime = ["glibc", "pcre2", "libffi", "zlib"]
build = ["gcc", "make", "pkgconf", "meson", "ninja"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
meson setup .. --prefix=/usr --buildtype=release
"""
make = "cd build && ninja -j$(nproc)"
check = "cd build && meson test || true"
install = "cd build && DESTDIR=$PKG ninja install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
