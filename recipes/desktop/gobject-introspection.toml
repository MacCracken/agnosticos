# gobject-introspection — Language bindings for GObject-based libraries
#
# BLFS

[package]
name = "gobject-introspection"
version = "1.84.0"
description = "gobject-introspection — GObject introspection for language bindings"
license = "LGPL-2.0"
groups = ["desktop", "libs"]
release = 1
arch = "x86_64"

[source]
url = "https://download.gnome.org/sources/gobject-introspection/1.84/gobject-introspection-1.84.0.tar.xz"
sha256 = "945b57da7ec262e5c266b89e091d14be800cc424277d82a02872b7d794a84779"
patches = []

[depends]
runtime = ["glibc", "glib", "python"]
build = ["gcc", "make", "pkgconf", "meson", "ninja"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
meson setup .. --prefix=/usr --buildtype=release
"""
make = "cd build && ninja -j$(nproc)"
check = "cd build && meson test || true"
install = "cd build && DESTDIR=$PKG ninja install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
