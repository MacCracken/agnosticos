# KeePassXC — Cross-platform password manager
# Offline-first, KeePass-compatible database, browser integration,
# SSH agent, TOTP, YubiKey/OnlyKey support.
# Integrates with agnos-common secrets store.
#
# BLFS

[package]
name = "keepassxc"
version = "2.7.9"
description = "KeePassXC — cross-platform password manager"
license = "GPL-3.0-or-later"
groups = ["desktop", "security", "secrets"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/keepassxreboot/keepassxc/releases/download/2.7.9/keepassxc-2.7.9-src.tar.xz"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "qt5-base", "qt5-svg", "qt5-x11extras", "libgcrypt", "argon2", "zlib", "minizip", "botan", "libusb", "readline"]
build = ["cmake", "gcc", "make", "pkgconf", "qt5-tools"]
optional = ["yubikey-personalization", "libfido2", "qt5-wayland"]

[build]
pre_build = ""
configure = """
cmake -S . -B build \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DWITH_XC_ALL=ON \
    -DWITH_XC_UPDATECHECK=OFF \
    -DWITH_XC_NETWORKING=ON \
    -DWITH_XC_BROWSER=ON \
    -DWITH_XC_SSHAGENT=ON \
    -DWITH_XC_KEESHARE=ON \
    -DWITH_XC_FDOSECRETS=ON
"""
make = "cmake --build build -j$(nproc)"
check = "cd build && ctest --output-on-failure || true"
install = "DESTDIR=$PKG cmake --install build"
post_install = """
# Autostart for Secret Service (replaces gnome-keyring)
mkdir -p $PKG/etc/xdg/autostart
cat > $PKG/etc/xdg/autostart/keepassxc-secretservice.desktop << 'EOF'
[Desktop Entry]
Name=KeePassXC Secret Service
Comment=KeePassXC freedesktop.org Secret Service integration
Exec=keepassxc --minimized
Type=Application
Icon=keepassxc
Categories=Utility;Security;
X-GNOME-AutoRestart=false
X-GNOME-Autostart-Notify=false
EOF
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
