# Neovim — Hyperextensible Vim-based text editor
# Post-beta alternative to Helix with richer plugin ecosystem.
# AI integration via agnoshi "edit file" intent.
#
# BLFS

[package]
name = "neovim"
version = "0.11.1"
description = "Neovim — hyperextensible Vim-based text editor"
license = "Apache-2.0"
groups = ["desktop", "editor"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/neovim/neovim/archive/refs/tags/v0.11.1.tar.gz"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "libuv", "luajit", "tree-sitter", "libvterm", "unibilium", "msgpack-c"]
build = ["cmake", "ninja", "gcc", "make", "pkgconf", "gettext"]
optional = ["python3", "nodejs", "xclip", "wl-clipboard"]

[build]
pre_build = ""
configure = """
cmake -S . -B build \
    -G Ninja \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DUSE_BUNDLED=OFF
"""
make = "ninja -C build -j$(nproc)"
check = "ninja -C build test || true"
install = "DESTDIR=$PKG ninja -C build install"
post_install = """
mkdir -p $PKG/usr/share/applications
cat > $PKG/usr/share/applications/neovim.desktop << 'EOF'
[Desktop Entry]
Name=Neovim
Comment=Hyperextensible Vim-based text editor
Exec=nvim %F
Terminal=true
Type=Application
Icon=nvim
Categories=Utility;TextEditor;
Keywords=text;editor;vim;
MimeType=text/plain;
EOF
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
