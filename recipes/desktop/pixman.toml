# pixman — Pixel manipulation library
# Low-level software pixel compositing and rasterization
#
# BLFS

[package]
name = "pixman"
version = "0.44.2"
description = "pixman — Pixel manipulation library"
license = "MIT"
groups = ["desktop", "graphics"]
release = 1
arch = "x86_64"

[source]
url = "https://cairographics.org/releases/pixman-0.44.2.tar.gz"
sha256 = "6349061ce1a338ab6952b92194d1b0377472244208d47ff25bef86fc71973466"
patches = []

[depends]
runtime = ["glibc"]
build = ["gcc", "make", "pkgconf", "meson", "ninja"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
meson setup .. --prefix=/usr --buildtype=release
"""
make = "cd build && ninja -j$(nproc)"
check = "cd build && meson test || true"
install = "cd build && DESTDIR=$PKG ninja install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
