# Poppler — PDF rendering library
# Used by Evince, Zathura, and other document viewers.
# Fork of Xpdf with active development.
#
# BLFS

[package]
name = "poppler"
version = "24.12.0"
description = "Poppler — PDF rendering library"
license = "GPL-2.0-or-later"
groups = ["desktop", "document"]
release = 1
arch = "x86_64"

[source]
url = "https://poppler.freedesktop.org/poppler-24.12.0.tar.xz"
sha256 = "1cf374c3146f3f685d9257701bf0c2866c61d6c202c14d1f5c01a1f3a089028a"
patches = []

[depends]
runtime = ["glibc", "fontconfig", "freetype", "cairo", "libjpeg-turbo", "libpng", "libtiff", "zlib", "lcms2"]
build = ["cmake", "gcc", "make", "pkgconf", "gobject-introspection"]
optional = ["glib", "nss", "openjpeg", "boost"]

[build]
pre_build = ""
configure = """
cmake -S . -B build \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DENABLE_UNSTABLE_API_ABI_HEADERS=ON \
    -DENABLE_GLIB=ON \
    -DENABLE_QT5=OFF \
    -DENABLE_QT6=OFF \
    -DENABLE_BOOST=ON \
    -DENABLE_CPP=ON
"""
make = "cmake --build build -j$(nproc)"
check = "cd build && ctest --output-on-failure || true"
install = "DESTDIR=$PKG cmake --install build"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
