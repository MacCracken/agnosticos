# Avatara — Divine archetype overlay for AGNOS
# Mythological personality templates for AI agents.
#
# Name: Avatara (Sanskrit: incarnation/descent)
# Lib: avatara = "1.0.1" in Cargo.toml
#
# Status: Released — v1.0.1.

[package]
name = "avatara"
version = "1.0.1"
description = "Avatara — divine archetype overlay"
license = "GPL-3.0"
groups = ["library", "science", "rust"]
release = 1
arch = "any"

[source]
github_release = "MacCracken/avatara"
release_asset = "source"

[depends]
runtime = []
build = ["rust"]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["mythology", "archetype", "personality", "ai", "science", "rust"]
min_agnos_version = "2026.3.24"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test --all-features"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]

install = """
mkdir -p $PKG/usr/lib/avatara
cp -r src $PKG/usr/lib/avatara/
cp Cargo.toml $PKG/usr/lib/avatara/
cp VERSION $PKG/usr/lib/avatara/
"""
