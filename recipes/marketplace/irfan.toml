# Ifran — LLM inference, training, and fleet management engine
# Download, run, and fine-tune language models via CLI or REST/gRPC API.
# Supports llama.cpp, Candle, Ollama, vLLM, ONNX, TensorRT backends.
# LoRA/QLoRA/full fine-tuning, DPO, RLHF, distillation.
# Built in Rust; OpenAI-compatible API for drop-in replacement.
#
# Name: Ifran (Persian/Arabic: عرفان — deep knowledge, gnosis)
# Desktop GUI: tanur (separate project)
# Status: Released — 1.1.1 on crates.io (amd64 + arm64).

[package]
name = "ifran"
version = "1.1.1"
description = "Ifran — LLM inference, training, and fleet management engine"
license = "GPL-3.0"
groups = ["server", "ai", "llm", "rust"]
release = 1
arch = "x86_64"

[source]
# Rust binary built by GitHub Actions CI.
# Release: https://github.com/MacCracken/ifran/releases
github_release = "MacCracken/ifran"
release_asset = "ifran-*-linux-amd64.tar.gz"

[depends]
runtime = [
    "glibc",
    "openssl",
    "sqlite",
    "zlib",
]
build = [
    "rust",
    "openssl-dev",
    "zlib-dev",
    "protobuf",
]

[marketplace]
category = "ai-platform"
runtime = "native-binary"
publisher = "AGNOS"
tags = ["llm", "ai", "training", "fine-tuning", "inference", "model-management", "rust", "openai-compatible"]
min_agnos_version = "2026.3.24"

[marketplace.sandbox]
seccomp_mode = "desktop"
network_access = true
allowed_hosts = [
    "localhost",
    "127.0.0.1",
    # HuggingFace model hub
    "huggingface.co", "*.huggingface.co",
    "hf.co", "*.hf.co",
    # OCI registries
    "ghcr.io",
    "registry.ollama.ai",
    # AI providers (OpenAI-compatible proxy mode)
    "api.anthropic.com",
    "api.openai.com",
    "api.groq.com",
    "api.deepseek.com",
    "api.mistral.ai",
    "openrouter.ai",
]
data_dir = "~/.ifran/"

[[marketplace.sandbox.landlock]]
path = "~/.ifran/"
access = "rw"

[[marketplace.sandbox.landlock]]
path = "/tmp"
access = "rw"

# GPU device access for inference/training
[[marketplace.sandbox.landlock]]
path = "/dev/dri"
access = "rw"

# CUDA/ROCm libraries
[[marketplace.sandbox.landlock]]
path = "/usr/lib/cuda"
access = "ro"

[[marketplace.sandbox.landlock]]
path = "/opt/rocm"
access = "ro"

# IPC with AGNOS agent runtime (daimon) and LLM gateway (hoosh)
[[marketplace.sandbox.landlock]]
path = "/run/agnos/"
access = "rw"

[marketplace.services]
# Ifran REST API + gRPC
ports = [8080]
depends_on = ["llm-gateway"]

[build]
pre_build = ""
configure = ""
make = "cargo build --release"
check = "cargo test"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]

install = """
# Install the single binary
mkdir -p $PKG/usr/lib/ifran/bin
cp target/release/ifran $PKG/usr/lib/ifran/bin/ifran
chmod +x $PKG/usr/lib/ifran/bin/ifran

# Symlink into PATH
mkdir -p $PKG/usr/bin
ln -sf /usr/lib/ifran/bin/ifran $PKG/usr/bin/ifran

# Default config directory
mkdir -p $PKG/etc/ifran

# Systemd service unit
mkdir -p $PKG/usr/lib/systemd/user
cat > $PKG/usr/lib/systemd/user/ifran.service << 'EOF'
[Unit]
Description=Ifran LLM Management Service
After=network.target agnos-llm-gateway.service
Wants=agnos-llm-gateway.service

[Service]
Type=simple
ExecStart=/usr/lib/ifran/bin/ifran serve
Environment=IFRAN_DATA_DIR=%h/.ifran
Restart=on-failure
RestartSec=5

[Install]
WantedBy=default.target
EOF
"""
