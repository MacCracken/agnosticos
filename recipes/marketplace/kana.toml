# Kana — Quantum mechanics engine for AGNOS
# Wavefunctions, operators, quantum states, Schrodinger solver.
#
# Name: Kana (Sanskrit: particle/atom)
# Lib: kana = "1.1.0" in Cargo.toml
#
# Status: Released — v1.1.0.

[package]
name = "kana"
version = "1.1.0"
description = "Kana — quantum mechanics engine"
license = "GPL-3.0"
groups = ["library", "science", "rust"]
release = 1
arch = "any"

[source]
github_release = "MacCracken/kana"
release_asset = "source"

[depends]
runtime = []
build = ["rust"]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["quantum", "mechanics", "wavefunction", "physics", "science", "rust"]
min_agnos_version = "2026.3.24"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test --all-features"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]

install = """
mkdir -p $PKG/usr/lib/kana
cp -r src $PKG/usr/lib/kana/
cp Cargo.toml $PKG/usr/lib/kana/
cp VERSION $PKG/usr/lib/kana/
"""
