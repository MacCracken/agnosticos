# Nada — Core audio engine for the AGNOS creative suite
# Buffers, DSP, resampling, mixing, analysis, transport clock, PipeWire capture.
# Eliminates duplicate audio implementations across shruti, jalwa, and aethersafta.
#
# Name: Nada (Sanskrit: नाद — primordial sound)
# Lib: nada = "0.20.3" in Cargo.toml
#
# Status: Scaffolded — v0.20.3.

[package]
name = "nada"
version = "0.20.3"
description = "Nada — Core audio engine (buffers, DSP, mixing, analysis, clock)"
license = "AGPL-3.0"
groups = ["library", "audio", "rust"]
release = 1
arch = "any"

[source]
crates_io = "nada"
github_release = "MacCracken/nada"
release_asset = "source"

[depends]
runtime = []
build = [
    "rust",
]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["audio", "dsp", "mixing", "resampling", "analysis", "pipewire", "clock", "rust"]
min_agnos_version = "2026.3.20"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]

install = """
# Library crate — consumers add to Cargo.toml:
#   nada = "0.20.3"
# Install source for offline/air-gapped Cargo builds.
mkdir -p $PKG/usr/lib/nada
cp -r src $PKG/usr/lib/nada/
cp Cargo.toml $PKG/usr/lib/nada/
cp VERSION $PKG/usr/lib/nada/
"""
