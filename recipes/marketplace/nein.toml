# Nein — Programmatic nftables firewall for AGNOS
# Type-safe rule builder, NAT, network policies, container networking.
# Used by stiva (container runtime), daimon (service mesh), aegis (host firewall).
#
# Name: Nein (German: no — as in "access denied")
# Lib: nein = "0.1.0" in Cargo.toml
#
# Status: Scaffolded — v0.1.0.

[package]
name = "nein"
version = "0.24.3"
description = "Nein — Programmatic nftables firewall"
license = "GPL-3.0"
groups = ["library", "networking", "security", "rust"]
release = 1
arch = "x86_64"

[source]
github_release = "MacCracken/nein"
release_asset = "source"

[depends]
runtime = [
    "nftables",
]
build = [
    "rust",
]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["firewall", "nftables", "network", "security", "nat", "policy", "rust"]
min_agnos_version = "2026.3.21"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]

install = """
# Library crate — consumers add to Cargo.toml:
#   nein = "0.1.0"
# Install source for offline/air-gapped Cargo builds.
mkdir -p $PKG/usr/lib/nein
cp -r src $PKG/usr/lib/nein/
cp Cargo.toml $PKG/usr/lib/nein/
cp VERSION $PKG/usr/lib/nein/
"""
