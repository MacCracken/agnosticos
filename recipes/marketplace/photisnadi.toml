# Photis Nadi — Productivity app for AGNOS marketplace
# Cross-platform Kanban task management + daily rituals app.
# Built with Flutter; CI releases on GitHub.
#
# Status: Ready for packaging — Photis Nadi 2026.3.11 is feature-complete.
# Release asset: photisnadi-20260310-linux-x64.tar.gz (~20 MB)

[package]
name = "photisnadi"
version = "2026.3.11"
description = "Photis Nadi — Kanban task management with daily rituals"
license = "MIT"
groups = ["desktop", "productivity", "flutter"]
release = 1
arch = "x86_64"

[source]
# Flutter app built by GitHub Actions CI.
# Release: https://github.com/MacCracken/PhotisNadi/releases
# Asset: photisnadi-YYYYMMDD-linux-x64.tar.gz
local = true
build_dir = "build/linux/x64/release/bundle"
github_release = "MacCracken/PhotisNadi"
release_asset = "photisnadi-*-linux-x64.tar.gz"

[depends]
runtime = [
    "glibc",
    "gtk3",
    "mesa",
    "libdrm",
    "wayland",
    "wayland-protocols",
    "fontconfig",
    "freetype2",
    "harfbuzz",
    "sqlite",
]
build = [
    "flutter",
    "clang",
    "cmake",
    "ninja",
    "pkg-config",
]

[marketplace]
category = "productivity"
runtime = "flutter"
publisher = "Photis Nadi"
tags = ["kanban", "productivity", "rituals", "task-management", "flutter"]
min_agnos_version = "2026.3.11"

[marketplace.sandbox]
seccomp_mode = "desktop"
network_access = true
allowed_hosts = ["*.supabase.co", "*.supabase.in"]
data_dir = "~/.local/share/photisnadi/"

[[marketplace.sandbox.landlock]]
path = "~/.local/share/photisnadi/"
access = "rw"

[[marketplace.sandbox.landlock]]
path = "/tmp"
access = "rw"

[[marketplace.sandbox.landlock]]
path = "/usr/share/fonts"
access = "ro"

[[marketplace.sandbox.landlock]]
path = "/run/user/"
access = "ro"

[marketplace.wayland]
requirements = ["core", "xdg-shell"]

[build]
pre_build = ""
configure = ""
make = "flutter build linux --release"
check = "flutter test"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]

install = """
# Pack Flutter frontend as .agnos-agent bundle
agpkg pack-flutter --build-dir build/linux/x64/release/bundle \
  --name photisnadi --version $VERSION --publisher "Photis Nadi" \
  --description "Kanban task management with daily rituals" \
  --category productivity --network --output $PKG/

# Install REST API server (Dart native AOT binary)
mkdir -p $PKG/usr/lib/photisnadi/bin
dart compile exe bin/server.dart -o $PKG/usr/lib/photisnadi/bin/photisnadi-api

# Desktop entry for aethersafha
mkdir -p $PKG/usr/share/applications
cat > $PKG/usr/share/applications/photisnadi.desktop << 'EOF'
[Desktop Entry]
Name=Photis Nadi
Comment=Kanban task management with daily rituals
GenericName=Productivity
Exec=photisnadi
Icon=photisnadi
Terminal=false
Type=Application
Categories=Office;ProjectManagement;
StartupNotify=true
StartupWMClass=photisnadi
EOF
"""
