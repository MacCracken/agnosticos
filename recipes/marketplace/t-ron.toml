# T-Ron — MCP security monitor for AGNOS
# Tool call auditing, rate limiting, injection detection, anomaly analysis.
# Security middleware for bote (MCP protocol layer).
#
# Name: T-Ron (the security program that fights the MCP)
# Lib: t-ron = "0.1.0" in Cargo.toml
#
# Status: Scaffolded — v0.1.0.

[package]
name = "t-ron"
version = "0.1.0"
description = "T-Ron — MCP security monitor"
license = "GPL-3.0"
groups = ["library", "security", "mcp", "rust"]
release = 1
arch = "any"

[source]
github_release = "MacCracken/t-ron"
release_asset = "source"

[depends]
runtime = []
build = [
    "rust",
]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["mcp", "security", "audit", "firewall", "agent", "injection", "rate-limit", "rust"]
min_agnos_version = "2026.3.22"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]

install = """
# Library crate — consumers add to Cargo.toml:
#   t-ron = "0.1.0"
# Install source for offline/air-gapped Cargo builds.
mkdir -p $PKG/usr/lib/t-ron
cp -r src $PKG/usr/lib/t-ron/
cp Cargo.toml $PKG/usr/lib/t-ron/
cp VERSION $PKG/usr/lib/t-ron/
"""
