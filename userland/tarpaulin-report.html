 == 0;\n        \n        let username = Self::get_username(uid)?;\n        let sudo_available = Self::check_sudo_available();\n        \n        if is_root {\n            warn!(\"Shell running as root - AI features disabled for safety\");\n        }\n        \n        Ok(Self {\n            uid,\n            gid,\n            euid,\n            username,\n            is_root,\n            restricted: restricted || is_root,\n            sudo_available,\n        })\n    }\n    \n    /// Get current username\n    fn get_username(uid: u32) -\u003e Result\u003cString\u003e {\n        // Try to get username from environment\n        if let Ok(user) = std::env::var(\"USER\") {\n            return Ok(user);\n        }\n        \n        // Fallback to uid\n        Ok(format!(\"uid_{}\", uid))\n    }\n    \n    /// Check if sudo is available\n    fn check_sudo_available() -\u003e bool {\n        Command::new(\"which\")\n            .arg(\"sudo\")\n            .output()\n            .map(|output| output.status.success())\n            .unwrap_or(false)\n    }\n    \n    /// Check if running as root\n    pub fn is_root(\u0026self) -\u003e bool {\n        self.is_root\n    }\n    \n    /// Check if in restricted mode\n    pub fn is_restricted(\u0026self) -\u003e bool {\n        self.restricted\n    }\n    \n    /// Get username\n    pub fn username(\u0026self) -\u003e \u0026str {\n        \u0026self.username\n    }\n    \n    /// Check if can escalate privileges\n    pub fn can_escalate(\u0026self) -\u003e bool {\n        !self.restricted \u0026\u0026 self.sudo_available \u0026\u0026 !self.is_root\n    }\n    \n    /// Execute command with privilege escalation\n    /// This ALWAYS requires human approval\n    pub async fn execute_with_privileges(\u0026self, command: \u0026[String]) -\u003e Result\u003cstd::process::Output\u003e {\n        if self.restricted {\n            return Err(anyhow!(\"Cannot escalate privileges in restricted mode\"));\n        }\n        \n        if !self.sudo_available {\n            return Err(anyhow!(\"sudo not available for privilege escalation\"));\n        }\n        \n        // Build sudo command\n        let mut cmd = Command::new(\"sudo\");\n        cmd.arg(\"-n\");  // Non-interactive (will fail if password needed)\n        cmd.args(command);\n        \n        info!(\"Executing with elevated privileges: {:?}\", command);\n        \n        let output = cmd.output()?;\n        \n        if !output.status.success() {\n            let stderr = String::from_utf8_lossy(\u0026output.stderr);\n            return Err(anyhow!(\"Privileged command failed: {}\", stderr));\n        }\n        \n        Ok(output)\n    }\n    \n    /// Execute command without privileges\n    pub fn execute_normal(\u0026self, command: \u0026[String]) -\u003e Result\u003cstd::process::Output\u003e {\n        if command.is_empty() {\n            return Err(anyhow!(\"Empty command\"));\n        }\n        \n        let mut cmd = Command::new(\u0026command[0]);\n        cmd.args(\u0026command[1..]);\n        \n        let output = cmd.output()?;\n        Ok(output)\n    }\n}\n\n/// Permission levels for commands\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum PermissionLevel {\n    /// Safe commands that don't modify system\n    Safe,\n    /// Read-only system information\n    ReadOnly,\n    /// Can modify user files\n    UserWrite,\n    /// Can modify system files (requires approval)\n    SystemWrite,\n    /// Administrative commands (requires approval)\n    Admin,\n    /// Dangerous commands (always blocked for AI)\n    Blocked,\n}\n\nimpl PermissionLevel {\n    /// Check if this level requires human approval\n    pub fn requires_approval(\u0026self) -\u003e bool {\n        matches!(self, \n            PermissionLevel::SystemWrite | \n            PermissionLevel::Admin | \n            PermissionLevel::Blocked\n        )\n    }\n    \n    /// Check if AI is allowed to execute this\n    pub fn ai_allowed(\u0026self) -\u003e bool {\n        !matches!(self, PermissionLevel::Blocked)\n    }\n}\n\n/// Analyze command for required permission level\npub fn analyze_command_permission(command: \u0026str, args: \u0026[String]) -\u003e PermissionLevel {\n    let cmd = command.to_lowercase();\n    \n    // Blocked commands (never allowed for AI)\n    let blocked = [\n        \"rm\", \"dd\", \"mkfs\", \"fdisk\", \"parted\", \"dd\",\n        \"chmod\", \"chown\", \"chgrp\",\n    ];\n    \n    if blocked.contains(\u0026cmd.as_str()) {\n        // But allow safe variations\n        if cmd == \"rm\" \u0026\u0026 !args.iter().any(|a| a.starts_with('-')) {\n            return PermissionLevel::UserWrite;\n        }\n        return PermissionLevel::Blocked;\n    }\n    \n    // Admin commands\n    let admin = [\n        \"apt\", \"yum\", \"dnf\", \"pacman\", \"systemctl\", \"service\",\n        \"useradd\", \"userdel\", \"usermod\", \"groupadd\",\n        \"mount\", \"umount\", \"modprobe\", \"insmod\", \"rmmod\",\n    ];\n    \n    if admin.contains(\u0026cmd.as_str()) {\n        return PermissionLevel::Admin;\n    }\n    \n    // System write commands\n    let system_write = [\n        \"cp\", \"mv\", \"ln\", \"touch\", \"mkdir\", \"rmdir\",\n        \"tee\", \"sed\", \"awk\",\n    ];\n    \n    if system_write.contains(\u0026cmd.as_str()) {\n        // Check if targeting system directories\n        if args.iter().any(|a| {\n            a.starts_with(\"/etc/\") || \n            a.starts_with(\"/usr/\") || \n            a.starts_with(\"/bin/\") ||\n            a.starts_with(\"/sbin/\") ||\n            a.starts_with(\"/lib\")\n        }) {\n            return PermissionLevel::SystemWrite;\n        }\n        return PermissionLevel::UserWrite;\n    }\n    \n    // Read-only commands\n    let read_only = [\n        \"ls\", \"cat\", \"head\", \"tail\", \"less\", \"more\",\n        \"grep\", \"find\", \"ps\", \"top\", \"htop\",\n        \"df\", \"du\", \"free\", \"uptime\", \"uname\",\n        \"ifconfig\", \"ip\", \"netstat\", \"ss\",\n        \"pwd\", \"echo\", \"date\", \"whoami\", \"id\",\n    ];\n    \n    if read_only.contains(\u0026cmd.as_str()) {\n        return PermissionLevel::ReadOnly;\n    }\n    \n    // Safe commands (builtin or non-destructive)\n    let safe = [\n        \"cd\", \"pwd\", \"echo\", \"clear\", \"exit\", \"history\",\n        \"help\", \"agnsh\",\n    ];\n    \n    if safe.contains(\u0026cmd.as_str()) {\n        return PermissionLevel::Safe;\n    }\n    \n    // Default to requiring approval for unknown commands\n    PermissionLevel::UserWrite\n}\n","traces":[{"line":23,"address":[6892746,6891664,6892752],"length":1,"stats":{"Line":0}},{"line":24,"address":[6891697],"length":1,"stats":{"Line":0}},{"line":25,"address":[6891721],"length":1,"stats":{"Line":0}},{"line":26,"address":[6891745],"length":1,"stats":{"Line":0}},{"line":27,"address":[6891773],"length":1,"stats":{"Line":0}},{"line":29,"address":[6891792],"length":1,"stats":{"Line":0}},{"line":30,"address":[6891962,6892022],"length":1,"stats":{"Line":0}},{"line":32,"address":[6892032],"length":1,"stats":{"Line":0}},{"line":33,"address":[6892095],"length":1,"stats":{"Line":0}},{"line":36,"address":[6892609],"length":1,"stats":{"Line":0}},{"line":40,"address":[6892040],"length":1,"stats":{"Line":0}},{"line":42,"address":[6892564,6892082],"length":1,"stats":{"Line":0}},{"line":48,"address":[6890528],"length":1,"stats":{"Line":0}},{"line":50,"address":[6890548,6890599],"length":1,"stats":{"Line":0}},{"line":51,"address":[6890629],"length":1,"stats":{"Line":0}},{"line":55,"address":[6890701],"length":1,"stats":{"Line":0}},{"line":59,"address":[6891596,6891408,6891590],"length":1,"stats":{"Line":0}},{"line":60,"address":[6891415],"length":1,"stats":{"Line":0}},{"line":63,"address":[6661984,6661993],"length":1,"stats":{"Line":0}},{"line":68,"address":[6892768],"length":1,"stats":{"Line":0}},{"line":69,"address":[6892773],"length":1,"stats":{"Line":0}},{"line":73,"address":[6890864],"length":1,"sta ell components and handles the main event loop\n\nuse anyhow::{anyhow, Result};\nuse std::io::{self, Write};\nuse std::path::PathBuf;\n\nuse crate::approval::{ApprovalManager, ApprovalRequest, ApprovalResponse};\nuse crate::config::ShellConfig;\nuse crate::history::CommandHistory;\nuse crate::interpreter::{Interpreter, Intent};\nuse crate::mode::{Mode, ModeManager};\nuse crate::output::OutputFormatter;\nuse crate::prompt::{PromptConfig, PromptContext, PromptRenderer};\nuse crate::security::{analyze_command_permission, PermissionLevel, SecurityContext};\nuse crate::ui::Ui;\n\n/// Main shell session\npub struct Session {\n    config: ShellConfig,\n    security: SecurityContext,\n    mode_manager: ModeManager,\n    interpreter: Interpreter,\n    approval: ApprovalManager,\n    history: CommandHistory,\n    output: OutputFormatter,\n    ui: Ui,\n    cwd: PathBuf,\n    prompt_renderer: PromptRenderer,\n    prompt_context: PromptContext,\n}\n\nimpl Session {\n    pub async fn new(\n        config: ShellConfig,\n        security: SecurityContext,\n        initial_mode: Mode,\n    ) -\u003e Result\u003cSelf\u003e {\n        let mode_manager = ModeManager::new(initial_mode.clone(), true);\n        let interpreter = Interpreter::new();\n        let approval = ApprovalManager::new();\n        let history = CommandHistory::new(\u0026config.history_file).await?;\n        let output = OutputFormatter::new(\u0026config.output_format);\n        let ui = Ui::new();\n        let cwd = std::env::current_dir()?;\n        \n        // Initialize starship-style prompt\n        let prompt_config = PromptConfig::default();\n        let prompt_renderer = PromptRenderer::new(prompt_config);\n        let prompt_context = PromptContext::new(\n            cwd.clone(),\n            security.username().to_string(),\n            initial_mode.to_string(),\n        );\n        \n        Ok(Self {\n            config,\n            security,\n            mode_manager,\n            interpreter,\n            approval,\n            history,\n            output,\n            ui,\n            cwd,\n            prompt_renderer,\n            prompt_context,\n        })\n    }\n    \n    /// Run the interactive shell loop\n    pub async fn run_interactive(\u0026mut self) -\u003e Result\u003c()\u003e {\n        self.ui.show_welcome();\n        \n        loop {\n            // Show prompt\n            let prompt = self.build_prompt();\n            \n            // Get input\n            let input = match self.ui.read_input(\u0026prompt).await? {\n                Some(line) =\u003e line,\n                None =\u003e break, // EOF\n            };\n            \n            // Skip empty input\n            if input.trim().is_empty() {\n                continue;\n            }\n            \n            // Add to history\n            self.history.add(\u0026input).await?;\n            \n            // Process input\n            if let Err(e) = self.process_input(\u0026input).await {\n                self.ui.show_error(\u0026e.to_string());\n            }\n        }\n        \n        self.ui.show_goodbye();\n        Ok(())\n    }\n    \n    /// Execute one-shot command\n    pub async fn execute_one_shot(\u0026mut self, command: String) -\u003e Result\u003c()\u003e {\n        self.process_input(\u0026command).await\n    }\n    \n    /// Process a single input line\n    async fn process_input(\u0026mut self, input: \u0026str) -\u003e Result\u003c()\u003e {\n        // Check for special commands\n        if let Some(result) = self.handle_builtin(input).await? {\n            return result;\n        }\n        \n        // Parse input based on current mode\n        match self.mode_manager.current() {\n            Mode::Human =\u003e {\n                // Direct shell execution in human mode\n                self.execute_shell_command(input).await?;\n            }\n            Mode::AiAssisted =\u003e {\n                // AI assists with interpretation\n                self.execute_with_assistance(input).await?;\n            }\n            Mode::AiAutonomous =\u003e {\n                // AI can act autonomously within constraints\n                self.execute_autonomously(input).await?;\n            }\n            Mode::Strict =\u003e {\n                // Everything requires approval\n                self.execute_with_approval(input).await?;\n            }\n        }\n        \n        Ok(())\n    }\n    \n    /// Handle builtin commands\n    async fn handle_builtin(\u0026mut self, input: \u0026str) -\u003e Result\u003cOption\u003cResult\u003c()\u003e\u003e\u003e {\n        let cmd = input.trim().to_lowercase();\n        \n        match cmd.as_str() {\n            \"exit\" | \"quit\" =\u003e {\n                return Ok(Some(Err(anyhow!(\"Exit requested\"))));\n            }\n            \"help\" =\u003e {\n                self.ui.show_help();\n                return Ok(Some(Ok(())));\n            }\n            \"clear\" =\u003e {\n                self.ui.clear_screen();\n                return Ok(Some(Ok(())));\n            }\n            \"mode\" =\u003e {\n                self.ui.show_mode(self.mode_manager.current());\n                return Ok(Some(Ok(())));\n            }\n            \"history\" =\u003e {\n                self.ui.show_history(\u0026self.history);\n                return Ok(Some(Ok(())));\n            }\n            _ if cmd.starts_with(\"mode \") =\u003e {\n                let new_mode = cmd.strip_prefix(\"mode \").unwrap();\n                match new_mode {\n                    \"human\" =\u003e {\n                        self.mode_manager.switch(Mode::Human)?;\n                        self.prompt_context.ai_mode = Mode::Human.to_string();\n                    }\n                    \"ai\" | \"assist\" =\u003e {\n                        self.mode_manager.switch(Mode::AiAssisted)?;\n                        self.prompt_context.ai_mode = Mode::AiAssisted.to_string();\n                    }\n                    \"auto\" =\u003e {\n                        self.mode_manager.switch(Mode::AiAutonomous)?;\n                        self.prompt_context.ai_mode = Mode::AiAutonomous.to_string();\n                    }\n                    \"strict\" =\u003e {\n                        self.mode_manager.switch(Mode::Strict)?;\n                        self.prompt_context.ai_mode = Mode::Strict.to_string();\n                    }\n                    _ =\u003e {\n                        self.ui.show_error(\u0026format!(\"Unknown mode: {}\", new_mode));\n                    }\n                }\n                return Ok(Some(Ok(())));\n            }\n            _ =\u003e {}\n        }\n        \n        Ok(None)\n    }\n    \n    /// Execute with AI assistance\n    async fn execute_with_assistance(\u0026mut self, input: \u0026str) -\u003e Result\u003c()\u003e {\n        // Parse intent\n        let intent = self.interpreter.parse(input);\n        \n        // Show AI interpretation\n        self.ui.show_ai_thinking(\u0026format!(\"Parsed intent: {:?}\", intent));\n        \n        match intent {\n            Intent::Question { query } =\u003e {\n                // Answer question using LLM\n                self.ui.show_info(\"Let me help you with that...\");\n                // TODO: Call LLM for explanation\n                self.ui.show_info(\u0026format!(\"You asked: {}\", query));\n            }\n            Intent::Unknown =\u003e {\n                // Try to execute as shell command with warning\n                self.ui.show_warning(\"I didn't understand. Executing as shell command.\");\n                self.execute_shell_command(input).await?;\n            }\n            _ =\u003e {\n                // Translate to command\n                match self.interpreter.translate(\u0026intent) {\n                    Ok(translation) =\u003e {\n                        // Show what we'll do\n                        self.ui.show_proposed_action(\u0026translation);\n                        \n                        // Check if approval needed\n                        if translation.permission.requires_approval() {\n                            let request = ApprovalRequest::Command {\n                                command: translation.command.clone(),\n                                args: translation.args.clone(),\n                                reason: translation.explanation.clone(),\n                                risk_level: crate::approval::RiskLevel::from_permission(\u0026translation.permission),\n                            };\n                            \n                            match self.approval.request(\u0026request).await? {\n                                ApprovalResponse::Approved | ApprovalResponse::ApprovedOnce =\u003e {\n                                    self.execute_command(\u0026translation.command, \u0026translation.args).await?;\n                                }\n                                ApprovalResponse::Denied | ApprovalResponse::DenyAndBlock =\u003e {\n                                    self.ui.show_info(\"Action cancelled by user\");\n                                }\n                                _ =\u003e {}\n                            }\n                        } else {\n                            // Safe to execute\n                            self.execute_command(\u0026translation.command, \u0026translation.args).await?;\n                        }\n                    }\n                    Err(e) =\u003e {\n                        self.ui.show_error(\u0026format!(\"Cannot translate: {}\", e));\n                    }\n                }\n            }\n        }\n        \n        Ok(())\n    }\n    \n    /// Execute autonomously (AI mode)\n    async fn execute_autonomously(\u0026mut self, input: \u0026str) -\u003e Result\u003c()\u003e {\n        let intent = self.interpreter.parse(input);\n        \n        match intent {\n            Intent::ShellCommand { command, args } =\u003e {\n                // Check permissions\n                let perm = analyze_command_permission(\u0026command, \u0026args);\n                \n                if !perm.ai_allowed() {\n                    self.ui.show_error(\"This command is blocked in AI mode\");\n                    return Ok(());\n                }\n                \n                if perm.requires_approval() {\n                    self.ui.show_info(\"This requires approval...\");\n                    return self.execute_with_assistance(input).await;\n                }\n                \n                // Safe to execute\n                self.execute_command(\u0026command, \u0026args).await?;\n            }\n            _ =\u003e {\n                return self.execute_with_assistance(input).await;\n            }\n        }\n        \n        Ok(())\n    }\n    \n    /// Execute with mandatory approval\n    async fn execute_with_approval(\u0026mut self, input: \u0026str) -\u003e Result\u003c()\u003e {\n        let request = ApprovalRequest::Command {\n            command: input.to_string(),\n            args: vec![],\n            reason: \"Strict mode requires approval for all commands\".to_string(),\n            risk_level: crate::approval::RiskLevel::Medium,\n        };\n        \n        match self.approval.request(\u0026request).await? {\n            ApprovalResponse::Approved | ApprovalResponse::ApprovedOnce =\u003e {\n                self.execute_shell_command(input).await?;\n            }\n            _ =\u003e {\n                self.ui.show_info(\"Command cancelled\");\n            }\n        }\n        \n        Ok(())\n    }\n    \n    /// Execute raw shell command\n    async fn execute_shell_command(\u0026mut self, command: \u0026str) -\u003e Result\u003c()\u003e {\n        // Parse command\n        let parts: Vec\u003c\u0026str\u003e = command.split_whitespace().collect();\n        if parts.is_empty() {\n            return Ok(());\n        }\n        \n        let cmd = parts[0].to_string();\n        let args: Vec\u003cString\u003e = parts[1..].iter().map(|s| s.to_string()).collect();\n        \n        // Check for cd (special handling)\n        if cmd == \"cd\" {\n            let path = args.get(0).map(|s| s.as_str()).unwrap_or(\"~\");\n            let expanded = shellexpand::tilde(path);\n            match std::env::set_current_dir(\u0026*expanded) {\n                Ok(_) =\u003e {\n                    self.cwd = std::env::current_dir()?;\n                    self.prompt_context.cwd = self.cwd.clone();\n                }\n                Err(e) =\u003e {\n                    self.ui.show_error(\u0026format!(\"cd: {}\", e));\n                }\n            }\n            return Ok(());\n        }\n        \n        self.execute_command(\u0026cmd, \u0026args).await\n    }\n    \n    /// Execute a command with proper formatting\n    async fn execute_command(\u0026mut self, cmd: \u0026str, args: \u0026[String]) -\u003e Result\u003c()\u003e {\n        use std::process::Stdio;\n        use tokio::process::Command;\n        \n        let mut command = Command::new(cmd);\n        command.args(args)\n            .current_dir(\u0026self.cwd)\n            .stdout(Stdio::piped())\n            .stderr(Stdio::piped());\n        \n        match command.spawn() {\n            Ok(mut child) =\u003e {\n                match child.wait().await {\n                    Ok(status) =\u003e {\n                        // Track exit code for prompt\n                        self.prompt_context.last_exit_code = status.code().unwrap_or(-1);\n                        \n                        if let Some(stdout) = child.stdout.take() {\n                            let reader = tokio::io::BufReader::new(stdout);\n                            use tokio::io::AsyncBufReadExt;\n                            let mut lines = reader.lines();\n                            while let Some(line) = lines.next_line().await? {\n                                self.ui.show_output(\u0026line);\n                            }\n                        }\n                        \n                        if !status.success() {\n                            if let Some(stderr) = child.stderr.take() {\n                                let reader = tokio::io::BufReader::new(stderr);\n                                use tokio::io::AsyncBufReadExt;\n                                let mut lines = reader.lines();\n                                while let Some(line) = lines.next_line().await? {\n                                    self.ui.show_error(\u0026line);\n                                }\n                            }\n                        }\n                    }\n                    Err(e) =\u003e {\n                        self.ui.show_error(\u0026format!(\"Failed to wait for process: {}\", e));\n                        self.prompt_context.last_exit_code = -1;\n                    }\n                }\n            }\n            Err(e) =\u003e {\n                self.ui.show_error(\u0026format!(\"Failed to execute '{}': {}\", cmd, e));\n                self.prompt_context.last_exit_code = -1;\n            }\n        }\n        \n        Ok(())\n    }\n    \n    /// Build the shell prompt using starship-style renderer\n    fn build_prompt(\u0026self) -\u003e String {\n        self.prompt_renderer.render(\u0026self.prompt_context)\n    }\n}\n","traces":[{"line":35,"address":[6838880],"length":1,"stats":{"Line":0}},{"line":40,"address":[7105630,7105731],"length":1,"stats":{"Line":0}},{"line":41,"address":[7105818],"length":1,"stats":{"Line":0}},{"line":42,"address":[7105837],"length":1,"stats":{"Line":0}},{"line":43,"address":[6779661],"length":1,"stats":{"Line":0}},{"line":44,"address":[7106590,7106669],"length":1,"stats":{"Line":0}},{"line":45,"address":[7106684],"length":1,"stats":{"Line":0}},{"line":46,"address":[7106784,7106728],"length":1,"stats":{"Line":0}},{"line":49,"address":[7106961],"length":1,"stats":{"Line":0}},{"line":50,"address":[7107012],"length":1,"stats":{ le, Style, Term};\nuse dialoguer::{theme::ColorfulTheme, Input};\n\npub struct Ui {\n    term: Term,\n    theme: ColorfulTheme,\n}\n\nimpl Ui {\n    pub fn new() -\u003e Self {\n        Self {\n            term: Term::stdout(),\n            theme: ColorfulTheme::default(),\n        }\n    }\n    \n    /// Read input from user\n    pub async fn read_input(\u0026self, prompt: \u0026str) -\u003e Result\u003cOption\u003cString\u003e\u003e {\n        print!(\"{}\", prompt);\n        std::io::Write::flush(\u0026mut std::io::stdout())?;\n        \n        let mut input = String::new();\n        match std::io::stdin().read_line(\u0026mut input) {\n            Ok(0) =\u003e Ok(None), // EOF\n            Ok(_) =\u003e Ok(Some(input.trim().to_string())),\n            Err(e) =\u003e Err(e.into()),\n        }\n    }\n    \n    /// Show welcome message\n    pub fn show_welcome(\u0026self) {\n        println!(\"\\n{}\", style(\"╔════════════════════════════════════════════════╗\").cyan());\n        println!(\"{}\", style(\"║         Welcome to AGNOS AI Shell (agnsh)      ║\").cyan().bold());\n        println!(\"{}\", style(\"║                                                ║\").cyan());\n        println!(\"{}\", style(\"║   Natural language interface with built-in     ║\").cyan());\n        println!(\"{}\", style(\"║   human oversight and security controls        ║\").cyan());\n        println!(\"{}\", style(\"╚════════════════════════════════════════════════╝\").cyan());\n        println!();\n        println!(\"Type {} to see available commands\\n\", style(\"help\").yellow());\n    }\n    \n    /// Show goodbye message\n    pub fn show_goodbye(\u0026self) {\n        println!(\"\\n{} Goodbye!\\n\", style(\"👋\").dim());\n    }\n    \n    /// Show help\n    pub fn show_help(\u0026self) {\n        println!(\"\\n{}\", style(\"AGNOS AI Shell Commands:\").bold().underlined());\n        println!();\n        println!(\"  {}    - Show this help\", style(\"help\").yellow());\n        println!(\"  {}  - Clear screen\", style(\"clear\").yellow());\n        println!(\"  {}  - Show command history\", style(\"history\").yellow());\n        println!(\"  {}   - Show current mode\", style(\"mode\").yellow());\n        println!(\"  {} - Change mode (human/ai/auto/strict)\", style(\"mode \u003cname\u003e\").yellow());\n        println!(\"  {}   - Exit the shell\", style(\"exit/quit\").yellow());\n        println!();\n        println!(\"{}\", style(\"Modes:\").bold());\n        println!(\"  👤       - Human: Direct shell control\");\n        println!(\"  👤🤖     - AI-Assist: AI helps interpret commands\");\n        println!(\"  🤖       - AI-Auto: AI acts autonomously (with limits)\");\n        println!(\"  🔒       - Strict: All commands require approval\");\n        println!();\n        println!(\"{}\", style(\"Safety:\").bold());\n        println!(\"  • AI never has root access\");\n        println!(\"  • Dangerous commands are blocked\");\n        println!(\"  • System modifications require approval\");\n        println!(\"  • All actions are logged\");\n        println!();\n    }\n    \n    /// Show current mode\n    pub fn show_mode(\u0026self, mode: \u0026crate::mode::Mode) {\n        println!(\"Current mode: {}\", style(mode).bold());\n        println!(\"Description: {}\", mode.description());\n    }\n    \n    /// Show command history\n    pub fn show_history(\u0026self, history: \u0026crate::history::CommandHistory) {\n        println!(\"\\n{}\", style(\"Command History:\").bold().underlined());\n        println!();\n        \n        for (i, cmd) in history.get_recent(20).iter().enumerate() {\n            println!(\"  {} {}\", style(format!(\"{:3}\", i + 1)).dim(), cmd);\n        }\n        println!();\n    }\n    \n    /// Show AI thinking\n    pub fn show_ai_thinking(\u0026self, message: \u0026str) {\n        println!(\"  {} {}\", style(\"🤔\").dim(), style(message).dim());\n    }\n    \n    /// Show proposed action\n    pub fn show_proposed_action(\u0026self, translation: \u0026crate::interpreter::Translation) {\n        println!(\"\\n  {} {}\", style(\"▶\").green(), style(\u0026translation.description).bold());\n        println!(\"  {} {} {}\", style(\"Command:\").dim(), translation.command, translation.args.join(\" \"));\n        if !translation.explanation.is_empty() {\n            println!(\"  {} {}\", style(\"Explanation:\").dim(), translation.explanation);\n        }\n        println!();\n    }\n    \n    /// Show output\n    pub fn show_output(\u0026self, output: \u0026str) {\n        println!(\"{}\", output);\n    }\n    \n    /// Show info message\n    pub fn show_info(\u0026self, message: \u0026str) {\n        println!(\"  {} {}\", style(\"ℹ\").blue(), message);\n    }\n    \n    /// Show warning\n    pub fn show_warning(\u0026self, message: \u0026str) {\n        println!(\"  {} {}\", style(\"⚠\").yellow(), style(message).yellow());\n    }\n    \n    /// Show error\n    pub fn show_error(\u0026self, message: \u0026str) {\n        eprintln!(\"  {} {}\", style(\"✗\").red(), style(message).red());\n    }\n    \n    /// Clear screen\n    pub fn clear_screen(\u0026self) {\n        let _ = self.term.clear_screen();\n    }\n}\n\nimpl Default for Ui {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n","traces":[{"line":13,"address":[6992632,6992496,6992638],"length":1,"stats":{"Line":0}},{"line":15,"address":[6992517],"length":1,"stats":{"Line":0}},{"line":16,"address":[6992522],"length":1,"stats":{"Line":0}},{"line":21,"address":[6887338,6887152,6888292,6887311,6888284,6887193],"length":1,"stats":{"Line":0}},{"line":22,"address":[6887284,6887377],"length":1,"stats":{"Line":0}},{"line":23,"address":[6888290,6887450],"length":1,"stats":{"Line":0}},{"line":25,"address":[6887617],"length":1,"stats":{"Line":0}},{"line":26,"address":[6887856,6887624,6887788,6887689],"length":1,"stats":{"Line":0}},{"line":27,"address":[6887867],"length":1,"stats":{"Line":0}},{"line":28,"address":[6887943,6888036],"leng ":{"Line":0}},{"line":134,"address":[6986528],"length":1,"stats":{"Line":0}},{"line":135,"address":[6986536],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":73},{"path":["/","home","macro","Repos","agnosticos","userland","desktop-environment","src","ai_features.rs"],"content":"use chrono::Timelike;\nuse std::collections::HashMap;\nuse std::sync::{Arc, RwLock};\nuse thiserror::Error;\nuse tracing::{debug, error, info, warn};\nuse uuid::Uuid;\n\n#[derive(Debug, Error)]\npub enum AIFeatureError {\n    #[error(\"Context not found: {0}\")]\n    ContextNotFound(String),\n    #[error(\"Agent not found: {0}\")]\n    AgentNotFound(Uuid),\n    #[error(\"Model error: {0}\")]\n    ModelError(String),\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum SuggestionType {\n    WindowPlacement,\n    ContextSwitch,\n    TaskRecommendation,\n    ResourceOptimization,\n    SecurityAlert,\n    Productivity,\n}\n\n#[derive(Debug, Clone)]\npub struct AISuggestion {\n    pub id: Uuid,\n    pub suggestion_type: SuggestionType,\n    pub title: String,\n    pub description: String,\n    pub confidence: f32,\n    pub action: Option\u003cString\u003e,\n    pub is_dismissed: bool,\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n}\n\nimpl Default for AISuggestion {\n    fn default() -\u003e Self {\n        Self {\n            id: Uuid::new_v4(),\n            suggestion_type: SuggestionType::Productivity,\n            title: String::new(),\n            description: String::new(),\n            confidence: 0.0,\n            action: None,\n            is_dismissed: false,\n            timestamp: chrono::Utc::now(),\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct AgentHUDState {\n    pub agent_id: Uuid,\n    pub agent_name: String,\n    pub status: AgentStatus,\n    pub current_task: String,\n    pub progress: f32,\n    pub last_activity: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub resource_usage: ResourceMetrics,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum AgentStatus {\n    Idle,\n    Thinking,\n    Acting,\n    Waiting,\n    Error,\n}\n\n#[derive(Debug, Clone)]\npub struct ResourceMetrics {\n    pub cpu_percent: f32,\n    pub memory_mb: u64,\n    pub gpu_percent: Option\u003cf32\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct ContextEvent {\n    pub id: Uuid,\n    pub event_type: ContextEventType,\n    pub source: String,\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub metadata: HashMap\u003cString, String\u003e,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum ContextEventType {\n    WindowOpened,\n    WindowClosed,\n    AppSwitched,\n    FileOpened,\n    CommandExecuted,\n    MeetingStarted,\n    MeetingEnded,\n    UserAway,\n    UserPresent,\n}\n\n#[derive(Debug)]\npub struct AIDesktopFeatures {\n    suggestions: Arc\u003cRwLock\u003cVec\u003cAISuggestion\u003e\u003e\u003e,\n    agent_hud: Arc\u003cRwLock\u003cHashMap\u003cUuid, AgentHUDState\u003e\u003e\u003e,\n    context_history: Arc\u003cRwLock\u003cVec\u003cContextEvent\u003e\u003e\u003e,\n    current_context: Arc\u003cRwLock\u003cDesktopContext\u003e\u003e,\n    proactive_mode: Arc\u003cRwLock\u003cbool\u003e\u003e,\n    ambient_enabled: Arc\u003cRwLock\u003cbool\u003e\u003e,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct DesktopContext {\n    pub context_type: ContextType,\n    pub active_apps: Vec\u003cString\u003e,\n    pub open_files: Vec\u003cString\u003e,\n    pub recent_commands: Vec\u003cString\u003e,\n    pub time_of_day: TimeOfDay,\n    pub user_activity_level: ActivityLevel,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum ContextType {\n    Development,\n    Writing,\n    Design,\n    Communication,\n    Browsing,\n    Gaming,\n    Idle,\n    Meeting,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum TimeOfDay {\n    Morning,\n    Afternoon,\n    Evening,\n    Night,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum ActivityLevel {\n    High,\n    Medium,\n    Low,\n    Idle,\n}\n\nimpl Default for DesktopContext {\n    fn default() -\u003e Self {\n        Self {\n            context_type: ContextType::Idle,\n            active_apps: Vec::new(),\n            open_files: Vec::new(),\n            recent_commands: Vec::new(),\n            time_of_day: TimeOfDay::Afternoon,\n            user_activity_level: ActivityLevel::Medium,\n        }\n    }\n}\n\nimpl AIDesktopFeatures {\n    pub fn new() -\u003e Self {\n        Self {\n            suggestions: Arc::new(RwLock::new(Vec::new())),\n            agent_hud: Arc::new(RwLock::new(HashMap::new())),\n            context_history: Arc::new(RwLock::new(Vec::new())),\n            current_context: Arc::new(RwLock::new(DesktopContext::default())),\n            proactive_mode: Arc::new(RwLock::new(true)),\n            ambient_enabled: Arc::new(RwLock::new(true)),\n        }\n    }\n\n    pub fn analyze_context(\u0026self) -\u003e DesktopContext {\n        let mut context = self.current_context.write().unwrap();\n\n        let hour = chrono::Utc::now().hour();\n        context.time_of_day = match hour {\n            5..=11 =\u003e TimeOfDay::Morning,\n            12..=16 =\u003e TimeOfDay::Afternoon,\n            17..=20 =\u003e TimeOfDay::Evening,\n            _ =\u003e TimeOfDay::Night,\n        };\n\n        info!(\n            \"Context analyzed: {:?} at {:?}\",\n            context.context_type, context.time_of_day\n        );\n        context.clone()\n    }\n\n    pub fn update_context(\u0026self, event: ContextEvent) {\n        let mut history = self.context_history.write().unwrap();\n        history.push(event.clone());\n\n        let len = history.len();\n        if len \u003e 100 {\n            history.drain(0..len - 100);\n        }\n\n        let mut context = self.current_context.write().unwrap();\n        match event.event_type {\n            ContextEventType::WindowOpened =\u003e {\n                if let Some(app) = event.metadata.get(\"app\") {\n                    if !context.active_apps.contains(app) {\n                        context.active_apps.push(app.clone());\n                    }\n                }\n            }\n            ContextEventType::FileOpened =\u003e {\n                if let Some(file) = event.metadata.get(\"file\") {\n                    context.open_files.push(file.clone());\n                    let len = context.open_files.len();\n                    if len \u003e 10 {\n                        context.open_files.drain(0..len - 10);\n                    }\n                }\n            }\n            _ =\u003e {}\n        }\n\n        self.detect_context_type();\n        debug!(\"Context updated: {:?}\", context.context_type);\n    }\n\n    fn detect_context_type(\u0026self) {\n        let mut context = self.current_context.write().unwrap();\n\n        let has_dev_tools = context\n            .active_apps\n            .iter()\n            .any(|app| app.contains(\"code\") || app.contains(\"terminal\") || app.contains(\"editor\"));\n        let has_design = context\n            .active_apps\n            .iter()\n            .any(|app| app.contains(\"gimp\") || app.contains(\"figma\") || app.contains(\"blender\"));\n        let has_comm = context\n            .active_apps\n            .iter()\n            .any(|app| app.contains(\"slack\") || app.contains(\"discord\") || app.contains(\"mail\"));\n\n        context.context_type = if has_dev_tools {\n            ContextType::Development\n        } else if has_design {\n            ContextType::Design\n        } else if has_comm {\n            ContextType::Communication\n        } else if context.active_apps.iter().any(|a| a.contains(\"browser\")) {\n            ContextType::Browsing\n        } else {\n            ContextType::Idle\n        };\n    }\n\n    pub fn generate_suggestion(\n        \u0026self,\n        suggestion_type: SuggestionType,\n        title: String,\n        description: String,\n        confidence: f32,\n    ) -\u003e AISuggestion {\n        AISuggestion {\n            id: Uuid::new_v4(),\n            suggestion_type,\n            title,\n            description,\n            confidence,\n            action: None,\n            is_dismissed: false,\n            timestamp: chrono::Utc::now(),\n        }\n    }\n\n    pub fn add_suggestion(\u0026self, suggestion: AISuggestion) {\n        let title = suggestion.title.clone();\n        let mut suggestions = self.suggestions.write().unwrap();\n\n        suggestions.retain(|s| {\n            s.suggestion_type != suggestion.suggestion_type || s.title != suggestion.title\n        });\n\n        suggestions.push(suggestion);\n        suggestions.sort_by(|a, b| b.confidence.partial_cmp(\u0026a.confidence).unwrap());\n\n        debug!(\"Suggestion added: {}\", title);\n    }\n\n    pub fn proactive_suggestions(\u0026self) -\u003e Vec\u003cAISuggestion\u003e {\n        let context = self.analyze_context();\n        let suggestions = self.suggestions.write().unwrap();\n\n        let relevant: Vec\u003c_\u003e = suggestions\n            .iter()\n            .filter(|s| !s.is_dismissed \u0026\u0026 s.confidence \u003e 0.5)\n            .cloned()\n            .collect();\n\n        relevant\n    }\n\n    pub fn smart_window_placement(\u0026self, app_id: \u0026str) -\u003e (i32, i32, u32, u32) {\n        let context = self.current_context.read().unwrap();\n        match context.context_type {\n            ContextType::Development =\u003e (100, 100, 1400, 900),\n            ContextType::Design =\u003e (50, 50, 1820, 1000),\n            ContextType::Communication =\u003e (200, 500, 600, 400),\n            _ =\u003e (100, 100, 1200, 800),\n        }\n    }\n\n    pub fn register_agent_hud(\u0026self, agent_id: Uuid, name: String) {\n        let name_clone = name.clone();\n        let mut hud = self.agent_hud.write().unwrap();\n        hud.insert(\n            agent_id,\n            AgentHUDState {\n                agent_id,\n                agent_name: name_clone,\n                status: AgentStatus::Idle,\n                current_task: String::new(),\n                progress: 0.0,\n                last_activity: chrono::Utc::now(),\n                resource_usage: ResourceMetrics {\n                    cpu_percent: 0.0,\n                    memory_mb: 0,\n                    gpu_percent: None,\n                },\n            },\n        );\n        info!(\"Agent HUD registered: {}\", name);\n    }\n\n    pub fn update_agent_hud(\n        \u0026self,\n        agent_id: Uuid,\n        status: AgentStatus,\n        task: String,\n        progress: f32,\n    ) {\n        let mut hud = self.agent_hud.write().unwrap();\n        if let Some(state) = hud.get_mut(\u0026agent_id) {\n            state.status = status;\n            state.current_task = task;\n            state.progress = progress;\n            state.last_activity = chrono::Utc::now();\n        }\n    }\n\n    pub fn unregister_agent_hud(\u0026self, agent_id: Uuid) {\n        let mut hud = self.agent_hud.write().unwrap();\n        hud.remove(\u0026agent_id);\n        debug!(\"Agent HUD unregistered: {}\", agent_id);\n    }\n\n    pub fn get_agent_hud_states(\u0026self) -\u003e Vec\u003cAgentHUDState\u003e {\n        self.agent_hud.read().unwrap().values().cloned().collect()\n    }\n\n    pub fn set_proactive_mode(\u0026self, enabled: bool) {\n        *self.proactive_mode.write().unwrap() = enabled;\n        info!(\"Proactive mode: {}\", enabled);\n    }\n\n    pub fn set_ambient_enabled(\u0026self, enabled: bool) {\n        *self.ambient_enabled.write().unwrap() = enabled;\n        info!(\"Ambient intelligence: {}\", enabled);\n    }\n\n    pub fn dismiss_suggestion(\u0026self, suggestion_id: Uuid) {\n        let mut suggestions = self.suggestions.write().unwrap();\n        if let Some(s) = suggestions.iter_mut().find(|s| s.id == suggestion_id) {\n            s.is_dismissed = true;\n            debug!(\"Suggestion dismissed: {}\", suggestion_id);\n        }\n    }\n\n    pub fn get_context(\u0026self) -\u003e DesktopContext {\n        self.current_context.read().unwrap().clone()\n    }\n\n    pub fn suggest_workspace_switch(\u0026self, from: usize, to: usize, reason: String) -\u003e AISuggestion {\n        self.generate_suggestion(\n            SuggestionType::ContextSwitch,\n            format!(\"Switch to Workspace {}\", to + 1),\n            reason,\n            0.75,\n        )\n    }\n\n    pub fn optimize_resources(\u0026self) -\u003e AISuggestion {\n        self.generate_suggestion(\n            SuggestionType::ResourceOptimization,\n            \"Resource Optimization\".to_string(),\n            \"Consider suspending idle agents to free resources\".to_string(),\n            0.65,\n        )\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_suggestion_type_variants() {\n        assert!(matches!(\n            SuggestionType::WindowPlacement,\n            SuggestionType::WindowPlacement\n        ));\n        assert!(matches!(\n            SuggestionType::ContextSwitch,\n            SuggestionType::ContextSwitch\n        ));\n        assert!(matches!(\n            SuggestionType::TaskRecommendation,\n            SuggestionType::TaskRecommendation\n        ));\n        assert!(matches!(\n            SuggestionType::SecurityAlert,\n            SuggestionType::SecurityAlert\n        ));\n    }\n\n    #[test]\n    fn test_ai_suggestion_default() {\n        let suggestion = AISuggestion::default();\n        assert_eq!(suggestion.suggestion_type, SuggestionType::Productivity);\n        assert!(!suggestion.is_dismissed);\n        assert_eq!(suggestion.confidence, 0.0);\n    }\n\n    #[test]\n    fn test_ai_suggestion_custom() {\n        let suggestion = AISuggestion {\n            id: Uuid::new_v4(),\n            suggestion_type: SuggestionType::TaskRecommendation,\n            title: \"Take a break\".to_string(),\n            description: \"You've been working for 2 hours\".to_string(),\n            confidence: 0.85,\n            action: Some(\"break\".to_string()),\n            is_dismissed: false,\n            timestamp: chrono::Utc::now(),\n        };\n        assert_eq!(suggestion.confidence, 0.85);\n        assert!(suggestion.action.is_some());\n    }\n\n    #[test]\n    fn test_agent_status_variants() {\n        assert!(matches!(AgentStatus::Idle, AgentStatus::Idle));\n        assert!(matches!(AgentStatus::Thinking, AgentStatus::Thinking));\n        assert!(matches!(AgentStatus::Acting, AgentStatus::Acting));\n        assert!(matches!(AgentStatus::Waiting, AgentStatus::Waiting));\n        assert!(matches!(AgentStatus::Error, AgentStatus::Error));\n    }\n\n    #[test]\n    fn test_agent_hud_state() {\n        let state = AgentHUDState {\n            agent_id: Uuid::new_v4(),\n            agent_name: \"test-agent\".to_string(),\n            status: AgentStatus::Thinking,\n            current_task: \"Processing data\".to_string(),\n            progress: 0.5,\n            last_activity: chrono::Utc::now(),\n            resource_usage: ResourceMetrics {\n                cpu_percent: 25.0,\n                memory_mb: 512,\n                gpu_percent: Some(50.0),\n            },\n        };\n        assert_eq!(state.status, AgentStatus::Thinking);\n        assert_eq!(state.progress, 0.5);\n    }\n\n    #[test]\n    fn test_resource_metrics() {\n        let metrics = ResourceMetrics {\n            cpu_percent: 30.0,\n            memory_mb: 1024,\n            gpu_percent: Some(75.0),\n        };\n        assert_eq!(metrics.cpu_percent, 30.0);\n        assert_eq!(metrics.memory_mb, 1024);\n        assert!(metrics.gpu_percent.is_some());\n    }\n\n    #[test]\n    fn test_time_of_day_variants() {\n        assert!(matches!(TimeOfDay::Morning, TimeOfDay::Morning));\n        assert!(matches!(TimeOfDay::Afternoon, TimeOfDay::Afternoon));\n        assert!(matches!(TimeOfDay::Evening, TimeOfDay::Evening));\n        assert!(matches!(TimeOfDay::Night, TimeOfDay::Night));\n    }\n\n    #[test]\n    fn test_activity_level_variants() {\n        assert!(matches!(ActivityLevel::Low, ActivityLevel::Low));\n        assert!(matches!(ActivityLevel::Medium, ActivityLevel::Medium));\n        assert!(matches!(ActivityLevel::High, ActivityLevel::High));\n        assert!(matches!(ActivityLevel::Idle, ActivityLevel::Idle));\n    }\n\n    #[test]\n    fn test_context_type_variants() {\n        assert!(matches!(ContextType::Development, ContextType::Development));\n        assert!(matches!(\n            ContextType::Communication,\n            ContextType::Communication\n        ));\n        assert!(matches!(ContextType::Design, ContextType::Design));\n    }\n\n    #[test]\n    fn test_context_event_type_variants() {\n        assert!(matches!(\n            ContextEventType::WindowOpened,\n            ContextEventType::WindowOpened\n        ));\n        assert!(matches!(\n            ContextEventType::WindowClosed,\n            ContextEventType::WindowClosed\n        ));\n        assert!(matches!(\n            ContextEventType::FileOpened,\n            ContextEventType::FileOpened\n        ));\n    }\n}\n","traces":[{"line":41,"address":[1423138,1423163,1422832],"length":1,"stats":{"Line":2}},{"line":43,"address":[5346368],"length":1,"stats":{"Line":2}},{"line":45,"address":[1422867],"length":1,"stats":{"Line":2}},{"line":46,"address":[1422877],"length":1,"stats":{"Line":2}},{"line":50,"address":[1422937],"length":1,"stats":{"Line":2}},{"line":153,"address":[5347363,5347120,5347357],"length":1,"stats":{"Line":0}},{"line":156,"address":[1423618],"length":1,"stats":{"Line":0}},{"line":157,"address":[1423628],"length":1,"stats":{"Line":0}},{"line":158,"address":[1423671],"length":1,"stats":{"Line":0}},{"line":166,"address":[1416469,1415824,1416463],"length":1,"stats":{"Line":0}},{"line":168,"address":[1415851],"length":1,"stats":{"Line":0}},{"line":169,"address":[1415959,1415899],"length":1,"stats":{"Line":0}},{"line":170,"address":[1416007,1416067],"length":1,"stats":{"Li rland","desktop-environment","src","apps.rs"],"content":"use std::collections::HashMap;\nuse std::sync::{Arc, RwLock};\nuse thiserror::Error;\nuse tracing::{error, info, warn};\nuse uuid::Uuid;\n\n#[derive(Debug, Error)]\npub enum AppError {\n    #[error(\"App not found: {0}\")]\n    AppNotFound(String),\n    #[error(\"Window error: {0}\")]\n    WindowError(String),\n    #[error(\"Permission denied: {0}\")]\n    PermissionDenied(String),\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum AppType {\n    Terminal,\n    FileManager,\n    TextEditor,\n    WebBrowser,\n    AgentManager,\n    AuditViewer,\n    ModelManager,\n    Settings,\n    Custom,\n}\n\n#[derive(Debug, Clone)]\npub struct AppWindow {\n    pub id: Uuid,\n    pub app_type: AppType,\n    pub title: String,\n    pub width: u32,\n    pub height: u32,\n    pub is_ai_enabled: bool,\n}\n\nimpl AppWindow {\n    pub fn new(app_type: AppType, title: String) -\u003e Self {\n        Self {\n            id: Uuid::new_v4(),\n            app_type,\n            title,\n            width: 800,\n            height: 600,\n            is_ai_enabled: false,\n        }\n    }\n}\n\n#[derive(Debug)]\npub struct TerminalApp {\n    pub id: String,\n    pub name: String,\n    pub ai_integration: bool,\n}\n\nimpl TerminalApp {\n    pub fn new() -\u003e Self {\n        Self {\n            id: \"terminal\".to_string(),\n            name: \"AGNOS Terminal\".to_string(),\n            ai_integration: true,\n        }\n    }\n\n    pub fn execute_command(\u0026self, command: String) -\u003e Result\u003cString, AppError\u003e {\n        info!(\"Terminal executing: {}\", command);\n        Ok(format!(\"Executed: {}\", command))\n    }\n}\n\n#[derive(Debug)]\npub struct FileManagerApp {\n    pub id: String,\n    pub name: String,\n    pub current_path: String,\n    pub agent_assistance: bool,\n}\n\nimpl FileManagerApp {\n    pub fn new() -\u003e Self {\n        Self {\n            id: \"filemanager\".to_string(),\n            name: \"File Manager\".to_string(),\n            current_path: \"/home\".to_string(),\n            agent_assistance: true,\n        }\n    }\n\n    pub fn navigate(\u0026mut self, path: String) -\u003e Result\u003c(), AppError\u003e {\n        let path_clone = path.clone();\n        self.current_path = path;\n        info!(\"Navigated to: {}\", path_clone);\n        Ok(())\n    }\n\n    pub fn search_with_agent(\u0026self, query: String) -\u003e Result\u003cVec\u003cString\u003e, AppError\u003e {\n        info!(\"Agent-assisted search: {}\", query);\n        Ok(vec![format!(\"Found: {}\", query)])\n    }\n}\n\n#[derive(Debug)]\npub struct AgentManagerApp {\n    pub id: String,\n    pub name: String,\n    pub running_agents: Vec\u003cAgentInfo\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct AgentInfo {\n    pub id: Uuid,\n    pub name: String,\n    pub status: String,\n    pub capabilities: Vec\u003cString\u003e,\n}\n\nimpl AgentManagerApp {\n    pub fn new() -\u003e Self {\n        Self {\n            id: \"agent-manager\".to_string(),\n            name: \"Agent Manager\".to_string(),\n            running_agents: Vec::new(),\n        }\n    }\n\n    pub fn list_agents(\u0026self) -\u003e Vec\u003cAgentInfo\u003e {\n        self.running_agents.clone()\n    }\n\n    pub fn start_agent(\n        \u0026mut self,\n        name: String,\n        capabilities: Vec\u003cString\u003e,\n    ) -\u003e Result\u003cUuid, AppError\u003e {\n        let id = Uuid::new_v4();\n        let name_clone = name.clone();\n        self.running_agents.push(AgentInfo {\n            id,\n            name: name_clone.clone(),\n            status: \"Running\".to_string(),\n            capabilities,\n        });\n        info!(\"Started agent: {}\", name);\n        Ok(id)\n    }\n\n    pub fn stop_agent(\u0026mut self, id: Uuid) -\u003e Result\u003c(), AppError\u003e {\n        self.running_agents.retain(|a| a.id != id);\n        info!(\"Stopped agent: {}\", id);\n        Ok(())\n    }\n}\n\n#[derive(Debug)]\npub struct AuditViewerApp {\n    pub id: String,\n    pub name: String,\n    pub filters: AuditFilters,\n}\n\n#[derive(Debug, Clone)]\npub struct AuditFilters {\n    pub include_agent: bool,\n    pub include_security: bool,\n    pub include_system: bool,\n    pub time_range: TimeRange,\n}\n\n#[derive(Debug, Clone)]\npub enum TimeRange {\n    LastHour,\n    LastDay,\n    LastWeek,\n    Custom,\n}\n\nimpl AuditViewerApp {\n    pub fn new() -\u003e Self {\n        Self {\n            id: \"audit-viewer\".to_string(),\n            name: \"Audit Log Viewer\".to_string(),\n            filters: AuditFilters {\n                include_agent: true,\n                include_security: true,\n                include_system: true,\n                time_range: TimeRange::LastDay,\n            },\n        }\n    }\n\n    pub fn get_logs(\u0026self) -\u003e Vec\u003cAuditEntry\u003e {\n        vec![AuditEntry {\n            id: Uuid::new_v4(),\n            timestamp: chrono::Utc::now(),\n            event_type: \"Agent Action\".to_string(),\n            description: \"Sample audit entry\".to_string(),\n            source: \"agent-runtime\".to_string(),\n        }]\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct AuditEntry {\n    pub id: Uuid,\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub event_type: String,\n    pub description: String,\n    pub source: String,\n}\n\n#[derive(Debug)]\npub struct ModelManagerApp {\n    pub id: String,\n    pub name: String,\n    pub installed_models: Vec\u003cModelInfo\u003e,\n    pub active_model: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct ModelInfo {\n    pub id: String,\n    pub name: String,\n    pub size: u64,\n    pub provider: String,\n    pub is_downloaded: bool,\n}\n\nimpl ModelManagerApp {\n    pub fn new() -\u003e Self {\n        Self {\n            id: \"model-manager\".to_string(),\n            name: \"Model Manager\".to_string(),\n            installed_models: Vec::new(),\n            active_model: None,\n        }\n    }\n\n    pub fn list_models(\u0026self) -\u003e Vec\u003cModelInfo\u003e {\n        self.installed_models.clone()\n    }\n\n    pub fn download_model(\u0026self, model_id: String) -\u003e Result\u003c(), AppError\u003e {\n        info!(\"Downloading model: {}\", model_id);\n        Ok(())\n    }\n\n    pub fn select_model(\u0026mut self, model_id: String) -\u003e Result\u003c(), AppError\u003e {\n        let model_id_clone = model_id.clone();\n        self.active_model = Some(model_id);\n        info!(\"Selected model: {}\", model_id_clone);\n        Ok(())\n    }\n}\n\n#[derive(Debug)]\npub struct DesktopApplications {\n    terminal: TerminalApp,\n    file_manager: FileManagerApp,\n    agent_manager: AgentManagerApp,\n    audit_viewer: AuditViewerApp,\n    model_manager: ModelManagerApp,\n    open_windows: Arc\u003cRwLock\u003cHashMap\u003cUuid, AppWindow\u003e\u003e\u003e,\n}\n\nimpl DesktopApplications {\n    pub fn new() -\u003e Self {\n        Self {\n            terminal: TerminalApp::new(),\n            file_manager: FileManagerApp::new(),\n            agent_manager: AgentManagerApp::new(),\n            audit_viewer: AuditViewerApp::new(),\n            model_manager: ModelManagerApp::new(),\n            open_windows: Arc::new(RwLock::new(HashMap::new())),\n        }\n    }\n\n    pub fn open_terminal(\u0026self) -\u003e Result\u003cAppWindow, AppError\u003e {\n        let window = AppWindow::new(AppType::Terminal, self.terminal.name.clone());\n        self.open_windows\n            .write()\n            .unwrap()\n            .insert(window.id, window.clone());\n        info!(\"Opened terminal\");\n        Ok(window)\n    }\n\n    pub fn open_file_manager(\u0026self, path: Option\u003cString\u003e) -\u003e Result\u003cAppWindow, AppError\u003e {\n        let path_clone = path.clone();\n        let mut window = AppWindow::new(AppType::FileManager, self.file_manager.name.clone());\n        if let Some(p) = path_clone {\n            // Note: Cannot call mutable method on file_manager through immutable reference\n            // This needs to be refactored\n        }\n        window.is_ai_enabled = self.file_manager.agent_assistance;\n        self.open_windows\n            .write()\n            .unwrap()\n            .insert(window.id, window.clone());\n        info!(\"Opened file manager\");\n        Ok(window)\n    }\n\n    pub fn open_agent_manager(\u0026self) -\u003e Result\u003cAppWindow, AppError\u003e {\n        let mut window = AppWindow::new(AppType::AgentManager, self.agent_manager.name.clone());\n        window.is_ai_enabled = true;\n        self.open_windows\n            .write()\n            .unwrap()\n            .insert(window.id, window.clone());\n        info!(\"Opened agent manager\");\n        Ok(window)\n    }\n\n    pub fn open_audit_viewer(\u0026self) -\u003e Result\u003cAppWindow, AppError\u003e {\n        let mut window = AppWindow::new(AppType::AuditViewer, self.audit_viewer.name.clone());\n        window.is_ai_enabled = true;\n        self.open_windows\n            .write()\n            .unwrap()\n            .insert(window.id, window.clone());\n        info!(\"Opened audit viewer\");\n        Ok(window)\n    }\n\n    pub fn open_model_manager(\u0026self) -\u003e Result\u003cAppWindow, AppError\u003e {\n        let mut window = AppWindow::new(AppType::ModelManager, self.model_manager.name.clone());\n        window.is_ai_enabled = true;\n        self.open_windows\n            .write()\n            .unwrap()\n            .insert(window.id, window.clone());\n        info!(\"Opened model manager\");\n        Ok(window)\n    }\n\n    pub fn close_window(\u0026self, window_id: Uuid) -\u003e Result\u003c(), AppError\u003e {\n        self.open_windows.write().unwrap().remove(\u0026window_id);\n        info!(\"Closed window: {}\", window_id);\n        Ok(())\n    }\n\n    pub fn get_open_windows(\u0026self) -\u003e Vec\u003cAppWindow\u003e {\n        self.open_windows\n            .read()\n            .unwrap()\n            .values()\n            .cloned()\n            .collect()\n    }\n\n    pub fn get_agent_manager(\u0026mut self) -\u003e \u0026mut AgentManagerApp {\n        \u0026mut self.agent_manager\n    }\n\n    pub fn get_model_manager(\u0026mut self) -\u003e \u0026mut ModelManagerApp {\n        \u0026mut self.model_manager\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_app_window_new() {\n        let window = AppWindow::new(AppType::Terminal, \"Test Terminal\".to_string());\n        assert_eq!(window.title, \"Test Terminal\");\n        assert_eq!(window.width, 800);\n        assert_eq!(window.height, 600);\n        assert!(!window.is_ai_enabled);\n    }\n\n    #[test]\n    fn test_terminal_app_new() {\n        let terminal = TerminalApp::new();\n        assert_eq!(terminal.name, \"AGNOS Terminal\");\n        assert!(terminal.ai_integration);\n    }\n\n    #[test]\n    fn test_terminal_execute_command() {\n        let terminal = TerminalApp::new();\n        let result = terminal.execute_command(\"ls\".to_string());\n        assert!(result.is_ok());\n        assert_eq!(result.unwrap(), \"Executed: ls\");\n    }\n\n    #[test]\n    fn test_file_manager_app_new() {\n        let fm = FileManagerApp::new();\n        assert_eq!(fm.current_path, \"/home\");\n        assert!(fm.agent_assistance);\n    }\n\n    #[test]\n    fn test_agent_manager_app_new() {\n        let am = AgentManagerApp::new();\n        assert!(am.running_agents.is_empty());\n    }\n\n    #[test]\n    fn test_audit_viewer_app_new() {\n        let av = AuditViewerApp::new();\n        assert!(av.filters.include_agent);\n        assert!(av.filters.include_security);\n    }\n\n    #[test]\n    fn test_audit_viewer_get_logs() {\n        let av = AuditViewerApp::new();\n        let logs = av.get_logs();\n        assert!(!logs.is_empty());\n    }\n\n    #[test]\n    fn test_model_manager_app_new() {\n        let mm = ModelManagerApp::new();\n        assert!(mm.installed_models.is_empty());\n        assert!(mm.active_model.is_none());\n    }\n\n    #[test]\n    fn test_model_manager_select_model() {\n        let mut mm = ModelManagerApp::new();\n        let result = mm.select_model(\"llama2-7b\".to_string());\n        assert!(result.is_ok());\n        assert_eq!(mm.active_model, Some(\"llama2-7b\".to_string()));\n    }\n\n    #[test]\n    fn test_desktop_applications_new() {\n        let apps = DesktopApplications::new();\n        let windows = apps.get_open_windows();\n        assert!(windows.is_empty());\n    }\n\n    #[test]\n    fn test_desktop_applications_open_terminal() {\n        let apps = DesktopApplications::new();\n        let result = apps.open_terminal();\n        assert!(result.is_ok());\n        let windows = apps.get_open_windows();\n        assert_eq!(windows.len(), 1);\n    }\n\n    #[test]\n    fn test_desktop_applications_close_window() {\n        let apps = DesktopApplications::new();\n        let window = apps.open_terminal().unwrap();\n        apps.close_window(window.id).unwrap();\n        let windows = apps.get_open_windows();\n        assert!(windows.is_empty());\n    }\n\n    #[test]\n    fn test_time_range_variants() {\n        assert!(matches!(TimeRange::LastHour, TimeRange::LastHour));\n        assert!(matches!(TimeRange::LastDay, TimeRange::LastDay));\n        assert!(matches!(TimeRange::LastWeek, TimeRange::LastWeek));\n    }\n\n    #[test]\n    fn test_app_type_variants() {\n        assert!(matches!(AppType::Terminal, AppType::Terminal));\n        assert!(matches!(AppType::FileManager, AppType::FileManager));\n        assert!(matches!(AppType::AgentManager, AppType::AgentManager));\n    }\n}\n","traces":[{"line":41,"address":[1230032,1230228],"length":1,"stats":{"Line":2}},{"line":43,"address":[4954158],"length":1,"stats":{"Line":2}},{"line":61,"address":[1216564,1216570,1216400],"length":1,"stats":{"Line":4}},{"line":63,"address":[1216414],"length":1," r)]\npub enum CompositorError {\n    #[error(\"Window not found: {0}\")]\n    WindowNotFound(Uuid),\n    #[error(\"Display server error: {0}\")]\n    DisplayServerError(String),\n    #[error(\"Permission denied: {0}\")]\n    PermissionDenied(String),\n}\n\npub type SurfaceId = Uuid;\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum WindowState {\n    Normal,\n    Minimized,\n    Maximized,\n    Fullscreen,\n    Floating,\n}\n\n#[derive(Debug, Clone)]\npub struct Window {\n    pub id: SurfaceId,\n    pub title: String,\n    pub app_id: String,\n    pub state: WindowState,\n    pub geometry: Rectangle,\n    pub is_agent_window: bool,\n    pub created_at: chrono::DateTime\u003cchrono::Utc\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct Rectangle {\n    pub x: i32,\n    pub y: i32,\n    pub width: u32,\n    pub height: u32,\n}\n\nimpl Default for Rectangle {\n    fn default() -\u003e Self {\n        Self {\n            x: 0,\n            y: 0,\n            width: 1920,\n            height: 1080,\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Workspace {\n    pub id: usize,\n    pub name: String,\n    pub windows: Vec\u003cSurfaceId\u003e,\n    pub active_window: Option\u003cSurfaceId\u003e,\n    pub context_type: ContextType,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum ContextType {\n    Development,\n    Communication,\n    Design,\n    General,\n    AgentOperation,\n}\n\n#[derive(Debug)]\npub struct Compositor {\n    windows: Arc\u003cRwLock\u003cHashMap\u003cSurfaceId, Window\u003e\u003e\u003e,\n    workspaces: Arc\u003cRwLock\u003cVec\u003cWorkspace\u003e\u003e\u003e,\n    active_workspace: Arc\u003cRwLock\u003cusize\u003e\u003e,\n    current_output: Arc\u003cRwLock\u003cRectangle\u003e\u003e,\n    agent_aware_mode: Arc\u003cRwLock\u003cbool\u003e\u003e,\n    secure_mode: Arc\u003cRwLock\u003cbool\u003e\u003e,\n}\n\nimpl Compositor {\n    pub fn new() -\u003e Self {\n        let mut workspaces = Vec::new();\n        for i in 0..4 {\n            workspaces.push(Workspace {\n                id: i,\n                name: format!(\"Workspace {}\", i + 1),\n                windows: Vec::new(),\n                active_window: None,\n                context_type: ContextType::General,\n            });\n        }\n\n        Self {\n            windows: Arc::new(RwLock::new(HashMap::new())),\n            workspaces: Arc::new(RwLock::new(workspaces)),\n            active_workspace: Arc::new(RwLock::new(0)),\n            current_output: Arc::new(RwLock::new(Rectangle::default())),\n            agent_aware_mode: Arc::new(RwLock::new(true)),\n            secure_mode: Arc::new(RwLock::new(false)),\n        }\n    }\n\n    pub fn create_window(\n        \u0026self,\n        title: String,\n        app_id: String,\n        is_agent: bool,\n    ) -\u003e Result\u003cSurfaceId, CompositorError\u003e {\n        let id = Uuid::new_v4();\n        let app_id_clone = app_id.clone();\n        let window = Window {\n            id,\n            title,\n            app_id: app_id_clone,\n            state: WindowState::Normal,\n            geometry: Rectangle::default(),\n            is_agent_window: is_agent,\n            created_at: chrono::Utc::now(),\n        };\n\n        self.windows.write().unwrap().insert(id, window);\n        self.add_window_to_workspace(id);\n\n        info!(\"Created window {} for {}\", id, app_id);\n        Ok(id)\n    }\n\n    fn add_window_to_workspace(\u0026self, window_id: SurfaceId) {\n        let active_ws = *self.active_workspace.read().unwrap();\n        let mut workspaces = self.workspaces.write().unwrap();\n        if let Some(ws) = workspaces.get_mut(active_ws) {\n            ws.windows.push(window_id);\n            ws.active_window = Some(window_id);\n        }\n    }\n\n    pub fn close_window(\u0026self, id: SurfaceId) -\u003e Result\u003c(), CompositorError\u003e {\n        let mut windows = self.windows.write().unwrap();\n        if !windows.contains_key(\u0026id) {\n            return Err(CompositorError::WindowNotFound(id));\n        }\n\n        windows.remove(\u0026id);\n\n        let active_ws = *self.active_workspace.read().unwrap();\n        let mut workspaces = self.workspaces.write().unwrap();\n        if let Some(ws) = workspaces.get_mut(active_ws) {\n            ws.windows.retain(|\u0026w| w != id);\n            if ws.active_window == Some(id) {\n                ws.active_window = ws.windows.last().copied();\n            }\n        }\n\n        info!(\"Closed window {}\", id);\n        Ok(())\n    }\n\n    pub fn set_window_state(\n        \u0026self,\n        id: SurfaceId,\n        state: WindowState,\n    ) -\u003e Result\u003c(), CompositorError\u003e {\n        let windows = self.windows.read().unwrap();\n        let window = windows\n            .get(\u0026id)\n            .ok_or(CompositorError::WindowNotFound(id))?;\n\n        let mut windows = self.windows.write().unwrap();\n        if let Some(w) = windows.get_mut(\u0026id) {\n            w.state = state.clone();\n            info!(\"Window {} state changed to {:?}\", id, state);\n        }\n\n        Ok(())\n    }\n\n    pub fn move_window_to_workspace(\n        \u0026self,\n        window_id: SurfaceId,\n        workspace_id: usize,\n    ) -\u003e Result\u003c(), CompositorError\u003e {\n        let windows = self.windows.read().unwrap();\n        if !windows.contains_key(\u0026window_id) {\n            return Err(CompositorError::WindowNotFound(window_id));\n        }\n\n        let mut windows = self.windows.write().unwrap();\n        let window = windows.get(\u0026window_id).unwrap().clone();\n\n        let old_ws = *self.active_workspace.read().unwrap();\n        let mut workspaces = self.workspaces.write().unwrap();\n\n        if let Some(ws) = workspaces.get_mut(old_ws) {\n            ws.windows.retain(|\u0026w| w != window_id);\n        }\n\n        if let Some(ws) = workspaces.get_mut(workspace_id) {\n            ws.windows.push(window_id);\n            ws.active_window = Some(window_id);\n        }\n\n        info!(\n            \"Moved window {} from workspace {} to {}\",\n            window_id, old_ws, workspace_id\n        );\n        Ok(())\n    }\n\n    pub fn switch_workspace(\u0026self, workspace_id: usize) -\u003e Result\u003c(), CompositorError\u003e {\n        let workspaces = self.workspaces.read().unwrap();\n        if workspace_id \u003e= workspaces.len() {\n            return Err(CompositorError::DisplayServerError(format!(\n                \"Invalid workspace: {}\",\n                workspace_id\n            )));\n        }\n\n        drop(workspaces);\n\n        *self.active_workspace.write().unwrap() = workspace_id;\n        info!(\"Switched to workspace {}\", workspace_id);\n        Ok(())\n    }\n\n    pub fn set_agent_aware_mode(\u0026self, enabled: bool) {\n        *self.agent_aware_mode.write().unwrap() = enabled;\n        if enabled {\n            info!(\"Agent-aware window management enabled\");\n        } else {\n            warn!(\"Agent-aware window management disabled\");\n        }\n    }\n\n    pub fn set_secure_mode(\u0026self, enabled: bool) {\n        *self.secure_mode.write().unwrap() = enabled;\n        if enabled {\n            info!(\"Secure mode enabled - screenshot/access controls active\");\n        } else {\n            warn!(\"Secure mode disabled\");\n        }\n    }\n\n    pub fn get_windows(\u0026self) -\u003e Vec\u003cWindow\u003e {\n        self.windows.read().unwrap().values().cloned().collect()\n    }\n\n    pub fn get_active_windows(\u0026self) -\u003e Vec\u003cWindow\u003e {\n        let active_ws = *self.active_workspace.read().unwrap();\n        let workspaces = self.workspaces.read().unwrap();\n        let window_ids = if let Some(ws) = workspaces.get(active_ws) {\n            ws.windows.clone()\n        } else {\n            Vec::new()\n        };\n\n        self.windows\n            .read()\n            .unwrap()\n            .iter()\n            .filter(|(id, _)| window_ids.contains(id))\n            .map(|(_, w)| w.clone())\n            .collect()\n    }\n\n    pub fn get_agent_windows(\u0026self) -\u003e Vec\u003cWindow\u003e {\n        self.windows\n            .read()\n            .unwrap()\n            .values()\n            .filter(|w| w.is_agent_window)\n            .cloned()\n            .collect()\n    }\n\n    pub fn get_workspace_context(\n        \u0026self,\n        workspace_id: usize,\n    ) -\u003e Result\u003cContextType, CompositorError\u003e {\n        let workspaces = self.workspaces.read().unwrap();\n        let ws = workspaces\n            .get(workspace_id)\n            .ok_or(CompositorError::DisplayServerError(format!(\n                \"Invalid workspace: {}\",\n                workspace_id\n            )))?;\n        Ok(ws.context_type.clone())\n    }\n\n    pub fn set_workspace_context(\n        \u0026self,\n        workspace_id: usize,\n        context: ContextType,\n    ) -\u003e Result\u003c(), CompositorError\u003e {\n        let mut workspaces = self.workspaces.write().unwrap();\n        if let Some(ws) = workspaces.get_mut(workspace_id) {\n            ws.context_type = context.clone();\n            info!(\"Workspace {} context set to {:?}\", workspace_id, context);\n        }\n        Ok(())\n    }\n}\n\npub trait CompositorBackend: Send + Sync {\n    fn initialize(\u0026mut self) -\u003e Result\u003c(), CompositorError\u003e;\n    fn handle_input(\u0026mut self, event: InputEvent) -\u003e Result\u003c(), CompositorError\u003e;\n    fn render(\u0026mut self) -\u003e Result\u003c(), CompositorError\u003e;\n    fn shutdown(\u0026mut self) -\u003e Result\u003c(), CompositorError\u003e;\n}\n\n#[derive(Debug, Clone)]\npub enum InputEvent {\n    MouseMove {\n        x: i32,\n        y: i32,\n    },\n    MouseClick {\n        button: u32,\n        x: i32,\n        y: i32,\n    },\n    KeyPress {\n        keycode: u32,\n        modifiers: u32,\n    },\n    TouchEvent {\n        finger_id: i32,\n        x: f64,\n        y: f64,\n        phase: TouchPhase,\n    },\n}\n\n#[derive(Debug, Clone)]\npub enum TouchPhase {\n    Down,\n    Move,\n    Up,\n}\n\npub struct WaylandBackend;\n\nimpl CompositorBackend for WaylandBackend {\n    fn initialize(\u0026mut self) -\u003e Result\u003c(), CompositorError\u003e {\n        info!(\"Initializing Wayland backend\");\n        Ok(())\n    }\n\n    fn handle_input(\u0026mut self, event: InputEvent) -\u003e Result\u003c(), CompositorError\u003e {\n        match event {\n            InputEvent::MouseMove { x, y } =\u003e {\n                tracing::debug!(\"Mouse move: ({}, {})\", x, y);\n            }\n            InputEvent::MouseClick { button, x, y } =\u003e {\n                tracing::debug!(\"Mouse click: button={}, ({}, {})\", button, x, y);\n            }\n            InputEvent::KeyPress { keycode, modifiers } =\u003e {\n                tracing::debug!(\"Key press: keycode={}, modifiers={}\", keycode, modifiers);\n            }\n            InputEvent::TouchEvent {\n                finger_id,\n                x: x_pos,\n                y: y_pos,\n                phase,\n            } =\u003e {\n                tracing::debug!(\n                    \"Touch: finger={}, x={}, y={}, phase={:?}\",\n                    finger_id,\n                    x_pos,\n                    y_pos,\n                    phase\n                );\n            }\n        }\n        Ok(())\n    }\n\n    fn render(\u0026mut self) -\u003e Result\u003c(), CompositorError\u003e {\n        Ok(())\n    }\n\n    fn shutdown(\u0026mut self) -\u003e Result\u003c(), CompositorError\u003e {\n        info!(\"Wayland backend shutting down\");\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_window_state_variants() {\n        assert!(matches!(WindowState::Normal, WindowState::Normal));\n        assert!(matches!(WindowState::Minimized, WindowState::Minimized));\n        assert!(matches!(WindowState::Maximized, WindowState::Maximized));\n        assert!(matches!(WindowState::Fullscreen, WindowState::Fullscreen));\n    }\n\n    #[test]\n    fn test_rectangle_default() {\n        let rect = Rectangle::default();\n        assert_eq!(rect.x, 0);\n        assert_eq!(rect.y, 0);\n        assert_eq!(rect.width, 1920);\n        assert_eq!(rect.height, 1080);\n    }\n\n    #[test]\n    fn test_rectangle_custom() {\n        let rect = Rectangle {\n            x: 100,\n            y: 200,\n            width: 800,\n            height: 600,\n        };\n        assert_eq!(rect.x, 100);\n        assert_eq!(rect.y, 200);\n        assert_eq!(rect.width, 800);\n        assert_eq!(rect.height, 600);\n    }\n\n    #[test]\n    fn test_context_type_variants() {\n        assert!(matches!(ContextType::Development, ContextType::Development));\n        assert!(matches!(\n            ContextType::Communication,\n            ContextType::Communication\n        ));\n        assert!(matches!(\n            ContextType::AgentOperation,\n            ContextType::AgentOperation\n        ));\n    }\n\n    #[test]\n    fn test_workspace() {\n        let ws = Workspace {\n            id: 1,\n            name: \"Main\".to_string(),\n            windows: vec![],\n            active_window: None,\n            context_type: ContextType::General,\n        };\n        assert_eq!(ws.name, \"Main\");\n    }\n\n    #[test]\n    fn test_touch_phase() {\n        assert!(matches!(TouchPhase::Down, TouchPhase::Down));\n        assert!(matches!(TouchPhase::Move, TouchPhase::Move));\n        assert!(matches!(TouchPhase::Up, TouchPhase::Up));\n    }\n}\n","traces":[{"line":48,"address":[5394832],"length":1,"stats":{"Line":2}},{"line":87,"address":[1279728,1280655,1281043],"length":1,"stats":{"Line":0}},{"line":88,"address":[1279745],"length":1,"stats":{"Line":0}},{"line":89,"address":[1279774,1279861],"length":1,"stats":{"Line":0}},{"line":90,"address":[1280905],"length":1,"stats":{"Line":0}},{"line":92,"address":[128
