u003cString, String\u003e,\n}\n\n/// Agent statistics\n#[derive(Debug, Clone, Default, Serialize, Deserialize)]\npub struct AgentStats {\n    pub total_tasks_completed: u64,\n    pub total_tasks_failed: u64,\n    pub total_inference_calls: u64,\n    pub total_file_operations: u64,\n    pub total_network_operations: u64,\n}\n\n/// Agent event\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub enum AgentEvent {\n    Started {\n        agent_id: AgentId,\n        timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    },\n    Stopped {\n        agent_id: AgentId,\n        timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n        reason: StopReason,\n    },\n    TaskCompleted {\n        agent_id: AgentId,\n        task_id: String,\n        duration_ms: u64,\n    },\n    TaskFailed {\n        agent_id: AgentId,\n        task_id: String,\n        error: String,\n    },\n    ResourceLimitExceeded {\n        agent_id: AgentId,\n        resource: String,\n        limit: u64,\n        actual: u64,\n    },\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub enum StopReason {\n    Normal,\n    Error(String),\n    UserRequest,\n    ResourceLimit,\n    Timeout,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use uuid::Uuid;\n\n    #[test]\n    fn test_agent_info() {\n        let info = AgentInfo {\n            id: AgentId::new(),\n            name: \"test-agent\".to_string(),\n            status: AgentStatus::Running,\n            created_at: chrono::Utc::now(),\n            started_at: Some(chrono::Utc::now()),\n            resource_usage: ResourceUsage::default(),\n            metadata: HashMap::new(),\n        };\n        assert_eq!(info.name, \"test-agent\");\n        assert_eq!(info.status, AgentStatus::Running);\n    }\n\n    #[test]\n    fn test_agent_stats_default() {\n        let stats = AgentStats::default();\n        assert_eq!(stats.total_tasks_completed, 0);\n        assert_eq!(stats.total_tasks_failed, 0);\n    }\n\n    #[test]\n    fn test_agent_stats_values() {\n        let mut stats = AgentStats::default();\n        stats.total_tasks_completed = 100;\n        stats.total_tasks_failed = 5;\n        stats.total_inference_calls = 50;\n\n        assert_eq!(stats.total_tasks_completed, 100);\n        assert_eq!(stats.total_tasks_failed, 5);\n        assert_eq!(stats.total_inference_calls, 50);\n    }\n\n    #[test]\n    fn test_agent_event_started() {\n        let event = AgentEvent::Started {\n            agent_id: AgentId::new(),\n            timestamp: chrono::Utc::now(),\n        };\n\n        if let AgentEvent::Started { agent_id, .. } = event {\n            assert_ne!(agent_id.0, Uuid::nil());\n        } else {\n            panic!(\"Expected Started event\");\n        }\n    }\n\n    #[test]\n    fn test_agent_event_stopped() {\n        let event = AgentEvent::Stopped {\n            agent_id: AgentId::new(),\n            timestamp: chrono::Utc::now(),\n            reason: StopReason::Normal,\n        };\n\n        if let AgentEvent::Stopped { reason, .. } = event {\n            assert!(matches!(reason, StopReason::Normal));\n        } else {\n            panic!(\"Expected Stopped event\");\n        }\n    }\n\n    #[test]\n    fn test_agent_event_task_completed() {\n        let event = AgentEvent::TaskCompleted {\n            agent_id: AgentId::new(),\n            task_id: \"task-123\".to_string(),\n            duration_ms: 1500,\n        };\n\n        if let AgentEvent::TaskCompleted {\n            task_id,\n            duration_ms,\n            ..\n        } = event\n        {\n            assert_eq!(task_id, \"task-123\");\n            assert_eq!(duration_ms, 1500);\n        } else {\n            panic!(\"Expected TaskCompleted event\");\n        }\n    }\n\n    #[test]\n    fn test_agent_event_task_failed() {\n        let event = AgentEvent::TaskFailed {\n            agent_id: AgentId::new(),\n            task_id: \"task-456\".to_string(),\n            error: \"Out of memory\".to_string(),\n        };\n\n        if let AgentEvent::TaskFailed { error, .. } = event {\n            assert_eq!(error, \"Out of memory\");\n        } else {\n            panic!(\"Expected TaskFailed event\");\n        }\n    }\n\n    #[test]\n    fn test_agent_event_resource_limit() {\n        let event = AgentEvent::ResourceLimitExceeded {\n            agent_id: AgentId::new(),\n            resource: \"memory\".to_string(),\n            limit: 1024,\n            actual: 2048,\n        };\n\n        if let AgentEvent::ResourceLimitExceeded {\n            resource,\n            limit,\n            actual,\n            ..\n        } = event\n        {\n            assert_eq!(resource, \"memory\");\n            assert_eq!(limit, 1024);\n            assert_eq!(actual, 2048);\n        } else {\n            panic!(\"Expected ResourceLimitExceeded event\");\n        }\n    }\n\n    #[test]\n    fn test_stop_reason_variants() {\n        assert!(matches!(StopReason::Normal, StopReason::Normal));\n        assert!(matches!(StopReason::UserRequest, StopReason::UserRequest));\n        assert!(matches!(\n            StopReason::ResourceLimit,\n            StopReason::ResourceLimit\n        ));\n\n        if let StopReason::Error(msg) = StopReason::Error(\"test error\".to_string()) {\n            assert_eq!(msg, \"test error\");\n        } else {\n            panic!(\"Expected Error variant\");\n        }\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","macro","Repos","agnosticos","userland","agnos-common","src","audit.rs"],"content":"//! Audit logging types\n\nuse crate::{AgentId, UserId};\nuse serde::{Deserialize, Serialize};\n\n/// Audit event\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AuditEvent {\n    pub sequence: u64,\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub event_type: AuditEventType,\n    pub agent_id: Option\u003cAgentId\u003e,\n    pub user_id: UserId,\n    pub action: String,\n    pub resource: String,\n    pub resul \npub const SYS_AGNOS_AGENT_CREATE: i64 = 500;\npub const SYS_AGNOS_AGENT_TERMINATE: i64 = 501;\npub const SYS_AGNOS_AGENT_SET_LIMITS: i64 = 502;\npub const SYS_AGNOS_AGENT_GET_INFO: i64 = 503;\npub const SYS_AGNOS_LLM_LOAD_MODEL: i64 = 510;\npub const SYS_AGNOS_LLM_INFERENCE: i64 = 511;\npub const SYS_AGNOS_LLM_UNLOAD_MODEL: i64 = 512;\npub const SYS_AGNOS_AUDIT_LOG: i64 = 520;\npub const SYS_AGNOS_AUDIT_READ: i64 = 521;\n\n/// Raw syscall wrapper\n#[inline(always)]\npub unsafe fn syscall1(num: i64, arg1: i64) -\u003e i64 {\n    libc::syscall(num, arg1)\n}\n\n#[inline(always)]\npub unsafe fn syscall2(num: i64, arg1: i64, arg2: i64) -\u003e i64 {\n    libc::syscall(num, arg1, arg2)\n}\n\n#[inline(always)]\npub unsafe fn syscall3(num: i64, arg1: i64, arg2: i64, arg3: i64) -\u003e i64 {\n    libc::syscall(num, arg1, arg2, arg3)\n}\n\n/// Check if AGNOS kernel modules are available\npub fn kernel_modules_available() -\u003e bool {\n    unsafe {\n        let result = syscall1(SYS_AGNOS_AGENT_GET_INFO, 0);\n        result \u003e= 0 || errno() != libc::ENOSYS\n    }\n}\n\nfn errno() -\u003e i32 {\n    unsafe { *libc::__errno_location() }\n}\n\n/// Convert syscall result to Result\nfn check_result(result: i64) -\u003e Result\u003ci64\u003e {\n    if result \u003c 0 {\n        Err(SysError::from_errno(-result as i32))\n    } else {\n        Ok(result)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_syscall_constants() {\n        assert_eq!(SYS_AGNOS_AGENT_CREATE, 500);\n        assert_eq!(SYS_AGNOS_AGENT_TERMINATE, 501);\n        assert_eq!(SYS_AGNOS_AGENT_SET_LIMITS, 502);\n        assert_eq!(SYS_AGNOS_AGENT_GET_INFO, 503);\n        assert_eq!(SYS_AGNOS_LLM_LOAD_MODEL, 510);\n        assert_eq!(SYS_AGNOS_LLM_INFERENCE, 511);\n        assert_eq!(SYS_AGNOS_LLM_UNLOAD_MODEL, 512);\n        assert_eq!(SYS_AGNOS_AUDIT_LOG, 520);\n        assert_eq!(SYS_AGNOS_AUDIT_READ, 521);\n    }\n\n    #[test]\n    fn test_check_result_success() {\n        let result = check_result(0);\n        assert!(result.is_ok());\n        assert_eq!(result.unwrap(), 0);\n    }\n\n    #[test]\n    fn test_check_result_error() {\n        let result = check_result(-1);\n        assert!(result.is_err());\n    }\n}\n","traces":[{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[2554366,2554182],"length":1,"stats":{"Line":0}},{"line":23,"address":[2554384],"length":1,"stats":{"Line":0}},{"line":24,"address":[2554402],"length":1,"stats":{"Line":0}},{"line":28,"address":[2554416],"length":1,"stats":{"Line":0}},{"line":29,"address":[2554440],"length":1,"stats":{"Line":0}},{"line":33,"address":[2554160],"length":1,"stats":{"Line":0}},{"line":35,"address":[2554199],"length":1,"stats":{"Line":0}},{"line":36,"address":[2554204],"length":1,"stats":{"Line":0}},{"line":40,"address":[2554256],"length":1,"stats":{"Line":0}},{"line":41,"address":[2554328,2554257],"length":1,"stats":{"Line":0}},{"line":45,"address":[2553984],"length":1,"stats":{"Line":2}},{"line":46,"address":[2554041,2554137,2554008],"length":1,"stats":{"Line":4}},{"line":47,"address":[2554080,2554139,2554048],"length":1,"stats":{"Line":2}},{"line":49,"address":[2554024],"length":1,"stats":{"Line":1}}],"covered":4,"coverable":15},{"path":["/","home","macro","Repos","agnosticos","userland","ai-shell","src","approval.rs"],"content":"//! Human approval system for sensitive operations\n//!\n//! Provides interactive prompts and logging for all actions\n//! that require human oversight.\n\nuse anyhow::{anyhow, Result};\nuse console::{style, Style};\nuse dialoguer::{theme::ColorfulTheme, Confirm, MultiSelect, Select};\nuse std::io::IsTerminal;\nuse std::time::Duration;\nuse tokio::time::timeout;\nuse tracing::{info, warn};\n\nuse crate::security::PermissionLevel;\n\n/// Types of approval requests\n#[derive(Debug, Clone)]\npub enum ApprovalRequest {\n    /// Command execution approval\n    Command {\n        command: String,\n        args: Vec\u003cString\u003e,\n        reason: String,\n        risk_level: RiskLevel,\n    },\n    /// Privilege escalation approval\n    PrivilegeEscalation {\n        command: String,\n        user: String,\n        reason: String,\n    },\n    /// File operation approval\n    FileOperation {\n        operation: String,\n        path: std::path::PathBuf,\n        description: String,\n    },\n    /// Network access approval\n    NetworkAccess {\n        host: String,\n        port: u16,\n        protocol: String,\n        purpose: String,\n    },\n    /// Batch operation approval\n    Batch {\n        operations: Vec\u003cString\u003e,\n        summary: String,\n    },\n}\n\n/// Risk levels for operations\n#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord)]\npub enum RiskLevel {\n    Low,\n    Medium,\n    High,\n    Critical,\n}\n\nimpl RiskLevel {\n    pub fn from_permission(perm: \u0026PermissionLevel) -\u003e Self {\n        match perm {\n            PermissionLevel::Safe =\u003e RiskLevel::Low,\n            PermissionLevel::ReadOnly =\u003e RiskLevel::Low,\n            PermissionLevel::UserWrite =\u003e RiskLevel::Medium,\n            PermissionLevel::SystemWrite =\u003e RiskLevel::High,\n            PermissionLevel::Admin =\u003e RiskLevel::Critical,\n            PermissionLevel::Blocked =\u003e RiskLevel::Critical,\n        }\n    }\n    \n    pub fn color(\u0026self) -\u003e impl Fn(\u0026str) -\u003e String {\n        match self {\n            RiskLevel::Low =\u003e |s: \u0026str| format!(\"\\x1b[32m{}\\x1b[0m\", s),\n            RiskLevel::Medium =\u003e |s: \u0026str| format!(\"\\x1b[33m{}\\x1b[0m\", s),\n            RiskLevel::High =\u003e |s: \u0026str| format!(\"\\x1b[31m{}\\x1b[0m\", s),\n            RiskLevel::Critical =\u003e |s: \u0026str| format!(\"\\x1b[1;31m{}\\x1b[0m\", s),\n        }\n    }\n    \n    pub fn icon(\u0026self) -\u003e \u0026'static str {\n        match self {\n            RiskLevel::Low =\u003e \"✓\",\n            RiskLevel::Medium =\u003e \"⚠\",\n            RiskLevel::High =\u003e \"⚠\",\n            RiskLevel::Critical =\u003e \"✕\",\n        }\n    }\n}\n\n/// Response to an approval request\n#[derive(Debug, Clone)]\npub enum ApprovalResponse {\n    /// Approved to proceed\n    Approved,\n    /// Approved once (don't remember)\n    ApprovedOnce,\n    /// Denied - do not execute\n    Denied,\n    /// Denied and block similar requests\n    DenyAndBlock,\n    /// Request more information\n    NeedInfo(String),\n    /// Modify the request\n    Modify(ApprovalRequest),\n}\n\n/// Manages approval workflows\npub struct ApprovalManager {\n    theme: ColorfulTheme,\n    timeout_seconds: u64,\n    auto_approve_low_risk: bool,\n    blocked_patterns: Vec\u003cString\u003e,\n}\n\nimpl ApprovalManager {\n    pub fn new() -\u003e Self {\n        Self {\n            theme: ColorfulTheme::default(),\n            timeout_seconds: 300, // 5 minutes default timeout\n            auto_approve_low_risk: false,\n            blocked_patterns: Vec::new(),\n        }\n    }\n    \n    /// Configure auto-approval for low-risk operations\n    pub fn set_auto_approve_low_risk(\u0026mut self, enabled: bool) {\n        self.auto_approve_low_risk = enabled;\n    }\n    \n    /// Request approval for an operation\n    pub async fn request(\u0026self, request: \u0026ApprovalRequest) -\u003e Result\u003cApprovalResponse\u003e {\n        info!(\"Approval requested: {:?}\", request);\n        \n        // Check if pattern is blocked\n        if self.is_blocked(request) {\n            warn!(\"Request matches blocked pattern, auto-denying\");\n            return Ok(ApprovalResponse::Denied);\n        }\n        \n        // Determine risk level\n        let risk = self.assess_risk(request);\n        \n        // Auto-approve low risk if configured\n        if self.auto_approve_low_risk \u0026\u0026 risk == RiskLevel::Low {\n            info!(\"Auto-approved low-risk operation\");\n            return Ok(ApprovalResponse::Approved);\n        }\n        \n        // Display request and get user input\n        self.display_request(request, risk)?;\n        \n        // For non-interactive environments, deny by default\n        if !std::io::stdin().is_terminal() {\n            warn!(\"Non-interactive environment, denying by default\");\n            return Ok(ApprovalResponse::Denied);\n        }\n        \n        // Get user decision with timeout\n        let response = timeout(\n            Duration::from_secs(self.timeout_seconds),\n            self.get_user_decision(request, risk)\n        ).await;\n        \n        match response {\n            Ok(Ok(resp)) =\u003e {\n                info!(\"User responded: {:?}\", resp);\n                Ok(resp)\n            }\n            Ok(Err(e)) =\u003e Err(e),\n            Err(_) =\u003e {\n                warn!(\"Approval request timed out\");\n                Ok(ApprovalResponse::Denied)\n            }\n        }\n    }\n    \n    /// Assess risk level of a request\n    fn assess_risk(\u0026self, request: \u0026ApprovalRequest) -\u003e RiskLevel {\n        match request {\n            ApprovalRequest::Command { risk_level, .. } =\u003e *risk_level,\n            ApprovalRequest::PrivilegeEscalation { .. } =\u003e RiskLevel::Critical,\n            ApprovalRequest::FileOperation { operation, path, .. } =\u003e {\n                let path_str = path.to_string_lossy();\n                if path_str.starts_with(\"/etc/\") || \n                   path_str.starts_with(\"/usr/\") ||\n                   path_str.starts_with(\"/bin/\") ||\n                   path_str.starts_with(\"/sbin/\") {\n                    RiskLevel::High\n                } else if operation.contains(\"delete\") || operation.contains(\"remove\") {\n                    RiskLevel::High\n                } else {\n                    RiskLevel::Medium\n                }\n            }\n            ApprovalRequest::NetworkAccess { .. } =\u003e RiskLevel::Medium,\n            ApprovalRequest::Batch { operations, .. } =\u003e {\n                if operations.len() \u003e 10 {\n                    RiskLevel::High\n                } else {\n                    RiskLevel::Medium\n                }\n            }\n        }\n    }\n    \n    /// Check if request matches blocked pattern\n    fn is_blocked(\u0026self, request: \u0026ApprovalRequest) -\u003e bool {\n        let cmd = match request {\n            ApprovalRequest::Command { command, .. } =\u003e command.clone(),\n            ApprovalRequest::PrivilegeEscalation { command, .. } =\u003e command.clone(),\n            _ =\u003e return false,\n        };\n        \n        self.blocked_patterns.iter().any(|pattern| {\n            cmd.contains(pattern)\n        })\n    }\n    \n    /// Display the approval request to user\n    fn display_request(\u0026self, request: \u0026ApprovalRequest, risk: RiskLevel) -\u003e Result\u003c()\u003e {\n        println!(\"\\n{}\", style(\"─\".repeat(60)).dim());\n        println!(\"{}\", style(\"  APPROVAL REQUIRED\").bold().yellow());\n        println!(\"{}\\n\", style(\"─\".repeat(60)).dim());\n        \n        match request {\n            ApprovalRequest::Command { command, args, reason, .. } =\u003e {\n                println!(\"  {} {}\", style(\"Command:\").bold(), command);\n                if !args.is_empty() {\n                    println!(\"  {} {}\", style(\"Args:\").bold(), args.join(\" \"));\n                }\n                println!(\"  {} {}\", style(\"Reason:\").dim(), reason);\n            }\n            ApprovalRequest::PrivilegeEscalation { command, user, reason } =\u003e {\n                println!(\"  {}\", style(\"⚠️  PRIVILEGE ESCALATION\").red().bold());\n                println!(\"  {} {} as {}\", style(\"Command:\").bold(), command, user);\n                println!(\"  {} {}\", style(\"Reason:\").dim(), reason);\n            }\n            ApprovalRequest::FileOperation { operation, path, description } =\u003e {\n                println!(\"  {} {}\", style(\"Operation:\").bold(), operation);\n                println!(\"  {} {}\", style(\"Path:\").bold(), path.display());\n                println!(\"  {} {}\", style(\"Description:\").dim(), description);\n            }\n            ApprovalRequest::NetworkAccess { host, port, protocol, purpose } =\u003e {\n                println!(\"  {} {}://{}:{}\", style(\"Network:\").bold(), protocol, host, port);\n                println!(\"  {} {}\", style(\"Purpose:\").dim(), purpose);\n            }\n            ApprovalRequest::Batch { operations, summary } =\u003e {\n                println!(\"  {} {}\", style(\"Batch Operation:\").bold(), summary);\n                println!(\"  {} {} operations\", style(\"Count:\").bold(), operations.len());\n                for (i, op) in operations.iter().take(5).enumerate() {\n                    println!(\"    {}. {}\", i + 1, op);\n                }\n                if operations.len() \u003e 5 {\n                    println!(\"    ... and {} more\", operations.len() - 5);\n                }\n            }\n        }\n        \n        println!(\"\\n  {} {} {}\", \n            style(\"Risk Level:\").bold(),\n            risk.icon(),\n            risk.color()(\u0026format!(\"{:?}\", risk))\n        );\n        \n        println!(\"{}\", style(\"─\".repeat(60)).dim());\n        \n        Ok(())\n    }\n    \n    /// Get user decision interactively\n    async fn get_user_decision(\u0026self, request: \u0026ApprovalRequest, risk: RiskLevel) -\u003e Result\u003cApprovalResponse\u003e {\n        let choices = vec![\n            \"✓ Approve\",\n            \"✓ Approve once\",\n            \"✗ Deny\",\n            \"✗ Deny and block\",\n            \"? More info\",\n        ];\n        \n        let selection = Select::with_theme(\u0026self.theme)\n            .with_prompt(\"Your decision\")\n            .items(\u0026choices)\n            .default(1) // Default to \"Approve once\"\n            .interact()?;\n        \n        match selection {\n            0 =\u003e Ok(ApprovalResponse::Approved),\n            1 =\u003e Ok(ApprovalResponse::ApprovedOnce),\n            2 =\u003e Ok(ApprovalResponse::Denied),\n            3 =\u003e Ok(ApprovalResponse::DenyAndBlock),\n            4 =\u003e {\n                // Request more info\n                let info = self.gather_more_info(request).await?;\n                Ok(ApprovalResponse::NeedInfo(info))\n            }\n            _ =\u003e Ok(ApprovalResponse::Denied),\n        }\n    }\n    \n    /// Gather additional information from user\n    async fn gather_more_info(\u0026self, request: \u0026ApprovalRequest) -\u003e Result\u003cString\u003e {\n        use dialoguer::Input;\n        \n        let info: String = Input::with_theme(\u0026self.theme)\n            .with_prompt(\"What would you like to know?\")\n            .interact_text()?;\n        \n        Ok(info)\n    }\n    \n    /// Add a blocked pattern\n    pub fn block_pattern(\u0026mut self, pattern: String) {\n        self.blocked_patterns.push(pattern);\n    }\n}\n\nimpl Default for ApprovalManager {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Batch approval for multiple operations\npub async fn batch_approve(\n    manager: \u0026ApprovalManager,\n    operations: Vec\u003cApprovalRequest\u003e,\n) -\u003e Result\u003cVec\u003c(ApprovalRequest, ApprovalResponse)\u003e\u003e {\n    let mut results = Vec::new();\n    \n    // Group by risk level\n    let low_risk: Vec\u003c_\u003e = operations.iter()\n        .filter(|op| manager.assess_risk(op) == RiskLevel::Low)\n        .cloned()\n        .collect();\n    \n    let high_risk: Vec\u003c_\u003e = operations.iter()\n        .filter(|op| manager.assess_risk(op) != RiskLevel::Low)\n        .cloned()\n        .collect();\n    \n    // Auto-approve low risk\n    for op in low_risk {\n        results.push((op, ApprovalResponse::Approved));\n    }\n    \n    // Request approval for high risk as batch\n    if !high_risk. ontent":"//! Audit logging for shell actions\n\nuse anyhow::Result;\nuse chrono::Utc;\nuse serde::{Deserialize, Serialize};\nuse std::path::PathBuf;\n\n/// Audit entry for shell actions\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AuditEntry {\n    pub timestamp: String,\n    pub user: String,\n    pub mode: String,\n    pub input: String,\n    pub action: String,\n    pub approved: bool,\n    pub result: String,\n}\n\n/// Audit logger\npub struct AuditLogger {\n    file: PathBuf,\n}\n\nimpl AuditLogger {\n    pub fn new(file: PathBuf) -\u003e Self {\n        Self { file }\n    }\n    \n    /// Log an action\n    pub async fn log(\u0026self, entry: AuditEntry) -\u003e Result\u003c()\u003e {\n        let line = serde_json::to_string(\u0026entry)?;\n        \n        use tokio::io::AsyncWriteExt;\n        let mut file = tokio::fs::OpenOptions::new()\n            .create(true)\n            .append(true)\n            .open(\u0026self.file)\n            .await?;\n        \n        file.write_all(line.as_bytes()).await?;\n        file.write_all(b\"\\n\").await?;\n        file.flush().await?;\n        \n        Ok(())\n    }\n}\n\n/// Create audit entry for command execution\npub fn create_entry(\n    user: \u0026str,\n    mode: \u0026str,\n    input: \u0026str,\n    action: \u0026str,\n    approved: bool,\n    result: \u0026str,\n) -\u003e AuditEntry {\n    AuditEntry {\n        timestamp: Utc::now().to_rfc3339(),\n        user: user.to_string(),\n        mode: mode.to_string(),\n        input: input.to_string(),\n        action: action.to_string(),\n        approved,\n        result: result.to_string(),\n    }\n}\n","traces":[{"line":26,"address":[6441184],"length":1,"stats":{"Line":0}},{"line":31,"address":[6441139,6441104],"length":1,"stats":{"Line":0}},{"line":32,"address":[6714470,6713871,6714050],"length":1,"stats":{"Line":0}},{"line":35,"address":[6714680,6714988,6715489,6714205,6714407,6714806,6714282],"length":1,"stats":{"Line":0}},{"line":38,"add  command.to_lowercase().as_str() {\n        \"cd\" =\u003e Some(\"Change directory\"),\n        \"exit\" | \"quit\" =\u003e Some(\"Exit the shell\"),\n        \"help\" =\u003e Some(\"Show help information\"),\n        \"clear\" =\u003e Some(\"Clear the screen\"),\n        \"mode\" =\u003e Some(\"Show or change shell mode\"),\n        \"history\" =\u003e Some(\"Show command history\"),\n        _ =\u003e None,\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_split_command_simple() {\n        let result = split_command(\"ls -la\");\n        assert!(result.is_ok());\n        let (cmd, args) = result.unwrap();\n        assert_eq!(cmd, \"ls\");\n        assert_eq!(args, vec![\"-la\"]);\n    }\n\n    #[test]\n    fn test_split_command_with_quotes() {\n        let result = split_command(\"echo \\\"hello world\\\"\");\n        assert!(result.is_ok());\n        let (cmd, args) = result.unwrap();\n        assert_eq!(cmd, \"echo\");\n        assert_eq!(args, vec![\"hello world\"]);\n    }\n\n    #[test]\n    fn test_split_command_empty() {\n        let result = split_command(\"\");\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_is_builtin_cd() {\n        assert!(is_builtin(\"cd\"));\n        assert!(is_builtin(\"CD\"));\n    }\n\n    #[test]\n    fn test_is_builtin_exit() {\n        assert!(is_builtin(\"exit\"));\n        assert!(is_builtin(\"quit\"));\n    }\n\n    #[test]\n    fn test_is_builtin_false() {\n        assert!(!is_builtin(\"ls\"));\n        assert!(!is_builtin(\"cat\"));\n    }\n\n    #[test]\n    fn test_builtin_description_cd() {\n        assert_eq!(builtin_description(\"cd\"), Some(\"Change directory\"));\n    }\n\n    #[test]\n    fn test_builtin_description_exit() {\n        assert_eq!(builtin_description(\"exit\"), Some(\"Exit the shell\"));\n        assert_eq!(builtin_description(\"quit\"), Some(\"Exit the shell\"));\n    }\n\n    #[test]\n    fn test_builtin_description_help() {\n        assert_eq!(builtin_description(\"help\"), Some(\"Show help information\"));\n    }\n\n    #[test]\n    fn test_builtin_description_unknown() {\n        assert_eq!(builtin_description(\"unknown\"), None);\n    }\n}\n","traces":[{"line":6,"address":[6697759,6697008,6697668],"length":1,"stats":{"Line":3}},{"line":7,"address":[6458740,6458736],"length":1,"stats":{"Line":3}},{"line":10,"address":[6697215,6697280],"length":1,"stats":{"Line":6}},{"line":11,"address":[6697684,6697318],"length":1,"stats":{"Line":2}},{"line":14,"address":[6697286,6697355],"length":1,"stats":{"Line":4}},{"line":15,"address":[6697374,6697470],"length":1,"stats":{"Line":4}},{"line":17,"address":[6697482],"length":1,"stats":{"Line":2}},{"line":21,"address":[6696978,6696624,6696984],"length":1,"stats":{"Line":3}},{"line":22,"address":[6696653],"length":1,"stats":{"Line":3}},{"line":24,"address":[6696806,6696901],"length":1,"stats":{"Line":6}},{"line":28,"address":[6698383,6698389,6697776],"length":1,"stats":{"Line":4}},{"line":29,"address":[6697888,6697799],"length":1,"stats":{"Line":8}},{"line":30,"address":[6697904,6697970],"length":1,"stats":{"Line":5}},{"line":31,"address":[6697947,6698000],"length":1,"stats":{"Line":6}},{"line":32,"address":[6698085,6698151],"length":1,"stats":{"Line":2}},{"line":33,"address":[6698220,6698128,6698181],"length":1,"stats":{"Line":2}},{"line":34,"address":[6698247,6698197,6698286],"length":1,"stats":{"Line":2}},{"line":35,"address":[6698330,6698313,6698263],"length":1,"stats":{"Line":2}},{"line":36,"address":[6698319],"length":1,"stats":{"Line":1}}],"covered":19,"coverable":19},{"path":["/","home","macro","Repos","agnosticos","userland","ai-shell","src","config.rs"],"content":"//! Shell configuration\n\nuse anyhow::{anyhow, Result};\nuse serde::{Deserialize, Serialize};\nuse std::path::PathBuf;\n\nuse crate::mode::Mode;\n\n/// Shell configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ShellConfig {\n    /// Default operating mode\n    pub default_mode: Mode,\n    /// History file path\n    pub history_file: PathBuf,\n    /// Maximum history entries\n    pub history_size: usize,\n    /// Output format style\n    pub output_format: String,\n    /// Enable AI by default\n    pub ai_enabled: bool,\n    /// Auto-approve low-risk commands\n    pub auto_approve_low_risk: bool,\n    /// Timeout for approval requests (seconds)\n    pub approval_timeout: u64,\n    /// LLM endpoint\n    pub llm_endpoint: Option\u003cString\u003e,\n    /// Audit log file\n    pub audit_log: PathBuf,\n    /// Show explanations for commands\n    pub show_explanations: bool,\n    /// Theme\n    pub theme: String,\n}\n\nimpl Default for ShellConfig {\n    fn default() -\u003e Self {\n        let home = dirs::home_dir().unwrap_or_else(|| PathBuf::from(\"/tmp\"));\n        \n        Self {\n            default_mode: Mode::AiAssisted,\n            history_file: home.join(\".agnsh_history\"),\n            history_size: 10000,\n            output_format: \"auto\".to_string(),\n            ai_enabled: true,\n            auto_approve_low_risk: false,\n            approval_timeout: 300,\n            llm_endpoint: None,\n            audit_log: home.join(\".agnsh_audit.log\"),\n            show_explanations: true,\n            theme: \"default\".to_string(),\n        }\n    }\n}\n\nimpl ShellConfig {\n    /// Load config from file\n    pub async fn from_file(path: PathBuf) -\u003e Result\u003cSelf\u003e {\n        if path.exists() {\n            let content = tokio::fs::read_to_string(\u0026path).await?;\n            let config: ShellConfig = toml::from_str(\u0026content)?;\n            Ok(config)\n        } else {\n            // Create default config\n            let config = ShellConfig::default();\n            config.save(\u0026path).await?;\n            Ok(config)\n        }\n    }\n    \n    /// Save config to file\n    pub async fn save(\u0026self, path: \u0026PathBuf) -\u003e Result\u003c()\u003e {\n        let content = toml::to_string_pretty(self)?;\n        if let Some(parent) = path.parent() {\n            tokio::fs::create_dir_all(parent).await?;\n        }\n        tokio::fs::write(path, content).await?;\n        Ok(())\n    }\n}\n","traces":[{"line":37,"address":[6458710,6458000,6458682],"length":1,"stats":{"Line":0}},{"line":38,"address":[6458017],"length":1,"stats":{"Line":0}},{"line":42,"address":[6458068,6458136],"length":1,"stats":{"Line":0}},{"line":44,"address":[6458165],"length":1,"stats":{"Line":0}},{"line":49,"address":[6458257,6458326],"length":1,"stats":{"Line":0}},{"line":51,"address":[6458358],"length":1,"stats":{"Line":0}},{"line":58,"address":[6456851,6456848],"length":1,"stats":{"Line":0}},{"line":59,"address":[6518213,6518349,6519960],"length":1,"stats":{"Line":0}},{"line":60,"address":[6518391,6518260,6518581,6518667,6519603],"length":1,"stats":{"Line":0}},{"line":61,"address":[6519071,6519150],"length":1,"stats":{"Line":0}},{"line":62,"address":[6519511],"length":1,"stats":{"Line":0}},{"line":65,"address":[6518375],"length":1,"stats":{"Line":0}},{"line":66,"address":[6518281,6518501,6518418,6519610],"length":1,"stats":{"Line":0}},{"line":67,"address":[6519912],"length":1,"stats":{"Line":0}},{"line":72,"address":[6456816,6456829],"length":1,"stats":{"Line":0}},{"line":73,"address":[6516484,6516622,6517158],"length":1,"stats":{"Line":0}},{"line":74,"address":[6517511,6516808,6516883],"length":1,"stats":{"Line":0}},{"line":75,"address":[6517217,6517598,6517001,6516521,6517089],"length":1,"stats":{"Line":0}},{"line":77,"address":[6516542,6517643,6518028,6517532,6517016],"length":1,"stats":{"Line":0}},{"line":78,"address":[6517944],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":20},{"path":["/","home","macro","Repos","agnosticos","userland","ai-shell","src","history.rs"],"content":"//! Command history management\n\nuse anyhow::Result;\nuse std::collections::VecDeque;\nuse std::path::PathBuf;\n\npub struct CommandHistory {\n    entries: VecDeque\u003cString\u003e,\n    file: PathBuf,\n    max_size: usize,\n}\n\nimpl CommandHistory {\n    pub async fn new(file: \u0026PathBuf) -\u003e Result\u003cSelf\u003e {\n        let mut entries = VecDeque::new();\n        \n        // Load existing history\n        if file.exists() {\n            let content = tokio::fs::read_to_string(file).await?;\n            for line in content.lines() {\n                entries.push_back(line.to_string());\n            }\n        }\n        \n        Ok(Self {\n            entries,\n            file: file.clone(),\n            max_size: 10000,\n        })\n    }\n    \n    pub async fn add(\u0026mut self, command: \u0026str) -\u003e Result\u003c()\u003e {\n        // Don't add duplicates at the end\n        if self.entries.back() != Some(\u0026command.to_string()) {\n            self.entries.push_back(command.to_string());\n            \n            // Trim if too large\n            while self.entries.len() \u003e self.max_size {\n                self.entries.pop_front();\n            }\n        }\n        \n        Ok(())\n    }\n    \n    pub fn get_recent(\u0026self, n: usize) -\u003e Vec\u003c\u0026String\u003e {\n        self.entries.iter().rev().take(n).collect()\n    }\n    \n    pub fn search(\u0026self, query: \u0026str) -\u003e Vec\u003c\u0026String\u003e {\n        self.entries\n            .iter()\n            .filter(|entry| entry.contains(query))\n            .collect()\n    }\n    \n    pub async fn save(\u0026self) -\u003e Result\u003c()\u003e {\n        let content: String = self.entries.iter()\n            .map(|s| s.as_str())\n            .collect::\u003cVec\u003c_\u003e\u003e()\n            .join(\"\\n\");\n        \n        if let Some(parent) = self.file.parent() {\n            tokio::fs::create_dir_all(parent).await?;\n        }\n        \n        tokio::fs::write(\u0026self.file, content).await?;\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::path::PathBuf;\n\n    #[test]\n    fn test_history_get_recent() {\n        let mut entries = VecDeque::new();\n        entries.push_back(\"cmd1\".to_string());\n        entries.push_back(\"cmd2\".to_string());\n        entries.push_back(\"cmd3\".to_string());\n        \n        let history = CommandHistory {\n            entries,\n            file: PathBuf::from(\"/tmp/test\"),\n            max_size: 100,\n        };\n        \n        let recent = history.get_recent(2);\n        assert_eq!(recent.len(), 2);\n    }\n\n    #[test]\n    fn test_history_search() {\n        let mut entries = VecDeque::new();\n        entries.push_back(\"ls -la\".to_string());\n        entries.push_back(\"cd /home\".to_string());\n        entries.push_back(\"git status\".to_string());\n        \n        let history = CommandHistory {\n            entries,\n            file: PathBuf::from(\"/tmp/test\"),\n            max_size: 100,\n        };\n        \n        let results = history.search(\"git\");\n        assert_eq!(results.len(), 1);\n    }\n\n    #[test]\n    fn test_history_search_no_results() {\n        let mut entries = VecDeque::new();\n        entries.push_back(\"ls\".to_string());\n        \n        let history = CommandHistory {\n            entries,\n            file: PathBuf::from(\"/tmp/test\"),\n            max_size: 100,\n        };\n        \n        let results = history.search(\"xyz\");\n        assert!(results.is_empty());\n    }\n}\n","traces":[{"line":14,"address":[6656595,6656990,6657946,6656560,6656709,6656663],"length":1,"stats":{"Line":0}},{"line":15,"address":[6656652],"length":1,"stats":{"Line":0}},{"line":18,"address":[6656827,6656753],"length":1,"stats":{"Line":0}},{"line":19,"address":[6656908,6657021,6656690],"length":1,"stats":{"Line":0}},{"line":20,"address":[6657478,6657402],"length":1,"stats":{"Line":0}},{"line":21,"address":[6657653,6657964],"length":1,"stats":{"Line":0}},{"line":25,"address":[6657742],"length":1,"stats":{"Line":0}},{"line":26,"address":[6656853],"length":1,"stats":{"Line":0}},{"line":27,"address":[6656881],"length":1,"stats":{"Line":0}},{"line":32,"address":[6983234,6983216],"length":1,"stats":{"Line":0}},{"line":34,"address":[6656152,6656245],"length":1,"stats":{"Line":0}},{"line":35,"address":[6656411],"length":1,"stats":{"Line":0}},{"line":38,"address":[6656451],"length":1,"stats":{"Line":0}},{"line":39,"address":[6656490],"length":1,"stats":{"Line":0}},{"line":46,"address":[6983104],"length":1,"stats":{"Line":1}},{"line":47,"address":[6983142],"length":1,"stats":{"Line":1}},{"line":50,"address":[6983328],"length":1,"stats":{"Line":2}},{"line":53,"address":[6659826,6659808],"length":1,"stats":{"Line":6}},{"line":57,"address":[6658032,6658063,6658222,6658189,6658827,6658146],"length":1,"stats":{"Line":0}},{"line":58,"address":[6658410,6658307,6658128],"length":1,"stats":{"Line":0}},{"line":59,"address":[6659785,6658277,6659760],"length":1,"stats":{"Line":0}},{"line":63,"address":[6658522,6659161],"length":1,"stats":{"Line":0}},{"line":64,"address":[6658766,6658674,6658176,6658867,6659248],"length":1,"stats":{"Line":0}},{"line":67,"address":[6659672,6658689,6659182,6658197,6659287],"length":1,"stats":{"Line":0}},{"line":68,"address":[6659588],"length":1,"stats":{"Line":0}}],"covered":4,"coverable":25},{"path":["/","home","macro","Repos","agnosticos","userland","ai-shell","src","interpreter.rs"],"content":"//! Natural language interpreter\n//!\n//! Translates natural language requests into shell commands\n//! with safety checks and human oversight.\n\nuse anyhow::{anyhow, Result};\nuse regex::Regex;\nuse std::collections::HashMap;\n\nuse crate::security::{analyze_command_permission, PermissionLevel};\n\n/// Parsed intent from natural language\n#[derive(Debug, Clone)]\npub enum Intent {\n    /// Show files or directories\n    ListFiles {\n        path: Option\u003cString\u003e,\n        options: ListOptions,\n    },\n    /// Display file contents\n    ShowFile { path: String, lines: Option\u003cusize\u003e },\n    /// Search for files\n    FindFiles {\n        pattern: String,\n        path: Option\u003cString\u003e,\n    },\n    /// Search within files\n    SearchContent {\n        pattern: String,\n        path: Option\u003cString\u003e,\n    },\n    /// Change directory\n    ChangeDirectory { path: String },\n    /// Create directory\n    CreateDirectory { path: String },\n    /// Copy files\n    Copy { source: String, destination: String },\n    /// Move/rename files\n    Move { source: String, destination: String },\n    /// Remove files\n    Remove { path: String, recursive: bool },\n    /// View process information\n    ShowProcesses,\n    /// Kill a process\n    KillProcess { pid: u32 },\n    /// Show system information\n    SystemInfo,\n    /// Network operations\n    NetworkInfo,\n    /// Disk usage\n    DiskUsage { path: Option\u003cString\u003e },\n    /// Install package\n    InstallPackage { packages: Vec\u003cString\u003e },\n    /// General shell command\n    ShellCommand { command: String, args: Vec\u003cString\u003e },\n    /// Question/Information request\n    Question { query: String },\n    /// Ambiguous - needs clarification\n    Ambiguous { alternatives: Vec\u003cString\u003e },\n    /// Unknown intent\n    Unknown,\n}\n\n#[derive(Debug, Clone, Default)]\npub struct ListOptions {\n    pub all: bool,\n    pub long: bool,\n    pub human_readable: bool,\n    pub sort_by_time: bool,\n    pub recursive: bool,\n}\n\n/// Command translation result\n#[derive(Debug, Clone)]\npub struct Translation {\n    pub command: String,\n    pub args: Vec\u003cString\u003e,\n    pub description: String,\n    pub permission: PermissionLevel,\n    pub explanation: String,\n}\n\n/// Natural language interpreter\npub struct Interpreter {\n    patterns: HashMap\u003cString, Regex\u003e,\n}\n\nimpl Interpreter {\n    pub fn new() -\u003e Self {\n        let mut patterns = HashMap::new();\n\n        // List files patterns\n        patterns.insert(\"list\".to_string(), Regex::new(\n            r\"(?i)^(show|list|display|what|see)?\\s*(me\\s+)?(all\\s+)?(files|directories|dirs|folders|contents?)?\\s*(in\\s+)?(.+)?$\"\n        ).unwrap());\n\n        // Show file patterns\n        patterns.insert(\"show_file\".to_string(), Regex::new(\n            r\"(?i)^(show|display|view|read|cat|open|print)\\s+(me\\s+)?(the\\s+)?(content|file|contents)?\\s*(of\\s+)?(.+)$\"\n        ).unwrap());\n\n        // Find files patterns\n        patterns.insert(\"find\".to_string(), Regex::new(\n            r\"(?i)^(find|locate|search\\s+for|look\\s+for)\\s+(files?\\s+(named|called)?\\s+)?(.+)(\\s+in\\s+(.+))?$\"\n        ).unwrap());\n\n        // Search content patterns\n        patterns.insert(\n            \"grep\".to_string(),\n            Regex::new(r\"(?i)^(search|grep|find)\\s+(for\\s+)?(.+?)\\s+(in|within|inside)\\s+(.+)$\")\n                .unwrap(),\n        );\n\n        // Change directory patterns\n        patterns.insert(\"cd\".to_string(), Regex::new(\n            r\"(?i)^(go\\s+to|change\\s+(to\\s+)?|cd\\s+(to\\s+)?|switch\\s+to)\\s*(directory\\s+)?(.+)$\"\n        ).unwrap());\n\n        // Create directory patterns\n        patterns.insert(\"mkdir\".to_string(), Regex::new(\n            r\"(?i)^(create|make|new)\\s+(a\\s+)?(new\\s+)?(directory|folder)\\s+(named|called)?\\s*(.+)$\"\n        ).unwrap());\n\n        // Copy patterns\n        patterns.insert(\n            \"copy\".to_string(),\n            Regex::new(r\"(?i)^(copy|duplicate)\\s+(.+?)\\s+(to|into)\\s+(.+)$\").unwrap(),\n        );\n\n        // Move patterns\n        patterns.insert(\n            \"move\".to_string(),\n            Regex::new(r\"(?i)^(move|rename)\\s+(.+?)\\s+(to|into|as)\\s+(.+)$\").unwrap(),\n        );\n\n        // Remove patterns\n        patterns.insert(\n            \"remove\".to_string(),\n            Regex::new(r\"(?i)^(remove|delete|rm)\\s+(the\\s+)?(file|directory|folder)?\\s*(.+)$\")\n                .unwrap(),\n        );\n\n        // Process patterns\n        patterns.insert(\"ps\".to_string(), Regex::new(\n            r\"(?i)^(show|list|display|what|view)\\s+(me\\s+)?(all\\s+)?(running\\s+)?(processes|tasks|programs|apps)$\"\n        ).unwrap());\n\n        // System info patterns\n        patterns.insert(\"sysinfo\".to_string(), Regex::new(\n            r\"(?i)^(show|display|what|get|view)\\s+(me\\s+)?(system|computer|machine)\\s*(info|information|status|stats)?$\"\n        ).unwrap());\n\n        // Disk usage patterns\n        patterns.insert(\"du\".to_string(), Regex::new(\n            r\"(?i)^(how\\s+much\\s+)?(disk\\s+)?(space|usage|size)\\s+(is\\s+)?(used\\s+)?(by\\s+)?(in\\s+)?(.+)?$\"\n        ).unwrap());\n\n        // Install package patterns\n        patterns.insert(\n            \"install\".to_string(),\n            Regex::new(r\"(?i)^(install|add|get)\\s+(package|program|software|app)?\\s*(.+)$\")\n                .unwrap(),\n        );\n\n        // Question patterns\n        patterns.insert(\n            \"question\".to_string(),\n            Regex::new(r\"(?i)^(what|who|when|where|why|how|is|are|can|do|does)\\s+.+\\??$\").unwrap(),\n        );\n\n        Self { patterns }\n    }\n\n    /// Parse natural language input into intent\n    pub fn parse(\u0026self, input: \u0026str) -\u003e Intent {\n        let input_lower = input.to_lowercase().trim().to_string();\n\n        // Check each pattern\n        if let Some(caps) = self.patterns.get(\"list\").unwrap().captures(\u0026input_lower) {\n            let path = caps.get(6).map(|m| m.as_str().trim().to_string());\n            let all = input_lower.contains(\"all\");\n\n            return Intent::ListFiles {\n                path,\n                options: ListOptions {\n                    all,\n                    ..Default::default()\n                },\n            };\n        }\n\n        if let Some(caps) = self\n            .patterns\n            .get(\"show_file\")\n            .unwrap()\n            .captures(\u0026input_lower)\n        {\n            if let Some(path) = caps.get(6) {\n                return Intent::ShowFile {\n                    path: path.as_str().trim().to_string(),\n                    lines: None,\n                };\n            }\n        }\n\n        if let Some(caps) = self.patterns.get(\"cd\").unwrap().captures(\u0026input_lower) {\n            if let Some(path) = caps.get(4) {\n                return Intent::ChangeDirectory {\n                    path: path.as_str().trim().to_string(),\n                };\n            }\n        }\n\n        if let Some(caps) = self.patterns.get(\"mkdir\").unwrap().captures(\u0026input_lower) {\n            if let Some(path) = caps.get(6) {\n                return Intent::CreateDirectory {\n                    path: path.as_str().trim().to_string(),\n                };\n            }\n        }\n\n        if let Some(caps) = self.patterns.get(\"copy\").unwrap().captures(\u0026input_lower) {\n            if let (Some(source), Some(dest)) = (caps.get(2), caps.get(4)) {\n                return Intent::Copy {\n                    source: source.as_str().trim().to_string(),\n                    destination: dest.as_str().trim().to_string(),\n                };\n            }\n        }\n\n        if let Some(caps) = self.patterns.get(\"move\").unwrap().captures(\u0026input_lower) {\n            if let (Some(source), Some(dest)) = (caps.get(2), caps.get(4)) {\n                return Intent::Move {\n                    source: source.as_str().trim().to_string(),\n                    destination: dest.as_str().trim().to_string(),\n                };\n            }\n        }\n\n        if let Some(caps) = self.patterns.get(\"ps\").unwrap().captures(\u0026input_lower) {\n            return Intent::ShowProcesses;\n        }\n\n        if let Some(caps) = self.patterns.get(\"sysinfo\").unwrap().captures(\u0026input_lower) {\n            return Intent::SystemInfo;\n        }\n\n        if self\n            .patterns\n            .get(\"question\")\n            .unwrap()\n            .is_match(\u0026input_lower)\n        {\n            return Intent::Question {\n                query: input.to_string(),\n            };\n        }\n\n        // If it looks like a command, treat it as such\n        if !input.contains(' ') || input.starts_with(\"/\") {\n            let parts: Vec\u003c\u0026str\u003e = input.split_whitespace().collect();\n            if !parts.is_empty() {\n                return Intent::ShellCommand {\n                    command: parts[0].to_string(),\n                    args: parts[1..].iter().map(|s| s.to_string()).collect(),\n                };\n            }\n        }\n\n        Intent::Unknown\n    }\n\n    /// Translate intent into shell command\n    pub fn translate(\u0026self, intent: \u0026Intent) -\u003e Result\u003cTranslation\u003e {\n        match intent {\n            Intent::ListFiles { path, options } =\u003e {\n                let mut args = vec![\"-la\".to_string()];\n                if options.human_readable {\n                    args.push(\"-h\".to_string());\n                }\n                if let Some(p) = path {\n                    args.push(p.clone());\n                }\n\n                Ok(Translation {\n                    command: \"ls\".to_string(),\n                    args,\n                    description: format!(\n                        \"List files{}\",\n                        path.as_ref()\n                            .map(|p| format!(\" in {}\", p))\n                            .unwrap_or_default()\n                    ),\n                    permission: PermissionLevel::ReadOnly,\n                    explanation: \"Lists files and directories with details\".to_string(),\n                })\n            }\n\n            Intent::ShowFile { path, lines } =\u003e {\n                let (cmd, args) = if let Some(n) = lines {\n                    (\"head\".to_string(), vec![format!(\"-{}\", n), path.clone()])\n                } else {\n                    (\"cat\".to_string(), vec![path.clone()])\n                };\n\n                Ok(Translation {\n                    command: cmd,\n                    args,\n                    description: format!(\"Display contents of {}\", path),\n                    permission: PermissionLevel::ReadOnly,\n                    explanation: \"Shows file contents\".to_string(),\n                })\n            }\n\n            Intent::ChangeDirectory { path } =\u003e Ok(Translation {\n                command: \"cd\".to_string(),\n                args: vec![path.clone()],\n                description: format!(\"Change directory to {}\", path),\n                permission: PermissionLevel::Safe,\n                explanation: \"Changes current working directory\".to_string(),\n            }),\n\n            Intent::CreateDirectory { path } =\u003e Ok(Translation {\n                command: \"mkdir\".to_string(),\n                args: vec![\"-p\".to_string(), path.clone()],\n                description: format!(\"Create directory {}\", path),\n                permission: PermissionLevel::UserWrite,\n                explanation: \"Creates a new directory\".to_string(),\n            }),\n\n            Intent::Copy {\n                source,\n                destination,\n            } =\u003e Ok(Translation {\n                command: \"cp\".to_string(),\n                args: vec![\"-r\".to_string(), source.clone(), destination.clone()],\n                description: format!(\"Copy {} to {}\", source, destination),\n                permission: PermissionLevel::UserWrite,\n                explanation: \"Copies files or directories\".to_string(),\n            }),\n\n            Intent::ShowProcesses =\u003e Ok(Translation {\n                command: \"ps\".to_string(),\n                args: vec![\"aux\".to_string()],\n                description: \"Show running processes\".to_string(),\n                permission: PermissionLevel::ReadOnly,\n                explanation: \"Lists all running processes\".to_string(),\n            }),\n\n            Intent::SystemInfo =\u003e Ok(Translation {\n                command: \"uname\".to_string(),\n                args: vec![\"-a\".to_string()],\n                description: \"Show system information\".to_string(),\n                permission: PermissionLevel::ReadOnly,\n                explanation: \"Displays system kernel information\".to_string(),\n            }),\n\n            Intent::ShellCommand { command, args } =\u003e {\n                let perm = analyze_command_permission(command, args);\n                Ok(Translation {\n                    command: command.clone(),\n                    args: args.clone(),\n                    description: format!(\"Execute {} {}\", command, args.join(\" \")),\n                    permission: perm,\n                    explanation: \"Direct shell command execution\".to_string(),\n                })\n            }\n\n            Intent::Question { query } =\u003e Err(anyhow!(\n                \"Questions should be handled by LLM, not translated to commands\"\n            )),\n\n            _ =\u003e Err(anyhow!(\"Cannot translate intent: {:?}\", intent)),\n        }\n    }\n\n    /// Get explanation of what a command does\n    pub fn explain(\u0026self, command: \u0026str, args: \u0026[String]) -\u003e String {\n        let cmd = command.to_lowercase();\n\n        match cmd.as_str() {\n            \"ls\" =\u003e \"Lists files and directories\".to_string(),\n            \"cat\" =\u003e \"Displays file contents\".to_string(),\n            \"cd\" =\u003e \"Changes current directory\".to_string(),\n            \"mkdir\" =\u003e \"Creates a new directory\".to_string(),\n            \"cp\" =\u003e \"Copies files or directories\".to_string(),\n            \"mv\" =\u003e \"Moves or renames files\".to_string(),\n            \"rm\" =\u003e \"Removes files or directories (destructive)\".to_string(),\n            \"ps\" =\u003e \"Lists running processes\".to_string(),\n            \"top\" =\u003e \"Shows system resource usage\".to_string(),\n            \"df\" =\u003e \"Shows disk space usage\".to_string(),\n            \"du\" =\u003e \"Shows directory space usage\".to_string(),\n            \"grep\" =\u003e \"Searches for text patterns\".to_string(),\n            \"find\" =\u003e \"Finds files by name or criteria\".to_string(),\n            _ =\u003e format!(\"Executes the {} command\", cmd),\n        }\n    }\n}\n\nimpl Default for Interpreter {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_parse_list_files() {\n        let interpreter = Interpreter::new();\n\n        let intent = interpreter.parse(\"show me all files\");\n        assert!(matches!(intent, Intent::ListFiles { .. }));\n\n        // This test may need adjustment based on interpreter behavior\n        // let intent = interpreter.parse(\"ls -la\");\n        // assert!(matches!(intent, Intent::ShellCommand { .. }));\n    }\n\n    #[test]\n    fn test_translate_cd() {\n        let interpreter = Interpreter::new();\n\n        let intent = Intent::ChangeDirectory {\n            path: \"/tmp\".to_string(),\n        };\n        let translation = interpreter.translate(\u0026intent).unwrap();\n\n        assert_eq!(translation.command, \"cd\");\n        assert_eq!(translation.args, vec![\"/tmp\"]);\n    }\n}\n","traces":[{"line":89,"address":[7047683,7044240,7047394],"length":1,"stats":{"Line":2}},{"line":90,"address":[7044257],"length":1,"stats":{"Line":2}},{"line":93,"address":[7044551,7044379,7044444],"length":1,"stats":{"Line":6}},{"line":95,"address":[7047664,7044483,7044589],"length":1,"stats":{"Line":1}},{"line":98,"address":[7044609,7044750],"length":1,"stats":{"Line":2}},{"line":100,"address":[7044794,7044679,7047642],"length":1,"stats":{"Line":1}},{"line":103,"address":[7044817,7044958],"length":1,"stats":{"Line":2}},{"line":105,"address":[7045002,7044887,7047620],"length":1,"stats":{"Line":2}},{"line":108,"a n    human: bool,\n    \n    /// Execute command and exit\n    #[arg(short, long)]\n    command: Option\u003cString\u003e,\n    \n    /// Configuration file path\n    #[arg(short, long)]\n    config: Option\u003cPathBuf\u003e,\n    \n    /// Disable AI assistance\n    #[arg(long)]\n    no_ai: bool,\n    \n    /// Require approval for all AI actions\n    #[arg(long)]\n    strict: bool,\n    \n    /// Start as restricted user (no privilege escalation)\n    #[arg(long)]\n    restricted: bool,\n    \n    /// Use starship-style prompt\n    #[arg(long)]\n    starship: bool,\n    \n    /// Custom prompt format (starship-style)\n    #[arg(long)]\n    prompt_format: Option\u003cString\u003e,\n}\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c()\u003e {\n    // Initialize logging\n    tracing_subscriber::fmt::init();\n    \n    let args = Args::parse();\n    \n    // Load configuration\n    let config = if let Some(config_path) = args.config {\n        ShellConfig::from_file(config_path).await?\n    } else {\n        ShellConfig::default()\n    };\n    \n    // Initialize security context\n    let security = SecurityContext::new(args.restricted)?;\n    \n    info!(\"Starting AGNOS AI Shell v{}\", env!(\"CARGO_PKG_VERSION\"));\n    info!(\"User: {}, Restricted: {}\", security.username(), security.is_restricted());\n    \n    // Determine initial mode\n    let initial_mode = if args.ai {\n        Mode::AiAutonomous\n    } else if args.human {\n        Mode::Human\n    } else {\n        config.default_mode.clone()\n    };\n    \n    // Create session\n    let mut session = Session::new(config, security, initial_mode).await?;\n    \n    // Handle one-shot command execution\n    if let Some(cmd) = args.command {\n        session.execute_one_shot(cmd).await?;\n        return Ok(());\n    }\n    \n    // Run interactive shell\n    session.run_interactive().await?;\n    \n    Ok(())\n}\n","traces":[{"line":76,"address":[6690688,6691113,6691119],"length":1,"stats":{"Line":0}},{ // Strict mode - all actions require approval\n    Strict,\n}\n\nimpl Default for Mode {\n    fn default() -\u003e Self {\n        Mode::AiAssisted\n    }\n}\n\nimpl fmt::Display for Mode {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        match self {\n            Mode::AiAutonomous =\u003e write!(f, \"AI-AUTO\"),\n            Mode::AiAssisted =\u003e write!(f, \"AI-ASSIST\"),\n            Mode::Human =\u003e write!(f, \"HUMAN\"),\n            Mode::Strict =\u003e write!(f, \"STRICT\"),\n        }\n    }\n}\n\nimpl Mode {\n    /// Check if AI is allowed to execute commands autonomously\n    pub fn ai_autonomous(\u0026self) -\u003e bool {\n        matches!(self, Mode::AiAutonomous)\n    }\n    \n    /// Check if AI assistance is available\n    pub fn ai_available(\u0026self) -\u003e bool {\n        !matches!(self, Mode::Human)\n    }\n    \n    /// Check if strict approval is required\n    pub fn strict_approval(\u0026self) -\u003e bool {\n        matches!(self, Mode::Strict)\n    }\n    \n    /// Get description of mode\n    pub fn description(\u0026self) -\u003e \u0026'static str {\n        match self {\n            Mode::AiAutonomous =\u003e \"AI acts autonomously within safety constraints\",\n            Mode::AiAssisted =\u003e \"AI assists human with suggestions and explanations\",\n            Mode::Human =\u003e \"Human user has full control, no AI assistance\",\n            Mode::Strict =\u003e \"All actions require explicit human approval\",\n        }\n    }\n    \n    /// Get prompt prefix for this mode\n    pub fn prompt_prefix(\u0026self) -\u003e \u0026'static str {\n        match self {\n            Mode::AiAutonomous =\u003e \"🤖\",\n            Mode::AiAssisted =\u003e \"👤🤖\",\n            Mode::Human =\u003e \"👤\",\n            Mode::Strict =\u003e \"🔒\",\n        }\n    }\n}\n\n/// Mode manager for tracking and switching modes\npub struct ModeManager {\n    current: Mode,\n    previous: Option\u003cMode\u003e,\n    allow_switching: bool,\n}\n\nimpl ModeManager {\n    pub fn new(initial: Mode, allow_switching: bool) -\u003e Self {\n        Self {\n            current: initial,\n            previous: None,\n            allow_switching,\n        }\n    }\n    \n    /// Get current mode\n    pub fn current(\u0026self) -\u003e \u0026Mode {\n        \u0026self.current\n    }\n    \n    /// Switch to a new mode\n    pub fn switch(\u0026mut self, mode: Mode) -\u003e Result\u003c()\u003e {\n        if !self.allow_switching \u0026\u0026 self.current != mode {\n            return Err(anyhow::anyhow!(\"Mode switching is disabled\"));\n        }\n        \n        self.previous = Some(self.current.clone());\n        self.current = mode;\n        \n        Ok(())\n    }\n    \n    /// Switch back to previous mode\n    pub fn revert(\u0026mut self) -\u003e Result\u003c()\u003e {\n        if let Some(prev) = self.previous.take() {\n            self.current = prev;\n            Ok(())\n        } else {\n            Err(anyhow::anyhow!(\"No previous mode to revert to\"))\n        }\n    }\n    \n    /// Toggle between AI and human modes\n    pub fn toggle(\u0026mut self) {\n        let new_mode = match self.current {\n            Mode::Human =\u003e Mode::AiAssisted,\n            Mode::AiAssisted =\u003e Mode::Human,\n            Mode::AiAutonomous =\u003e Mode::Human,\n            Mode::Strict =\u003e Mode::AiAssisted,\n        };\n        \n        self.previous = Some(self.current.clone());\n        self.current = new_mode;\n    }\n    \n    /// List all available modes\n    pub fn available_modes(\u0026self) -\u003e Vec\u003cMode\u003e {\n        vec![\n            Mode::Human,\n            Mode::AiAssisted,\n            Mode::AiAutonomous,\n            Mode::Strict,\n        ]\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    \n    #[test]\n    fn test_mode_switching() {\n        let mut manager = ModeManager::new(Mode::Human, true);\n        \n        assert_eq!(manager.current(), \u0026Mode::Human);\n        \n        manager.switch(Mode::AiAssisted).unwrap();\n        assert_eq!(manager.current(), \u0026Mode::AiAssisted);\n        \n        manager.revert().unwrap();\n        assert_eq!(manager.current(), \u0026Mode::Human);\n    }\n    \n    #[test]\n    fn test_ai_permissions() {\n        assert!(Mode::AiAutonomous.ai_autonomous());\n        assert!(!Mode::AiAssisted.ai_autonomous());\n        assert!(!Mode::Human.ai_autonomous());\n        assert!(!Mode::Strict.ai_autonomous());\n    }\n}\n","traces":[{"line":30,"address":[7003552],"length":1,"stats":{"Line":0}},{"line":31,"address":[7003570],"length":1,"stats":{"Line":0}},{"line":32,"address":[7003601],"length":1,"stats":{"Line":0}},{"line":33,"address":[7003638],"length":1,"stats":{"Line":0}},{"line":34,"address":[7003675],"length":1,"stats":{"Line":0}},{"line":35,"address":[7003712],"length":1,"stats":{"Line":0}},{"line":42,"address":[7004608],"length":1,"stats":{"Line":1}},{"line":43,"address":[7004613],"length":1,"stats":{"Line":1}},{"line":47,"address":[7004576],"length":1,"stats":{"Line":0}},{"line":48,"address":[7004581],"length":1,"stats":{"Line":0}},{"line":52,"address":[7004784],"length":1,"stats":{"Line":0}},{"line":53,"address":[7004789],"length":1,"stats":{"Line":0}},{"line":57,"address":[7004432],"length":1,"stats":{"Line":0}},{"line":58,"address":[7004437],"length":1,"stats":{"Line":0}},{"line":59,"address":[7004468],"length":1,"stats":{"Line":0}},{"line":60,"address":[7004491],"length":1,"stats":{"Line":0}},{"line":61,"address":[7004514],"length":1,"stats":{"Line":0}},{"line":62,"address":[7004537],"length":1,"stats":{"Line":0}},{"line":67,"address":[7004640],"length":1,"stats":{"Line":0}},{"line":68,"address":[7004645],"length":1,"stats":{"Line":0}},{"line":69,"address":[7004676],"length":1,"stats":{"Line":0}},{"line":70,"address":[7004699],"length":1,"stats":{"Line":0}},{"line":71,"address":[7004722],"length":1,"stats":{"Line":0}},{"line":72,"addre put: \u0026str) -\u003e String {\n        match self.format.as_str() {\n            \"json\" =\u003e self.format_json(output),\n            \"table\" =\u003e self.format_table(output),\n            \"auto\" =\u003e self.format_auto(output),\n            _ =\u003e output.to_string(),\n        }\n    }\n    \n    fn format_json(\u0026self, output: \u0026str) -\u003e String {\n        // Simple JSON wrapping\n        format!(\"{{\\\"output\\\": \\\"{}\\\"}}\", output.replace('\"', \"\\\\\\\"\"))\n    }\n    \n    fn format_table(\u0026self, output: \u0026str) -\u003e String {\n        // Detect if output looks like a table\n        if output.contains('\\t') || output.contains(\"  \") {\n            // Attempt to format as table\n            output.to_string()\n        } else {\n            output.to_string()\n        }\n    }\n    \n    fn format_auto(\u0026self, output: \u0026str) -\u003e String {\n        // Auto-detect format based on content\n        output.to_string()\n    }\n}\n\nimpl Default for OutputFormatter {\n    fn default() -\u003e Self {\n        Self::new(\"auto\")\n    }\n}\n","traces":[{"line":8,"address":[6528256],"length":1,"stats":{"Line":0}},{"line":10,"address":[6528279],"length":1,"stats":{"Line":0}},{"line":15,"address":[6528336],"length":1,"stats":{"Line":0}},{"line":16,"address":[6528388],"length":1,"stats":{"Line":0}},{"line":17,"address":[6528409,6528483],"length":1,"stats":{"Line":0}},{"line":18,"address":[6528543,6528440],"length":1,"stats":{"Line":0}},{"line":19,"address":[6528500,6528593],"length":1,"stats":{"Line":0}},{"line":20,"address":[6528565],"length":1,"stats":{"Line":0}},{"line":24,"address":[6528077,6528083,6527792],"length":1,"stats":{"Line":0}},{"line":26,"address":[6527859],"length":1,"stats":{"Line":0}},{"line":29,"address":[6528096],"length":1,"stats":{"Line":0}},{"line":31,"address":[6528149],"length":1,"stats":{"Line":0}},{"line":33,"address":[6528211],"length":1,"stats":{"Line":0}},{"line":35,"address":[6528233],"length":1,"stats":{"Line":0}},{"line":39,"address":[6527712],"length":1,"stats":{"Line":0}},{"line":41,"address":[6527765],"length":1,"stats":{"Line":0}},{"line":46,"address":[6528608],"length":1,"stats":{"Line":0}},{"line":47,"address":[6528616],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":18},{"path":["/","home","macro","Repos","agnosticos","userland","ai-shell","src","permissions.rs"],"content":"//! Permission management\n\nuse crate::security::PermissionLevel;\n\n/// Check if user has permission for an action\npub fn check_permission(\n    user: \u0026str,\n    required: PermissionLevel,\n) -\u003e bool {\n    // Root can do anything\n    if user == \"root\" {\n        return true;\n    }\n    \n    // Otherwise check based on level\n    match required {\n        PermissionLevel::Safe | PermissionLevel::ReadOnly =\u003e true,\n        PermissionLevel::UserWrite =\u003e true,\n        PermissionLevel::SystemWrite =\u003e false, // Requires escalation\n        PermissionLevel::Admin =\u003e false,        // Requires root\n        PermissionLevel::Blocked =\u003e false,      // Never allowed\n    }\n}\n","traces":[{"line":6,"address":[7003008],"length":1,"stats":{"Line":0}},{"line":11,"address":[7003032],"length":1,"stats":{"Line":0}},{"line":12,"address":[7003085],"length":1,"stats":{"Line":0}},{"line":16,"address":[7003092,7003058],"length":1,"stats":{"Line":0}},{"line":17,"address":[7003094],"length":1,"stats":{"Line":0}},{"line":18,"address":[7003101],"length":1,"stats":{"Line":0}},{"line":19,"address":[7003108],"length":1,"stats":{"Line":0}},{"line":20,"address":[7003115],"length":1,"stats":{"Line":0}},{"line":21,"address":[7003122],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":9},{"path":["/","home","macro","Repos","agnosticos","userland","ai-shell","src","prompt.rs"],"content":"//! Starship-style prompt for AGNOS AI Shell\n//!\n//! Provides a fast, customizable, cross-shell compatible prompt\n//! with AGNOS-specific features like AI mode indicators\n\nuse ansi_term::{Color, Style};\nuse anyhow::Result;\nuse std::path::PathBuf;\nuse std::time::SystemTime;\n\n/// Prompt configuration (starship-compatible)\n#[derive(Debug, Clone)]\npub struct PromptConfig {\n    /// Prompt format string\n    pub format: String,\n    /// Show AI mode indicator\n    pub show_ai_mode: bool,\n    /// Show execution time for slow commands\n    pub show_execution_time: bool,\n    /// Show git status\n    pub show_git_status: bool,\n    /// Show username/hostname\n    pub show_context: bool,\n    /// Show current directory\n    pub show_directory: bool,\n    /// Show exit status of last command\n    pub show_exit_status: bool,\n    /// Show battery level\n    pub show_battery: bool,\n    /// Time threshold for showing execution time (ms)\n    pub execution_time_threshold: u64,\n    /// Character set for prompt\n    pub character_set: CharacterSet,\n    /// Prompt style (powerline, plain, etc.)\n    pub style: PromptStyle,\n}\n\n#[derive(Debug, Clone)]\npub enum CharacterSet {\n    Unicode,\n    ASCII,\n    Minimal,\n}\n\n#[derive(Debug, Clone)]\npub enum PromptStyle {\n    Powerline,\n    Plain,\n    Minimal,\n}\n\nimpl Default for PromptConfig {\n    fn default() -\u003e Self {\n        Self {\n            format: \"$ai_mode$directory$git_branch$character\".to_string(),\n            show_ai_mode: true,\n            show_execution_time: true,\n            show_git_status: true,\n            show_context: false,\n            show_directory: true,\n            show_exit_status: true,\n            show_battery: false,\n            execution_time_threshold: 2000, // 2 seconds\n            character_set: CharacterSet::Unicode,\n            style: PromptStyle::Powerline,\n        }\n    }\n}\n\n/// Prompt module trait for individual prompt components\npub trait PromptModule {\n    fn render(\u0026self, context: \u0026PromptContext) -\u003e Option\u003cString\u003e;\n    fn name(\u0026self) -\u003e \u0026'static str;\n}\n\n/// Context for prompt rendering\npub struct PromptContext {\n    pub cwd: PathBuf,\n    pub home: PathBuf,\n    pub username: String,\n    pub hostname: String,\n    pub ai_mode: String,\n    pub last_exit_code: i32,\n    pub cmd_duration_ms: u64,\n    pub start_time: SystemTime,\n}\n\nimpl PromptContext {\n    pub fn new(cwd: PathBuf, username: String, ai_mode: String) -\u003e Self {\n        Self {\n            cwd,\n            home: dirs::home_dir().unwrap_or_else(|| PathBuf::from(\"/\")),\n            username,\n            hostname: Self::get_hostname(),\n            ai_mode,\n            last_exit_code: 0,\n            cmd_duration_ms: 0,\n            start_time: SystemTime::now(),\n        }\n    }\n    \n    fn get_hostname() -\u003e String {\n        hostname::get()\n            .ok()\n            .and_then(|h| h.into_string().ok())\n            .unwrap_or_else(|| \"unknown\".to_string())\n    }\n}\n\n/// AI Mode indicator module\npub struct AiModeModule;\n\nimpl PromptModule for AiModeModule {\n    fn render(\u0026self, context: \u0026PromptContext) -\u003e Option\u003cString\u003e {\n        if context.ai_mode.is_empty() {\n            return None;\n        }\n        \n        let (icon, color) = match context.ai_mode.as_str() {\n            \"AI-AUTO\" =\u003e (\"🤖\", Color::Purple),\n            \"AI-ASSIST\" =\u003e (\"👤🤖\", Color::Cyan),\n            \"HUMAN\" =\u003e (\"👤\", Color::Green),\n            \"STRICT\" =\u003e (\"🔒\", Color::Red),\n            _ =\u003e (\"●\", Color::White),\n        };\n        \n        let style = Style::new().fg(color).bold();\n        Some(format!(\"{} \", style.paint(icon)))\n    }\n    \n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"ai_mode\"\n    }\n}\n\n/// Directory module\npub struct DirectoryModule;\n\nimpl PromptModule for DirectoryModule {\n    fn render(\u0026self, context: \u0026PromptContext) -\u003e Option\u003cString\u003e {\n        let path = \u0026context.cwd;\n        let display_path = if path.starts_with(\u0026context.home) {\n            let shortened = path.strip_prefix(\u0026context.home).ok()?;\n            PathBuf::from(\"~\").join(shortened)\n        } else {\n            path.clone()\n        };\n        \n        let path_str = display_path.to_string_lossy();\n        let style = Style::new().fg(Color::Blue).bold();\n        \n        Some(format!(\"{} \", style.paint(path_str.to_string())))\n    }\n    \n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"directory\"\n    }\n}\n\n/// Git branch module\npub struct GitBranchModule;\n\nimpl PromptModule for GitBranchModule {\n    fn render(\u0026self, context: \u0026PromptContext) -\u003e Option\u003cString\u003e {\n        // Check if we're in a git repository\n        let mut current = context.cwd.clone();\n        \n        loop {\n            let git_dir = current.join(\".git\");\n            if git_dir.exists() {\n                // Try to read branch name\n                let head_file = git_dir.join(\"HEAD\");\n                if let Ok(content) = std::fs::read_to_string(\u0026head_file) {\n                    let branch = content.trim().strip_prefix(\"ref: refs/heads/\")\n                        .unwrap_or(content.trim());\n                    \n                    let style = Style::new().fg(Color::Yellow);\n                    return Some(format!(\"{} \", style.paint(format!(\"({})\", branch))));\n                }\n                break;\n            }\n            \n            if !current.pop() {\n                break;\n            }\n        }\n        \n        None\n    }\n    \n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"git_branch\"\n    }\n}\n\n/// Execution time module\npub struct ExecutionTimeModule {\n    threshold_ms: u64,\n}\n\nimpl ExecutionTimeModule {\n    pub fn new(threshold_ms: u64) -\u003e Self {\n        Self { threshold_ms }\n    }\n}\n\nimpl PromptModule for ExecutionTimeModule {\n    fn render(\u0026self, context: \u0026PromptContext) -\u003e Option\u003cString\u003e {\n        if context.cmd_duration_ms \u003c self.threshold_ms {\n            return None;\n        }\n        \n        let duration = if context.cmd_duration_ms \u003c 1000 {\n            format!(\"{}ms\", context.cmd_duration_ms)\n        } else {\n            let secs = context.cmd_duration_ms / 1000;\n            let ms = context.cmd_duration_ms % 1000;\n            format!(\"{}.{:03}s\", secs, ms)\n        };\n        \n        let style = Style::new().fg(Color::Yellow).dimmed();\n        Some(format!(\"{} \", style.paint(format!(\"took {}\", duration))))\n    }\n    \n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"execution_time\"\n    }\n}\n\n/// Exit status module\npub struct ExitStatusModule;\n\nimpl PromptModule for ExitStatusModule {\n    fn render(\u0026self, context: \u0026PromptContext) -\u003e Option\u003cString\u003e {\n        if context.last_exit_code == 0 {\n            return None;\n        }\n        \n        let style = Style::new().fg(Color::Red).bold();\n        Some(format!(\"{} \", style.paint(format!(\"✗ {}\", context.last_exit_code))))\n    }\n    \n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"exit_status\"\n    }\n}\n\n/// Character/prompt symbol module\npub struct CharacterModule;\n\nimpl PromptModule for CharacterModule {\n    fn render(\u0026self, context: \u0026PromptContext) -\u003e Option\u003cString\u003e {\n        let (symbol, color) = if context.last_exit_code == 0 {\n            (\"❯\", Color::Green)\n        } else {\n            (\"❯\", Color::Red)\n        };\n        \n        let style = Style::new().fg(color).bold();\n        Some(format!(\"{} \", style.paint(symbol)))\n    }\n    \n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"character\"\n    }\n}\n\n/// Username/hostname module\npub struct ContextModule;\n\nimpl PromptModule for ContextModule {\n    fn render(\u0026self, context: \u0026PromptContext) -\u003e Option\u003cString\u003e {\n        let user_style = Style::new().fg(Color::Yellow);\n        let host_style = Style::new().fg(Color::Green);\n        let sep_style = Style::new().dimmed();\n        \n        Some(format!(\"{}{}{} \",\n            user_style.paint(\u0026context.username),\n            sep_style.paint(\"@\"),\n            host_style.paint(\u0026context.hostname)\n        ))\n    }\n    \n    fn name(\u0026self) -\u003e \u0026'static str {\n        \"context\"\n    }\n}\n\n/// Main prompt renderer\npub struct PromptRenderer {\n    config: PromptConfig,\n    modules: Vec\u003cBox\u003cdyn PromptModule\u003e\u003e,\n}\n\nimpl PromptRenderer {\n    pub fn new(config: PromptConfig) -\u003e Self {\n        let mut renderer = Self {\n            config,\n            modules: Vec::new(),\n        };\n        \n        renderer.register_default_modules();\n        renderer\n    }\n    \n    fn register_default_modules(\u0026mut self) {\n        if self.config.show_ai_mode {\n            self.modules.push(Box::new(AiModeModule));\n        }\n        \n        if self.config.show_context {\n            self.modules.push(Box::new(ContextModule));\n        }\n        \n        if self.config.show_directory {\n            self.modules.push(Box::new(DirectoryModule));\n        }\n        \n        if self.config.show_git_status {\n            self.modules.push(Box::new(GitBranchModule));\n        }\n        \n        if self.config.show_execution_time {\n            self.modules.push(Box::new(ExecutionTimeModule::new(\n                self.config.execution_time_threshold\n            )));\n        }\n        \n        if self.config.show_exit_status {\n            self.modules.push(Box::new(ExitStatusModule));\n        }\n        \n        self.modules.push(Box::new(CharacterModule));\n    }\n    \n    /// Register a custom module\n    pub fn register_module(\u0026mut self, module: Box\u003cdyn PromptModule\u003e) {\n        self.modules.push(module);\n    }\n    \n    /// Render the
