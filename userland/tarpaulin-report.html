<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

at: None,\n            message_tx,\n            message_rx: None,\n        };\n\n        Ok((agent, message_rx))\n    }\n\n    /// Get agent ID\n    pub fn id(\u0026self) -\u003e AgentId {\n        self.id\n    }\n\n    /// Get agent handle for external reference\n    pub async fn handle(\u0026self) -\u003e AgentHandle {\n        AgentHandle {\n            id: self.id,\n            name: self.config.name.clone(),\n            status: *self.status.read().await,\n            created_at: chrono::Utc::now(),\n            started_at: None,\n            resource_usage: ResourceUsage::default(),\n        }\n    }\n\n    /// Start the agent process\n    pub async fn start(\u0026mut self) -\u003e Result\u003c()\u003e {\n        let mut status = self.status.write().await;\n        \n        if *status != AgentStatus::Pending \u0026\u0026 *status != AgentStatus::Stopped {\n            return Err(anyhow::anyhow!(\"Agent is not in a startable state: {:?}\", *status));\n        }\n\n        *status = AgentStatus::Starting;\n        drop(status);\n\n        info!(\"Starting agent {} ({})\", self.config.name, self.id);\n\n        // Apply sandbox restrictions\n        self.sandbox.apply().await?;\n\n        // Spawn agent process\n        let executable = self.find_agent_executable().await?;\n        \n        let mut cmd = Command::new(\u0026executable);\n        cmd.arg(\"--agent-id\")\n            .arg(self.id.to_string())\n            .arg(\"--agent-name\")\n            .arg(\u0026self.config.name)\n            .stdin(Stdio::null())\n            .stdout(Stdio::piped())\n            .stderr(Stdio::piped());\n\n        // Apply resource limits\n        if let Some(rlimits) = self.build_resource_limits() {\n            unsafe {\n                cmd.pre_exec(move || {\n                    rlimits.apply()?;\n                    Ok(())\n                });\n            }\n        }\n\n        let mut child = cmd.spawn()\n            .with_context(|| format!(\"Failed to spawn agent process: {}\", executable.display()))?;\n\n        info!(\"Agent {} started with PID {:?}\", self.id, child.id());\n\n        self.process = Some(child);\n        self.started_at = Some(Instant::now());\n        \n        let mut status = self.status.write().await;\n        *status = AgentStatus::Running;\n\n        Ok(())\n    }\n\n    /// Stop the agent gracefully\n    pub async fn stop(\u0026mut self, reason: StopReason) -\u003e Result\u003c()\u003e {\n        info!(\"Stopping agent {}: {:?}\", self.id, reason);\n        \n        let mut status = self.status.write().await;\n        *status = AgentStatus::Stopping;\n        drop(status);\n\n        // Send graceful shutdown signal\n        if let Some(ref mut process) = self.process {\n            #[cfg(unix)]\n            {\n                use nix::sys::signal::{self, Signal};\n                use nix::unistd::Pid;\n                \n                if let Some(pid) = process.id() {\n                    let _ = signal::kill(Pid::from_raw(pid as i32), Signal::SIGTERM);\n                }\n            }\n\n            // Wait for graceful shutdown with timeout\n            match tokio::time::timeout(Duration::from_secs(10), process.wait()).await {\n                Ok(Ok(_)) =\u003e {\n                    info!(\"Agent {} stopped gracefully\", self.id);\n                }\n                Ok(Err(e)) =\u003e {\n                    warn!(\"Agent {} exit error: {}\", self.id, e);\n                    process.kill().await.ok();\n                }\n                Err(_) =\u003e {\n                    warn!(\"Agent {} shutdown timeout, forcing kill\", self.id);\n                    process.kill().await.ok();\n                }\n            }\n        }\n\n        let mut status = self.status.write().await;\n        *status = AgentStatus::Stopped;\n\n        Ok(())\n    }\n\n    /// Pause the agent (suspend execution)\n    pub async fn pause(\u0026mut self) -\u003e Result\u003c()\u003e {\n        let mut status = self.status.write().await;\n        if *status != AgentStatus::Running {\n            return Err(anyhow::anyhow!(\"Cannot pause agent in state: {:?}\", *status));\n        }\n\n        *status = AgentStatus::Paused;\n        info!(\"Agent {} paused\", self.id);\n        \n        // TODO: Implement actual process suspension\n        \n        Ok(())\n    }\n\n    /// Resume a paused agent\n    pub async fn resume(\u0026mut self) -\u003e Result\u003c()\u003e {\n        let mut status = self.status.write().await;\n        if *status != AgentStatus::Paused {\n            return Err(anyhow::anyhow!(\"Cannot resume agent in state: {:?}\", *status));\n        }\n\n        *status = AgentStatus::Running;\n        info!(\"Agent {} resumed\", self.id);\n        \n        // TODO: Implement actual process resumption\n        \n        Ok(())\n    }\n\n    /// Get current resource usage\n    pub async fn resource_usage(\u0026self) -\u003e ResourceUsage {\n        // TODO: Implement actual resource monitoring\n        ResourceUsage::default()\n    }\n\n    /// Send a message to the agent\n    pub async fn send_message(\u0026self, message: Message) -\u003e Result\u003c()\u003e {\n        self.message_tx.send(message).await\n            .map_err(|_| anyhow::anyhow!(\"Failed to send message to agent\"))?;\n        Ok(())\n    }\n\n    /// Check if the agent is still running\n    pub async fn is_running(\u0026self) -\u003e bool {\n        let status = self.status.read().await;\n        *status == AgentStatus::Running\n    }\n\n    /// Find the executable for this agent type\n    async fn find_agent_executable(\u0026self) -\u003e Result\u003cPathBuf\u003e {\n        // Look for agent implementations in standard locations\n        let search_paths = vec![\n            PathBuf::from(\"/usr/lib/agnos/agents\"),\n            PathBuf::from(\"/opt/agnos/agents\"),\n            PathBuf::from(\"./agents\"),\n        ];\n\n        let agent_type = format!(\"{:?}\", self.config.agent_type).to_lowerca {mpsc, RwLock};\nuse tracing::{debug, error, info, warn};\nuse uuid::Uuid;\n\nuse agnos_common::{AgentId, Message, MessageType};\n\n/// IPC endpoint for agent communication\npub struct AgentIpc {\n    agent_id: AgentId,\n    socket_path: std::path::PathBuf,\n    message_tx: mpsc::Sender\u003cMessage\u003e,\n    message_rx: Option\u003cmpsc::Receiver\u003cMessage\u003e\u003e,\n}\n\nimpl AgentIpc {\n    /// Create a new IPC endpoint for an agent\n    pub fn new(agent_id: AgentId) -\u003e Result\u003c(Self, mpsc::Receiver\u003cMessage\u003e)\u003e {\n        let socket_path = std::path::PathBuf::from(format!(\"/run/agnos/agents/{}.sock\", agent_id));\n        let (message_tx, message_rx) = mpsc::channel(100);\n        \n        let ipc = Self {\n            agent_id,\n            socket_path,\n            message_tx,\n            message_rx: None,\n        };\n\n        Ok((ipc, message_rx))\n    }\n\n    /// Start listening for incoming connections\n    pub async fn start_listening(\u0026self) -\u003e Result\u003c()\u003e {\n        // Ensure directory exists\n        if let Some(parent) = self.socket_path.parent() {\n            tokio::fs::create_dir_all(parent).await?;\n        }\n\n        // Remove old socket if it exists\n        let _ = tokio::fs::remove_file(\u0026self.socket_path).await;\n\n        let listener = UnixListener::bind(\u0026self.socket_path)\n            .with_context(|| format!(\"Failed to bind to socket: {}\", self.socket_path.display()))?;\n\n        info!(\"Agent {} IPC listening on {}\", self.agent_id, self.socket_path.display());\n\n        let tx = self.message_tx.clone();\n        let socket_path = self.socket_path.clone();\n\n        tokio::spawn(async move {\n            loop {\n                match listener.accept().await {\n                    Ok((stream, _)) =\u003e {\n                        let tx = tx.clone();\n                        tokio::spawn(handle_connection(stream, tx));\n                    }\n                    Err(e) =\u003e {\n                        error!(\"Failed to accept connection: {}\", e);\n                    }\n                }\n            }\n        });\n\n        Ok(())\n    }\n\n    /// Send a message to this agent\n    pub async fn send(\u0026self, message: Message) -\u003e Result\u003c()\u003e {\n        self.message_tx.send(message).await\n            .map_err(|_| anyhow::anyhow!(\"Failed to send message\"))?;\n        Ok(())\n    }\n}\n\n/// Handle an incoming connection\nasync fn handle_connection(mut stream: UnixStream, tx: mpsc::Sender\u003cMessage\u003e) {\n    let mut buffer = vec![0u8; 4096];\n\n    loop {\n        match stream.read(\u0026mut buffer).await {\n            Ok(0) =\u003e {\n                // Connection closed\n                break;\n            }\n            Ok(n) =\u003e {\n                let data = \u0026buffer[..n];\n                \n                // Parse message\n                match serde_json::from_slice::\u003cMessage\u003e(data) {\n                    Ok(message) =\u003e {\n                        debug!(\"Received message: {:?}\", message);\n                        if let Err(e) = tx.send(message).await {\n                            error!(\"Failed to forward message: {}\", e);\n                        }\n                    }\n                    Err(e) =\u003e {\n                        error!(\"Failed to parse message: {}\", e);\n                    }\n                }\n            }\n            Err(e) =\u003e {\n                error!(\"Failed to read from socket: {}\", e);\n                break;\n            }\n        }\n    }\n}\n\n/// IPC bus for routing messages between agents\npub struct MessageBus {\n    /// Subscribers by agent ID\n    subscribers: RwLock\u003cHashMap\u003cAgentId, mpsc::Sender\u003cMessage\u003e\u003e\u003e,\n    /// Global subscribers (receive all messages)\n    global_subscribers: RwLock\u003cVec\u003cmpsc::Sender\u003cMessage\u003e\u003e\u003e,\n}\n\nimpl MessageBus {\n    /// Create a new message bus\n    pub fn new() -\u003e Self {\n        Self {\n            subscribers: RwLock::new(HashMap::new()),\n            global_subscribers: RwLock::new(Vec::new()),\n        }\n    }\n\n    /// Subscribe an agent to receive messages\n    pub async fn subscribe(\u0026self, agent_id: AgentId, sender: mpsc::Sender\u003cMessage\u003e) {\n        self.subscribers.write().await.insert(agent_id, sender);\n    }\n\n    /// Unsubscribe an agent\n    pub async fn unsubscribe(\u0026self, agent_id: AgentId) {\n        self.subscribers.write().await.remove(\u0026agent_id);\n    }\n\n    /// Subscribe to all messages (for monitoring/debugging)\n    pub async fn subscribe_global(\u0026self, sender: mpsc::Sender\u003cMessage\u003e) {\n        self.global_subscribers.write().await.push(sender);\n    }\n\n    /// Publish a message\n    pub async fn publish(\u0026self, message: Message) -\u003e Result\u003c()\u003e {\n        // Send to specific target if specified\n        if message.target != \"*\" \u0026\u0026 message.target != \"broadcast\" {\n            // TODO: Look up agent ID by name\n            // For now, broadcast to all\n        }\n\n        // Send to all subscribers\n        let subscribers = self.subscribers.read().await;\n        for (agent_id, sender) in subscribers.iter() {\n            if sender.send(message.clone()).await.is_err() {\n                warn!(\"Failed to send message to agent {}\", agent_id);\n            }\n        }\n\n        // Send to global subscribers\n        let globals = self.global_subscribers.read().await;\n        for sender in globals.iter() {\n            let _ = sender.send(message.clone()).await;\n        }\n\n        Ok(())\n    }\n\n    /// Send a message to a specific agent\n    pub async fn send_to(\u0026self, agent_id: AgentId, message: Message) -\u003e Result\u003c()\u003e {\n        let subscribers = self.subscribers.read().await;\n        \n        if let Some(sender) = subscribers.get(\u0026agent_id) {\n            sender.send(message).await\n                .map_err(|_| anyhow::anyhow!(\"Failed to send message\"))?;\n            Ok(())\n        } else {\n            Err(anyhow::anyhow!(\"Agent {} not subscribed\", agent_id))\n        }\n    }\n}\n\nimpl Default for MessageBus {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n","traces":[{"line":26,"address":[6546412,6545968],"length":1,"stats":{"Line":0}},{"line":27,"address":[6545989],"length":1,"stats":{"Line":0}},{"line":28,"address":[6546107,6546191],"length":1,"stats":{"Line":0}},{"line":37,"address":[6546337],"length":1,"stats":{"Line":0}},{"line":41,"address":[5699327,5699255,5699629,5699298,5700155,5699120,5699151],"length":1,"stats":{"Line":0}},{"line":43,"address":[5699382,5699987,5699228],"length":1,"stats":{"Line":0}},{"line":44,"address":[5699285,5699512,5699663,5699565,5700083],"length":1,"stats":{"Line":0}},{"line":48,"address":[5699306,5700008,5699527,5700169],"length":1,"stats":{"Line":0}},{"line":50,"address":[5700571,5700408,5701854,5700520],"length":1,"stats":{"Line":0}},{"line":51,"address":[5701888,5700555,5700477,5701920],"length":1,"stats":{"Line":0}},{"line":53,"address":[5700776,5701030,5700700],"length":1,"stats":{"Line":0}},{"line":55,"address":[5701007,5701490],"length":1,"stats":{"Line":0}},{"line":56,"address":[5701506],"length":1,"stats":{"Line":0}},{"line":58,"address":[5701563,5702170,5702048,5701727,5702073,5702831,5702123,5703480],"length":1,"stats":{"Line":0}},{"line":59,"address":[5702113],"length":1,"stats":{"Line":0}},{"line":60,"address":[5702413,5703420,5702209,5702136,5702188],"length":1,"stats":{"Line":0}},{"line":61,"address":[5702490],"length":1,"stats":{"Line":0}},{"line":62,"address":[5702608,5702546],"length":1,"stats":{"Line":0}},{"line":63,"address":[5702616],"length":1,"stats":{"Line":0}},{"line":65,"address":[5702441],"length":1,"stats":{"Line":0}},{"line":66,"address":[5702457,5703130,5702885],"length":1,"stats":{"Line":0}},{"line":72,"address":[57017 ges agent lifecycle, orchestration, and resource allocation.\n\nuse std::collections::HashMap;\nuse std::path::PathBuf;\nuse std::sync::Arc;\n\nuse anyhow::{Context, Result};\nuse clap::{Parser, Subcommand};\nuse tokio::sync::{mpsc, RwLock};\nuse tracing::{debug, error, info, warn};\n\nuse agnos_common::{\n    AgentConfig, AgentId, AgentStatus, AgentType, Message, MessageType, ResourceUsage,\n};\n\nmod agent;\nmod ipc;\nmod orchestrator;\nmod registry;\nmod resource;\nmod sandbox;\nmod supervisor;\n\nuse crate::agent::{Agent, AgentHandle};\nuse crate::orchestrator::Orchestrator;\nuse crate::registry::AgentRegistry;\nuse crate::supervisor::Supervisor;\n\n#[derive(Parser)]\n#[command(name = \"agent-runtime\")]\n#[command(about = \"AGNOS Agent Runtime Daemon\")]\nstruct Cli {\n    #[command(subcommand)]\n    command: Commands,\n\n    #[arg(short, long, default_value = \"/etc/agnos/agent-runtime\")]\n    config_dir: PathBuf,\n\n    #[arg(short, long, default_value = \"/var/lib/agnos/agents\")]\n    data_dir: PathBuf,\n}\n\n#[derive(Subcommand)]\nenum Commands {\n    /// Run the agent runtime daemon\n    Daemon,\n    /// Start a new agent\n    Start {\n        /// Path to agent configuration file\n        #[arg(short, long)]\n        config: PathBuf,\n    },\n    /// Stop an agent\n    Stop {\n        /// Agent ID\n        agent_id: String,\n    },\n    /// List running agents\n    List,\n    /// Get agent status\n    Status {\n        /// Agent ID\n        agent_id: String,\n    },\n    /// Send a message to an agent\n    Send {\n        /// Target agent ID\n        target: String,\n        /// Message payload (JSON)\n        message: String,\n    },\n}\n\n/// Runtime state shared across all components\n#[derive(Clone)]\npub struct RuntimeState {\n    pub registry: Arc\u003cAgentRegistry\u003e,\n    pub orchestrator: Arc\u003cOrchestrator\u003e,\n    pub supervisor: Arc\u003cSupervisor\u003e,\n}\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c()\u003e {\n    tracing_subscriber::fmt()\n        .with_env_filter(tracing_subscriber::EnvFilter::from_default_env())\n        .init();\n\n    info!(\"AGNOS Agent Runtime Daemon v{}\", env!(\"CARGO_PKG_VERSION\"));\n\n    let cli = Cli::parse();\n\n    match cli.command {\n        Commands::Daemon =\u003e run_daemon(cli).await,\n        Commands::Start { config } =\u003e start_agent(config).await,\n        Commands::Stop { agent_id } =\u003e stop_agent(agent_id).await,\n        Commands::List =\u003e list_agents().await,\n        Commands::Status { agent_id } =\u003e get_status(agent_id).await,\n        Commands::Send { target, message } =\u003e send_message(target, message).await,\n    }\n}\n\nasync fn run_daemon(cli: Cli) -\u003e Result\u003c()\u003e {\n    info!(\"Starting agent runtime daemon...\");\n\n    let registry = Arc::new(AgentRegistry::new());\n    let supervisor = Arc::new(Supervisor::new(registry.clone()));\n    let orchestrator = Arc::new(Orchestrator::new(registry.clone()));\n\n    let state = RuntimeState {\n        registry,\n        orchestrator,\n        supervisor,\n    };\n\n    info!(\"Agent runtime daemon started successfully\");\n\n    let (shutdown_tx, mut shutdown_rx) = mpsc::channel::\u003c()\u003e(1);\n\n    tokio::select! {\n        _ = tokio::signal::ctrl_c() =\u003e {\n            info!(\"Received shutdown signal\");\n        }\n        _ = shutdown_rx.recv() =\u003e {\n            info!(\"Received internal shutdown signal\");\n        }\n    }\n\n    info!(\"Shutting down agent runtime daemon...\");\n    state.supervisor.shutdown_all().await?;\n    info!(\"Agent runtime daemon stopped\");\n\n    Ok(())\n}\n\nasync fn start_agent(config_path: PathBuf) -\u003e Result\u003c()\u003e {\n    let config_str = tokio::fs::read_to_string(\u0026config_path)\n        .await\n        .with_context(|| format!(\"Failed to read config file: {}\", config_path.display()))?;\n\n    let config: AgentConfig = serde_json::from_str(\u0026config_str)\n        .with_context(| //! Multi-Agent Orchestrator\n//!\n//! Handles agent coordination, task distribution, workload balancing, and conflict resolution.\n\nuse std::collections::{HashMap, VecDeque};\n\nuse anyhow::{Context, Result};\nuse tokio::sync::{mpsc, RwLock};\nuse tracing::{debug, error, info, warn};\nuse uuid::Uuid;\n\nuse agnos_common::{AgentId, Message, MessageType};\n\nuse crate::registry::AgentRegistry;\n\n/// Task priority levels\n#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]\npub enum TaskPriority {\n    Critical = 0,\n    High = 1,\n    Normal = 2,\n    Low = 3,\n    Background = 4,\n}\n\n/// Represents a task to be executed by an agent\n#[derive(Debug, Clone)]\npub struct Task {\n    pub id: String,\n    pub priority: TaskPriority,\n    pub target_agents: Vec\u003cAgentId\u003e,\n    pub payload: serde_json::Value,\n    pub created_at: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub deadline: Option\u003cchrono::DateTime\u003cchrono::Utc\u003e\u003e,\n    pub dependencies: Vec\u003cString\u003e,\n}\n\n/// Task execution result\n#[derive(Debug, Clone)]\npub struct TaskResult {\n    pub task_id: String,\n    pub agent_id: AgentId,\n    pub success: bool,\n    pub result: Option\u003cserde_json::Value\u003e,\n    pub error: Option\u003cString\u003e,\n    pub completed_at: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub duration_ms: u64,\n}\n\n/// Orchestrator for multi-agent coordination\npub struct Orchestrator {\n    registry: Arc\u003cAgentRegistry\u003e,\n    /// Task queues by priority\n    task_queues: RwLock\u003cHashMap\u003cTaskPriority, VecDeque\u003cTask\u003e\u003e\u003e,\n    /// Running tasks\n    running_tasks: RwLock\u003cHashMap\u003cString, Task\u003e\u003e,\n    /// Task results\n    results: RwLock\u003cHashMap\u003cString, TaskResult\u003e\u003e,\n    /// Communication bus\n    message_bus: mpsc::Sender\u003cMessage\u003e,\n    message_rx: RwLock\u003cOption\u003cmpsc::Receiver\u003cMessage\u003e\u003e\u003e,\n}\n\nimpl Clone for Orchestrator {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            registry: self.registry.clone(),\n            task_queues: RwLock::new(HashMap::new()),\n            running_tasks: RwLock::new(HashMap::new()),\n            results: RwLock::new(HashMap::new()),\n            message_bus: self.message_bus.clone(),\n            message_rx: RwLock::new(None),\n        }\n    }\n}\n\nimpl Orchestrator {\n    /// Create a new orchestrator\n    pub fn new(registry: Arc\u003cAgentRegistry\u003e) -\u003e Self {\n        let (message_bus, message_rx) = mpsc::channel(1000);\n        \n        let mut queues = HashMap::new();\n        for priority in [\n            TaskPriority::Critical,\n            TaskPriority::High,\n            TaskPriority::Normal,\n            TaskPriority::Low,\n            TaskPriority::Background,\n        ] {\n            queues.insert(priority, VecDeque::new());\n        }\n\n        Self {\n            registry,\n            task_queues: RwLock::new(queues),\n            running_tasks: RwLock::new(HashMap::new()),\n            results: RwLock::new(HashMap::new()),\n            message_bus,\n            message_rx: RwLock::new(Some(message_rx)),\n        }\n    }\n\n    /// Start the orchestrator\n    pub async fn start(\u0026self) -\u003e Result\u003c()\u003e {\n        info!(\"Starting multi-agent orchestrator...\");\n\n        // Start the message processing loop\n        if let Some(rx) = self.message_rx.write().await.take() {\n            tokio::spawn(Self::message_loop(rx));\n        }\n\n        // Start the task scheduler\n        tokio::spawn(Self::scheduler_loop(self.clone()));\n\n        info!(\"Multi-agent orchestrator started\");\n        Ok(())\n    }\n\n    /// Submit a new task for execution\n    pub async fn submit_task(\u0026self, mut task: Task) -\u003e Result\u003cString\u003e {\n        task.id = Uuid::new_v4().to_string();\n        task.created_at = chrono::Utc::now();\n\n        info!(\n            \"Submitting task {} with priority {:?}\",\n            task.id, task.priority\n        );\n\n        let mut queues = self.task_queues.write().await;\n        queues\n            .get_mut(\u0026task.priority)\n            .context(\"Invalid task priority\")?\n            .push_back(task.clone());\n\n        Ok(task.id)\n    }\n\n    /// Get task status\n    pub async fn get_task_status(\u0026self, task_id: \u0026str) -\u003e Option\u003cTaskStatus\u003e {\n        // Check if running\n        let running = self.running_tasks.read().await;\n        if running.contains_key(task_id) {\n            return Some(TaskStatus::Running);\n        }\n        drop(running);\n\n        // Check if completed\n        let results = self.results.read().await;\n        if let Some(result) = results.get(task_id) {\n            return Some(TaskStatus::Completed(result.clone()));\n        }\n\n        // Check if queued\n        let queues = self.task_queues.read().await;\n        for (_, queue) in queues.iter() {\n            if queue.iter().any(|t| t.id == task_id) {\n                return Some(TaskStatus::Queued);\n            }\n        }\n\n        None\n    }\n\n    /// Get task result\n    pub async fn get_result(\u0026self, task_id: \u0026str) -\u003e Option\u003cTaskResult\u003e {\n        self.results.read().await.get(task_id).cloned()\n    }\n\n    /// Distribute a task to available agents\n    async fn distribute_task(\u0026self, task: \u0026Task) -\u003e Result\u003c()\u003e {\n        if task.target_agents.is_empty() {\n            // Auto-assign based on capabilities\n            self.auto_assign_task(task).await?;\n        } else {\n            // Send to specific agents\n            for agent_id in \u0026task.target_agents {\n                if let Some(agent) = self.registry.get(*agent_id) {\n                    let message = Message {\n                        id: Uuid::new_v4().to_string(),\n                        source: \"orchestrator\".to_string(),\n                        target: agent.name,\n                        message_type: MessageType::Command,\n                        payload: task.payload.clone(),\n                        timestamp: chrono::Utc::now(),\n                    };\n                    \n                    self.message_bus.send(message).await\n                        .map_err(|_| anyhow::anyhow!(\"Failed to send message\"))?;\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Auto-assign a task to the most suitable agent(s)\n    async fn auto_assign_task(\u0026self, task: \u0026Task) -\u003e Result\u003c()\u003e {\n        // Get available agents\n        let available = self.registry.list_by_status(agnos_common::AgentStatus::Running);\n\n        if available.is_empty() {\n            warn!(\"No available agents to execute task {}\", task.id);\n            return Err(anyhow::anyhow!(\"No available agents\"));\n        }\n\n        // Simple round-robin for now\n        // TODO: Implement intelligent load balancing\n        let selected = \u0026available[0];\n\n        info!(\n            \"Auto-assigned task {} to agent {} ({})\",\n            task.id, selected.name, selected.id\n        );\n\n        let message = Message {\n            id: Uuid::new_v4().to_string(),\n            source: \"orchestrator\".to_string(),\n            target: selected.name.clone(),\n            message_type: MessageType::Command,\n            payload: task.payload.clone(),\n            timestamp: chrono::Utc::now(),\n        };\n\n        self.message_bus.send(message).await\n            .map_err(|_| anyhow::anyhow!(\"Failed to send message\"))?;\n\n        Ok(())\n    }\n\n    /// Handle task result\n    async fn handle_result(\u0026self, result: TaskResult) {\n        let task_id = result.task_id.clone();\n        info!(\n            \"Task {} completed by agent {}: success={}\",\n            task_id, result.agent_id, result.success\n        );\n\n        let mut results = self.results.write().await;\n        results.insert(task_id.clone(), result);\n\n        // Remove from running tasks\n        let mut running = self.running_tasks.write().await;\n        running.remove(\u0026task_id);\n    }\n\n    /// Message processing loop\n    async fn message_loop(mut rx: mpsc::Receiver\u003cMessage\u003e) {\n        while let Some(message) = rx.recv().await {\n            debug!(\"Orchestrator received message: {:?}\", message);\n            \n            match message.message_type {\n                MessageType::Response =\u003e {\n                    // Handle task results\n                    debug!(\"Received response: {:?}\", message.payload);\n                }\n                MessageType::Event =\u003e {\n                    // Handle agent events\n                    debug!(\"Received event: {:?}\", message.payload);\n                }\n                MessageType::Error =\u003e {\n                    error!(\"Received error message: {:?}\", message.payload);\n                }\n                _ =\u003e {}\n            }\n        }\n    }\n\n    /// Task scheduler loop\n    async fn scheduler_loop(orchestrator: Self) {\n        let mut interval = tokio::time::interval(tokio::time::Duration::from_millis(100));\n\n        loop {\n            interval.tick().await;\n\n            // Process tasks by priority\n            let priorities = [\n                TaskPriority::Critical,\n                TaskPriority::High,\n                TaskPriority::Normal,\n                TaskPriority::Low,\n                TaskPriority::Background,\n            ];\n\n            for priority in \u0026priorities {\n                let mut queues = orchestrator.task_queues.write().await;\n                if let Some(queue) = queues.get_mut(priority) {\n                    if let Some(task) = queue.pop_front() {\n                        drop(queues);\n                        \n                        // Add to running tasks\n                        orchestrator.running_tasks.write().await.insert(task.id.clone(), task.clone());\n                        \n                        // Distribute the task\n                        if let Err(e) = orchestrator.distribute_task(\u0026task).await {\n                            error!(\"Failed to distribute task {}: {}\", task.id, e);\n                        }\n                    }\n                }\n            }\n        }\n    }\n\n    /// Broadcast a message to all agents\n    pub async fn broadcast(\u0026self, message_type: MessageType, payload: serde_json::Value) -\u003e Result\u003c()\u003e {\n        let agents = self.registry.list_all();\n        \n        for agent in agents {\n            let message = Message {\n                id: Uuid::new_v4().to_string(),\n                source: \"orchestrator\".to_string(),\n                target: agent.name,\n                message_type,\n                payload: payload.clone(),\n                timestamp: chrono::Utc::now(),\n            };\n            \n            self.message_bus.send(message).await\n                .map_err(|_| anyhow::anyhow!(\"Failed to broadcast message\"))?;\n        }\n\n        Ok(())\n    }\n}\n\n/// Task status\n#[derive(Debug, Clone)]\npub enum TaskStatus {\n    Queued,\n    Running,\n    Completed(TaskResult),\n}\n\nuse std::sync::Arc;\n","traces":[{"line":65,"address":[6667622,6667628,6667056],"length":1,"stats":{"Line":0}},{"line":67,"address":[6667094],"length":1,"stats":{"Line":0}},{"line":68,"address":[6667112,6667156],"length":1,"stats":{"Line":0}},{"line":69,"address":[6667232,6667191],"length":1,"stats":{"Line":0}},{"line":70,"address":[6667314,6667270],"length":1,"stats":{"Line":0}},{"line":71,"address":[6667407,6667349],"length":1,"stats":{"Line":0}},{"line":72,"address":[6667415],"length":1,"stats":{"Line":0}},{"line":79,"address":[6663376,6664511,6664645],"length":1,"stats":{"Line":0}},{"line":80,"address":[6663518,6663398],"length":1,"stats":{"Line":0}},{"line":82,"address":[6663549],"length":1, n\nuse agnos_common::{AgentConfig, AgentId, AgentStatus, ResourceUsage};\n\nuse crate::agent::{Agent, AgentHandle};\n\n/// Central registry for all agents\npub struct AgentRegistry {\n    /// All registered agents by ID\n    agents: DashMap\u003cAgentId, RegisteredAgent\u003e,\n    /// Agents indexed by name for lookup\n    by_name: DashMap\u003cString, AgentId\u003e,\n    /// Agents indexed by capability\n    by_capability: DashMap\u003cString, Vec\u003cAgentId\u003e\u003e,\n    /// Agent statistics\n    stats: RwLock\u003cRegistryStats\u003e,\n}\n\n/// Internal representation of a registered agent\nstruct RegisteredAgent {\n    handle: AgentHandle,\n    config: AgentConfig,\n    capabilities: Vec\u003cString\u003e,\n}\n\n/// Registry statistics\n#[derive(Debug, Default)]\npub struct RegistryStats {\n    pub total_registered: u64,\n    pub total_started: u64,\n    pub total_stopped: u64,\n    pub total_failed: u64,\n}\n\nimpl AgentRegistry {\n    /// Create a new empty registry\n    pub fn new() -\u003e Self {\n        Self {\n            agents: DashMap::new(),\n            by_name: DashMap::new(),\n            by_capability: DashMap::new(),\n            stats: RwLock::new(RegistryStats::default()),\n        }\n    }\n\n    /// Register a new agent\n    pub async fn register(\u0026self, agent: \u0026Agent, config: AgentConfig) -\u003e Result\u003cAgentHandle\u003e {\n        let handle = agent.handle().await;\n        let id = handle.id;\n        let name = handle.name.clone();\n\n        // Check for duplicate names\n        if self.by_name.contains_key(\u0026name) {\n            return Err(anyhow::anyhow!(\"Agent with name '{}' already exists\", name));\n        }\n\n        let capabilities = Self::extract_capabilities(\u0026config);\n\n        let registered = RegisteredAgent {\n            handle: handle.clone(),\n            config,\n            capabilities: capabilities.clone(),\n        };\n\n        // Insert into primary storage\n        self.agents.insert(id, registered);\n        self.by_name.insert(name.clone(), id);\n\n        // Index by capabilities\n        for cap in capabilities {\n            self.by_capability\n                .entry(cap)\n                .or_insert_with(Vec::new)\n                .push(id);\n        }\n\n        let mut stats = self.stats.write().await;\n        stats.total_registered += 1;\n\n        info!(\"Registered agent {} ({})\", name, id);\n        debug!(\"Registry now contains {} agents\", self.agents.len());\n\n        Ok(handle)\n    }\n\n    /// Unregister an agent\n    pub async fn unregister(\u0026self, id: AgentId) -\u003e Result\u003c()\u003e {\n        if let Some((_, agent)) = self.agents.remove(\u0026id) {\n            self.by_name.remove(\u0026agent.handle.name);\n            \n            // Remove from capability indices\n            for cap in \u0026agent.capabilities {\n                if let Some(mut agents) = self.by_capability.get_mut(cap) {\n                    agents.retain(|\u0026agent_id| agent_id != id);\n                }\n            }\n\n            info!(\"Unregistered agent {} ({})\", agent.handle.name, id);\n        }\n\n        Ok(())\n    }\n\n    /// Get an agent by ID\n    pub fn get(\u0026self, id: AgentId) -\u003e Option\u003cAgentHandle\u003e {\n        self.agents.get(\u0026id).map(|a| a.handle.clone())\n    }\n\n    /// Get an agent by name\n    pub fn get_by_name(\u0026self, name: \u0026str) -\u003e Option\u003cAgentHandle\u003e {\n        self.by_name\n            .get(name)\n            .and_then(|id| self.agents.get(\u0026*id))\n            .map(|a| a.handle.clone())\n    }\n\n    /// Find agents by capability\n    pub fn find_by_capability(\u0026self, capability: \u0026str) -\u003e Vec\u003cAgentHandle\u003e {\n        self.by_capability\n            .get(capability)\n            .map(|ids| {\n                ids.iter()\n                    .filter_map(|id| self.agents.get(id).map(|a| a.handle.clone()))\n                    .collect()\n            })\n            .unwrap_or_default()\n    }\n\n    /// List all agents\n    pub fn list_all(\u0026self) -\u003e Vec\u003cAgentHandle\u003e {\n        self.agents\n            .iter()\n            .map(|a| a.handle.clone())\n            .collect()\n    }\n\n    /// List agents by status\n    pub fn list_by_status(\u0026self, status: AgentStatus) -\u003e Vec\u003cAgentHandle\u003e {\n        self.agents\n            .iter()\n            .filter(|a| a.handle.status == status)\n            .map(|a| a.handle.clone())\n            .collect()\n    }\n\n    /// Update agent status\n    pub async fn update_status(\u0026self, id: AgentId, status: AgentStatus) -\u003e Result\u003c()\u003e {\n        if let Some(mut agent) = self.agents.get_mut(\u0026id) {\n            agent.handle.status = status;\n            debug!(\"Updated agent {} status to {:?}\", id, status);\n        } else {\n            return Err(anyhow::anyhow!(\"Agent {} not found\", id));\n        }\n\n        Ok(())\n    }\n\n    /// Update agent resource usage\n    pub async fn update_resource_usage(\u0026self, id: AgentId, usage: ResourceUsage) -\u003e Result\u003c()\u003e {\n        if let Some(mut agent) = self.agents.get_mut(\u0026id) {\n            agent.handle.resource_usage = usage;\n        }\n        Ok(())\n    }\n\n    /// Get agent configuration\n    pub fn get_config(\u0026self, id: AgentId) -\u003e Option\u003cAgentConfig\u003e {\n        self.agents.get(\u0026id).map(|a| a.config.clone())\n    }\n\n    /// Get registry statistics\n    pub async fn stats(\u0026self) -\u003e RegistryStats {\n        self.stats.read().await.clone()\n    }\n\n    /// Check if an agent exists\n    pub fn contains(\u0026self, id: AgentId) -\u003e bool {\n        self.agents.contains_key(\u0026id)\n    }\n\n    /// Get total number of registered agents\n    pub fn len(\u0026self) -\u003e usize {\n        self.agents.len()\n    }\n\n    /// Check if registry is empty\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.agents.is_empty()\n    }\n\n    /// Extract capabilities from agent configuration\n    fn extract_capabilities(config: \u0026AgentConfig) -\u003e Vec\u003cString\u003e {\n        let mut caps = vec![format!(\"type:{:?}\", config.agent_type).to_lowercase()];\n        \n        // Add capability based on permissions\n        for perm in \u0026config.permissions {\n            caps.push(format!(\"perm:{:?}\", perm).to_lowercase());\n        }\n\n        caps\n    }\n}\n\nimpl Default for AgentRegistry {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl Clone for RegistryStats {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            total_registered: self.total_registered,\n            total_started: self.total_started,\n            total_stopped: self.total_stopped,\n            total_failed: self.total_failed,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_registry_new() {\n        let registry = AgentRegistry::new();\n        assert!(registry.is_empty());\n        assert_eq!(registry.len(), 0);\n    }\n\n    #[test]\n    fn test_registry_contains() {\n        let registry = AgentRegistry::new();\n        let id = AgentId::new();\n        assert!(!registry.contains(id));\n    }\n\n    #[test]\n    fn test_registry_stats_default() {\n        let stats = RegistryStats::default();\n        assert_eq!(stats.total_registered, 0);\n        assert_eq!(stats.total_started, 0);\n        assert_eq!(stats.total_stopped, 0);\n    }\n\n    #[test]\n    fn test_registry_stats_clone() {\n        let stats = RegistryStats {\n            total_registered: 10,\n            total_started: 5,\n            total_stopped: 3,\n            total_failed: 2,\n        };\n        let cloned = stats.clone();\n        assert_eq!(cloned.total_registered, 10);\n        assert_eq!(cloned.total_started, 5);\n    }\n\n    #[tokio::test]\n    async fn test_registry_stats_async() {\n        let registry = AgentRegistry::new();\n        let stats = registry.stats().await;\n        assert_eq!(stats.total_registered, 0);\n    }\n\n    #[test]\n    fn test_extract_capabilities() {\n        let config = AgentConfig {\n            name: \"test\".to_string(),\n            agent_type: agnos_common::AgentType::Service,\n            permissions: vec![\n                agnos_common::Permission::FileRead,\n                agnos_common::Permission::NetworkAccess,\n            ],\n            ..Default::default()\n        };\n        \n        let caps = AgentRegistry::extract_capabilities(\u0026config);\n        assert!(!caps.is_empty());\n    }\n}\n","traces":[{"line":44,"address":[6544656,6544352,6544662],"length":1,"stats":{"Line":3}},{"line":46,"address":[6544373],"length":1,"stats":{"Line":3}},{"line":47,"address":[6544383],"length":1,"stats":{"Line":3}},{"line":48,"address":[6544432],"length":1,"stats":{"Line":3}},{"line":49,"address":[6544481,6544522],"length":1,"stats":{"Line":6}},{"line":54,"address":[5681461,5681256,5681087,5681299,5681040,5683432,5683729],"length":1,"stats":{"Line":0}},{"line":55,"address":[5681286,5681249,5681495,5681391],"length":1,"stats":{"Line":0}},{"line":56,"address":[5681877],"length":1,"stats":{"Line":0}},{"line":57,"address":[5681901],"length":1,"stats":{"Line":0}},{"line":60,"address":[5682062,5681975],"length":1,"stats":{"Line":0}},{"line":61,"address":[5682108,5683456],"length":1,"stats":{"Line":0}},{"line":64,"address":[5682195,5682076],"length":1,"stats":{"Line":0}},{"line":67,"address":[5682202],"length":1,"stats":{"Line":0}},{"line":69,"address":[5682321],"length":1,"stats":{"Line":0}},{"line":73,"address":[5682573],"length":1,"stats":{"Line":0}},{"line":74,"address":[5682696],"length":1,"stats":{"Line":0}},{"line":77,"address":[5682811,5682998],"length":1,"stats":{"Line":0}},{"line":78,"address":[5683075,5683313],"length":1,"stats":{"Line":0}},{"line":79,"address":[5683134],"length":1,"stats":{"Line":0}},{"line":80,"address   /// Create a new resource manager\n    pub async fn new() -\u003e Result\u003cSelf\u003e {\n        info!(\"Initializing resource manager...\");\n\n        // Detect GPUs\n        let gpus = Self::detect_gpus().await?;\n        \n        // Detect system memory\n        let total_memory = Self::detect_system_memory().await?;\n        \n        info!(\"Detected {} GPU(s)\", gpus.len());\n        info!(\"Total system memory: {} MB\", total_memory / (1024 * 1024));\n\n        Ok(Self {\n            gpus: RwLock::new(gpus),\n            gpu_allocations: RwLock::new(HashMap::new()),\n            cpu_allocations: RwLock::new(HashMap::new()),\n            total_memory,\n            available_memory: RwLock::new(total_memory),\n        })\n    }\n\n    /// Allocate GPU resources to an agent\n    pub async fn allocate_gpu(\u0026self, agent_id: AgentId, memory_required: u64) -\u003e Result\u003cVec\u003cu32\u003e\u003e {\n        debug!(\"Allocating GPU for agent {} ({} bytes)\", agent_id, memory_required);\n\n        let mut gpus = self.gpus.write().await;\n        let mut allocations = self.gpu_allocations.write().await;\n\n        // Find GPU with sufficient memory\n        let mut allocated_gpus = Vec::new();\n        \n        for gpu in gpus.iter_mut() {\n            let available = *gpu.available_memory.read().await;\n            \n            if available \u003e= memory_required {\n                let mut gpu_available = gpu.available_memory.write().await;\n                *gpu_available -= memory_required;\n                \n                allocated_gpus.push(gpu.id);\n                info!(\"Allocated GPU {} to agent {}\", gpu.id, agent_id);\n                \n                if allocated_gpus.len() \u003e= 1 {\n                    // For now, only allocate one GPU per agent\n                    break;\n                }\n            }\n        }\n\n        if allocated_gpus.is_empty() {\n            return Err(anyhow::anyhow!(\"No GPU with sufficient memory available\"));\n        }\n\n        allocations.insert(agent_id, allocated_gpus.clone());\n        Ok(allocated_gpus)\n    }\n\n    /// Release GPU resources from an agent\n    pub async fn release_gpu(\u0026self, agent_id: AgentId) -\u003e Result\u003c()\u003e {\n        debug!(\"Releasing GPU allocation for agent {}\", agent_id);\n\n        let mut allocations = self.gpu_allocations.write().await;\n        \n        if let Some(gpu_ids) = allocations.remove(\u0026agent_id) {\n            let mut gpus = self.gpus.write().await;\n            \n            for gpu_id in gpu_ids {\n                if let Some(gpu) = gpus.iter_mut().find(|g| g.id == gpu_id) {\n                    let mut available = gpu.available_memory.write().await;\n                    // Restore full GPU memory (simplified)\n                    *available = gpu.total_memory;\n                    info!(\"Released GPU {} from agent {}\", gpu_id, agent_id);\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Get GPU information\n    pub async fn list_gpus(\u0026self) -\u003e Vec\u003cGpuDevice\u003e {\n        self.gpus.read().await.clone()\n    }\n\n    /// Get current GPU allocations\n    pub async fn get_gpu_allocations(\u0026self) -\u003e HashMap\u003cAgentId, Vec\u003cu32\u003e\u003e {\n        self.gpu_allocations.read().await.clone()\n    }\n\n    /// Allocate CPU cores to an agent\n    pub async fn allocate_cpu(\u0026self, agent_id: AgentId, cores: usize) -\u003e Result\u003cVec\u003cusize\u003e\u003e {\n        debug!(\"Allocating {} CPU cores for agent {}\", cores, agent_id);\n\n        let num_cores = Self::detect_cpu_cores().await?;\n        \n        if cores \u003e num_cores {\n            return Err(anyhow::anyhow!(\n                \"Requested {} cores but only {} available\",\n                cores, num_cores\n            ));\n        }\n\n        // Simple allocation: assign cores 0 to N-1\n        let allocated_cores: Vec\u003cusize\u003e = (0..cores).collect();\n        \n        let mut allocations = self.cpu_allocations.write().await;\n        allocations.insert(agent_id, allocated_cores.clone());\n        \n        info!(\"Allocated CPU cores {:?} to agent {}\", allocated_cores, agent_id);\n        \n        Ok(allocated_cores)\n    }\n\n    /// Release CPU allocation\n    pub async fn release_cpu(\u0026self, agent_id: AgentId) -\u003e Result\u003c()\u003e {\n        debug!(\"Releasing CPU allocation for agent {}\", agent_id);\n        \n        let mut allocations = self.cpu_allocations.write().await;\n        \n        if allocations.remove(\u0026agent_id).is_some() {\n            info!(\"Released CPU allocation for agent {}\", agent_id);\n        }\n        \n        Ok(())\n    }\n\n    /// Get total system memory\n    pub fn total_memory(\u0026self) -\u003e u64 {\n        self.total_memory\n    }\n\n    /// Get available system memory\n    pub async fn available_memory(\u0026self) -\u003e u64 {\n        *self.available_memory.read().await\n    }\n\n    /// Reserve memory for an agent\n    pub async fn reserve_memory(\u0026self, agent_id: AgentId, bytes: u64) -\u003e Result\u003c()\u003e {\n        let mut available = self.available_memory.write().await;\n        \n        if *available \u003c bytes {\n            return Err(anyhow::anyhow!(\n                \"Insufficient memory: requested {} bytes, {} available\",\n                bytes, *available\n            ));\n        }\n        \n        *available -= bytes;\n        debug!(\"Reserved {} bytes for agent {} ({} remaining)\", \n               bytes, agent_id, *available);\n        \n        Ok(())\n    }\n\n    /// Release reserved memory\n    pub async fn release_memory(\u0026self, bytes: u64) {\n        let mut available = self.available_memory.write().await;\n        *available = (*available + bytes).min(self.total_memory);\n        debug!(\"Released {} bytes of memory ({} available)\", bytes, *available);\n    }\n\n    /// Detect available GPUs\n    async fn detect_gpus() -\u003e Result\u003cVec\u003cGpuDevice\u003e\u003e {\n        let mut gpus = Vec::new();\n\n        // Try to detect NVIDIA GPUs via nvidia-smi\n        match Self::detect_nvidia_gpus().await {\n            Ok(nvidia_gpus) =\u003e {\n                gpus.extend(nvidia_gpus);\n            }\n            Err(e) =\u003e {\n                debug!(\"Failed to detect NVIDIA GPUs: {}\", e);\n            }\n        }\n\n        // Try to detect other GPUs (AMD, Intel)\n        // TODO: Implement detection for other GPU vendors\n\n        if gpus.is_empty() {\n            info!(\"No GPUs detected\");\n        }\n\n        Ok(gpus)\n    }\n\n    /// Detect NVIDIA GPUs\n    async fn detect_nvidia_gpus() -\u003e Result\u003cVec\u003cGpuDevice\u003e\u003e {\n        use tokio::process::Command;\n\n        let output = Command::new(\"nvidia-smi\")\n            .args(\u0026[\"--query-gpu=index,name,memory.total\", \"--format=csv,noheader,nounits\"])\n            .output()\n            .await\n            .context(\"Failed to run nvidia-smi\")?;\n\n        if !output.status.success() {\n            return Err(anyhow::anyhow!(\"nvidia-smi failed\"));\n        }\n\n        let stdout = String::from_utf8(output.stdout)?;\n        let mut gpus = Vec::new();\n\n        for line in stdout.lines() {\n            let parts: Vec\u003c\u0026str\u003e = line.split(\", \").collect();\n            if parts.len() \u003e= 3 {\n                let id = parts[0].parse::\u003cu32\u003e()?;\n                let name = parts[1].to_string();\n                let memory_mb = parts[2].parse::\u003cu64\u003e()?;\n                let total_memory = memory_mb * 1024 * 1024; // Convert to bytes\n\n                gpus.push(GpuDevice {\n                    id,\n                    name,\n                    total_memory,\n                    available_memory: RwLock::new(total_memory),\n                    compute_capability: None,\n                });\n            }\n        }\n\n        Ok(gpus)\n    }\n\n    /// Detect total system memory\n    async fn detect_system_memory() -\u003e Result\u003cu64\u003e {\n        // Read from /proc/meminfo on Linux\n        #[cfg(target_os = \"linux\")]\n        {\n            let meminfo = tokio::fs::read_to_string(\"/proc/meminfo\").await?;\n            \n            for line in meminfo.lines() {\n                if line.starts_with(\"MemTotal:\") {\n                    let parts: Vec\u003c\u0026str\u003e = line.split_whitespace().collect();\n                    if parts.len() \u003e= 2 {\n                        let kb = parts[1].parse::\u003cu64\u003e()?;\n                        return Ok(kb * 1024); // Convert from KB to bytes\n                    }\n                }\n            }\n        }\n\n        // Fallback: return 8GB\n        warn!(\"Could not detect system memory, using default 8GB\");\n        Ok(8 * 1024 * 1024 * 1024)\n    }\n\n    /// Detect number of CPU cores\n    async fn detect_cpu_cores() -\u003e Result\u003cusize\u003e {\n        // Use sysconf on Unix systems\n        #[cfg(unix)]\n        {\n            let cores = unsafe { libc::sysconf(libc::_SC_NPROCESSORS_ONLN) };\n            if cores \u003e 0 {\n                return Ok(cores as usize);\n            }\n        }\n\n        // Fallback\n        Ok(std::thread::available_parallelism()\n            .map(|p| p.get())\n            .unwrap_or(1))\n    }\n}\n\nuse std::sync::Arc;\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_gpu_device_clone() {\n        let gpu = GpuDevice {\n            id: 0,\n            name: \"RTX 4090\".to_string(),\n            total_memory: 24 * 1024 * 1024 * 1024,\n            available_memory: RwLock::new(24 * 1024 * 1024 * 1024),\n            compute_capability: Some(\"8.9\".to_string()),\n        };\n        \n        let cloned = gpu.clone();\n        assert_eq!(cloned.name, \"RTX 4090\");\n        assert_eq!(cloned.total_memory, gpu.total_memory);\n    }\n\n    #[test]\n    fn test_gpu_device_id() {\n        let gpu = GpuDevice {\n            id: 1,\n            name: \"RTX 3090\".to_string(),\n            total_memory: 24 * 1024 * 1024 * 1024,\n            available_memory: RwLock::new(24 * 1024 * 1024 * 1024),\n            compute_capability: None,\n        };\n        \n        assert_eq!(gpu.id, 1);\n        assert!(gpu.compute_capability.is_none());\n    }\n}\n","traces":[{"line":24,"address":[5817529,5817550,5817120],"length":1,"stats":{"Line":1}},{"line":26,"address":[5817150],"length":1,"stats":{"Line":1}},{"line":27,"address":[5817157],"length":1,"stats":{"Line":1}},{"line":28,"address":[5817176],"length":1,"stats":{"Line":1}},{"line":29,"address":[5817264,5817185,5817346],"length":1,"stats":{"Line":3}},{"line":30,"address":[5817373],"length":1,"stats":{"Line":1}},{"line":51,"address":[5816691,5816688],"length":1,"stats":{"Line":0}},{"line":52,"address":[6719299,6719448,6719731],"length":1,"stats":{"Line":0}},{"line":55,"address":[6719361,6720026,6719721,6720124,6720662],"length":1,"stats":{"Line":0}},{"line":58,"address":[6720530,6720598,6720695,6719382],"length":1,"stats":{"Line":0}},{"line":60,"address":[6721411,6721089],"length":1,"stats":{"Line":0}},{"line":61,"address":[6721726,6721383,6722018],"length":1,"stats":{"Line":0}},{"line":63,"address":[6722624],"length":1,"stats":{"Line":0}},{"line":64,"address":[6721957],"length":1,"stats":{"Line":0}},{"line":65,"address":[6722445,6722398],"length":1,"stats":{"Line":0}},{"line":66,"address":[6722483,6722527],"length":1,"stats":{"Line":0}},{"line":68,"address":[6722565],"length":1,"stats":{"Line":0}},{"line":73,"address":[5816477,5816464],"length":1,"stats":{"Line":0}},{"line":74,"address":[6704209,6704511,6704015],"length":1,"stats":{"Line":0}},{"line":76,"address":[6704995,6704482,6704076,6704891],"length":1,"stats":{"Line":0}},{"line":77,"address":[6705313,6705397,6704097,6705234],"length":1,"stats":{"Line":0}},{"line":80,"address":[6705636],"length":1,"stats":{"Line , and namespace isolation.\n\nuse std::collections::HashSet;\nuse std::path::PathBuf;\n\nuse anyhow::{Context, Result};\nuse tracing::{debug, info, warn};\n\nuse agnos_common::SandboxConfig;\n\n/// Security sandbox for agent processes\npub struct Sandbox {\n    config: SandboxConfig,\n    applied: bool,\n}\n\nimpl Sandbox {\n    /// Create a new sandbox from configuration\n    pub fn new(config: \u0026SandboxConfig) -\u003e Result\u003cSelf\u003e {\n        Ok(Self {\n            config: config.clone(),\n            applied: false,\n        })\n    }\n\n    /// Apply sandbox restrictions to the current process\n    pub async fn apply(\u0026mut self) -\u003e Result\u003c()\u003e {\n        if self.applied {\n            return Ok(());\n        }\n\n        info!(\"Applying sandbox restrictions...\");\n\n        // Apply Landlock filesystem restrictions\n        self.apply_landlock().await?;\n\n        // Apply seccomp-bpf filters\n        self.apply_seccomp().await?;\n\n        // Apply network namespace isolation\n        self.apply_network_isolation().await?;\n\n        self.applied = true;\n        info!(\"Sandbox restrictions applied successfully\");\n\n        Ok(())\n    }\n\n    /// Apply Landlock filesystem restrictions\n    async fn apply_landlock(\u0026self) -\u003e Result\u003c()\u003e {\n        debug!(\"Applying Landlock restrictions...\");\n\n        #[cfg(target_os = \"linux\")]\n        {\n            // Check if Landlock is supported\n            match Self::check_landlock_support() {\n                Ok(version) =\u003e {\n                    info!(\"Landlock v{} is supported\", version);\n                    \n                    // Create Landlock ruleset\n                    // TODO: Implement actual Landlock ABI calls\n                    // This requires the landlock crate or raw syscalls\n                    \n                    debug!(\"Landlock restrictions applied\");\n                }\n                Err(e) =\u003e {\n                    warn!(\"Landlock not supported: {}\", e);\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Apply seccomp-bpf filters\n    async fn apply_seccomp(\u0026self) -\u003e Result\u003c()\u003e {\n        debug!(\"Applying seccomp-bpf filters...\");\n\n        #[cfg(target_os = \"linux\")]\n        {\n            // Load seccomp-bpf filter\n            // TODO: Implement seccomp filter loading\n            // This requires libseccomp or raw BPF program loading\n            \n            debug!(\"seccomp-bpf filters applied\");\n        }\n\n        Ok(())\n    }\n\n    /// Apply network namespace isolation\n    async fn apply_network_isolation(\u0026self) -\u003e Result\u003c()\u003e {\n        if !self.config.isolate_network {\n            debug!(\"Network isolation disabled\");\n            return Ok(());\n        }\n\n        debug!(\"Applying network isolation...\");\n\n        #[cfg(target_os = \"linux\")]\n        {\n            use std::process::Command;\n            \n            // Create new network namespace\n            // This would typically be done before spawning the process\n            // Here we're documenting what should happen\n            \n            match self.config.network_access {\n                agnos_common::NetworkAccess::None =\u003e {\n                    // Completely isolate network\n                    debug!(\"Network access: none\");\n                }\n                agnos_common::NetworkAccess::LocalhostOnly =\u003e {\n                    // Allow loopback only\n                    debug!(\"Network access: localhost only\");\n                }\n                agnos_common::NetworkAccess::Restricted =\u003e {\n                    // Allow specific endpoints\n                    debug!(\"Network access: restricted\");\n                }\n                agnos_common::NetworkAccess::Full =\u003e {\n                    // Full network access (but still isolated namespace)\n                    debug!(\"Network access: full (isolated namespace)\");\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Check Landlock support\n    #[cfg(target_os = \"linux\")]\n    fn check_landlock_support() -\u003e Result\u003cu64\u003e {\n        // Try to detect Landlock ABI version\n        // This is a placeholder - actual implementation would use prctl or syscalls\n        \n        // For now, return an error indicating Landlock is not available\n        // until properly implemented\n        Err(anyhow::anyhow!(\"Landlock support not yet implemented\"))\n    }\n\n    #[cfg(not(target_os = \"linux\"))]\n    fn check_landlock_support() -\u003e Result\u003cu64\u003e {\n        Err(anyhow::anyhow!(\"Landlock is Linux-only\"))\n    }\n\n    /// Check if sandbox has been applied\n    pub fn is_applied(\u0026self) -\u003e bool {\n        self.applied\n    }\n}\n\n/// Seccomp-bpf filter builder\npub struct SeccompFilter {\n    allowed_syscalls: HashSet\u003cString\u003e,\n    denied_syscalls: HashSet\u003cString\u003e,\n}\n\nimpl SeccompFilter {\n    /// Create a new filter with default allowed syscalls\n    pub fn new() -\u003e Self {\n        let mut allowed = HashSet::new();\n        \n        // Essential syscalls for any process\n        allowed.insert(\"read\".to_string());\n        allowed.insert(\"write\".to_string());\n        allowed.insert(\"openat\".to_string());\n        allowed.insert(\"close\".to_string());\n        allowed.insert(\"exit\".to_string());\n        allowed.insert(\"exit_group\".to_string());\n        \n        // Memory management\n        allowed.insert(\"mmap\".to_string());\n        allowed.insert(\"munmap\".to_string());\n        allowed.insert(\"mprotect\".to_string());\n        allowed.insert(\"brk\".to_string());\n        \n        // File operations\n        allowed.insert(\"fstat\".to_string());\n        allowed.insert(\"lseek\".to_string());\n        allowed.insert(\"pread64\".to_string());\n        allowed.insert(\"pwrite64\".to_string());\n        \n        // Process management\n        allowed.insert(\"getpid\".to_string());\n        allowed.insert(\"getppid\".to_string());\n        allowed.insert(\"gettid\".to_string());\n        \n        Self {\n            allowed_syscalls: allowed,\n            denied_syscalls: HashSet::new(),\n        }\n    }\n\n    /// Add an allowed syscall\n    pub fn allow(\u0026mut self, syscall: \u0026str) -\u003e \u0026mut Self {\n        self.allowed_syscalls.insert(syscall.to_string());\n        self\n    }\n\n    /// Deny a syscall\n    pub fn deny(\u0026mut self, syscall: \u0026str) -\u003e \u0026mut Self {\n        self.denied_syscalls.insert(syscall.to_string());\n        self\n    }\n\n    /// Build and load the filter\n    pub fn load(\u0026self) -\u003e Result\u003c()\u003e {\n        // TODO: Implement actual seccomp filter loading\n        // This would use libseccomp or generate BPF bytecode\n        \n        debug!(\"Loading seccomp filter with {} allowed syscalls\", \n               self.allowed_syscalls.len());\n        \n        Ok(())\n    }\n}\n\nimpl Default for SeccompFilter {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_sandbox_new() {\n        let config = SandboxConfig::default();\n        let sandbox = Sandbox::new(\u0026config).unwrap();\n        assert!(!sandbox.is_applied());\n    }\n\n    #[test]\n    fn test_seccomp_filter_new() {\n        let filter = SeccompFilter::new();\n        assert!(filter.allowed_syscalls.contains(\"read\"));\n        assert!(filter.allowed_syscalls.contains(\"write\"));\n        assert!(filter.allowed_syscalls.contains(\"mmap\"));\n    }\n\n    #[test]\n    fn test_seccomp_filter_allow() {\n        let mut filter = SeccompFilter::new();\n        filter.allow(\"custom_syscall\");\n        assert!(filter.allowed_syscalls.contains(\"custom_syscall\"));\n    }\n\n    #[test]\n    fn test_seccomp_filter_deny() {\n        let mut filter = SeccompFilter::new();\n        filter.deny(\"kill\");\n        assert!(filter.denied_syscalls.contains(\"kill\"));\n    }\n\n    #[test]\n    fn test_seccomp_filter_load() {\n        let filter = SeccompFilter::new();\n        let result = filter.load();\n        assert!(result.is_ok());\n    }\n\n    #[tokio::test]\n    async fn test_sandbox_apply() {\n        let config = SandboxConfig::default();\n        let mut sandbox = Sandbox::new(\u0026config).unwrap();\n        \n        let result = sandbox.apply().await;\n        assert!(result.is_ok() || result.is_err()); // May fail on systems without Landlock\n    }\n\n    #[test]\n    fn test_sandbox_is_applied() {\n        let config = SandboxConfig::default();\n        let sandbox = Sandbox::new(\u0026config).unwrap();\n        assert!(!sandbox.is_applied());\n    }\n\n    #[test]\n    fn test_check_landlock_support() {\n        #[cfg(target_os = \"linux\")]\n        {\n            let result = Sandbox::check_landlock_support();\n            // Result depends on kernel support\n            assert!(result.is_err()); // Currently not implemented\n        }\n        \n        #[cfg(not(target_os = \"linux\"))]\n        {\n            let result = Sandbox::check_landlock_support();\n            assert!(result.is_err());\n        }\n    }\n}\n","traces":[{"line":21,"address":[6177152],"length":1,"stats":{"Line":3}},{"line":22,"address":[6177187],"length":1,"stats":{"Line":3}},{"line":23,"address":[6177177],"length":1,"stats":{"Line":3}},{"line":29,"address":[6040328,6040264,6040402,6041616,6040307,6040191,6041132,6040160],"length":1,"stats":{"Line":4}},{"line":30,"address":[6040252],"length":1,"stats":{"Line":1}},{"line":31,"address":[6040377],"length":1,"stats":{"Line":0}},{"line":34,"address":[6040743,6040349,6040448],"length":1,"stats":{"Line":2}},{"line":37,"address":[6040294,6040999,6041166,6041603,6040721],"length":1,"stats":{"Line":2}},{"line":40,"address":[6040315,6041494,6 }],"covered":55,"coverable":67},{"path":["/","home","macro","Repos","agnosticos","userland","agent-runtime","src","supervisor.rs"],"content":"//! Agent Supervisor\n//!\n//! Monitors agent health, enforces resource limits, and handles failures.\n\nuse std::collections::HashMap;\nuse std::time::{Duration, Instant};\n\nuse anyhow::Result;\nuse tokio::sync::RwLock;\nuse tokio::time::interval;\nuse tracing::{debug, error, info, warn};\n\nuse agnos_common::{AgentEvent, AgentId, AgentStatus, ResourceUsage, StopReason};\n\nuse crate::agent::Agent;\nuse crate::registry::AgentRegistry;\n\n/// Health check configuration\n#[derive(Debug, Clone)]\npub struct HealthCheckConfig {\n    pub interval: Duration,\n    pub timeout: Duration,\n    pub unhealthy_threshold: u32,\n    pub healthy_threshold: u32,\n}\n\nimpl Default for HealthCheckConfig {\n    fn default() -\u003e Self {\n        Self {\n            interval: Duration::from_secs(30),\n            timeout: Duration::from_secs(5),\n            unhealthy_threshold: 3,\n            healthy_threshold: 2,\n        }\n    }\n}\n\n/// Agent health status\n#[derive(Debug)]\npub struct AgentHealth {\n    pub agent_id: AgentId,\n    pub is_healthy: bool,\n    pub consecutive_failures: u32,\n    pub consecutive_successes: u32,\n    pub last_check: Instant,\n    pub last_response_time_ms: u64,\n    pub resource_usage: ResourceUsage,\n}\n\n/// Supervisor for monitoring and managing agents\npub struct Supervisor {\n    registry: Arc\u003cAgentRegistry\u003e,\n    health_checks: RwLock\u003cHashMap\u003cAgentId, AgentHealth\u003e\u003e,\n    config: HealthCheckConfig,\n    running_agents: RwLock\u003cHashMap\u003cAgentId, Box\u003cdyn AgentControl\u003e\u003e\u003e,\n}\n\n/// Trait for controlling agent processes\n#[async_trait::async_trait]\npub trait AgentControl: Send + Sync {\n    async fn check_health(\u0026self) -\u003e Result\u003cbool\u003e;\n    async fn get_resource_usage(\u0026self) -\u003e Result\u003cResourceUsage\u003e;\n    async fn stop(\u0026mut self, reason: StopReason) -\u003e Result\u003c()\u003e;\n    async fn restart(\u0026mut self) -\u003e Result\u003c()\u003e;\n}\n\nimpl Supervisor {\n    /// Create a new supervisor\n    pub fn new(registry: Arc\u003cAgentRegistry\u003e) -\u003e Self {\n        Self {\n            registry,\n            health_checks: RwLock::new(HashMap::new()),\n            config: HealthCheckConfig::default(),\n            running_agents: RwLock::new(HashMap::new()),\n        }\n    }\n\n    /// Start the supervisor\n    pub async fn start(\u0026self) -\u003e Result\u003c()\u003e {\n        info!(\"Starting agent supervisor...\");\n\n        // Start health check loop\n        let supervisor_clone = self.clone();\n        tokio::spawn(async move {\n            supervisor_clone.health_check_loop().await;\n        });\n\n        // Start resource monitoring loop\n        let supervisor_clone = self.clone();\n        tokio::spawn(async move {\n            supervisor_clone.resource_monitor_loop().await;\n        });\n\n        info!(\"Agent supervisor started\");\n        Ok(())\n    }\n\n    /// Register an agent for supervision\n    pub async fn register_agent(\u0026self, agent_id: AgentId) -\u003e Result\u003c()\u003e {\n        let health = AgentHealth {\n            agent_id,\n            is_healthy: true,\n            consecutive_failures: 0,\n            consecutive_successes: 0,\n            last_check: Instant::now(),\n            last_response_time_ms: 0,\n            resource_usage: ResourceUsage::default(),\n        };\n\n        self.health_checks.write().await.insert(agent_id, health);\n        info!(\"Registered agent {} for supervision\", agent_id);\n\n        Ok(())\n    }\n\n    /// Unregister an agent from supervision\n    pub async fn unregister_agent(\u0026self, agent_id: AgentId) -\u003e Result\u003c()\u003e {\n        self.health_checks.write().await.remove(\u0026agent_id);\n        self.running_agents.write().await.remove(\u0026agent_id);\n        info!(\"Unregistered agent {} from supervision\", agent_id);\n        Ok(())\n    }\n\n    /// Shutdown all supervised agents\n    pub async fn shutdown_all(\u0026self) -\u003e Result\u003c()\u003e {\n        info!(\"Shutting down all supervised agents...\");\n\n        let agents: Vec\u003c_\u003e = self.running_agents.write().await.keys().copied().collect();\n        \n        for agent_id in agents {\n            info!(\"Stopping agent {}\", agent_id);\n            // Send stop signal via registry\n            if let Err(e) = self.registry.update_status(agent_id, AgentStatus::Stopping).await {\n                warn!(\"Failed to update agent {} status: {}\", agent_id, e);\n            }\n        }\n\n        info!(\"All agents shutdown complete\");\n        Ok(())\n    }\n\n    /// Health check monitoring loop\n    async fn health_check_loop(\u0026self) {\n        let mut interval = interval(self.config.interval);\n\n        loop {\n            interval.tick().await;\n\n            let agents: Vec\u003c_\u003e = self.health_checks.read().await.keys().copied().collect();\n\n            for agent_id in agents {\n                match self.check_agent_health(agent_id).await {\n                    Ok(healthy) =\u003e {\n                        self.update_health_status(agent_id, healthy).await;\n                    }\n                    Err(e) =\u003e {\n                        error!(\"Health check failed for agent {}: {}\", agent_id, e);\n                        self.update_health_status(agent_id, false).await;\n                    }\n                }\n            }\n        }\n    }\n\n    /// Resource monitoring loop\n    async fn resource_monitor_loop(\u0026self) {\n        let mut interval = interval(Duration::from_secs(10));\n\n        loop {\n            interval.tick().await;\n\n            let agents: Vec\u003c_\u003e = self.running_agents.read().await.keys().copied().collect();\n\n            for agent_id in agents {\n                if let Err(e) = self.check_resource_limits(agent_id).await {\n                    error!(\"Resource check failed for agent {}: {}\", agent_id, e);\n                }\n            }\n        }\n    }\n\n    /// Check the health of a specific agent\n    async fn check_agent_health(\u0026self, agent_id: AgentId) -\u003e Result\u003cbool\u003e {\n        // Get agent from registry\n        let agent = self.registry.get(agent_id)\n            .ok_or_else(|| anyhow::anyhow!(\"Agent {} not found in registry\", agent_id))?;\n\n        // Only check running agents\n        if agent.status != AgentStatus::Running {\n            return Ok(true); // Not running, consider healthy\n        }\n\n        // TODO: Implement actual health check via IPC or syscall\n        // For now, assume healthy\n        Ok(true)\n    }\n\n    /// Update health status based on check result\n    async fn update_health_status(\u0026self, agent_id: AgentId, healthy: bool) {\n        let mut checks = self.health_checks.write().await;\n        \n        if let Some(health) = checks.get_mut(\u0026agent_id) {\n            health.last_check = Instant::now();\n\n            if healthy {\n                health.consecutive_successes += 1;\n                health.consecutive_failures = 0;\n\n                if health.consecutive_successes \u003e= self.config.healthy_threshold {\n                    if !health.is_healthy {\n                        info!(\"Agent {} is now healthy\", agent_id);\n                        health.is_healthy = true;\n                    }\n                }\n            } else {\n                health.consecutive_failures += 1;\n                health.consecutive_successes = 0;\n\n                if health.consecutive_failures \u003e= self.config.unhealthy_threshold {\n                    if health.is_healthy {\n                        warn!(\"Agent {} is now unhealthy\", agent_id);\n                        health.is_healthy = false;\n                        \n                        // Trigger recovery action\n                        drop(checks);\n                        self.handle_unhealthy_agent(agent_id).await;\n                    }\n                }\n            }\n        }\n    }\n\n    /// Handle an unhealthy agent\n    async fn handle_unhealthy_agent(\u0026self, agent_id: AgentId) {\n        warn!(\"Taking recovery action for unhealthy agent {}\", agent_id);\n\n        // Update agent status\n        if let Err(e) = self.registry.update_status(agent_id, AgentStatus::Failed).await {\n            error!(\"Failed to update agent {} status: {}\", agent_id, e);\n        }\n\n        // TODO: Implement automatic restart logic\n        // For now, just log the failure\n        error!(\"Agent {} has failed health checks\", agent_id);\n    }\n\n    /// Check if an agent is exceeding resource limits\n    async fn check_resource_limits(\u0026self, agent_id: AgentId) -\u003e Result\u003c()\u003e {\n        let agent = self.registry.get(agent_id)\n            .ok_or_else(|| anyhow::anyhow!(\"Agent {} not found\", agent_id))?;\n\n        let config = self.registry.get_config(agent_id)\n            .ok_or_else(|| anyhow::anyhow!(\"Config not found for agent {}\", agent_id))?;\n\n        // Check memory limit\n        if agent.resource_usage.memory_used \u003e config.resource_limits.max_memory {\n            warn!(\n                \"Agent {} exceeded memory limit: {} \u003e {}\",\n                agent_id, agent.resource_usage.memory_used, config.resource_limits.max_memory\n            );\n            \n            // TODO: Implement memory limit enforcement\n        }\n\n        // Check CPU time limit\n        if agent.resource_usage.cpu_time_used \u003e config.resource_limits.max_cpu_time {\n            warn!(\n                \"Agent {} exceeded CPU time limit: {} \u003e {}\",\n                agent_id, agent.resource_usage.cpu_time_used, config.resource_limits.max_cpu_time\n            );\n            \n            // TODO: Implement CPU limit enforcement\n        }\n\n        Ok(())\n    }\n\n    /// Get health status for an agent\n    pub async fn get_health(\u0026self, agent_id: AgentId) -\u003e Option\u003cAgentHealth\u003e {\n        self.health_checks.read().await.get(\u0026agent_id).cloned()\n    }\n\n    /// Get all health statuses\n    pub async fn get_all_health(\u0026self) -\u003e Vec\u003cAgentHealth\u003e {\n        self.health_checks.read().await.values().cloned().collect()\n    }\n}\n\nimpl Clone for Supervisor {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            registry: self.registry.clone(),\n            health_checks: RwLock::new(HashMap::new()),\n            config: self.config.clone(),\n            running_agents: RwLock::new(HashMap::new()),\n        }\n    }\n}\n\nimpl Clone for AgentHealth {\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            agent_id: self.agent_id,\n            is_healthy: self.is_healthy,\n            consecutive_failures: self.consecutive_failures,\n            consecutive_successes: self.consecutive_successes,\n            last_check: self.last_check,\n            last_response_time_ms: self.last_response_time_ms,\n            resource_usage: self.resource_usage,\n        }\n    }\n}\n\nuse std::sync::Arc;\n","traces":[{"line":28,"address":[6067808],"length":1,"stats":{"Line":0}},{"line":30,"address":[6067822],"length":1,"stats":{"Line":0}},{"line":31,"address":[6067841],"length":1,"stats":{"Line":0}},{"line":69,"address":[6066548,6066256,6066554],"length":1,"stats":{"Line":0}},{"line":72,"address":[6066334,6066290],"length":1,"stats":{"Line":0}},{"line":73,"address":[6066366],"length":1,"stats":{"Line":0}},{"line":74,"address":[6066415],"length":1,"stats":{"Line":0}},{"line":79,"address":[6066584,6066576],"length":1,"stats":{"Line":0}},{"line":80,"address":[6584045,6583941,6584336],"length":1,"stats":{"Line":0}},{"line":83,"address":[6584326],"length":1,"stats":{"Line":0}},{"line":84,"address":[6586293,6586366,6585960,6584597,6
