se std::sync::Arc;\nuse std::time::Duration;\nuse tokio::signal;\nuse tracing::{info, warn, error};\nuse tracing_subscriber::EnvFilter;\nuse clap::Parser;\n\nmod compositor;\nmod shell;\nmod ai_features;\nmod apps;\nmod security_ui;\n\nuse compositor::{Compositor, WindowState, ContextType};\nuse shell::{DesktopShell, Notification, NotificationPriority};\nuse ai_features::{AIDesktopFeatures, AISuggestion, SuggestionType, ContextEvent, ContextEventType};\nuse apps::DesktopApplications;\nuse security_ui::{SecurityUI, SecurityAlert, ThreatLevel, SecurityLevel};\n\n#[derive(Debug, clap::Parser)]\n#[command(name = \"desktop-environment\")]\n#[command(author = \"AGNOS Team\")]\n#[command(version = \"0.1.0\")]\n#[command(about = \"AGNOS Desktop Environment\", long_about = None)]\nstruct Args {\n    #[arg(short, long, default_value = \"wayland\")]\n    #[arg(help = \"Display server backend (wayland, x11)\")]\n    backend: String,\n\n    #[arg(short, long)]\n    #[arg(help = \"Start in kiosk mode\")]\n    kiosk: bool,\n\n    #[arg(short, long)]\n    #[arg(help = \"Disable AI features\")]\n    no_ai: bool,\n\n    #[arg(short, long)]\n    #[arg(help = \"Enable secure mode\")]\n    secure: bool,\n}\n\nstruct DesktopEnvironment {\n    compositor: Arc\u003cCompositor\u003e,\n    shell: Arc\u003cDesktopShell\u003e,\n    ai_features: Arc\u003cAIDesktopFeatures\u003e,\n    apps: Arc\u003ctokio::sync::Mutex\u003cDesktopApplications\u003e\u003e,\n    security_ui: Arc\u003cSecurityUI\u003e,\n    running: Arc\u003ctokio::sync::Mutex\u003cbool\u003e\u003e,\n}\n\nimpl DesktopEnvironment {\n    async fn new(args: \u0026Args) -\u003e Self {\n        info!(\"Initializing AGNOS Desktop Environment\");\n\n        let compositor = Arc::new(Compositor::new());\n        let shell = Arc::new(DesktopShell::new());\n        let ai_features = Arc::new(AIDesktopFeatures::new());\n        let apps = Arc::new(tokio::sync::Mutex::new(DesktopApplications::new()));\n        let security_ui = Arc::new(SecurityUI::new());\n        let running = Arc::new(tokio::sync::Mutex::new(false));\n\n        if args.secure {\n            compositor.set_secure_mode(true);\n            security_ui.set_security_level(SecurityLevel::Elevated);\n        }\n\n        if !args.no_ai {\n            info!(\"AI features enabled\");\n        }\n\n        Self {\n            compositor,\n            shell,\n            ai_features,\n            apps,\n            security_ui,\n            running,\n        }\n    }\n\n    async fn initialize(\u0026self) -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n        info!(\"Initializing compositor backend\");\n\n        info!(\"Loading desktop shell\");\n        self.shell.show_notification(Notification {\n            app_name: \"AGNOS Desktop\".to_string(),\n            title: \"Welcome to AGNOS\".to_string(),\n            body: \"Your AI-native desktop environment\".to_string(),\n            priority: NotificationPriority::Normal,\n            timestamp: chrono::Utc::now(),\n            requires_action: false,\n            is_agent_related: false,\n            ..Default::default()\n        });\n\n        info!(\"Initializing AI desktop features\");\n        self.ai_features.set_proactive_mode(true);\n        self.ai_features.set_ambient_enabled(true);\n\n        info!(\"Starting system applications\");\n\n        Ok(())\n    }\n\n    async fn run(\u0026self) -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n        info!(\"Desktop environment running\");\n        *self.running.lock().await = true;\n\n        let mut interval = tokio::time::interval(Duration::from_secs(5));\n\n        loop {\n            tokio::select! {\n                _ = interval.tick() =\u003e {\n                    self.update_system_status().await;\n                }\n                _ = signal::ctrl_c() =\u003e {\n                    info!(\"Received shutdown signal\");\n                    break;\n                }\n            }\n        }\n\n        self.shutdown().await;\n        Ok(())\n    }\n\n    async fn update_system_status(\u0026self) {\n        let status = shell::SystemStatus {\n            cpu_usage: 25.0,\n            memory_usage: 40.0,\n            disk_usage: 60.0,\n            battery_level: Some(85),\n            network_status: shell::NetworkStatus::Connected,\n            agent_count: 2,\n        };\n        self.shell.update_system_status(status);\n\n        self.ai_features.update_context(ContextEvent {\n            id: uuid::Uuid::new_v4(),\n            event_type: ContextEventType::UserPresent,\n            source: \"desktop\".to_string(),\n            timestamp: chrono::Utc::now(),\n            metadata: Default::default(),\n        });\n    }\n\n    async fn shutdown(\u0026self) {\n        info!(\"Shutting down desktop environment\");\n        *self.running.lock().await = false;\n\n        self.shell.show_notification(Notification {\n            app_name: \"AGNOS Desktop\".to_string(),\n            title: \"Shutting down\".to_string(),\n            body: \"Goodbye!\".to_string(),\n            priority: NotificationPriority::Low,\n            timestamp: chrono::Utc::now(),\n            requires_action: false,\n            is_agent_related: false,\n            ..Default::default()\n        });\n\n        info!(\"Desktop environment stopped\");\n    }\n}\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n    tracing_subscriber::fmt()\n        .with_env_filter(EnvFilter::from_default_env())\n        .init();\n\n    let args = Args::parse();\n\n    info!(\"AGNOS Desktop Environment v0.1.0\");\n    info!(\"Backend: {}\", args.backend);\n\n    let desktop = DesktopEnvironment::new(\u0026args).await;\n    desktop.initialize().await?;\n\n    desktop.run().await?;\n\n    Ok(())\n}\n","traces":[{"line":53,"address":[4975216,4975361,4975391,4977248,4975263],"length":1,"stats":{"Line":0}},{"line":54,"address":[4975437,4975333,4 ,"length":1,"stats":{"Line":0}},{"line":183,"address":[4987347],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":59},{"path":["/","home","macro","Repos","agnosticos","userland","desktop-environment","src","security_ui.rs"],"content":"use std::collections::HashMap;\nuse std::sync::{Arc, RwLock};\nuse thiserror::Error;\nuse tracing::{debug, error, info, warn};\nuse uuid::Uuid;\n\n#[derive(Debug, Error)]\npub enum SecurityUIError {\n    #[error(\"Permission not found: {0}\")]\n    PermissionNotFound(String),\n    #[error(\"Alert not found: {0}\")]\n    AlertNotFound(Uuid),\n    #[error(\"Action blocked: {0}\")]\n    ActionBlocked(String),\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord)]\npub enum ThreatLevel {\n    Low,\n    Medium,\n    High,\n    Critical,\n}\n\n#[derive(Debug, Clone)]\npub struct SecurityAlert {\n    pub id: Uuid,\n    pub title: String,\n    pub description: String,\n    pub threat_level: ThreatLevel,\n    pub source: String,\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub requires_action: bool,\n    pub is_resolved: bool,\n}\n\nimpl Default for SecurityAlert {\n    fn default() -\u003e Self {\n        Self {\n            id: Uuid::new_v4(),\n            title: String::new(),\n            description: String::new(),\n            threat_level: ThreatLevel::Low,\n            source: String::new(),\n            timestamp: chrono::Utc::now(),\n            requires_action: false,\n            is_resolved: false,\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct PermissionRequest {\n    pub id: Uuid,\n    pub agent_id: Uuid,\n    pub agent_name: String,\n    pub permission: String,\n    pub resource: String,\n    pub reason: String,\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub is_granted: bool,\n}\n\n#[derive(Debug, Clone)]\npub struct PermissionDefinition {\n    pub name: String,\n    pub description: String,\n    pub category: PermissionCategory,\n    pub requires_confirmation: bool,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum PermissionCategory {\n    FileSystem,\n    Network,\n    Process,\n    Hardware,\n    Agent,\n    System,\n}\n\n#[derive(Debug, Clone)]\npub struct AgentPermission {\n    pub agent_id: Uuid,\n    pub agent_name: String,\n    pub permissions: Vec\u003cString\u003e,\n    pub granted_at: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub expires_at: Option\u003cchrono::DateTime\u003cchrono::Utc\u003e\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct SecurityDashboard {\n    pub threat_level: ThreatLevel,\n    pub active_alerts: usize,\n    pub pending_permissions: usize,\n    pub running_agents: usize,\n    pub last_scan: chrono::DateTime\u003cchrono::Utc\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct OverrideRequest {\n    pub id: Uuid,\n    pub agent_name: String,\n    pub action: String,\n    pub reason: String,\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub is_approved: bool,\n    pub approved_by: Option\u003cString\u003e,\n}\n\n#[derive(Debug)]\npub struct SecurityUI {\n    alerts: Arc\u003cRwLock\u003cVec\u003cSecurityAlert\u003e\u003e\u003e,\n    permission_requests: Arc\u003cRwLock\u003cVec\u003cPermissionRequest\u003e\u003e\u003e,\n    agent_permissions: Arc\u003cRwLock\u003cHashMap\u003cUuid, AgentPermission\u003e\u003e\u003e,\n    override_requests: Arc\u003cRwLock\u003cVec\u003cOverrideRequest\u003e\u003e\u003e,\n    permission_definitions: Arc\u003cRwLock\u003cVec\u003cPermissionDefinition\u003e\u003e\u003e,\n    security_level: Arc\u003cRwLock\u003cSecurityLevel\u003e\u003e,\n    emergency_mode: Arc\u003cRwLock\u003cbool\u003e\u003e,\n    human_override_enabled: Arc\u003cRwLock\u003cbool\u003e\u003e,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum SecurityLevel {\n    Standard,\n    Elevated,\n    Lockdown,\n}\n\nimpl Default for SecurityLevel {\n    fn default() -\u003e Self {\n        SecurityLevel::Standard\n    }\n}\n\nimpl SecurityUI {\n    pub fn new() -\u003e Self {\n        let mut ui = Self {\n            alerts: Arc::new(RwLock::new(Vec::new())),\n            permission_requests: Arc::new(RwLock::new(Vec::new())),\n            agent_permissions: Arc::new(RwLock::new(HashMap::new())),\n            override_requests: Arc::new(RwLock::new(Vec::new())),\n            permission_definitions: Arc::new(RwLock::new(Vec::new())),\n            security_level: Arc::new(RwLock::new(SecurityLevel::Standard)),\n            emergency_mode: Arc::new(RwLock::new(false)),\n            human_override_enabled: Arc::new(RwLock::new(true)),\n        };\n\n        ui.initialize_permission_definitions();\n        ui\n    }\n\n    fn initialize_permission_definitions(\u0026self) {\n        let mut defs = self.permission_definitions.write().unwrap();\n\n        defs.push(PermissionDefinition {\n            name: \"file:read\".to_string(),\n            description: \"Read files in specified directories\".to_string(),\n            category: PermissionCategory::FileSystem,\n            requires_confirmation: false,\n        });\n\n        defs.push(PermissionDefinition {\n            name: \"file:write\".to_string(),\n            description: \"Create or modify files\".to_string(),\n            category: PermissionCategory::FileSystem,\n            requires_confirmation: true,\n        });\n\n        defs.push(PermissionDefinition {\n            name: \"file:delete\".to_string(),\n            description: \"Delete files and directories\".to_string(),\n            category: PermissionCategory::FileSystem,\n            requires_confirmation: true,\n        });\n\n        defs.push(PermissionDefinition {\n            name: \"network:outbound\".to_string(),\n            description: \"Make outbound network connections\".to_string(),\n            category: PermissionCategory::Network,\n            requires_confirmation: false,\n        });\n\n        defs.push(PermissionDefinition {\n            name: \"process:spawn\".to_string(),\n            description: \"Start new processes\".to_string(),\n            category: PermissionCategory::Process,\n            requires_confirmation: true,\n        });\n\n        defs.push(PermissionDefinition {\n            name: \"agent:delegate\".to_string(),\n            description: \"Delegate tasks to other agents\".to_string(),\n            category: PermissionCategory::Agent,\n            requires_confirmation: true,\n        });\n\n        info!(\"Initialized {} permission definitions\", defs.len());\n    }\n\n    pub fn show_security_alert(\u0026self, alert: SecurityAlert) {\n        let mut alerts = self.alerts.write().unwrap();\n        alerts.push(alert.clone());\n\n        if alert.threat_level == ThreatLevel::Critical {\n            warn!(\"CRITICAL SECURITY ALERT: {}\", alert.title);\n        }\n\n        debug!(\"Security alert: {}\", alert.title);\n    }\n\n    pub fn dismiss_alert(\u0026self, alert_id: Uuid) -\u003e Result\u003c(), SecurityUIError\u003e {\n        let mut alerts = self.alerts.write().unwrap();\n        if let Some(alert) = alerts.iter_mut().find(|a| a.id == alert_id) {\n            alert.is_resolved = true;\n        }\n        Ok(())\n    }\n\n    pub fn request_permission(\u0026self, request: PermissionRequest) {\n        let permission = request.permission.clone();\n        let mut requests = self.permission_requests.write().unwrap();\n        requests.push(request);\n        info!(\"Permission request: {}\", permission);\n    }\n\n    pub fn grant_permission(\u0026self, request_id: Uuid) -\u003e Result\u003c(), SecurityUIError\u003e {\n        let mut requests = self.permission_requests.write().unwrap();\n        if let Some(req) = requests.iter_mut().find(|r| r.id == request_id) {\n            req.is_granted = true;\n            info!(\"Permission granted: {}\", req.permission);\n        }\n        Ok(())\n    }\n\n    pub fn deny_permission(\u0026self, request_id: Uuid) -\u003e Result\u003c(), SecurityUIError\u003e {\n        let mut requests = self.permission_requests.write().unwrap();\n        requests.retain(|r| r.id != request_id);\n        info!(\"Permission denied: {}\", request_id);\n        Ok(())\n    }\n\n    pub fn set_agent_permissions(\n        \u0026self,\n        agent_id: Uuid,\n        agent_name: String,\n        permissions: Vec\u003cString\u003e,\n    ) {\n        let mut perms = self.agent_permissions.write().unwrap();\n        perms.insert(\n            agent_id,\n            AgentPermission {\n                agent_id,\n                agent_name,\n                permissions,\n                granted_at: chrono::Utc::now(),\n                expires_at: None,\n            },\n        );\n        info!(\"Agent permissions set for {:?}\", agent_id);\n    }\n\n    pub fn revoke_agent_permissions(\u0026self, agent_id: Uuid) -\u003e Result\u003c(), SecurityUIError\u003e {\n        let mut perms = self.agent_permissions.write().unwrap();\n        if perms.remove(\u0026agent_id).is_some() {\n            info!(\"Permissions revoked for {:?}\", agent_id);\n            Ok(())\n        } else {\n            Err(SecurityUIError::PermissionNotFound(format!(\n                \"{:?}\",\n                agent_id\n            )))\n        }\n    }\n\n    pub fn request_human_override(\n        \u0026self,\n        agent_name: String,\n        action: String,\n        reason: String,\n    ) -\u003e Uuid {\n        let agent_name_clone = agent_name.clone();\n        let id = Uuid::new_v4();\n        let request = OverrideRequest {\n            id,\n            agent_name: agent_name_clone,\n            action,\n            reason,\n            timestamp: chrono::Utc::now(),\n            is_approved: false,\n            approved_by: None,\n        };\n\n        let mut requests = self.override_requests.write().unwrap();\n        requests.push(request);\n\n        warn!(\"Human override requested by {}\", agent_name);\n        id\n    }\n\n    pub fn approve_override(\n        \u0026self,\n        request_id: Uuid,\n        approver: String,\n    ) -\u003e Result\u003c(), SecurityUIError\u003e {\n        let approver_clone = approver.clone();\n        let mut requests = self.override_requests.write().unwrap();\n        if let Some(req) = requests.iter_mut().find(|r| r.id == request_id) {\n            req.is_approved = true;\n            req.approved_by = Some(approver);\n            info!(\"Override approved by {}\", approver_clone);\n            Ok(())\n        } else {\n            Err(SecurityUIError::AlertNotFound(request_id))\n        }\n    }\n\n    pub fn emergency_kill_switch(\u0026self) {\n        *self.emergency_mode.write().unwrap() = true;\n        *self.human_override_enabled.write().unwrap() = false;\n\n        let mut requests = self.override_requests.write().unwrap();\n        for req in requests.iter_mut() {\n            req.is_approved = false;\n        }\n\n        warn!(\"EMERGENCY KILL SWITCH ACTIVATED\");\n    }\n\n    pub fn deactivate_emergency(\u0026self) {\n        *self.emergency_mode.write().unwrap() = false;\n        info!(\"Emergency mode deactivated\");\n    }\n\n    pub fn set_security_level(\u0026self, level: SecurityLevel) {\n        let level_clone = level.clone();\n        *self.security_level.write().unwrap() = level;\n        match level_clone {\n            SecurityLevel::Standard =\u003e info!(\"Security level: Standard\"),\n            SecurityLevel::Elevated =\u003e warn!(\"Security level: Elevated\"),\n            SecurityLevel::Lockdown =\u003e {\n                warn!(\"SECURITY LEVEL: LOCKDOWN\");\n            }\n        }\n    }\n\n    pub fn get_security_dashboard(\u0026self) -\u003e SecurityDashboard {\n        let alerts = self.alerts.read().unwrap();\n        let requests = self.permission_requests.read().unwrap();\n        let agent_perms = self.agent_permissions.read().unwrap();\n\n        let active_alerts = alerts.iter().filter(|a| !a.is_resolved).count();\n        let pending = requests.iter().filter(|r| !r.is_granted).count();\n\n        let max_threat = alerts\n            .iter()\n            .filter(|a| !a.is_resolved)\n            .map(|a| a.threat_level.clone())\n            .max()\n            .unwrap_or(ThreatLevel::Low);\n\n        SecurityDashboard {\n            threat_level: max_threat,\n            active_alerts,\n            pending_permissions: pending,\n            running_agents: agent_perms.len(),\n            last_scan: chrono::Utc::now(),\n        }\n    }\n\n    pub fn get_active_alerts(\u0026self) -\u003e Vec\u003cSecurityAlert\u003e {\n        self.alerts\n            .read()\n            .unwrap()\n            .iter()\n            .filter(|a| !a.is_resolved)\n            .cloned()\n            .collect()\n    }\n\n    pub fn get_pending_permissions(\u0026self) -\u003e Vec\u003cPermissionRequest\u003e {\n        self.permission_requests\n            .read()\n            .unwrap()\n            .iter()\n            .filter(|r| !r.is_granted)\n            .cloned()\n            .collect()\n    }\n\n    pub fn get_override_requests(\u0026self) -\u003e Vec\u003cOverrideRequest\u003e {\n        self.override_requests\n            .read()\n            .unwrap()\n            .iter()\n            .filter(|r| !r.is_approved)\n            .cloned()\n            .collect()\n    }\n\n    pub fn is_emergency_mode(\u0026self) -\u003e bool {\n        *self.emergency_mode.read().unwrap()\n    }\n\n    pub fn get_security_level(\u0026self) -\u003e SecurityLevel {\n        self.security_level.read().unwrap().clone()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_threat_level_variants() {\n        assert!(matches!(ThreatLevel::Low, ThreatLevel::Low));\n        assert!(matches!(ThreatLevel::Medium, ThreatLevel::Medium));\n        assert!(matches!(ThreatLevel::High, ThreatLevel::High));\n        assert!(matches!(ThreatLevel::Critical, ThreatLevel::Critical));\n    }\n\n    #[test]\n    fn test_security_alert_default() {\n        let alert = SecurityAlert::default();\n        assert_eq!(alert.threat_level, ThreatLevel::Low);\n        assert!(!alert.requires_action);\n        assert!(!alert.is_resolved);\n    }\n\n    #[test]\n    fn test_security_alert_custom() {\n        let alert = SecurityAlert {\n            id: Uuid::new_v4(),\n            title: \"Suspicious Activity\".to_string(),\n            description: \"Detected unusual behavior\".to_string(),\n            threat_level: ThreatLevel::High,\n            source: \"agent-runtime\".to_string(),\n            timestamp: chrono::Utc::now(),\n            requires_action: true,\n            is_resolved: false,\n        };\n        assert_eq!(alert.threat_level, ThreatLevel::High);\n        assert!(alert.requires_action);\n    }\n\n    #[test]\n    fn test_permission_request() {\n        let request = PermissionRequest {\n            id: Uuid::new_v4(),\n            agent_id: Uuid::new_v4(),\n            agent_name: \"test-agent\".to_string(),\n            permission: \"file:read\".to_string(),\n            resource: \"/home\".to_string(),\n            reason: \"Reading files\".to_string(),\n            timestamp: chrono::Utc::now(),\n            is_granted: false,\n        };\n        assert_eq!(request.agent_name, \"test-agent\");\n        assert!(!request.is_granted);\n    }\n\n    #[test]\n    fn test_permission_definition() {\n        let def = PermissionDefinition {\n            name: \"test:permission\".to_string(),\n            description: \"Test permission\".to_string(),\n            category: PermissionCategory::Agent,\n            requires_confirmation: true,\n        };\n        assert_eq!(def.name, \"test:permission\");\n        assert!(def.requires_confirmation);\n    }\n\n    #[test]\n    fn test_permission_category() {\n        assert!(matches!(\n            PermissionCategory::FileSystem,\n            PermissionCategory::FileSystem\n        ));\n        assert!(matches!(\n            PermissionCategory::Network,\n            PermissionCategory::Network\n        ));\n        assert!(matches!(\n            PermissionCategory::Agent,\n            PermissionCategory::Agent\n        ));\n    }\n\n    #[test]\n    fn test_security_level() {\n        assert!(matches!(SecurityLevel::Standard, SecurityLevel::Standard));\n        assert!(matches!(SecurityLevel::Elevated, SecurityLevel::Elevated));\n        assert!(matches!(SecurityLevel::Lockdown, SecurityLevel::Lockdown));\n    }\n\n    #[test]\n    fn test_security_level_default() {\n        let level = SecurityLevel::default();\n        assert!(matches!(level, SecurityLevel::Standard));\n    }\n\n    #[test]\n    fn test_security_dashboard() {\n        let dashboard = SecurityDashboard {\n            threat_level: ThreatLevel::Medium,\n            active_alerts: 5,\n            pending_permissions: 3,\n            running_agents: 2,\n            last_scan: chrono::Utc::now(),\n        };\n        assert_eq!(dashboard.active_alerts, 5);\n        assert_eq!(dashboard.running_agents, 2);\n    }\n\n    #[test]\n    fn test_override_request() {\n        let request = OverrideRequest {\n            id: Uuid::new_v4(),\n            agent_name: \"test-agent\".to_string(),\n            action: \"delete\".to_string(),\n            reason: \"Cleanup\".to_string(),\n            timestamp: chrono::Utc::now(),\n            is_approved: false,\n            approved_by: None,\n        };\n        assert!(!request.is_approved);\n        assert!(request.approved_by.is_none());\n    }\n}\n","traces":[{"line":38,"address":[5103819,5103825,5103488],"length":1,"stats":{"Line":2}},{"line":40,"address":[1401152],"length":1,"stats":{"Line":2}},{"line":41,"address":[1401171],"length":1,"stats":{"Line":2}},{"line":42,"address":[1401181],"length":1,"stats":{"Line":2}},{"line":44,"address":[1401231],"length":1,"stats":{"Line":2}},{"line":45,"address":[1401273],"length":1,"stats":{"Line":2}},{"line":137,"address":[1395397,1395403,1394448],"length":1,"stats":{"Line":0 n: bool,\n    pub is_agent_related: bool,\n}\n\nimpl Default for Notification {\n    fn default() -\u003e Self {\n        Self {\n            id: Uuid::new_v4(),\n            app_name: String::new(),\n            title: String::new(),\n            body: String::new(),\n            priority: NotificationPriority::Normal,\n            timestamp: chrono::Utc::now(),\n            requires_action: false,\n            is_agent_related: false,\n        }\n    }\n}\n\npub struct QuickSetting {\n    pub id: String,\n    pub name: String,\n    pub icon: String,\n    pub is_active: bool,\n    #[doc(hidden)]\n    pub on_activate: Box\u003cdyn Fn() + Send + Sync\u003e,\n}\n\nimpl std::fmt::Debug for QuickSetting {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.debug_struct(\"QuickSetting\")\n            .field(\"id\", \u0026self.id)\n            .field(\"name\", \u0026self.name)\n            .field(\"icon\", \u0026self.icon)\n            .field(\"is_active\", \u0026self.is_active)\n            .field(\"on_activate\", \u0026\"\u003cfunction\u003e\")\n            .finish()\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct SystemStatus {\n    pub cpu_usage: f32,\n    pub memory_usage: f32,\n    pub disk_usage: f32,\n    pub battery_level: Option\u003cu8\u003e,\n    pub network_status: NetworkStatus,\n    pub agent_count: usize,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum NetworkStatus {\n    Connected,\n    Disconnected,\n    Connecting,\n    Error,\n}\n\n#[derive(Debug, Clone)]\npub struct AppEntry {\n    pub id: String,\n    pub name: String,\n    pub icon: String,\n    pub category: AppCategory,\n    pub is_ai_app: bool,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum AppCategory {\n    System,\n    Office,\n    Development,\n    Communication,\n    Media,\n    Graphics,\n    AI,\n    Other,\n}\n\n#[derive(Debug, Clone)]\npub struct LauncherItem {\n    pub id: String,\n    pub name: String,\n    pub description: String,\n    pub icon: String,\n    pub app: Option\u003cAppEntry\u003e,\n    pub action: Option\u003cLauncherAction\u003e,\n    pub is_suggested: bool,\n    pub relevance_score: f32,\n}\n\n#[derive(Debug, Clone)]\npub enum LauncherAction {\n    OpenApp(String),\n    RunCommand(String),\n    SearchFiles(String),\n    WebSearch(String),\n}\n\n#[derive(Debug)]\npub struct DesktopShell {\n    notifications: Arc\u003cRwLock\u003cHashMap\u003cNotificationId, Notification\u003e\u003e\u003e,\n    quick_settings: Arc\u003cRwLock\u003cVec\u003cQuickSetting\u003e\u003e\u003e,\n    system_status: Arc\u003cRwLock\u003cSystemStatus\u003e\u003e,\n    launcher_items: Arc\u003cRwLock\u003cVec\u003cLauncherItem\u003e\u003e\u003e,\n    app_registry: Arc\u003cRwLock\u003cHashMap\u003cString, AppEntry\u003e\u003e\u003e,\n    is_locked: Arc\u003cRwLock\u003cbool\u003e\u003e,\n    panel_visible: Arc\u003cRwLock\u003cbool\u003e\u003e,\n}\n\nimpl DesktopShell {\n    pub fn new() -\u003e Self {\n        let mut shell = Self {\n            notifications: Arc::new(RwLock::new(HashMap::new())),\n            quick_settings: Arc::new(RwLock::new(Vec::new())),\n            system_status: Arc::new(RwLock::new(SystemStatus {\n                cpu_usage: 0.0,\n                memory_usage: 0.0,\n                disk_usage: 0.0,\n                battery_level: None,\n                network_status: NetworkStatus::Connected,\n                agent_count: 0,\n            })),\n            launcher_items: Arc::new(RwLock::new(Vec::new())),\n            app_registry: Arc::new(RwLock::new(HashMap::new())),\n            is_locked: Arc::new(RwLock::new(false)),\n            panel_visible: Arc::new(RwLock::new(true)),\n        };\n\n        shell.initialize_quick_settings();\n        shell.initialize_app_registry();\n        shell.populate_launcher_items();\n\n        shell\n    }\n\n    fn initialize_quick_settings(\u0026self) {\n        let mut settings = self.quick_settings.write().unwrap();\n\n        settings.push(QuickSetting {\n            id: \"wifi\".to_string(),\n            name: \"Wi-Fi\".to_string(),\n            icon: \"wifi\".to_string(),\n            is_active: true,\n            on_activate: Box::new(|| {\n                info!(\"Wi-Fi toggle activated\");\n            }),\n        });\n\n        settings.push(QuickSetting {\n            id: \"bluetooth\".to_string(),\n            name: \"Bluetooth\".to_string(),\n            icon: \"bluetooth\".to_string(),\n            is_active: false,\n            on_activate: Box::new(|| {\n                info!(\"Bluetooth toggle activated\");\n            }),\n        });\n\n        settings.push(QuickSetting {\n            id: \"airplane\".to_string(),\n            name: \"Airplane Mode\".to_string(),\n            icon: \"airplane\".to_string(),\n            is_active: false,\n            on_activate: Box::new(|| {\n                info!(\"Airplane mode toggle activated\");\n            }),\n        });\n\n        settings.push(QuickSetting {\n            id: \"dnd\".to_string(),\n            name: \"Do Not Disturb\".to_string(),\n            icon: \"dnd\".to_string(),\n            is_active: false,\n            on_activate: Box::new(|| {\n                info!(\"Do Not Disturb toggle activated\");\n            }),\n        });\n\n        settings.push(QuickSetting {\n            id: \"nightlight\".to_string(),\n            name: \"Night Light\".to_string(),\n            icon: \"nightlight\".to_string(),\n            is_active: true,\n            on_activate: Box::new(|| {\n                info!(\"Night Light toggle activated\");\n            }),\n        });\n\n        info!(\"Quick settings initialized\");\n    }\n\n    fn initialize_app_registry(\u0026self) {\n        let mut registry = self.app_registry.write().unwrap();\n\n        let system_apps = [\n            (\"terminal\", \"Terminal\", \"terminal\", true),\n            (\"filemanager\", \"File Manager\", \"folder\", false),\n            (\"settings\", \"Settings\", \"settings\", false),\n            (\"agent-manager\", \"Agent Manager\", \"bot\", true),\n            (\"audit-viewer\", \"Audit Viewer\", \"shield\", true),\n            (\"model-manager\", \"Model Manager\", \"cpu\", true),\n        ];\n\n        for (id, name, icon, is_ai) in system_apps {\n            registry.insert(\n                id.to_string(),\n                AppEntry {\n                    id: id.to_string(),\n                    name: name.to_string(),\n                    icon: icon.to_string(),\n                    category: AppCategory::System,\n                    is_ai_app: is_ai,\n                },\n            );\n        }\n\n        info!(\"App registry initialized with {} entries\", registry.len());\n    }\n\n    fn populate_launcher_items(\u0026self) {\n        let registry = self.app_registry.read().unwrap();\n        let mut items = self.launcher_items.write().unwrap();\n\n        for app in registry.values() {\n            items.push(LauncherItem {\n                id: format!(\"app-{}\", app.id),\n                name: app.name.clone(),\n                description: format!(\"Launch {}\", app.name),\n                icon: app.icon.clone(),\n                app: Some(app.clone()),\n                action: Some(LauncherAction::OpenApp(app.id.clone())),\n                is_suggested: false,\n                relevance_score: 1.0,\n            });\n        }\n\n        items.push(LauncherItem {\n            id: \"search-files\".to_string(),\n            name: \"Search Files\".to_string(),\n            description: \"Search for files on the system\".to_string(),\n            icon: \"search\".to_string(),\n            app: None,\n            action: Some(LauncherAction::SearchFiles(String::new())),\n            is_suggested: false,\n            relevance_score: 0.8,\n        });\n\n        info!(\"Launcher populated with {} items\", items.len());\n    }\n\n    pub fn show_notification(\u0026self, notification: Notification) {\n        let title = notification.title.clone();\n        let mut notifications = self.notifications.write().unwrap();\n        notifications.insert(notification.id, notification);\n        info!(\"Notification shown: {}\", title);\n    }\n\n    pub fn dismiss_notification(\u0026self, id: NotificationId) -\u003e Result\u003c(), ShellError\u003e {\n        let mut notifications = self.notifications.write().unwrap();\n        if !notifications.contains_key(\u0026id) {\n            return Err(ShellError::NotificationNotFound(id));\n        }\n        notifications.remove(\u0026id);\n        info!(\"Notification dismissed: {}\", id);\n        Ok(())\n    }\n\n    pub fn show_agent_notification(\u0026self, title: String, body: String, requires_action: bool) {\n        let notification = Notification {\n            id: Uuid::new_v4(),\n            app_name: \"AGNOS Agent\".to_string(),\n            title,\n            body,\n            priority: if requires_action {\n                NotificationPriority::High\n            } else {\n                NotificationPriority::Normal\n            },\n            timestamp: chrono::Utc::now(),\n            requires_action,\n            is_agent_related: true,\n        };\n        self.show_notification(notification);\n    }\n\n    pub fn request_human_override(\u0026self, agent_name: String, action: String, reason: String) {\n        let agent_name_clone = agent_name.clone();\n        let notification = Notification {\n            id: Uuid::new_v4(),\n            app_name: format!(\"Agent: {}\", agent_name_clone),\n            title: \"Human Override Requested\".to_string(),\n            body: format!(\n                \"{}\\n\\nAction: {}\\nReason: {}\",\n                agent_name_clone, action, reason\n            ),\n            priority: NotificationPriority::Critical,\n            timestamp: chrono::Utc::now(),\n            requires_action: true,\n            is_agent_related: true,\n        };\n        self.show_notification(notification);\n        warn!(\"Human override requested by {}\", agent_name);\n    }\n\n    pub fn toggle_quick_setting(\u0026self, setting_id: \u0026str) -\u003e Result\u003c(), ShellError\u003e {\n        let mut settings = self.quick_settings.write().unwrap();\n        let setting = settings\n            .iter_mut()\n            .find(|s| s.id == setting_id)\n            .ok_or(ShellError::AppNotFound(setting_id.to_string()))?;\n\n        setting.is_active = !setting.is_active;\n        (setting.on_activate)();\n\n        info!(\n            \"Quick setting {} toggled to {}\",\n            setting_id, setting.is_active\n        );\n        Ok(())\n    }\n\n    pub fn search_launcher(\u0026self, query: \u0026str) -\u003e Vec\u003cLauncherItem\u003e {\n        let items = self.launcher_items.read().unwrap();\n        let query = query.to_lowercase();\n\n        let mut results: Vec\u003c_\u003e = items\n            .iter()\n            .filter(|item| {\n                item.name.to_lowercase().contains(\u0026query)\n                    || item.description.to_lowercase().contains(\u0026query)\n            })\n            .cloned()\n            .collect();\n\n        results.sort_by(|a, b| b.relevance_score.partial_cmp(\u0026a.relevance_score).unwrap());\n\n        if !query.is_empty() {\n            for item in \u0026mut results {\n                if item.name.to_lowercase().starts_with(\u0026query) {\n                    item.relevance_score *= 1.5;\n                }\n            }\n        }\n\n        results\n    }\n\n    pub fn launch_app(\u0026self, app_id: \u0026str) -\u003e Result\u003c(), ShellError\u003e {\n        let registry = self.app_registry.read().unwrap();\n        if !registry.contains_key(app_id) {\n            return Err(ShellError::AppNotFound(app_id.to_string()));\n        }\n\n        info!(\"Launching application: {}\", app_id);\n        Ok(())\n    }\n\n    pub fn lock_screen(\u0026self) {\n        *self.is_locked.write().unwrap() = true;\n        info!(\"Screen locked\");\n    }\n\n    pub fn unlock_screen(\u0026self) {\n        *self.is_locked.write().unwrap() = false;\n        info!(\"Screen unlocked\");\n    }\n\n    pub fn is_locked(\u0026self) -\u003e bool {\n        *self.is_locked.read().unwrap()\n    }\n\n    pub fn toggle_panel(\u0026self) {\n        let mut visible = self.panel_visible.write().unwrap();\n        *visible = !*visible;\n        info!(\"Panel visibility: {}\", *visible);\n    }\n\n    pub fn get_notifications(\u0026self) -\u003e Vec\u003cNotification\u003e {\n        self.notifications\n            .read()\n            .unwrap()\n            .values()\n            .cloned()\n            .collect()\n    }\n\n    pub fn get_quick_settings(\u0026self) -\u003e Vec\u003cQuickSetting\u003e {\n        // QuickSetting contains closures and cannot be cloned\n        // Return empty vec for now - needs proper handling\n        Vec::new()\n    }\n\n    pub fn get_system_status(\u0026self) -\u003e SystemStatus {\n        self.system_status.read().unwrap().clone()\n    }\n\n    pub fn update_system_status(\u0026self, status: SystemStatus) {\n        *self.system_status.write().unwrap() = status;\n    }\n\n    pub fn set_agent_count(\u0026self, count: usize) {\n        let mut status = self.system_status.write().unwrap();\n        status.agent_count = count;\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_notification_priority_variants() {\n        assert!(matches!(\n            NotificationPriority::Low,\n            NotificationPriority::Low\n        ));\n        assert!(matches!(\n            NotificationPriority::Normal,\n            NotificationPriority::Normal\n        ));\n        assert!(matches!(\n            NotificationPriority::High,\n            NotificationPriority::High\n        ));\n        assert!(matches!(\n            NotificationPriority::Critical,\n            NotificationPriority::Critical\n        ));\n    }\n\n al.prompt_tokens += usage.prompt_tokens;\n        total.completion_tokens += usage.completion_tokens;\n        total.total_tokens += usage.total_tokens;\n\n        debug!(\n            \"Recorded usage for agent {}: {} tokens (total: {})\",\n            agent_id, usage.total_tokens, total.total_tokens\n        );\n    }\n\n    /// Get token usage for a specific agent\n    pub async fn get_usage(\u0026self, agent_id: AgentId) -\u003e Option\u003cTokenUsage\u003e {\n        self.agent_usage.read().await.get(\u0026agent_id).copied()\n    }\n\n    /// Get total usage across all agents\n    pub async fn get_total_usage(\u0026self) -\u003e TokenUsage {\n        *self.total_usage.read().await\n    }\n\n    /// Reset usage for a specific agent\n    pub async fn reset_usage(\u0026self, agent_id: AgentId) {\n        let mut agent_usage = self.agent_usage.write().await;\n        agent_usage.remove(\u0026agent_id);\n        debug!(\"Reset token usage for agent {}\", agent_id);\n    }\n\n    /// Reset all usage data\n    pub async fn reset_all(\u0026self) {\n        let mut agent_usage = self.agent_usage.write().await;\n        agent_usage.clear();\n        \n        let mut total = self.total_usage.write().await;\n        *total = TokenUsage::default();\n        \n        debug!(\"Reset all token usage\");\n    }\n\n    /// List all agents with usage\n    pub async fn list_agents(\u0026self) -\u003e Vec\u003c(AgentId, TokenUsage)\u003e {\n        self.agent_usage\n            .read()\n            .await\n            .iter()\n            .map(|(k, v)| (*k, *v))\n            .collect()\n    }\n\n    /// Get usage statistics\n    pub async fn stats(\u0026self) -\u003e AccountingStats {\n        let agents = self.agent_usage.read().await;\n        let total = self.total_usage.read().await;\n        \n        AccountingStats {\n            total_agents: agents.len(),\n            total_prompt_tokens: total.prompt_tokens,\n            total_completion_tokens: total.completion_tokens,\n            total_tokens: total.total_tokens,\n        }\n    }\n}\n\nimpl Default for TokenAccounting {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Accounting statistics\n#[derive(Debug, Clone, Copy)]\npub struct AccountingStats {\n    pub total_agents: usize,\n    pub total_prompt_tokens: u32,\n    pub total_completion_tokens: u32,\n    pub total_tokens: u32,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use agnos_common::{AgentId, TokenUsage};\n\n    #[tokio::test]\n    async fn test_token_accounting_new() {\n        let accounting = TokenAccounting::new();\n        let stats = accounting.stats().await;\n        assert_eq!(stats.total_agents, 0);\n        assert_eq!(stats.total_tokens, 0);\n    }\n\n    #[tokio::test]\n    async fn test_record_usage() {\n        let accounting = TokenAccounting::new();\n        let agent_id = AgentId::new();\n        \n        let usage = TokenUsage {\n            prompt_tokens: 100,\n            completion_tokens: 200,\n            total_tokens: 300,\n        };\n        \n        accounting.record_usage(agent_id, usage).await;\n        \n        let agent_usage = accounting.get_usage(agent_id).await;\n        assert!(agent_usage.is_some());\n        assert_eq!(agent_usage.unwrap().total_tokens, 300);\n    }\n\n    #[tokio::test]\n    async fn test_get_total_usage() {\n        let accounting = TokenAccounting::new();\n        let agent_id = AgentId::new();\n        \n        let usage = TokenUsage {\n            prompt_tokens: 50,\n            completion_tokens: 100,\n            total_tokens: 150,\n        };\n        \n        accounting.record_usage(agent_id, usage).await;\n        \n        let total = accounting.get_total_usage().await;\n        assert_eq!(total.total_tokens, 150);\n    }\n\n    #[tokio::test]\n    async fn test_reset_usage() {\n        let accounting = TokenAccounting::new();\n        let agent_id = AgentId::new();\n        \n        let usage = TokenUsage {\n            prompt_tokens: 10,\n            completion_tokens: 20,\n            total_tokens: 30,\n        };\n        \n        accounting.record_usage(agent_id, usage).await;\n        accounting.reset_usage(agent_id).await;\n        \n        let agent_usage = accounting.get_usage(agent_id).await;\n        assert!(agent_usage.is_none());\n    }\n\n    #[tokio::test]\n    async fn test_reset_all() {\n        let accounting = TokenAccounting::new();\n        let agent_id = AgentId::new();\n        \n        let usage = TokenUsage {\n            prompt_tokens: 10,\n            completion_tokens: 20,\n            total_tokens: 30,\n        };\n        \n        accounting.record_usage(agent_id, usage).await;\n        accounting.reset_all().await;\n        \n        let stats = accounting.stats().await;\n        assert_eq!(stats.total_agents, 0);\n        assert_eq!(stats.total_tokens, 0);\n    }\n\n    #[tokio::test]\n    async fn test_list_agents() {\n        let accounting = TokenAccounting::new();\n        \n        let agent1 = AgentId::new();\n        let agent2 = AgentId::new();\n        \n        accounting.record_usage(agent1, TokenUsage { prompt_tokens: 10, completion_tokens: 20, total_tokens: 30 }).await;\n        accounting.record_usage(agent2, TokenUsage { prompt_tokens: 15, completion_tokens: 25, total_tokens: 40 }).await;\n        \n        let agents = accounting.list_agents().await;\n        assert_eq!(agents.len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_multiple_agents() {\n        let accounting = TokenAccounting::new();\n        \n        let agent1 = AgentId::new();\n        let agent2 = AgentId::new();\n        \n        accounting.record_usage(agent1, TokenUsage { prompt_tokens: 100, completion_tokens: 200, total_tokens: 300 }).await;\n        accounting.record_usage(agent2, TokenUsage { prompt_tokens: 50, completion_tokens: 100, total_tokens: 150 }).await;\n        \n        let total = accounting.get_total_usage().await;\n        assert_eq!(total.total_tokens, 450);\n    }\n}\n","traces":[{"line":19,"address":[9297956,9297760,9297962],"length":1,"stats":{"Line":7}},{"line":21,"address":[9297790],"length":1,"stats":{"Line":7}},{"line":22,"address":[9297866,9297825],"length":1,"stats":{"Line":14}},{"line":27,"address":[9218959,9217856,9218066,9218033,9217993,9218185,9217887],"length":1,"stats":{"Line":24}},{"line":29,"address":[9176111],"length":1,"stats":{"Line":12}},{"line":30,"address":[9218521,9218441],"length":1,"stats":{"Line":12}},{"line":31,"address":[9218671,9218603],"length":1,"stats":{"Line":6}},{"line":32,"address":[9218740,9218648,9218714],"length":1,"stats":{"Line":12}},{"line":33,"address":[9218781,9218717,9218827],"length":1,"stats":{"Line":12}},{"line":34,"address":[9218784],"length":1,"stats":{"Line":6}},{"line":37,"address":[9218973,9218041,9218856],"length":1,"stats":{"Line":6}},{"line":38,"address":[9219287,9219359,9219199],"length":1,"stats":{"Line":12}},{"line":39,"address":[9219392,9219329,9219457],"length":1,"stats":{"Line":12}},{"line":40,"address":[9219539,9219430,9219487],"length":1,"stats":{"Line":12}},{"line":42,"address":[9219878],"length":1,"stats":{"Line":0}},{"line":49,"address":[9222464,9222620,9222499,9222581,9222727,9223135],"length":1,"stats":{"Line":4}},{"line":50,"address":[9222608,9222675,9223036,9222574,9222758],"length":1,"stats":{"Line":3}},{"line":54,"address":[9220478,9220368,9220403,9220621,9221010,9220517],"length":1,"stats":{"Line":8}},{"line":55,"address":[9220505,9220922,9220459,9220569,9220652],"length":1,"stats":{"Line":6}},{"line":59,"address":[9216640,9216786,9216899,9217794,9216747,9216665],"length":1,"stats":{"Line":4}},{"line":60,"address":[9216740,9216930,9216774,9216844],"length":1,"stats":{"Line":2}},{"line":61,"address":[9217141,9217203],"length":1,"stats":{"Line":2}},{"line":62,"address":[9217222,9217492],"length":1,"stats":{"Line":1}},{"line":66,"address":[9223177,9223282,9223248,9223412,9223152,9223302,9223814],"length":1,"stats":{"Line":  a new cache with the specified TTL\n    pub fn new(ttl: Duration) -\u003e Self {\n        Self {\n            cache: RwLock::new(HashMap::new()),\n            ttl,\n        }\n    }\n\n    /// Generate a cache key from a request\n    fn make_key(request: \u0026InferenceRequest) -\u003e String {\n        // Create a deterministic key from request parameters\n        format!(\n            \"{}:{}:{:.2}:{:.2}:{}\",\n            request.model,\n            request.prompt,\n            request.temperature,\n            request.top_p,\n            request.max_tokens\n        )\n    }\n\n    /// Get a cached response if available and not expired\n    pub async fn get(\u0026self, request: \u0026InferenceRequest) -\u003e Option\u003cInferenceResponse\u003e {\n        let key = Self::make_key(request);\n        let cache = self.cache.read().await;\n        \n        if let Some(entry) = cache.get(\u0026key) {\n            if entry.expires_at \u003e Instant::now() {\n                return Some(entry.response.clone());\n            }\n        }\n        \n        None\n    }\n\n    /// Store a response in the cache\n    pub async fn set(\u0026self, request: InferenceRequest, response: InferenceResponse) {\n        let key = Self::make_key(\u0026request);\n        let entry = CacheEntry {\n            response,\n            expires_at: Instant::now() + self.ttl,\n        };\n        \n        let mut cache = self.cache.write().await;\n        cache.insert(key, entry);\n        \n        // Simple cleanup: if cache gets too large, clear old entries\n        if cache.len() \u003e 1000 {\n            self.cleanup_expired(\u0026mut cache).await;\n        }\n    }\n\n    /// Clean up expired entries\n    async fn cleanup_expired(\u0026self, cache: \u0026mut HashMap\u003cString, CacheEntry\u003e) {\n        let now = Instant::now();\n        cache.retain(|_, entry| entry.expires_at \u003e now);\n    }\n\n    /// Clear all cached entries\n    pub async fn clear(\u0026self) {\n        let mut cache = self.cache.write().await;\n        cache.clear();\n    }\n\n    /// Get cache statistics\n    pub async fn stats(\u0026self) -\u003e CacheStats {\n        let cache = self.cache.read().await;\n        let total = cache.len();\n        let expired = cache.values().filter(|e| e.expires_at \u003c= Instant::now()).count();\n        \n        CacheStats {\n            total_entries: total,\n            expired_entries: expired,\n            active_entries: total - expired,\n        }\n    }\n}\n\n/// Cache statistics\n#[derive(Debug, Clone)]\npub struct CacheStats {\n    pub total_entries: usize,\n    pub expired_entries: usize,\n    pub active_entries: usize,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use agnos_common::{FinishReason, InferenceResponse, TokenUsage};\n\n    #[tokio::test]\n    async fn test_cache_new() {\n        let cache = ResponseCache::new(Duration::from_secs(60));\n        let stats = cache.stats().await;\n        assert_eq!(stats.total_entries, 0);\n    }\n\n    #[tokio::test]\n    async fn test_cache_set_and_get() {\n        let cache = ResponseCache::new(Duration::from_secs(60));\n        \n        let request = InferenceRequest {\n            prompt: \"Hello\".to_string(),\n            model: \"test\".to_string(),\n            max_tokens: 100,\n            temperature: 0.7,\n            top_p: 1.0,\n            presence_penalty: 0.0,\n            frequency_penalty: 0.0,\n        };\n        \n        let response = InferenceResponse {\n            text: \"Hi there!\".to_string(),\n            tokens_generated: 5,\n            finish_reason: FinishReason::Stop,\n            model: \"test\".to_string(),\n            usage: TokenUsage {\n                prompt_tokens: 2,\n                completion_tokens: 5,\n                total_tokens: 7,\n            },\n        };\n        \n        cache.set(request.clone(), response.clone()).await;\n        \n        let cached = cache.get(\u0026request).await;\n        assert!(cached.is_some());\n    }\n\n    #[tokio::test]\n    async fn test_cache_miss() {\n        let cache = ResponseCache::new(Duration::from_secs(60));\n        \n        let request = InferenceRequest {\n            prompt: \"Different prompt\".to_string(),\n            model: \"test\".to_string(),\n            max_tokens: 100,\n            temperature: 0.7,\n            top_p: 1.0,\n            presence_penalty: 0.0,\n            frequency_penalty: 0.0,\n        };\n        \n        let cached = cache.get(\u0026request).await;\n        assert!(cached.is_none());\n    }\n\n    #[tokio::test]\n    async fn test_cache_clear() {\n        let cache = ResponseCache::new(Duration::from_secs(60));\n        \n        let request = InferenceRequest::default();\n        let response = InferenceResponse {\n            text: \"Test\".to_string(),\n            tokens_generated: 1,\n            finish_reason: FinishReason::Stop,\n            model: \"test\".to_string(),\n            usage: TokenUsage::default(),\n        };\n        \n        cache.set(request, response).await;\n        cache.clear().await;\n        \n        let stats = cache.stats().await;\n        assert_eq!(stats.total_entries, 0);\n    }\n\n    #[tokio::test]\n    async fn test_cache_stats() {\n        let cache = ResponseCache::new(Duration::from_secs(60));\n        \n        let stats = cache.stats().await;\n        assert_eq!(stats.active_entries, 0);\n    }\n}\n","traces":[{"line":24,"address":[9332320],"length":1,"stats":{"Line":5}},{"line":26,"address":[9332361],"length":1,"stats":{"Line":5}},{"line":32,"address":[9332608],"length":1,"stats":{"Line":3}},{"line":34,"address":[9332635],"length":1,"stats":{"Line":3}},{"line":45,"address":[9059206,9058292,9058128,9058163,9058250,9058467],"length":1,"stats":{"Line":4}},{"line":46,"address":[9058239],"length":1,"stats":{"Line":1}},{"line":47,"address":[9058277,9058498,9058347,9058412],"length":1,"stats":{"Line":2}},{"line":49,"address":[9058733,9058795],"lengt ents.\n\nuse std::collections::HashMap;\nuse std::sync::Arc;\n\nuse anyhow::{Context, Result};\nuse clap::{Parser, Subcommand};\nuse tokio::sync::{mpsc, RwLock, Semaphore};\nuse tokio::time::{timeout, Duration};\nuse tracing::{debug, error, info, warn};\nuse uuid::Uuid;\n\nuse agnos_common::{\n    AgentId, InferenceRequest, InferenceResponse, ModelInfo, TokenUsage,\n};\n\nmod providers;\nmod cache;\nmod accounting;\n\nuse crate::accounting::TokenAccounting;\nuse crate::cache::ResponseCache;\nuse crate::providers::{LlmProvider, ProviderType};\n\n#[derive(Parser)]\n#[command(name = \"llm-gateway\")]\n#[command(about = \"AGNOS LLM Gateway Service\")]\nstruct Cli {\n    #[command(subcommand)]\n    command: Commands,\n\n    #[arg(short, long, default_value = \"/etc/agnos/llm-gateway\")]\n    config_dir: std::path::PathBuf,\n}\n\n#[derive(Subcommand)]\nenum Commands {\n    /// Run the LLM gateway daemon\n    Daemon,\n    /// List available models\n    ListModels,\n    /// Load a model\n    Load {\n        model_id: String,\n    },\n    /// Unload a model\n    Unload {\n        model_id: String,\n    },\n    /// Run inference\n    Infer {\n        #[arg(short, long)]\n        model: Option\u003cString\u003e,\n        #[arg(short, long)]\n        prompt: String,\n    },\n    /// Show token usage statistics\n    Stats,\n}\n\n/// LLM Gateway service\npub struct LlmGateway {\n    /// Active providers\n    providers: RwLock\u003cHashMap\u003cProviderType, Arc\u003cdyn LlmProvider\u003e\u003e\u003e,\n    /// Currently loaded models\n    loaded_models: RwLock\u003cHashMap\u003cString, ModelInfo\u003e\u003e,\n    /// Request rate limiter\n    rate_limiter: Semaphore,\n    /// Response cache\n    cache: ResponseCache,\n    /// Token accounting for agents\n    accounting: TokenAccounting,\n    /// Configuration\n    config: GatewayConfig,\n}\n\n/// Gateway configuration\n#[derive(Debug, Clone)]\npub struct GatewayConfig {\n    pub max_concurrent_requests: usize,\n    pub request_timeout: Duration,\n    pub enable_caching: bool,\n    pub cache_ttl_seconds: u64,\n    pub enable_token_accounting: bool,\n}\n\nimpl Default for GatewayConfig {\n    fn default() -\u003e Self {\n        Self {\n            max_concurrent_requests: 10,\n            request_timeout: Duration::from_secs(60),\n            enable_caching: true,\n            cache_ttl_seconds: 3600,\n            enable_token_accounting: true,\n        }\n    }\n}\n\nimpl LlmGateway {\n    /// Create a new LLM gateway\n    pub async fn new(config: GatewayConfig) -\u003e Result\u003cSelf\u003e {\n        info!(\"Initializing LLM Gateway...\");\n\n        let rate_limiter = Semaphore::new(config.max_concurrent_requests);\n        let cache = ResponseCache::new(Duration::from_secs(config.cache_ttl_seconds));\n        let accounting = TokenAccounting::new();\n\n        Ok(Self {\n            providers: RwLock::new(HashMap::new()),\n            loaded_models: RwLock::new(HashMap::new()),\n            rate_limiter,\n            cache,\n            accounting,\n            config,\n        })\n    }\n\n    /// Initialize providers\n    pub async fn init_providers(\u0026self) -\u003e Result\u003c()\u003e {\n        info!(\"Initializing LLM providers...\");\n\n        let mut providers = self.providers.write().await;\n\n        // Try to initialize local providers\n        match providers::OllamaProvider::new().await {\n            Ok(provider) =\u003e {\n                info!(\"Ollama provider initialized\");\n                providers.insert(ProviderType::Ollama, Arc::new(provider));\n            }\n            Err(e) =\u003e {\n                warn!(\"Failed to initialize Ollama provider: {}\", e);\n            }\n        }\n\n        match providers::LlamaCppProvider::new().await {\n            Ok(provider) =\u003e {\n                info!(\"llama.cpp provider initialized\");\n                providers.insert(ProviderType::LlamaCpp, Arc::new(provider));\n            }\n            Err(e) =\u003e {\n                warn!(\"Failed to initialize llama.cpp provider: {}\", e);\n            }\n        }\n\n        // TODO: Initialize cloud providers (OpenAI, Anthropic)\n\n        info!(\"{} provider(s) initialized\", providers.len());\n        Ok(())\n    }\n\n    /// Run inference with the LLM\n    pub async fn infer(\n        \u0026self,\n        request: InferenceRequest,\n        agent_id: Option\u003cAgentId\u003e,\n    ) -\u003e Result\u003cInferenceResponse\u003e {\n        let _permit = self.rate_limiter.acquire().await?;\n        \n        info!(\n            \"Inference request: model={}, agent={:?}\",\n            request.model, agent_id\n        );\n\n        // Check cache if enabled\n        if self.config.enable_caching {\n            if let Some(cached) = self.cache.get(\u0026request).await {\n                debug!(\"Cache hit for inference request\");\n                return Ok(cached);\n            }\n        }\n\n        // Select the best provider for the request\n        let provider = self.select_provider(\u0026request).await?;\n        \n        // Execute inference with timeout\n        let response = timeout(\n            self.config.request_timeout,\n            provider.infer(request.clone())\n        )\n        .await\n        .context(\"Inference request timed out\")??;\n\n        // Update token accounting\n        if self.config.enable_token_accounting {\n            if let Some(agent_id) = agent_id {\n                self.accounting.record_usage(agent_id, response.usage).await;\n            }\n        }\n\n        // Cache the response\n        if self.config.enable_caching {\n            self.cache.set(request, response.clone()).await;\n        }\n\n        Ok(response)\n    }\n\n    /// Stream inference results\n    pub async fn infer_stream(\n        \u0026self,\n        request: InferenceRequest,\n        agent_id: Option\u003cAgentId\u003e,\n    ) -\u003e Result\u003cmpsc::Receiver\u003cResult\u003cString\u003e\u003e\u003e {\n        let _permit = self.rate_limiter.acquire().await?;\n        \n        info!(\n            \"Streaming inference request: model={}, agent={:?}\",\n            request.model, agent_id\n        );\n\n        let provider = self.select_provider(\u0026request).await?;\n        let stream = provider.infer_stream(request).await?;\n\n        Ok(stream)\n    }\n\n    /// Select the best provider for a request\n    async fn select_provider(\u0026self, request: \u0026InferenceRequest) -\u003e Result\u003cArc\u003cdyn LlmProvider\u003e\u003e {\n        let providers = self.providers.read().await;\n        \n        // Check if requested model is loaded locally\n        let loaded = self.loaded_models.read().await;\n        if loaded.contains_key(\u0026request.model) {\n            // Use the provider that has this model\n            if let Some(provider) = providers.get(\u0026ProviderType::Ollama) {\n                return Ok(provider.clone());\n            }\n        }\n        drop(loaded);\n\n        // Default to first available local provider\n        if let Some((_, provider)) = providers.iter().next() {\n            return Ok(provider.clone());\n        }\n\n        // Try cloud providers as fallback\n        if let Some(provider) = providers.get(\u0026ProviderType::OpenAi) {\n            return Ok(provider.clone());\n        }\n\n        Err(anyhow::anyhow!(\"No LLM provider available\"))\n    }\n\n    /// List available models\n    pub async fn list_models(\u0026self) -\u003e Vec\u003cModelInfo\u003e {\n        let loaded = self.loaded_models.read().await;\n        loaded.values().cloned().collect()\n    }\n\n    /// Load a model\n    pub async fn load_model(\u0026self, model_id: \u0026str) -\u003e Result\u003c()\u003e {\n        info!(\"Loading model: {}\", model_id);\n\n        let providers = self.providers.read().await;\n        \n        // Try to load from available providers\n        for (provider_type, provider) in providers.iter() {\n            match provider.load_model(model_id).await {\n                Ok(model_info) =\u003e {\n                    let mut loaded = self.loaded_models.write().await;\n                    loaded.insert(model_id.to_string(), model_info);\n                    info!(\"Model {} loaded successfully via {:?}\", model_id, provider_type);\n                    return Ok(());\n                }\n                Err(e) =\u003e {\n                    debug!(\"Provider {:?} could not load model {}: {}\", \n                           provider_type, model_id, e);\n                }\n            }\n        }\n\n        Err(anyhow::anyhow!(\"Failed to load model {} from any provider\", model_id))\n    }\n\n    /// Unload a model\n    pub async fn unload_model(\u0026self, model_id: \u0026str) -\u003e Result\u003c()\u003e {\n        info!(\"Unloading model: {}\", model_id);\n\n        let mut loaded = self.loaded_models.write().await;\n        \n        if loaded.remove(model_id).is_some() {\n            info!(\"Model {} unloaded\", model_id);\n        }\n\n        Ok(())\n    }\n\n    /// Get token usage for an agent\n    pub async fn get_agent_usage(\u0026self, agent_id: AgentId) -\u003e Option\u003cTokenUsage\u003e {\n        self.accounting.get_usage(agent_id).await\n    }\n\n    /// Get total token usage\n    pub async fn get_total_usage(\u0026self) -\u003e TokenUsage {\n        self.accounting.get_total_usage().await\n    }\n\n    /// Reset token accounting for an agent\n    pub async fn reset_agent_usage(\u0026self, agent_id: AgentId) {\n        self.accounting.reset_usage(agent_id).await;\n    }\n\n    /// Create a model sharing session for multi-agent access\n    pub async fn create_shared_session(\n        \u0026self,\n        model_id: \u0026str,\n        agent_ids: Vec\u003cAgentId\u003e,\n    ) -\u003e Result\u003cSharedSession\u003e {\n        info!(\"Creating shared session for model {} with {} agents\", \n              model_id, agent_ids.len());\n\n        // Ensure model is loaded\n        self.load_model(model_id).await?;\n\n        let session = SharedSession {\n            id: Uuid::new_v4().to_string(),\n            model_id: model_id.to_string(),\n            agent_ids,\n            created_at: chrono::Utc::now(),\n        };\n\n        Ok(session)\n    }\n}\n\n/// Shared model session for multi-agent access\n#[derive(Debug, Clone)]\npub struct SharedSession {\n    pub id: String,\n    pub model_id: String,\n    pub agent_ids: Vec\u003cAgentId\u003e,\n    pub created_at: chrono::DateTime\u003cchrono::Utc\u003e,\n}\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c()\u003e {\n    tracing_subscriber::fmt()\n        .with_env_filter(tracing_subscriber::EnvFilter::from_default_env())\n        .init();\n\n    info!(\"AGNOS LLM Gateway Service v{}\", env!(\"CARGO_PKG_VERSION\"));\n\n    let cli = Cli::parse();\n\n    match cli.command {\n        Commands::Daemon =\u003e run_daemon().await,\n        Commands::ListModels =\u003e list_models().await,\n        Commands::Load { model_id } =\u003e load_model(\u0026model_id).await,\n        Commands::Unload { model_id } =\u003e unload_model(\u0026model_id).await,\n        Commands::Infer { model, prompt } =\u003e run_inference(model, prompt).await,\n        Commands::Stats =\u003e show_stats().await,\n    }\n}\n\nasync fn run_daemon() -\u003e Result\u003c()\u003e {\n    info!(\"Starting LLM Gateway daemon...\");\n\n    let config = GatewayConfig::default();\n    let gateway = Arc::new(LlmGateway::new(config).await?);\n    \n    gateway.init_providers().await?;\n\n    info!(\"LLM Gateway daemon started successfully\");\n\n    // Keep running until shutdown signal\n    tokio::signal::ctrl_c().await?;\n    \n    info!(\"Shutting down LLM Gateway daemon...\");\n    Ok(())\n}\n\nasync fn list_models() -\u003e Result\u003c()\u003e {\n    println!(\"Available models:\");\n    println!(\"  (none loaded - run 'llm-gateway daemon' first)\");\n    Ok(())\n}\n\nasync fn load_model(model_id: \u0026str) -\u003e Result\u003c()\u003e {\n    println!(\"Loading model: {}\", model_id);\n    Ok(())\n}\n\nasync fn unload_model(model_id: \u0026str) -\u003e Result\u003c()\u003e {\n    println!(\"Unloading model: {}\", model_id);\n    Ok(())\n}\n\nasync fn run_inference(model: Option\u003cString\u003e, prompt: String) -\u003e Result\u003c()\u003e {\n    let request = InferenceRequest {\n        prompt,\n        model: model.unwrap_or_else(|| \"default\".to_string()),\n        ..Default::default()\n    };\n\n    println!(\"Running inference with model: {}\", request.model);\n    println!(\"Prompt: {}\", request.prompt);\n    \n    Ok(())\n}\n\nasync fn show_stats() -\u003e Result\u003c()\u003e {\n    println!(\"Token usage statistics:\");\n    println!(\"  (no data available)\");\n    Ok(())\n}\n","traces":[{"line":91,"address":[9082864],"length":1,"stats":{"Line":0}},{"line":94,"address":[9082878],"length":1,"stats":{"Line":0}},{"line":104,"address":[9254646,9254748,9254775,9255872,9254608],"length":1,"stats":{"Line":0}},{"line":105,"address":[9255078,9254818,9254723],"length":1,"stats":{"Line":0}},{"line":107,"address":[9255041],"length":1,"stats":{"Line":0}},{"line":108,"address":[9255294],"length":1,"stats":{"Line":0}},{"line":109,"address":[9255350],"length":1,"stats":{"Line":0}},{"line":111,"address":[9255613],"length":1,"stats":{"Line":0}},{"line":112,"address":[9255405,9255449],"length":1,"stats":{"Line":0}},{"line":113,"address":[9255531,9255487],"length":1,"stats":{"Line":0}},{"line":115,"address":[9255561],"length":1,"stats":{"Line":0}},{"line":116,"address":[9255587],"length":1,"stats":{"Line":0}},{"line":122,"address":[9077504,9077512],"length":1,"stats":{"Line":0}},{"line":123,"address":[9243605,9243144,9243314],"length":1,"stats":{"Line":0}},{"line":125,"address":[9188753],"length":1,"stats":{"Line":0}},{"line":128,"address":[9244389,9243226,9244180,9244245],"length":1,"stats":{"Line":0}},{"line":129,"address":[9244676],"length":1,"stats":{"Line":0}},{"line":130,"ad e_url: \"http://localhost:11434\".to_string(),\n        })\n    }\n}\n\n#[async_trait]\nimpl LlmProvider for OllamaProvider {\n    async fn infer(\u0026self, request: InferenceRequest) -\u003e anyhow::Result\u003cInferenceResponse\u003e {\n        use reqwest;\n        \n        let client = reqwest::Client::new();\n        let response = client\n            .post(format!(\"{}/api/generate\", self.base_url))\n            .json(\u0026serde_json::json!({\n                \"model\": request.model,\n                \"prompt\": request.prompt,\n                \"stream\": false,\n                \"options\": {\n                    \"temperature\": request.temperature,\n                    \"top_p\": request.top_p,\n                    \"num_predict\": request.max_tokens,\n                }\n            }))\n            .send()\n            .await?;\n        \n        let result: serde_json::Value = response.json().await?;\n        \n        Ok(InferenceResponse {\n            text: result[\"response\"].as_str().unwrap_or(\"\").to_string(),\n            tokens_generated: result[\"eval_count\"].as_u64().unwrap_or(0) as u32,\n            finish_reason: agnos_common::FinishReason::Stop,\n            model: request.model,\n            usage: agnos_common::TokenUsage {\n                prompt_tokens: result[\"prompt_eval_count\"].as_u64().unwrap_or(0) as u32,\n                completion_tokens: result[\"eval_count\"].as_u64().unwrap_or(0) as u32,\n                total_tokens: result[\"eval_count\"].as_u64().unwrap_or(0) as u32 \n                    + result[\"prompt_eval_count\"].as_u64().unwrap_or(0) as u32,\n            },\n        })\n    }\n    \n    async fn infer_stream(\u0026self, _request: InferenceRequest) -\u003e anyhow::Result\u003cmpsc::Receiver\u003canyhow::Result\u003cString\u003e\u003e\u003e {\n        let (tx, rx) = mpsc::channel(100);\n        // TODO: Implement streaming\n        Ok(rx)\n    }\n    \n    async fn load_model(\u0026self, model_id: \u0026str) -\u003e anyhow::Result\u003cagnos_common::ModelInfo\u003e {\n        // Pull the model if not already available\n        let client = reqwest::Client::new();\n        let _ = client\n            .post(format!(\"{}/api/pull\", self.base_url))\n            .json(\u0026serde_json::json!({\n                \"name\": model_id,\n            }))\n            .send()\n            .await?;\n        \n        Ok(agnos_common::ModelInfo {\n            id: model_id.to_string(),\n            name: model_id.to_string(),\n            provider: agnos_common::Provider::Local,\n            capabilities: vec![agnos_common::ModelCapability::TextGeneration],\n            max_tokens: 4096,\n            size_bytes: 0,\n            loaded: true,\n        })\n    }\n    \n    async fn unload_model(\u0026self, _model_id: \u0026str) -\u003e anyhow::Result\u003c()\u003e {\n        // Ollama manages model loading/unloading automatically\n        Ok(())\n    }\n    \n    async fn list_models(\u0026self) -\u003e anyhow::Result\u003cVec\u003cagnos_common::ModelInfo\u003e\u003e {\n        let client = reqwest::Client::new();\n        let response = client\n            .get(format!(\"{}/api/tags\", self.base_url))\n            .send()\n            .await?;\n        \n        let result: serde_json::Value = response.json().await?;\n        let models: Vec\u003cagnos_common::ModelInfo\u003e = result[\"models\"]\n            .as_array()\n            .unwrap_or(\u0026vec![])\n            .iter()\n            .filter_map(|m| {\n                Some(agnos_common::ModelInfo {\n                    id: m[\"name\"].as_str()?.to_string(),\n                    name: m[\"name\"].as_str()?.to_string(),\n                    provider: agnos_common::Provider::Local,\n                    capabilities: vec![agnos_common::ModelCapability::TextGeneration],\n                    max_tokens: 4096,\n                    size_bytes: m[\"size\"].as_u64().unwrap_or(0),\n                    loaded: true,\n                })\n            })\n            .collect();\n        \n        Ok(models)\n    }\n}\n\n/// llama.cpp provider implementation\npub struct LlamaCppProvider {\n    base_url: String,\n}\n\nimpl LlamaCppProvider {\n    pub async fn new() -\u003e anyhow::Result\u003cSelf\u003e {\n        Ok(Self {\n            base_url: \"http://localhost:8080\".to_string(),\n        })\n    }\n}\n\n#[async_trait]\nimpl LlmProvider for LlamaCppProvider {\n    async fn infer(\u0026self, request: InferenceRequest) -\u003e anyhow::Result\u003cInferenceResponse\u003e {\n        use reqwest;\n        \n        let client = reqwest::Client::new();\n        let response = client\n            .post(format!(\"{}/completion\", self.base_url))\n            .json(\u0026serde_json::json!({\n                \"prompt\": request.prompt,\n                \"temperature\": request.temperature,\n                \"top_p\": request.top_p,\n                \"n_predict\": request.max_tokens,\n            }))\n            .send()\n            .await?;\n        \n        let result: serde_json::Value = response.json().await?;\n        \n        Ok(InferenceResponse {\n            text: result[\"content\"].as_str().unwrap_or(\"\").to_string(),\n            tokens_generated: result[\"tokens_predicted\"].as_u64().unwrap_or(0) as u32,\n            finish_reason: agnos_common::FinishReason::Stop,\n            model: request.model,\n            usage: agnos_common::TokenUsage {\n                prompt_tokens: result[\"tokens_evaluated\"].as_u64().unwrap_or(0) as u32,\n                completion_tokens: result[\"tokens_predicted\"].as_u64().unwrap_or(0) as u32,\n                total_tokens: result[\"tokens_evaluated\"].as_u64().unwrap_or(0) as u32 \n                    + result[\"tokens_predicted\"].as_u64().unwrap_or(0) as u32,\n            },\n        })\n    }\n    \n    async fn infer_stream(\u0026self, _request: InferenceRequest) -\u003e anyhow::Result\u003cmpsc::Receiver\u003canyhow::Result\u003cString\u003e\u003e\u003e {\n        let (tx, rx) = mpsc::channel(100);\n        Ok(rx)\n    }\n    \n    async fn load_model(\u0026self, _model_id: \u0026str) -\u003e anyhow::Result\u003cagnos_common::ModelInfo\u003e {\n        // llama.cpp loads models at startup\n        anyhow::bail!(\"llama.cpp requires model at startup\")\n    }\n    \n    async fn unload_model(\u0026self, _model_id: \u0026str) -\u003e anyhow::Result\u003c()\u003e {\n        Ok(())\n    }\n    \n    async fn list_models(\u0026self) -\u003e anyhow::Result\u003cVec\u003cagnos_common::ModelInfo\u003e\u003e {\n        // llama.cpp typically runs one model at a time\n        Ok(vec![])\n    }\n}\n","traces":[{"line":43,"address":[9386256],"length":1,"stats":{"Line":0}},{"line":44,"address":[9120671],"length":1,"stats":{"Line":0}},{"line":45,"address":[9120571],"length":1,"stats":{"Line":0}},{"line":52,"address":[9128732,9133979,9128208,9131257,9134002,9134524,9134661,9128503,9128270,9131141,9134589,9128460,9128586,9128706],"length":1,"stats":{"Line":0}},{"line":55,"address":[9128665,9128804],"length":1,"stats":{"Line":0}},{"line":56,"address":[9128807,9131610,9131477,9131541,9131061],"length":1,"stats":{"Line":0}},{"line":57,"address":[9128821,9128906],"length":1,"stats":{"Line":0}},{"line":58,"address":[9129220,9129861,9129803,9130304,9129444,9130554,9129511,9130010,9129112,9131119,9131147,9130484,9130234,9129150,9129937,9129061],"length":1,"stats":{"Line":0}},{"line":69,"address":[9131487,9131594,9130960,9131291,9131094,9131046,9128490,9131982,9131746],"length":1,"stats":{"Line":0}},{"line":71,"address":[9178082],"length":1,"stats":{"Line":0}},{"line":73,"address":[9133572],"length":1,"stats":{"Line":0}},{"line":74,"address":[9132434,9132665,9132528],"length":1,"stats":{"Line":0}},{"line":75,"address":[9132778,9132684],"length":1,"stats":{"Line":0}},{"line":77,"address":[9132867],"length":1,"stats":{"Line":0}},{"line":78,"address":[9133551],"length":1,"stats":{"Line":0}},{"line":79,"address":[9132992,9132898],"length":1,"s
